<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Request Form Rules — Prototype Hub</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  body { display: flex; flex-direction: column; background: #0f172a; }
  header { flex: 0 0 auto; display: flex; align-items: center; gap: 16px; padding: 8px 16px;
           background: #0f172a; color: #e2e8f0; border-bottom: 1px solid #1e293b; }
  .brand { font-weight: 600; font-size: 13px; color: #f1f5f9; white-space: nowrap; }
  .tabs { display: flex; gap: 6px; flex: 1 1 auto; overflow-x: auto; }
  .tab { appearance: none; border: 1px solid #334155; background: #1e293b; color: #cbd5e1;
         padding: 6px 12px; border-radius: 9999px; font-size: 13px; font-weight: 500; cursor: pointer;
         white-space: nowrap; transition: background .12s, color .12s, border-color .12s; }
  .tab:hover { background: #334155; color: #fff; }
  .tab.active { background: #0ea5e9; border-color: #0ea5e9; color: #fff; }
  .tab .sub { opacity: .7; font-weight: 400; }
  .tab .star { color: #fde047; margin-left: 4px; }
  .pop { flex: 0 0 auto; color: #94a3b8; text-decoration: none; font-size: 12px; padding: 6px 8px;
         border-radius: 6px; white-space: nowrap; }
  .pop:hover { color: #fff; background: #1e293b; }
  .picker { flex: 0 0 auto; background: #1e293b; color: #e2e8f0; border: 1px solid #334155;
            border-radius: 8px; font-size: 12px; padding: 6px 8px; cursor: pointer; max-width: 220px; }
  .picker:hover { border-color: #475569; }
  .picker:focus { outline: none; border-color: #0ea5e9; }
  main { flex: 1 1 auto; min-height: 0; background: #fff; }
  iframe { width: 100%; height: 100%; border: 0; display: block; }
</style>
</head>
<body>
<header>
  <span class="brand">Request Form Rules · Prototypes</span>
  <nav class="tabs" id="tabs"></nav>
  <select class="picker" id="picker" title="Jump to any version (incl. older ones)"></select>
  <a class="pop" id="pop" href="#" target="_blank" rel="noopener">Open full screen ↗</a>
</header>
<main>
  <iframe id="frame" title="Rule Studio prototype" src="about:blank"></iframe>
</main>

<script>
  var VERSIONS = [
    { id:"v11", label:"Field Rule Workspace",   sub:"V11", src:"rule-studio-v11.html" },
    { id:"v112", label:"Field Rule Workspace",  sub:"V11.2", src:"rule-studio-v11-2.html" },
    { id:"v12", label:"Multi-Field Rule Workspace",  sub:"V12", src:"rule-studio-v12.html" },
    { id:"v10", label:"Form Builder",           sub:"V10", src:"rule-studio-v10.html" },
    { id:"v102", label:"Rule Block Display",    sub:"V10.2", src:"rule-studio-v10-2.html" },
    { id:"v103", label:"Rule Landmarks",        sub:"V10.3", src:"rule-studio-v10-3.html" },
    { id:"v7", label:"Progressive Workspace",   sub:"V7", src:"rule-studio-v7.html" },
    { id:"v8", label:"Guided Form Canvas",      sub:"V8", src:"rule-studio-v8.html" },
    { id:"v9", label:"Rule Sequence Workspace", sub:"V9", src:"rule-studio-v9.html" },
  ];

  // Full catalogue (incl. older versions) — used by the dropdown so EVERY version is reachable.
  // The tab bar above still renders only the VERSIONS subset (unchanged).
  var ALL_VERSIONS = [
    { id:"v1",  label:"Sentence-First Builder",     sub:"V1",   src:"rule-studio-v1.html" },
    { id:"v2",  label:"Structured Form",            sub:"V2",   src:"rule-studio-demo.html" },
    { id:"v3",  label:"Block Workspace",            sub:"V3",   src:"rule-studio-v3.html" },
    { id:"v4",  label:"Starter Cards",              sub:"V4",   src:"rule-studio-v4.html" },
    { id:"v5",  label:"Guided Composer",            sub:"V5",   src:"rule-studio-v5.html" },
    { id:"v6",  label:"Refined Classic Form",       sub:"V6",   src:"rule-studio-v6.html" },
    { id:"v7",  label:"Progressive Workspace",      sub:"V7",   src:"rule-studio-v7.html" },
    { id:"v8",  label:"Guided Form Canvas",         sub:"V8",   src:"rule-studio-v8.html" },
    { id:"v9",  label:"Rule Sequence Workspace",    sub:"V9",   src:"rule-studio-v9.html" },
    { id:"v92", label:"Guided Sequence Editor",     sub:"V9.2", src:"rule-studio-v9-2.html" },
    { id:"v10", label:"Form Builder",               sub:"V10",  src:"rule-studio-v10.html" },
    { id:"v101",label:"Service Catalog + Rules",     sub:"V10.1",src:"rule-studio-v10-1.html" },
    { id:"v102",label:"Rule Block Display",          sub:"V10.2",src:"rule-studio-v10-2.html" },
    { id:"v103",label:"Rule Landmarks",              sub:"V10.3",src:"rule-studio-v10-3.html" },
    { id:"v11", label:"Field Rule Workspace",       sub:"V11",  src:"rule-studio-v11.html" },
    { id:"v112",label:"Field Rule Workspace",       sub:"V11.2",src:"rule-studio-v11-2.html" },
    { id:"v12", label:"Multi-Field Rule Workspace", sub:"V12",  src:"rule-studio-v12.html" },
  ];

  var tabsEl = document.getElementById("tabs");
  var frame = document.getElementById("frame");
  var pop = document.getElementById("pop");
  var picker = document.getElementById("picker");
  var vlookup = function(id){ return ALL_VERSIONS.find(function(x){ return x.id === id; }) || VERSIONS[0]; };
  var known = function(id){ return ALL_VERSIONS.some(function(v){ return v.id === id; }); };

  // bump on each deploy to bust the browser cache of the iframed prototype (stale cache was loading
  // an old version that still pointed at blocked CDNs → blank iframe)
  var BUILD = "20260619c";
  function select(id, push){
    var v = vlookup(id);
    frame.src = v.src + "?b=" + BUILD;
    pop.href = v.src + "?b=" + BUILD;
    Array.prototype.forEach.call(tabsEl.children, function(btn){
      btn.classList.toggle("active", btn.dataset.id === v.id);
    });
    if (picker) picker.value = v.id;
    if (push && location.hash !== "#" + v.id) history.replaceState(null, "", "#" + v.id);
    document.title = "Hub · " + v.label + " " + v.sub;
  }

  VERSIONS.forEach(function(v){
    var b = document.createElement("button");
    b.className = "tab";
    b.dataset.id = v.id;
    b.innerHTML = "<strong>" + v.label + "</strong> <span class='sub'>" + v.sub + "</span>" +
                  (v.star ? "<span class='star' title='Recommended'>★</span>" : "");
    b.addEventListener("click", function(){ select(v.id, true); });
    tabsEl.appendChild(b);
  });

  // Dropdown — lists ALL versions (this is how older versions stay reachable).
  ALL_VERSIONS.forEach(function(v){
    var o = document.createElement("option");
    o.value = v.id;
    o.textContent = v.sub + " — " + v.label;
    picker.appendChild(o);
  });
  picker.addEventListener("change", function(){ select(picker.value, true); });

  // honor #v1…#v12 deep-links; default to V11 (current focus)
  var start = (location.hash || "").replace("#", "");
  select(known(start) ? start : "v11", false);
  window.addEventListener("hashchange", function(){
    var id = (location.hash || "").replace("#", "");
    if (known(id)) select(id, false);
  });
</script>
</body>
</html>
