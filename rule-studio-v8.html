<script type="text/babel" data-presets="react">
const { useState, useMemo, useRef, useEffect } = React;

/* ============================================================ DOMAIN DATA */
// Field groups shown as headers in the field dropdown (DD1)
const FIELD_GROUPS = [
  { id:"REQUESTER", label:"Requester Fields",      short:"Requester" },
  { id:"LOGGED_IN", label:"Logged-in User Fields", short:"Logged-in User" },
  { id:"REQUEST",   label:"Request Fields",        short:"Request" },
  { id:"GLOBAL",    label:"Global Fields",         short:"Global" },
];
const groupShort = id => (FIELD_GROUPS.find(g=>g.id===id)||{}).short || id;

// Operator sets by field kind (DD2 depends on the field chosen in DD1)
const OP_SETS = {
  TEXT:       ["EQUALS","NOT_EQUALS","STARTS_WITH","ENDS_WITH","CONTAINS","IS_NOT_BLANK","IS_BLANK"],
  CHOICE:     ["MATCH_ANY","MATCH_ALL","IS_EMPTY","IS_NOT_EMPTY"],
  MEMBERSHIP: ["IN","NOT_IN"],
};

// Reusable option lists for choice/membership fields (DD3 values)
const OPT = {
  group:    ["IT Support","HR","Finance","Network","Facilities"],
  tz:       ["UTC","IST (GMT+5:30)","EST","PST","CET"],
  loc:      ["New York","London","Mumbai","Berlin","Remote"],
  dept:     ["IT","HR","Finance","Sales","Operations"],
  level:    ["Tier 0","Tier 1","Tier 2","Tier 3"],
  roles:    ["Admin","Agent","Requester","Manager","Approver"],
  impact:   ["Low","Medium","High"],
  priority: ["Low","Medium","High","Urgent"],
  tags:     ["VIP","Escalated","Onboarding","Hardware","Security"],
  assignee: ["Unassigned","Priya","Marco","Sara","Alex"],
  sentiment:["Positive","Neutral","Negative"],
  status:   ["Open","In Progress","On Hold","Resolved","Closed"],
  reqType:  ["Incident","Service Request","Problem","Change"],
  category: ["Hardware","Software","Network","Access"],

  company:  ["Acme","Globex","Initech","Umbrella"],
  vendor:   ["Dell","Cisco","Microsoft","Apple"],
  portal:   ["Employee Portal","Customer Portal","Partner Portal"],

const _slugName = n => n.replace(/[^a-zA-Z0-9]+/g,"_").replace(/^_+|_+$/g,"").toLowerCase();
function mkField(group, name, type, options){
  return { id: group.toLowerCase()+"__"+_slugName(name), group, name,
           label: groupShort(group)+" - "+name, type,
           options: options || null,
           opset: type==="choice" ? "CHOICE" : type==="membership" ? "MEMBERSHIP" : "TEXT" };
}
const FIELDS = [
  // ---- Requester Fields ----
  mkField("REQUESTER","Requester Group","choice",OPT.group),
  mkField("REQUESTER","Name","text"),
  mkField("REQUESTER","Time Zone","choice",OPT.tz),
  mkField("REQUESTER","Support Level","choice",OPT.level),
  mkField("REQUESTER","Logon Name","text"),
  mkField("REQUESTER","Location","choice",OPT.loc),
  mkField("REQUESTER","Manager","text"),
  mkField("REQUESTER","Department","choice",OPT.dept),
  mkField("REQUESTER","Email","text"),
  // ---- Logged-in User Fields ----
  mkField("LOGGED_IN","Requester Group","choice",OPT.group),
  mkField("LOGGED_IN","Name","text"),
  mkField("LOGGED_IN","Time Zone","choice",OPT.tz),
  mkField("LOGGED_IN","Support Level","choice",OPT.level),
  mkField("LOGGED_IN","Logon Name","text"),
  mkField("LOGGED_IN","Location","choice",OPT.loc),
  mkField("LOGGED_IN","Manager","text"),
  mkField("LOGGED_IN","Department","choice",OPT.dept),
  mkField("LOGGED_IN","Roles","membership",OPT.roles),
  mkField("LOGGED_IN","Email","text"),
  // ---- Request Fields ----
  mkField("REQUEST","Cc Emails","text"),
  mkField("REQUEST","Technician Group","choice",OPT.group),
  mkField("REQUEST","Impact","choice",OPT.impact),
  mkField("REQUEST","Priority","choice",OPT.priority),
  mkField("REQUEST","Tags","membership",OPT.tags),
  mkField("REQUEST","Summary","text"),
  mkField("REQUEST","Assignee","choice",OPT.assignee),
  mkField("REQUEST","Sentiment","choice",OPT.sentiment),
  mkField("REQUEST","Status","choice",OPT.status),
  mkField("REQUEST","Request Type","choice",OPT.reqType),
  mkField("REQUEST","Subject","text"),
  mkField("REQUEST","Category","choice",OPT.category),
  mkField("REQUEST","Urgency","choice",OPT.urgency),
  mkField("REQUEST","Company","choice",OPT.company),
  mkField("REQUEST","Vendor","choice",OPT.vendor),
  mkField("REQUEST","Location","choice",OPT.loc),
  mkField("REQUEST","Department","choice",OPT.dept),
  mkField("REQUEST","New Datetime","date"),
  mkField("REQUEST","New Text Input","text"),
  mkField("REQUEST","Description","text"),
  mkField("REQUEST","Attachment","text"),
  mkField("REQUEST","Requester","choice",OPT.assignee),
  // ---- Global Fields ----
  mkField("GLOBAL","Support Portal","choice",OPT.portal),
];
const fieldOf  = id => FIELDS.find(f => f.id === id) || { id, label:id, name:id, type:"text", opset:"TEXT", options:null };
const fLabel   = id => fieldOf(id).label;
const fieldOps = id => OP_SETS[fieldOf(id).opset] || OP_SETS.TEXT;
// Fields a rule action can target = actual form fields (Request + Global)
const FORM_FIELDS = FIELDS.filter(f => f.group==="REQUEST" || f.group==="GLOBAL");
// Action target fields (shown after an action is chosen) — short names, real-product order
const ACTION_FIELDS = ["request__description","request__status","request__attachment","request__priority","request__cc_emails","request__requester","request__impact","request__department","request__location","request__vendor","request__urgency","request__tags","request__technician_group","request__assignee","request__subject"].map(id => fieldOf(id));

const AUDIENCES = [
  { id:"ALL",        label:"All Users",        actor:"any user" },
  { id:"REQUESTERS", label:"Requesters",       actor:"a requester" },
  { id:"TECHNICIANS",label:"Technicians",      actor:"a technician" },
  { id:"LOGGED_IN",  label:"Logged-in Users",  actor:"a logged-in user" },
];
const audActor = id => (AUDIENCES.find(a=>a.id===id)||{}).actor || "a user";

const LIFECYCLES = [
  { id:"CREATE",      label:"On Create",          verb:"creates a request" },
  { id:"EDIT",        label:"On Edit",            verb:"edits a request" },
  { id:"CREATE_EDIT", label:"On Create & Edit",   verb:"creates or edits a request" },
];
const MOMENTS = [
  { id:"ON_LOAD",         label:"When the form opens" },
  { id:"ON_FIELD_CHANGE", label:"While the form is being filled" },
  { id:"ON_SUBMIT",       label:"When the form is submitted" },
];
const momentLabel = id => (MOMENTS.find(m=>m.id===id)||{}).label || id;
const lcVerb = id => (LIFECYCLES.find(l=>l.id===id)||{}).verb || "uses a request";
const LIFECYCLES_FRIENDLY = [
  { id:"CREATE",      label:"New requests only" },
  { id:"EDIT",        label:"Existing requests only" },
  { id:"CREATE_EDIT", label:"New and existing requests" },
];
// "Execute On" options (screenshot-style labels) — map to lifecycle ids
const EXECUTE_ON = [
  { id:"CREATE",      label:"New Form" },
  { id:"EDIT",        label:"Edit Form" },
  { id:"CREATE_EDIT", label:"New & Edit Form" },
];
// who experiences the rule, in plain language
const AUD_FRIENDLY = [
  { id:"ALL",        label:"Everyone" },
  { id:"REQUESTERS", label:"Requesters only" },
  { id:"TECHNICIANS",label:"Technicians only" },
  { id:"LOGGED_IN",  label:"Signed-in users only" },
];
const audFriendly = id => (AUD_FRIENDLY.find(a=>a.id===id)||{}).label || id;
const audPlural = id => ({ ALL:"everyone", REQUESTERS:"requesters", TECHNICIANS:"technicians", LOGGED_IN:"signed-in users" }[id] || "everyone");

// val: how DD3 behaves — "single" (one value), "multi" (multi-select chips), "none" (no value)
const OPERATORS = [
  { id:"EQUALS",       label:"Equals",          val:"single" },
  { id:"NOT_EQUALS",   label:"Not Equals",      val:"single" },
  { id:"STARTS_WITH",  label:"Start With",      val:"single" },
  { id:"ENDS_WITH",    label:"End With",        val:"single" },
  { id:"CONTAINS",     label:"Contains",        val:"single" },
  { id:"IS_NOT_BLANK", label:"Is Not Blank",    val:"none" },
  { id:"IS_BLANK",     label:"Is Blank",        val:"none" },
  { id:"MATCH_ANY",    label:"Match Any",       val:"multi" },
  { id:"MATCH_ALL",    label:"Match All",       val:"multi" },
  { id:"IS_EMPTY",     label:"Is Empty",        val:"none" },
  { id:"IS_NOT_EMPTY", label:"Is Not Empty",    val:"none" },
  { id:"IN",           label:"in",              val:"multi" },
  { id:"NOT_IN",       label:"not in",          val:"multi" },
  // legacy ids kept so older summaries/eval paths never throw
  { id:"BECOMES",      label:"becomes",         val:"single" },
  { id:"GREATER_THAN", label:"is greater than", val:"single" },
  { id:"LESS_THAN",    label:"is less than",    val:"single" },
];
const opLabel = id => (OPERATORS.find(o=>o.id===id)||{}).label || id;
const opVal   = id => (OPERATORS.find(o=>o.id===id)||{}).val || "single";

const ACTION_TYPES = [
  { id:"SHOW",         label:"Show",              phrase:(f)=>`show ${f}` },
  { id:"HIDE",         label:"Hide",              phrase:(f)=>`hide ${f}` },
  { id:"MANDATE",      label:"Mandate",           phrase:(f)=>`make ${f} mandatory` },
  { id:"OPTIONAL",     label:"Non-Mandate",       phrase:(f)=>`make ${f} non-mandatory` },
  { id:"ENABLE",       label:"Enable",            phrase:(f)=>`enable ${f}` },
  { id:"DISABLE",      label:"Disable",           phrase:(f)=>`disable ${f}` },
  { id:"SET_VALUE",    label:"Set Value",         phrase:(f,v)=>`set ${f} to ${v||"…"}` },
  { id:"CLEAR_VALUE",  label:"Clear Value",       phrase:(f)=>`clear ${f}` },
  { id:"SHOW_OPTIONS", label:"Show Options",      phrase:(f)=>`show options for ${f}` },
  { id:"HIDE_OPTIONS", label:"Hide Options",      phrase:(f)=>`hide options for ${f}` },
  { id:"RUN_SCRIPT",   label:"Run Custom Script", phrase:(f)=>`run a custom script` },
  { id:"FILTER_DATA",  label:"Filter Data",       phrase:(f)=>`filter the data in ${f}` },
];
const REVERSIBLE = ["SHOW","HIDE","MANDATE","OPTIONAL","ENABLE","DISABLE","SHOW_OPTIONS","HIDE_OPTIONS"];
const OPPOSITE = { SHOW:"HIDE", HIDE:"SHOW", MANDATE:"OPTIONAL", OPTIONAL:"MANDATE", ENABLE:"DISABLE", DISABLE:"ENABLE", SHOW_OPTIONS:"HIDE_OPTIONS", HIDE_OPTIONS:"SHOW_OPTIONS" };
const actionPhrase = a => {
  const t = ACTION_TYPES.find(x=>x.id===a.type);
  const fName = fieldOf(a.fieldId).name || fLabel(a.fieldId);
  return t ? t.phrase(fName, a.value) : a.type;
};

let _uid = 100;
const uid = p => `${p}_${++_uid}`;

/* ============================================================ FACTORIES */
const defaultVal  = op => { const k=opVal(op); return k==="multi" ? [] : k==="none" ? undefined : ""; };
const newCondition = () => { const fieldId="request__priority"; const op=fieldOps(fieldId)[0]; return { id:uid("c"), fieldId, op, value:defaultVal(op) }; };
const newGroup     = () => ({ id:uid("g"), kind:"GROUP", match:"ANY", conditions:[ newCondition() ] });
const newAction    = () => ({ id:uid("a"), type:"MANDATE", fieldId:"request__assignee", value:"" });
const newBlock     = () => ({ id:uid("b"), match:"ALL", mode:"ACTION", conditions:[ newCondition() ], actions:[ newAction() ] });
const newRule = () => ({
  id: uid("rule"),
  name: "",
  description: "",
  trigger: { lifecycle:"CREATE", moment:"ON_FIELD_CHANGE", fieldId:"request__priority" },
  scope:   { audience:"TECHNICIANS" },
  blocks:  [ { id: uid("b"), match:"ALL", mode:"ACTION", conditions:[], actions:[] } ],  // guided: start empty (no prefilled condition/action)
  advanced:{ reverseOnFalse:false, enforceSystemWide:false },
  status:  "ENABLED",
  audit:   { createdBy:"You", createdAt:"just now", modifiedBy:"You", modifiedAt:"just now", version:1 },
});

/* ============================================================ SEED RULES */
const SEED = [
  { id:"rule_1",
    trigger:{ lifecycle:"CREATE", moment:"ON_FIELD_CHANGE", fieldId:"request__priority" },
    scope:{ audience:"TECHNICIANS" },
    blocks:[{ id:"b1", match:"ALL",
      conditions:[{id:"c1", fieldId:"request__priority", op:"MATCH_ANY", value:["High","Urgent"]}],
      actions:[{id:"a1", type:"MANDATE", fieldId:"request__assignee", value:""}] }],
    advanced:{ reverseOnFalse:false, enforceSystemWide:false }, status:"ENABLED",
    audit:{ createdBy:"Priya", createdAt:"21 Apr 2026 05:24 PM", modifiedBy:"Marco", modifiedAt:"2h ago", version:3 } },

  { id:"rule_2",
    trigger:{ lifecycle:"CREATE_EDIT", moment:"ON_LOAD" },
    scope:{ audience:"ALL" },
    blocks:[{ id:"b1", match:"ALL", conditions:[],
      actions:[{id:"a1", type:"HIDE", fieldId:"request__cc_emails", value:""}] }],
    advanced:{ reverseOnFalse:false, enforceSystemWide:false }, status:"ENABLED",
    audit:{ createdBy:"Marco", createdAt:"21 Apr 2026 05:14 PM", modifiedBy:"Marco", modifiedAt:"3d ago", version:1 } },

  { id:"rule_3",
    trigger:{ lifecycle:"EDIT", moment:"ON_SUBMIT" },
    scope:{ audience:"REQUESTERS" },
    blocks:[{ id:"b1", match:"ALL",
      conditions:[{id:"c1", fieldId:"request__impact", op:"MATCH_ANY", value:["High"]}],
      actions:[{id:"a1", type:"MANDATE", fieldId:"request__subject", value:""}] }],
    advanced:{ reverseOnFalse:false, enforceSystemWide:false }, status:"DISABLED",
    audit:{ createdBy:"Priya", createdAt:"20 Apr 2026 12:12 PM", modifiedBy:"Priya", modifiedAt:"1w ago", version:2 } },

  { id:"rule_4",
    trigger:{ lifecycle:"CREATE", moment:"ON_FIELD_CHANGE", fieldId:"request__priority" },
    scope:{ audience:"ALL" },
    blocks:[{ id:"b1", match:"ALL",
      conditions:[{id:"c1", fieldId:"request__priority", op:"MATCH_ANY", value:["High","Urgent"]}],
      actions:[{id:"a1", type:"OPTIONAL", fieldId:"request__assignee", value:""}] }],
    advanced:{ reverseOnFalse:false, enforceSystemWide:false }, status:"ENABLED",
    audit:{ createdBy:"Marco", createdAt:"20 Apr 2026 10:24 AM", modifiedBy:"Marco", modifiedAt:"1d ago", version:1 } },

  { id:"rule_5",
    trigger:{ lifecycle:"EDIT", moment:"ON_FIELD_CHANGE", fieldId:"request__category" },
    scope:{ audience:"TECHNICIANS" },
    blocks:[{ id:"b1", match:"ALL",
      conditions:[{id:"c1", fieldId:"request__category", op:"MATCH_ANY", value:["Hardware"]}],
      actions:[{id:"a1", type:"SET_VALUE", fieldId:"request__status", value:"In Progress"}] }],
    advanced:{ reverseOnFalse:false, enforceSystemWide:false }, status:"ENABLED",
    audit:{ createdBy:"Priya", createdAt:"18 Apr 2026 08:36 AM", modifiedBy:"Priya", modifiedAt:"5d ago", version:2 } },

  { id:"rule_6",
    trigger:{ lifecycle:"CREATE_EDIT", moment:"ON_LOAD" },
    scope:{ audience:"ALL" },
    blocks:[{ id:"b1", match:"ALL",
      conditions:[{id:"c1", fieldId:"request__category", op:"MATCH_ANY", value:["Software"]}],
      actions:[{id:"a1", type:"HIDE", fieldId:"request__vendor", value:""}] }],
    advanced:{ reverseOnFalse:false, enforceSystemWide:false }, status:"ENABLED",
    audit:{ createdBy:"Marco", createdAt:"18 Apr 2026 12:37 PM", modifiedBy:"Marco", modifiedAt:"6d ago", version:1 } },

  { id:"rule_7",
    trigger:{ lifecycle:"EDIT", moment:"ON_FIELD_CHANGE", fieldId:"request__priority" },
    scope:{ audience:"LOGGED_IN" },
    blocks:[{ id:"b1", match:"ALL",
      conditions:[{id:"c1", fieldId:"request__priority", op:"MATCH_ANY", value:["High"]}],
      actions:[{id:"a1", type:"SHOW", fieldId:"request__subject", value:""}] }],
    advanced:{ reverseOnFalse:true, enforceSystemWide:false }, status:"ENABLED",
    audit:{ createdBy:"Priya", createdAt:"20 Apr 2026 01:24 AM", modifiedBy:"Priya", modifiedAt:"1w ago", version:1 } },

  { id:"rule_8",
    trigger:{ lifecycle:"CREATE_EDIT", moment:"ON_FIELD_CHANGE", fieldId:"request__priority" },
    scope:{ audience:"ALL" },
    blocks:[
      { id:"b1", match:"ALL",
        conditions:[{id:"c1", fieldId:"request__priority", op:"MATCH_ANY", value:["Low"]}],
        actions:[{id:"a1", type:"OPTIONAL", fieldId:"request__sentiment", value:""}] },
      { id:"b2", match:"ALL",
        conditions:[{id:"c2", fieldId:"request__category", op:"MATCH_ANY", value:["Network"]}],
        actions:[{id:"a2", type:"SHOW", fieldId:"request__company", value:""}] },
    ],
    advanced:{ reverseOnFalse:false, enforceSystemWide:false }, status:"DISABLED",
    audit:{ createdBy:"Marco", createdAt:"18 Apr 2026 08:28 AM", modifiedBy:"Marco", modifiedAt:"1w ago", version:1 } },
];

/* ============================================================ SUMMARIZE */
function triggerClause(rule){
  let s = `When ${audActor(rule.scope.audience)} ${lcVerb(rule.trigger.lifecycle)}`;
  if (rule.trigger.moment === "ON_FIELD_CHANGE") s += ` and changes ${fLabel(rule.trigger.fieldId)}`;
  else if (rule.trigger.moment === "ON_SUBMIT")  s += ` and submits the request`;
  return s;
}
// A block's conditions can contain leaf conditions and one-level GROUP items.
function flatConds(block){
  const out=[];
  (block.conditions||[]).forEach(it=>{ if(it && it.kind==="GROUP") out.push(...(it.conditions||[])); else if(it) out.push(it); });
  return out;
}
function firstLeaf(block){ return flatConds(block)[0] || null; }
function condValText(c){ return Array.isArray(c.value) ? c.value.join("/") : (c.value==null ? "" : String(c.value)); }
function condText(c){
  const f=fLabel(c.fieldId), o=opLabel(c.op).toLowerCase(), k=opVal(c.op);
  if(k==="none") return `${f} ${o}`;
  if(k==="multi"){ const a=Array.isArray(c.value)?c.value:[]; return `${f} ${o} ${a.join(", ")||"…"}`; }
  return `${f} ${o} ${c.value||"…"}`;
}
function condClause(block){
  const sep = block.match === "ALL" ? " and " : " or ";
  const parts = (block.conditions||[]).map(it=>{
    if(it && it.kind==="GROUP"){
      const inner=(it.conditions||[]).map(condText).join(it.match==="ALL"?" and ":" or ");
      return inner ? `(${inner})` : "";
    }
    return condText(it);
  }).filter(Boolean);
  return parts.join(sep);
}
function listJoin(arr){
  if (arr.length <= 1) return arr[0] || "";
  return arr.slice(0,-1).join(", ") + " and " + arr[arr.length-1];
}
function actClause(block){ return listJoin(block.actions.map(actionPhrase)); }
function advClause(rule){
  const x=[];
  if (rule.advanced.reverseOnFalse) x.push("reverses when the condition is no longer true");
  if (rule.advanced.enforceSystemWide) x.push("enforced system-wide");
  return x;
}
const cap = s => s.charAt(0).toUpperCase()+s.slice(1);
// Requirement-framed sentence: "When Priority becomes High, make Assignee required for technicians."
function blockSentence(rule, b){
  const cond = condClause(b);
  let s = cond ? `when ${cond}, ${actClause(b)}` : actClause(b);
  if (rule.scope.audience !== "ALL") s += ` for ${audPlural(rule.scope.audience)}`;
  const adv = advClause(rule); if (adv.length) s += ` (${adv.join(", ")})`;
  return s;
}
function summarize(rule){
  if (rule.blocks.length === 1) return cap(blockSentence(rule, rule.blocks[0]) + ".");
  return null; // multiple requirements rendered as a list
}

/* ============================================================ CONFLICTS */
const lcSet = lc => lc==="CREATE_EDIT" ? ["CREATE","EDIT"] : [lc];
const lcOverlap = (a,b) => lcSet(a).some(x => lcSet(b).includes(x));
const scopeOverlap = (a,b) => a==="ALL" || b==="ALL" || a===b;
function triggerOverlap(r1,r2){
  if (!lcOverlap(r1.trigger.lifecycle, r2.trigger.lifecycle)) return false;
  if (r1.trigger.moment !== r2.trigger.moment) return false;
  return scopeOverlap(r1.scope.audience, r2.scope.audience);
}
const allActions = r => r.blocks.flatMap(b => b.actions);
function detectConflicts(rule, all){
  const out = [];
  const others = all.filter(r => r.id !== rule.id && r.status === "ENABLED");
  const mine = allActions(rule);
  const myCond = new Set(); rule.blocks.forEach(b=>flatConds(b).forEach(c=>myCond.add(c.fieldId)));
  for (const o of others){
    if (!triggerOverlap(rule, o)) continue;
    for (const da of mine) for (const oa of allActions(o)){
      if (da.fieldId !== oa.fieldId) continue;
      if (OPPOSITE[da.type] === oa.type){
        out.push({ type:"CONTRADICTORY", category:"CONTRADICTORY", severity:"HIGH", with:o, field:da.fieldId,
          text:`This rule does "${actionPhrase(da)}" while ${ruleName(o)} does "${actionPhrase(oa)}" on the same trigger.` });
      } else if (da.type === oa.type){
        if (da.type==="SET_VALUE" && da.value!==oa.value)
          out.push({ type:"CONTRADICTORY", category:"CONTRADICTORY", severity:"HIGH", with:o, field:da.fieldId,
            text:`This rule sets ${fLabel(da.fieldId)} to "${da.value}" but ${ruleName(o)} sets it to "${oa.value}".` });
        else
          out.push({ type:"REDUNDANT", category:"DUPLICATE", severity:"MEDIUM", with:o, field:da.fieldId,
            text:`This rule duplicates "${actionPhrase(da)}" already done by ${ruleName(o)}.` });
      } else {
        out.push({ type:"SAME_TIME", category:"SAME_TIME", severity:"LOW", with:o, field:da.fieldId,
          text:`This rule and ${ruleName(o)} both change ${fLabel(da.fieldId)} at the same moment.` });
      }
    }
    const oCond = new Set(); o.blocks.forEach(b=>flatConds(b).forEach(c=>oCond.add(c.fieldId)));
    const shared = [...myCond].find(f=>oCond.has(f));
    if (shared) out.push({ type:"OVERLAP", category:"OVERLAP", severity:"LOW", with:o, field:shared,
      text:`This rule and ${ruleName(o)} can both run — they each check ${fLabel(shared)}.` });
  }
  const seen = new Set();
  return out.filter(c => { const k=c.with.id+c.category+c.field; if(seen.has(k)) return false; seen.add(k); return true; });
}
function ruleName(r){
  const s = summarize(r);
  if (s) return `“${s.replace(/\.$/,"")}”`;
  return `a ${r.blocks.length}-block rule`;
}
/* ============================================================ CONFLICT REVIEW (shared)

/* ============================================================ SIMULATION */
function evalCondition(c, values){
  if(!c) return true;
  const raw = values[c.fieldId];
  const v = raw === undefined ? "" : raw;
  const arr = Array.isArray(c.value) ? c.value : (c.value==null || c.value==="" ? [] : [c.value]);
  const s = String(v).toLowerCase();
  const isBlank = (v==="" || v==null || (Array.isArray(v) && v.length===0));
  switch(c.op){
    case "BECOMES":
    case "EQUALS":       return String(v) === String(c.value);
    case "NOT_EQUALS":   return String(v) !== String(c.value);
    case "STARTS_WITH":  return s.startsWith(String(c.value).toLowerCase());
    case "ENDS_WITH":    return s.endsWith(String(c.value).toLowerCase());
    case "CONTAINS":     return s.includes(String(c.value).toLowerCase());
    case "IS_BLANK":
    case "IS_EMPTY":     return isBlank;
    case "IS_NOT_BLANK":
    case "IS_NOT_EMPTY": return !isBlank;
    case "MATCH_ANY":
    case "IN":           return arr.map(String).includes(String(v));
    case "NOT_IN":       return !arr.map(String).includes(String(v));
    case "MATCH_ALL":    return arr.length>0 && arr.every(x => String(x) === String(v));
    case "GREATER_THAN": return parseFloat(v) >  parseFloat(c.value);
    case "LESS_THAN":    return parseFloat(v) <  parseFloat(c.value);
    default: return false;
  }
}
function evalGroup(g, values){
  if(!g.conditions || !g.conditions.length) return true;
  const r = g.conditions.map(c => evalCondition(c, values));
  return g.match === "ALL" ? r.every(Boolean) : r.some(Boolean);
}
function evalBlock(block, values){
  const items = block.conditions || [];
  if (!items.length) return true;
  const res = items.map(it => (it && it.kind==="GROUP") ? evalGroup(it, values) : evalCondition(it, values));
  return block.match === "ALL" ? res.every(Boolean) : res.some(Boolean);
}
function scopeMatchPersona(aud, persona){
  if (aud === "ALL") return true;
  if (aud === "LOGGED_IN") return true; // all demo personas are logged in
  return aud === persona;
}
function applyAction(state, a){
  const s = state[a.fieldId] || (state[a.fieldId] = { visible:true, required:false, enabled:true, value: "" });
  switch(a.type){
    case "SHOW": s.visible=true; break;
    case "HIDE": s.visible=false; break;
    case "MANDATE": s.required=true; break;
    case "OPTIONAL": s.required=false; break;
    case "ENABLE": s.enabled=true; break;
    case "DISABLE": s.enabled=false; break;
    case "SET_VALUE": s.value=a.value; break;
    case "CLEAR_VALUE": s.value=""; break;
  }
}
function simulate(draft, all, persona, values, moment){
  const ruleset = [...all.filter(r => r.id !== draft.id && r.status === "ENABLED"), draft];
  const applicable = ruleset.filter(r => r.trigger.moment === moment && scopeMatchPersona(r.scope.audience, persona));
  const state = {};
  // init touched fields
  applicable.forEach(r => allActions(r).forEach(a => {
    if (!state[a.fieldId]) state[a.fieldId] = { visible:true, required:false, enabled:true, value: values[a.fieldId]||"" };
  }));
  const trace = [];
  applicable.forEach(r => r.blocks.forEach((b, bi) => {
    const matched = evalBlock(b, values);
    if (matched){
      b.actions.forEach(a => applyAction(state, a));
      trace.push({ ruleId:r.id, isDraft:r.id===draft.id, blockIndex:bi, matched:true, actions:b.actions });
    } else {
      trace.push({ ruleId:r.id, isDraft:r.id===draft.id, blockIndex:bi, matched:false, actions:[] });
    }
  }));
  return { state, trace, applicableCount: applicable.length };
}

function Dropdown({ trigger, children, align }){
  const [open,setOpen]=useState(false);
  const ref = React.useRef(null);
  const [pos,setPos]=useState(null);
  const measure = () => {
    const el = ref.current; if(!el) return null;
    const r = el.getBoundingClientRect();
    const vw = (typeof window!=="undefined"?window.innerWidth:1280), vh = (typeof window!=="undefined"?window.innerHeight:800);
    let left = align==="right" ? r.right - 224 : r.left;
    left = Math.max(8, Math.min(left, vw - 232));
    return { top: Math.max(8, Math.min(r.bottom + 4, vh - 16)), left };
  };
  const menuRef = React.useRef(null);
  const toggle = () => { if(!open){ setPos(measure()); setOpen(true); } else setOpen(false); };
  React.useEffect(()=>{
    if(!open) return;
    const onScroll = (e)=>{ if(menuRef.current && menuRef.current.contains(e.target)) return; setOpen(false); }; // ignore scrolling inside the menu
    const onResize = ()=>setOpen(false);
    window.addEventListener("scroll", onScroll, true);
    window.addEventListener("resize", onResize);
    return ()=>{ window.removeEventListener("scroll", onScroll, true); window.removeEventListener("resize", onResize); };
  }, [open]);
  // rendered in a body portal so the menu escapes every ancestor's clipping / stacking / transform context
  const menu = (open && pos && typeof document!=="undefined") ? ReactDOM.createPortal(
    <React.Fragment>
      <div className="fixed inset-0" style={{zIndex:9998}} onClick={()=>setOpen(false)} />
      <div ref={menuRef} className="min-w-[190px] rounded-lg border border-slate-200 bg-white p-1 shadow-xl"
        style={{ position:"fixed", top:pos.top, left:pos.left, zIndex:9999, maxHeight:"60vh", overflowY:"auto" }}>
        {typeof children==="function" ? children(()=>setOpen(false)) : children}
      </div>
    </React.Fragment>, document.body) : null;
  return (
    <span ref={ref} className="relative inline-block align-middle">
      <span onClick={toggle}>{trigger}</span>
      {menu}
    </span>
  );
}

function ConditionsEditor({ block, mutate }){
  const items = block.conditions || [];
  const setField = idx => v => mutate(b=>{ const c=b.conditions[idx]; c.fieldId=v; c.op=fieldOps(v)[0]; c.value=defaultVal(c.op); });
  const setOp    = idx => v => mutate(b=>{ const c=b.conditions[idx]; c.op=v; c.value=defaultVal(v); });
  const setVal   = idx => v => mutate(b=>{ b.conditions[idx].value=v; });
  const rmItem   = idx => mutate(b=>{ b.conditions.splice(idx,1); });
  const addCond  = () => mutate(b=>{ b.conditions.push(newCondition()); });
  const addGroup = () => mutate(b=>{ b.conditions.push(newGroup()); });
  const clearAll = () => mutate(b=>{ b.conditions=[]; });
  const gSetMatch= gi => v => mutate(b=>{ b.conditions[gi].match=v; });
  const gSetField= (gi,ci) => v => mutate(b=>{ const c=b.conditions[gi].conditions[ci]; c.fieldId=v; c.op=fieldOps(v)[0]; c.value=defaultVal(c.op); });
  const gSetOp   = (gi,ci) => v => mutate(b=>{ const c=b.conditions[gi].conditions[ci]; c.op=v; c.value=defaultVal(v); });
  const gSetVal  = (gi,ci) => v => mutate(b=>{ b.conditions[gi].conditions[ci].value=v; });
  const gRm      = (gi,ci) => mutate(b=>{ b.conditions[gi].conditions.splice(ci,1); });
  const gAdd     = gi => mutate(b=>{ b.conditions[gi].conditions.push(newCondition()); });

  return (
    <div>
      <div className="flex items-center gap-3">
        <span className="text-xs text-slate-500">When the rule runs, check:</span>
        {items.length>1 && <MatchToggle match={block.match} onChange={v=>mutate(b=>{ b.match=v; })} />}
      </div>
      <div className="mt-3 space-y-2">
        {items.length===0 && <p className="text-sm italic text-slate-400">No conditions — this rule always runs.</p>}
        {items.map((it,idx)=> (it && it.kind==="GROUP") ? (
          <div key={it.id} className="rounded-lg border border-slate-200 bg-slate-50/70 p-3">
            <div className="mb-2 flex items-center justify-between gap-2">
              <span className="text-[11px] font-semibold uppercase tracking-wide text-slate-400">Condition group</span>
              <div className="flex items-center gap-2">
                {it.conditions.length>1 && <MatchToggle match={it.match} onChange={gSetMatch(idx)} />}
                <button onClick={()=>rmItem(idx)} className="text-xs font-medium text-red-500 hover:underline">Remove group</button>
              </div>
            </div>
            <div className="space-y-2">
              {it.conditions.map((c,ci)=>(
                <ConditionRow key={c.id} cond={c} onField={gSetField(idx,ci)} onOp={gSetOp(idx,ci)} onValue={gSetVal(idx,ci)} onRemove={()=>gRm(idx,ci)} />
              ))}
            </div>
            <button onClick={()=>gAdd(idx)} className="mt-2 flex items-center gap-1.5 text-xs font-medium text-sky-600 hover:underline">
              <span className="flex h-4 w-4 items-center justify-center rounded-full bg-emerald-500 text-[11px] leading-none text-white">+</span> Add condition to group
            </button>
          </div>
        ) : (
          <ConditionRow key={it.id} cond={it} onField={setField(idx)} onOp={setOp(idx)} onValue={setVal(idx)} onRemove={()=>rmItem(idx)} />
        ))}
      </div>
      <div className="mt-3 flex flex-wrap items-center gap-2">
        <button onClick={addCond} className="inline-flex items-center gap-1.5 rounded-md border border-slate-200 bg-white px-3 py-1.5 text-sm font-medium text-sky-600 hover:bg-sky-50">
          <span className="flex h-4 w-4 items-center justify-center rounded-full bg-emerald-500 text-[11px] leading-none text-white">+</span> Add Condition
        </button>
        <button onClick={addGroup} className="inline-flex items-center gap-1.5 rounded-md border border-slate-200 bg-white px-3 py-1.5 text-sm font-medium text-slate-600 hover:bg-slate-50">
          <span className="text-sky-500">⊕</span> Add Condition Group
        </button>
        {items.length>0 && (
          <button onClick={clearAll} className="inline-flex items-center gap-1.5 rounded-md px-3 py-1.5 text-sm font-medium text-red-500 hover:bg-red-50">
            <span>⊘</span> Remove All Condition
          </button>
        )}
      </div>
    </div>
  );
}

function V8Drop({ trigger, render, width }){
  const [open,setOpen] = useState(false);
  const ref = React.useRef(null);

  const measure = () => {
    const el=ref.current; if(!el) return null;

  };

  const addCond=()=>update(d=>{ d.blocks[0].conditions.push({id:uid("c"),fieldId:"",op:"",value:""}); });
  const setCondField=(ci,v)=>update(d=>{ const c=d.blocks[0].conditions[ci]; c.fieldId=v; c.op=fieldOps(v)[0]; c.value=defaultVal(c.op); });
  const setCondOp=(ci,v)=>update(d=>{ const c=d.blocks[0].conditions[ci]; c.op=v; c.value=defaultVal(v); });
  const setCondValue=(ci,v)=>update(d=>{ d.blocks[0].conditions[ci].value=v; });
  const rmCond=ci=>update(d=>{ d.blocks[0].conditions.splice(ci,1); });
  const toggleMatch=()=>update(d=>{ d.blocks[0].match = d.blocks[0].match==="ALL"?"ANY":"ALL"; });

  const finalize=()=>{ const d=JSON.parse(JSON.stringify(draft));
    if(!d.trigger.moment) d.trigger.moment="ON_FIELD_CHANGE";
    if(!d.trigger.lifecycle) d.trigger.lifecycle="CREATE";
    if(!d.scope.audience) d.scope.audience="ALL";
    d.blocks=d.blocks.map(b=>({...b, conditions:(b.conditions||[]).filter(c=>(c&&c.kind==="GROUP")||(c&&c.fieldId)), actions:(b.actions||[]).filter(a=>a.type&&a.fieldId) }));
    return d; };

  const FIELD_GROUPED = FIELD_GROUPS.map(g=>({ header:g.label, items:FIELDS.filter(f=>f.group===g.id).map(f=>({value:f.id,label:f.name})) })).filter(g=>g.items.length);
  const condValueSlot = (c,ci)=>{ const f=fieldOf(c.fieldId); const opts=(f&&f.options)?f.options:null;
    return opts ? <V8Slot value={valDisplay(c.value)} placeholder="a value" items={opts.map(o=>({value:o,label:o}))} onPick={v=>setCondValue(ci,v)} />
                : <V8Slot value={valDisplay(c.value)} placeholder="a value" valueInput onPick={v=>setCondValue(ci,v)} />; };
  const actValueSlot = (a,ai)=>{ const f=fieldOf(a.fieldId); const opts=(f&&f.options)?f.options:null;
    return opts ? <V8Slot value={valDisplay(a.value)} placeholder="a value" items={opts.map(o=>({value:o,label:o}))} onPick={v=>setActValue(ai,v)} />
                : <V8Slot value={valDisplay(a.value)} placeholder="a value" valueInput onPick={v=>setActValue(ai,v)} />; };

  const overview=[];
  if(moment) overview.push({ role:"when", lead:"When", text: momentLabel(moment)+(draft.trigger.lifecycle?" · "+lifeFriendly(draft.trigger.lifecycle):"") });
  if(condClause(cc)) overview.push({ role:"if", lead:"Only if", text:cap(condClause(cc)) });
  cc.actions.forEach((a,i)=> overview.push({ role:"do", lead:i===0?"Do":"And", text:cap(actionPhrase(a)) }));
  if(draft.scope.audience) overview.push({ role:"for", lead:"For", text:audFriendly(draft.scope.audience) });

  const grp = CONFLICT_CATS.map(cat=>({ cat, items:conflicts.filter(c=>(c.category||"CONTRADICTORY")===cat.id) })).filter(g=>g.items.length);
  const CTONE = { red:"var(--v8-red)", amber:"var(--v8-if)", violet:"var(--v8-if)", slate:"var(--v8-muted)" };
  const tbtn = { background:"var(--v8-panel2)", border:"1px solid var(--v8-border2)", color:"var(--v8-muted)" };
  const lastActionIdx = block.actions.length-1;

  return (
    <div className="v8root flex min-h-0 flex-1 flex-col" data-v8theme={theme}>

      <header className="flex h-14 shrink-0 items-center gap-3 px-6" style={{ borderBottom:"1px solid var(--v8-border)", background:"var(--v8-topbar)" }}>
        <div className="mr-1 flex h-6 w-6 items-center justify-center rounded-lg text-xs font-bold" style={{ background:"linear-gradient(135deg,#5b6cff,#7c89ff)", color:"#fff" }}>R</div>
        <input value={draft.name||""} onChange={e=>setName(e.target.value)} placeholder="Untitled rule"
          className="w-60 bg-transparent text-[15px] font-medium outline-none" style={{ color:"var(--v8-text)" }} />
        <span className="rounded-full px-2 py-0.5 text-xs" style={ valid ? { background:"var(--v8-then-bg)", color:"var(--v8-then)" } : { background:"var(--v8-panel2)", color:"var(--v8-muted)" } }>{valid?"Ready":"Draft"}</span>
        <nav className="ml-2 flex items-center gap-1.5 text-xs" style={{ color:"var(--v8-faint)" }}>
          <button onClick={onCancel} className="hover:underline" style={{ color:"var(--v8-accent2)" }}>Request Form Rules</button>
          <span>›</span><span style={{ color:"var(--v8-muted)" }}>{isNew?"Create":"Edit"}</span>
        </nav>
        <div className="ml-auto flex items-center gap-2">
          <button onClick={()=>setTheme(theme==="dark"?"light":"dark")} title="Toggle theme" className="flex h-8 w-8 items-center justify-center rounded-lg" style={tbtn}>{theme==="dark"?"☾":"☀"}</button>
          <button onClick={undo} title="Undo" className="flex h-8 w-8 items-center justify-center rounded-lg" style={tbtn}>↶</button>
          <button onClick={redo} title="Redo" className="flex h-8 w-8 items-center justify-center rounded-lg" style={tbtn}>↷</button>
          <button onClick={()=>setHowOpen(true)} title="How it works" className="flex h-8 w-8 items-center justify-center rounded-lg" style={tbtn}>{VI.bulb}</button>
          <button onClick={()=>setRefOpen(true)} title="Behavior reference" className="flex h-8 w-8 items-center justify-center rounded-lg" style={tbtn}>{VI.book}</button>
          <button onClick={()=>setTestOpen(true)} className="rounded-lg px-3 py-1.5 text-sm font-medium" style={{ background:"var(--v8-panel2)", border:"1px solid var(--v8-border2)", color:"var(--v8-text)" }}>Test</button>
          <button onClick={onCancel} className="rounded-lg px-3 py-1.5 text-sm font-medium" style={{ border:"1px solid var(--v8-border2)", color:"var(--v8-muted)" }}>Cancel</button>
          <button onClick={()=>{ if(valid) onSave(finalize()); }} className="rounded-lg px-4 py-1.5 text-sm font-semibold" style={ valid ? { background:"var(--v8-accent)", color:"#fff" } : { background:"var(--v8-panel2)", color:"var(--v8-faint)" } }>Save rule</button>
        </div>
      </header>

      <div className="flex min-h-0 flex-1">
        <div className="relative flex-1 overflow-y-auto">
          <div className="v8grain" /><div className="v8glow" />
          <div className="relative mx-auto w-full" style={{ maxWidth:"720px", paddingLeft:"36px", paddingRight:"36px", paddingTop:"7vh", paddingBottom:"64px" }}>

            {/* WHEN */}
            <V8Node role="when" head="When" first last={!showIf && !showThen && !showFor}
              footer={ isNew && !moment ? "Click to start — then type to fill each field" : null }
              chips={ moment ? [
                (!showIf) && <NextChip key="ci" role="if" icon={VI.diamond} label="Check if" onClick={()=>{ setShowIf(true); addCond(); }} />,
                (!showThen) && <NextChip key="th" role="do" primary icon={VI.arrow} label="Then" onClick={()=>{ setShowThen(true); addAction(); }} />,
              ].filter(Boolean) : null }>
              {moment
                ? <><V8Slot value={momentLabel(moment)} items={MOMENTS.map(m=>({value:m.id,label:m.label}))} onPick={setMoment} width={280} help={V8_HELP.when} /> <Conn>on</Conn> <V8Slot value={lifeFriendly(draft.trigger.lifecycle)||null} placeholder="any form" items={LIFECYCLES_FRIENDLY.map(l=>({value:l.id,label:l.label}))} onPick={setLifecycle} help={V8_HELP.life} /></>
                : <V8Slot value={null} placeholder="something happens" beckon width={280} help={V8_HELP.when} items={MOMENTS.map(m=>({value:m.id,label:m.label}))} onPick={setMoment} />}
            </V8Node>

            {/* CHECK IF */}
            {showIf && (
              <V8Node role="if" head="Check if" last={!showThen && !showFor}
                chips={[
                  <NextChip key="ao" role="if" icon={VI.diamond} label="+ and/or" onClick={addCond} />,
                  (!showThen) && <NextChip key="th" role="do" primary icon={VI.arrow} label="Then" onClick={()=>{ setShowThen(true); addAction(); }} />,
                ].filter(Boolean)}>
                {leafConds.length===0
                  ? <V8Slot value={null} placeholder="a field" beckon search groups={FIELD_GROUPED} width={300} help={V8_HELP.if} onPick={v=>{ addCond(); setCondField(0,v); }} />
                  : leafConds.map((c,ci)=>(
                      <React.Fragment key={c.id}>
                        {ci>0 && <MatchChip match={block.match} onClick={toggleMatch} />}
                        <V8Slot value={fieldShort(c.fieldId)} placeholder="a field" search groups={FIELD_GROUPED} width={300} help={V8_HELP.if} beckon={!c.fieldId} onPick={v=>setCondField(ci,v)} />
                        {c.fieldId && <> <V8Slot value={opLabel(c.op)} placeholder="is" items={fieldOps(c.fieldId).map(o=>({value:o,label:opLabel(o)}))} onPick={v=>setCondOp(ci,v)} /></>}
                        {c.fieldId && c.op && opVal(c.op)!=="none" && <> {condValueSlot(c,ci)}</>}
                        {leafConds.length>1 && <button onClick={()=>rmCond(ci)} className="ml-1 align-middle text-[14px] font-normal" style={{ color:"var(--v8-faint)" }} title="Remove">✕</button>}
                      </React.Fragment>
                    ))}
              </V8Node>
            )}

            {/* THEN (one node per action) */}
            {showThen && block.actions.map((a,ai)=>(
              <V8Node key={a.id} role="do" head={ai===0?"Then":"And"} last={ai===lastActionIdx && !showFor}
                removable={block.actions.length>1} onRemove={()=>rmAction(ai)}
                chips={ai===lastActionIdx ? [
                  <NextChip key="aa" role="do" icon={VI.arrow} label="+ and also" onClick={addAction} />,
                  (!showFor) && <NextChip key="fr" role="for" primary icon={VI.user} label="For" onClick={()=>setShowFor(true)} />,
                  (!showIf) && <NextChip key="ci" role="if" icon={VI.diamond} label="Check if" onClick={()=>{ setShowIf(true); addCond(); }} />,
                ].filter(Boolean) : null}>
                <V8Slot value={bverb(a.type)} placeholder="do something" items={ACTION_TYPES.map(t=>({value:t.id,label:bverb(t.id)}))} onPick={v=>setActType(ai,v)} help={V8_HELP.do} beckon={!a.type} />
                {" "}
                <V8Slot value={fieldShort(a.fieldId)} placeholder="a field" search items={ACTION_FIELDS.map(f=>({value:f.id,label:f.name}))} onPick={v=>setActField(ai,v)} help={V8_HELP.field} beckon={!!a.type && !a.fieldId} />
                {a.type==="SET_VALUE" && <> <Conn>to</Conn> {actValueSlot(a,ai)}</>}
              </V8Node>
            ))}

            {/* FOR */}
            {showFor && (
              <V8Node role="for" head="For" last>
                <V8Slot value={audFriendly(draft.scope.audience)||null} placeholder="everyone" items={AUD_FRIENDLY.map(x=>({value:x.id,label:x.label}))} onPick={setAudience} help={V8_HELP.for} />
              </V8Node>
            )}
          </div>
        </div>

        <aside className="hidden w-[340px] shrink-0 flex-col lg:flex" style={{ borderLeft:"1px solid var(--v8-border)", background:"var(--v8-panel)" }}>
          {railEmpty ? (
            <div className="flex flex-1 flex-col items-center justify-center px-9 text-center">
              <span className="mb-4 flex h-12 w-12 items-center justify-center rounded-2xl" style={{ background:"var(--v8-panel2)", color:"var(--v8-muted)" }}>{VI.bulb}</span>
              <div className="text-[15px] font-semibold" style={{ color:"var(--v8-text)" }}>Build a form rule</div>
              <div className="mt-1.5 text-[12.5px] leading-relaxed" style={{ color:"var(--v8-muted)" }}>Start on the left: choose when the rule runs, then add steps with the next → chips. Each part appears as you go.</div>
              <div className="mt-5 flex items-center justify-center gap-2">
                <button onClick={()=>setHowOpen(true)} className="rounded-lg px-4 py-2 text-[12.5px] font-medium" style={{ background:"color-mix(in srgb, var(--v8-accent) 16%, transparent)", border:"1px solid color-mix(in srgb, var(--v8-accent) 30%, transparent)", color:"var(--v8-accent2)" }}>Show me how</button>
                <button onClick={()=>setRefOpen(true)} className="rounded-lg px-4 py-2 text-[12.5px] font-medium" style={{ border:"1px solid var(--v8-border2)", color:"var(--v8-muted)" }}>Behaviors</button>
              </div>
            </div>
          ) : (
            <React.Fragment>
              <div className="flex-1 overflow-y-auto px-6 py-6">
                <div className="text-[10px] uppercase tracking-[0.14em]" style={{ color:"var(--v8-faint)" }}>In plain English</div>
                <p className="mt-2 rounded-xl px-3 py-2.5 text-[13px] leading-relaxed" style={{ background:"var(--v8-panel2)", color: summary?"var(--v8-text)":"var(--v8-faint)" }}>{summary || "Your rule will read here once you add a behavior."}</p>
                <div className="mt-4 text-[11px] uppercase tracking-[0.12em]" style={{ color:"var(--v8-faint)" }}>Your rule</div>
                <div className="mt-3 flex flex-col gap-2">
                  {overview.map((o,i)=>{ const r=RV[o.role]; return (
                    <div key={o.role+"-"+i} className="v8in flex items-start gap-2.5 rounded-xl px-3 py-2.5" style={{ background:r.bg, border:"1px solid var(--v8-border)" }}>
                      <span className="mt-1 h-2 w-2 shrink-0 rounded-full" style={{ background:r.c }} />
                      <div className="min-w-0">
                        <div className="text-[10px] font-semibold uppercase tracking-wider" style={{ color:r.c }}>{o.lead}</div>
                        <div className="text-[12.5px] leading-snug" style={{ color:"var(--v8-text)" }}>{o.text}</div>
                      </div>
                    </div>
                  );})}
                  {overview.length===0 && <div className="text-[12px]" style={{ color:"var(--v8-faint)" }}>Pick a moment, then keep going…</div>}
                </div>

                {hasDo && <React.Fragment>
                  <div className="mt-5 flex items-center justify-between">
                    <div className="text-[10px] uppercase tracking-[0.14em]" style={{ color:"var(--v8-faint)" }}>Field impact</div>
                    <button onClick={()=>setTestOpen(true)} className="text-[11px] font-medium" style={{ color:"var(--v8-accent2)" }}>Try it ▷</button>
                  </div>
                  <p className="mt-1 text-xs" style={{ color:"var(--v8-faint)" }}>Affects {affected.length} field{affected.length===1?"":"s"}.</p>
                </React.Fragment>}

                {ruleReady && <React.Fragment>
                  <div className="mt-5 text-[10px] uppercase tracking-[0.14em]" style={{ color:"var(--v8-faint)" }}>Conflicts</div>
                  {grp.length===0
                    ? <div className="mt-2 flex items-center gap-2 rounded-xl px-3 py-2 text-[12.5px]" style={{ background:"var(--v8-then-bg)", color:"var(--v8-then)" }}>✓ No conflicts with your other rules.</div>
                    : <div className="mt-2 flex flex-col gap-2">
                        {grp.map(g=>(
                          <div key={g.cat.id} className="v8in rounded-xl px-3 py-2.5" style={{ background:"var(--v8-panel2)", border:"1px solid var(--v8-border)", borderLeft:"3px solid "+(CTONE[g.cat.tone]||"var(--v8-muted)") }}>
                            <div className="text-[12px] font-semibold" style={{ color:CTONE[g.cat.tone]||"var(--v8-text)" }}>{g.items.length} {g.cat.label}</div>
                            {g.items.map((c,k)=><div key={k} className="mt-1 text-[11.5px] leading-snug" style={{ color:"var(--v8-muted)" }}>{c.text}</div>)}
                          </div>
                        ))}
                        <div className="flex flex-wrap items-center gap-2 text-[11px]">
                          <button onClick={()=>setConflictNote("Marked for review")} className="rounded-md px-2 py-1 font-medium" style={{ border:"1px solid var(--v8-border2)", color:"var(--v8-muted)" }}>Review later</button>
                          <button onClick={()=>setConflictNote("Keeping this rule")} className="rounded-md px-2 py-1 font-medium" style={{ border:"1px solid var(--v8-border2)", color:"var(--v8-muted)" }}>Let this win</button>
                          {conflictNote && <span style={{ color:"var(--v8-then)" }}>✓ {conflictNote}</span>}
                        </div>
                      </div>}
                </React.Fragment>}
              </div>
              <div className="flex shrink-0" style={{ borderTop:"1px solid var(--v8-border)" }}>
                <button onClick={()=>setHowOpen(true)} className="flex-1 px-4 py-3 text-[12px]" style={{ color:"var(--v8-faint)" }}>How it works</button>
                <button onClick={()=>setRefOpen(true)} className="flex-1 px-4 py-3 text-[12px]" style={{ borderLeft:"1px solid var(--v8-border)", color:"var(--v8-faint)" }}>Behaviors</button>
              </div>
            </React.Fragment>
          )}
        </aside>
      </div>

      {howOpen && <V8HowItWorks onClose={()=>setHowOpen(false)} />}
      {refOpen && <V8BehaviorRef onClose={()=>setRefOpen(false)} />}
      {testOpen && <V8TestModal draft={clean} allRules={allRules} onClose={()=>setTestOpen(false)} />}
    </div>
  );
}


/* ============================================================ VERSION SWITCHER */
const VERSIONS = [
  { id:"v1", label:"Version 1", note:"Sentence-first builder", href:"rule-studio-v1.html" },
  { id:"v2", label:"Version 2", note:"Structured form",        href:"rule-studio-demo.html" },
  { id:"v3", label:"Version 3", note:"Block workspace",        href:"rule-studio-v3.html" },
  { id:"v4", label:"Version 4", note:"Starter cards",          href:"rule-studio-v4.html" },
  { id:"v6", label:"Version 6", note:"Refined classic form",   href:"rule-studio-v6.html" },
  { id:"v7", label:"Version 7", note:"Progressive workspace",  href:"rule-studio-v7.html" },
  { id:"v8", label:"Version 8", note:"Guided form canvas",     href:"rule-studio-v8.html" },
  { id:"v9", label:"Version 9", note:"Rule sequence workspace", href:"rule-studio-v9.html" },
  { id:"v92", label:"Version 9.2", note:"Guided sequence editor", href:"rule-studio-v9-2.html" },
];
const currentVersionId = () => {
  const p = (typeof window!=="undefined" && window.location.pathname) || "";
  if (p.indexOf("v9-2") >= 0) return "v92";
  if (p.indexOf("v9") >= 0) return "v9";
  if (p.indexOf("v8") >= 0) return "v8";
  if (p.indexOf("v7") >= 0) return "v7";
  if (p.indexOf("v6") >= 0) return "v6";
  if (p.indexOf("v5") >= 0) return "v5";
  if (p.indexOf("v4") >= 0) return "v4";
  if (p.indexOf("v3") >= 0) return "v3";
  if (p.indexOf("v1") >= 0) return "v1";
  return "v2";
};
function VersionBar(){
  const [open,setOpen]=useState(false);
  const cur = currentVersionId();
  const curV = VERSIONS.find(v=>v.id===cur) || VERSIONS[1];
  return (
    <div className="flex shrink-0 items-center justify-between border-b border-slate-800 bg-slate-900 px-4 py-1.5 text-xs text-slate-300">
      <span className="font-semibold tracking-wide text-slate-100">Request Form Rules · Rule Studio</span>
      <div className="relative">
        <button onClick={()=>setOpen(o=>!o)} className="inline-flex items-center gap-2 rounded-md bg-slate-800 px-3 py-1 font-medium text-white hover:bg-slate-700">
          <span className="inline-block h-1.5 w-1.5 rounded-full bg-emerald-400" />
          {curV.label} · {curV.note}
          <span className="opacity-60">▾</span>
        </button>
        {open && (
          <React.Fragment>
            <div className="fixed inset-0 z-40" onClick={()=>setOpen(false)} />
            <div className="absolute right-0 z-50 mt-1 w-60 overflow-hidden rounded-lg border border-slate-200 bg-white p-1 text-slate-700 shadow-xl">
              <p className="px-2 py-1 text-[11px] uppercase tracking-wide text-slate-400">Switch version</p>
              {VERSIONS.map(v=>(
                <a key={v.id} href={v.href}
                   className={cx("flex items-center justify-between rounded px-2 py-2 text-sm hover:bg-slate-100", v.id===cur && "bg-slate-50")}>
                  <span><span className="font-medium">{v.label}</span><span className="block text-xs text-slate-400">{v.note}</span></span>
                  {v.id===cur && <span className="text-xs font-medium text-emerald-600">current</span>}
                </a>
              ))}
            </div>
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

  return (
    <div className="flex shrink-0 flex-wrap items-center gap-3 border-b border-slate-200 bg-white px-8 py-2.5">
      <div className="inline-flex rounded-full border border-slate-200 bg-slate-100 p-0.5 text-sm">
        {[["example","Example"],["guided","Guided"]].map(([id,label])=>(
          <button key={id} onClick={()=>onChange(id)}
            className={cx("rounded-full px-4 py-1.5 font-medium transition-colors",
              (id==="guided")===guided ? "bg-white text-sky-700 shadow-sm" : "text-slate-500 hover:text-slate-700")}>
            {label}
          </button>
        ))}
      </div>
      <span className="text-xs text-slate-500">
        {guided
          ? <React.Fragment><span className="font-semibold text-slate-700">Guided</span> · Start empty and build your own rule step by step.</React.Fragment>
          : <React.Fragment><span className="font-semibold text-amber-700">Example</span> · Loaded sample rule for demonstration.</React.Fragment>}
      </span>

}
function GuidedEmptyState({ mode, onCreate }){
  return (
    <div className="mt-8 flex flex-col items-center justify-center rounded-2xl border border-dashed border-slate-300 bg-slate-50/60 px-6 py-16 text-center">
      <div className="flex h-14 w-14 items-center justify-center rounded-2xl bg-sky-100 text-2xl text-sky-600">✎</div>
      <h2 className="mt-4 text-lg font-bold text-slate-800">Start building a rule</h2>
      <p className="mt-1 max-w-md text-sm text-slate-500">Start empty and build your own rule step by step. Nothing is pre-filled — you choose what to control.</p>
      <ol className="mt-5 grid max-w-xl gap-2 text-left text-sm text-slate-600 sm:grid-cols-3">
        <li className="rounded-lg border border-slate-200 bg-white px-3 py-2"><span className="font-semibold text-slate-700">1.</span> Choose what you want to control</li>
        <li className="rounded-lg border border-slate-200 bg-white px-3 py-2"><span className="font-semibold text-slate-700">2.</span> Add your first behavior</li>
        <li className="rounded-lg border border-slate-200 bg-white px-3 py-2"><span className="font-semibold text-slate-700">3.</span> Use the helper text to learn what's next</li>
      </ol>
      <button onClick={onCreate} className="mt-6 h-11 rounded-full bg-sky-500 px-6 text-sm font-semibold text-white shadow-sm hover:bg-sky-600">Start building a rule</button>
      <p className="mt-3 text-xs text-slate-400">Want to see a finished example instead? Switch to <span className="font-semibold text-slate-500">Example</span> mode above.</p>
    </div>
  );
}

/* ============================================================ APP */
function App(){
  const [mode, setMode] = useState("example");                // "example" = sample loaded (default) · "guided" = empty start
  const [rules, setRules] = useState(() => SEED.map(r => ({ ...r, name: r.name || genSlug(r) })));  // example default: sample rules loaded
  const [view, setView] = useState({ screen:"list" }); // {screen:'studio', id|null}
  const switchMode = m => { setMode(m); setRules(m==="example" ? SEED.map(r => ({ ...r, name: r.name || genSlug(r) })) : []); setView({ screen:"list" }); };

  const startCreate = () => setView({ screen:"studio", rule:newRule(), isNew:true });
  const startEdit = id => setView({ screen:"studio", rule:rules.find(r=>r.id===id), isNew:false });
  const cancel = () => setView({ screen:"list" });
  const save = draft => {
    setRules(rs => rs.some(r=>r.id===draft.id) ? rs.map(r=>r.id===draft.id?draft:r) : [...rs, draft]);
    setView({ screen:"list" });
  };

  return (
    <div className="flex h-screen flex-col">
      <VersionBar />
      {view.screen!=="studio" && <ModeBar mode={mode} onChange={switchMode} />}
      {view.screen==="studio"
        ? <RuleStudioV8 initial={view.rule} isNew={view.isNew} allRules={rules} onCancel={cancel} onSave={save} />
        : <div className="flex-1 overflow-y-auto"><RulesList rules={rules} setRules={setRules} onCreate={startCreate} onEdit={startEdit} mode={mode} /></div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<!-- self-compile safety net: prints the exact Babel error on screen if the app fails to compile (silent on success) -->
<script>
(function(){
  function check(){
    var root = document.getElementById("root");
    if (root && root.children.length) return; // rendered fine
    try {
      var s = document.querySelector('script[type="text/babel"]');
      if (s && window.Babel) Babel.transform(s.textContent, { presets:["react"] });
    } catch(err){
      var pre = document.createElement("pre");
      pre.style.cssText = "white-space:pre-wrap;background:#fff1f2;color:#9f1239;padding:14px 16px;margin:0;font:13px/1.5 ui-monospace,Menlo,Consolas,monospace;border-bottom:3px solid #e11d48;";
      pre.textContent = "⚠ Rule Studio failed to compile:\n\n" + (err && err.message ? err.message : String(err));
      document.body.insertBefore(pre, document.body.firstChild);
    }
  }
  setTimeout(check, 1500);
})();
</script>
</body>
</html>
