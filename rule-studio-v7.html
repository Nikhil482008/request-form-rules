};

/* ============================================================ SUMMARIZE */
function triggerClause(rule){
  let s = `When ${audActor(rule.scope.audience)} ${lcVerb(rule.trigger.lifecycle)}`;
  if (rule.trigger.moment === "ON_FIELD_CHANGE") s += ` and changes ${fLabel(rule.trigger.fieldId)}`;
  else if (rule.trigger.moment === "ON_SUBMIT")  s += ` and submits the request`;
  return s;
}
// A block's conditions can contain leaf conditions and one-level GROUP items.
function flatConds(block){
  const out=[];
  (block.conditions||[]).forEach(it=>{ if(it && it.kind==="GROUP") out.push(...(it.conditions||[])); else if(it) out.push(it); });
  return out;
}
function firstLeaf(block){ return flatConds(block)[0] || null; }
function condValText(c){ return Array.isArray(c.value) ? c.value.join("/") : (c.value==null ? "" : String(c.value)); }
function condText(c){
  if(!c || !c.fieldId || !c.op) return "";   // incomplete condition contributes nothing to the summary
  const f=fLabel(c.fieldId), o=opLabel(c.op).toLowerCase(), k=opVal(c.op);
  if(k==="none") return `${f} ${o}`;
  if(k==="multi"){ const a=Array.isArray(c.value)?c.value:[]; return `${f} ${o} ${a.join(", ")||"…"}`; }
  return `${f} ${o} ${c.value||"…"}`;
}
function condClause(block){
  const sep = block.match === "ALL" ? " and " : " or ";
  const parts = (block.conditions||[]).map(it=>{
    if(it && it.kind==="GROUP"){
      const inner=(it.conditions||[]).map(condText).join(it.match==="ALL"?" and ":" or ");
      return inner ? `(${inner})` : "";
    }
    return condText(it);
  }).filter(Boolean);
  return parts.join(sep);
}
function listJoin(arr){
  if (arr.length <= 1) return arr[0] || "";
  return arr.slice(0,-1).join(", ") + " and " + arr[arr.length-1];
}
function actClause(block){ return listJoin(block.actions.map(actionPhrase).filter(Boolean)); }
function advClause(rule){
  const x=[];
  if (rule.advanced.reverseOnFalse) x.push("reverses when the condition is no longer true");
  if (rule.advanced.enforceSystemWide) x.push("enforced system-wide");
  return x;
}
const cap = s => s.charAt(0).toUpperCase()+s.slice(1);
// Requirement-framed sentence: "When Priority becomes High, make Assignee required for technicians."
function blockSentence(rule, b){
  const cond = condClause(b);
  let s = cond ? `when ${cond}, ${actClause(b)}` : actClause(b);
  if (rule.scope.audience !== "ALL") s += ` for ${audPlural(rule.scope.audience)}`;
  const adv = advClause(rule); if (adv.length) s += ` (${adv.join(", ")})`;
  return s;
}
function summarize(rule){
  if (rule.blocks.length === 1) return cap(blockSentence(rule, rule.blocks[0]) + ".");
  return null; // multiple requirements rendered as a list
}

/* ============================================================ CONFLICTS */
const lcSet = lc => lc==="CREATE_EDIT" ? ["CREATE","EDIT"] : [lc];
const lcOverlap = (a,b) => lcSet(a).some(x => lcSet(b).includes(x));
const scopeOverlap = (a,b) => a==="ALL" || b==="ALL" || a===b;
function triggerOverlap(r1,r2){
  if (!lcOverlap(r1.trigger.lifecycle, r2.trigger.lifecycle)) return false;
  if (r1.trigger.moment !== r2.trigger.moment) return false;
  return scopeOverlap(r1.scope.audience, r2.scope.audience);
}
const allActions = r => r.blocks.flatMap(b => b.actions);
function detectConflicts(rule, all){
  const out = [];
  const others = all.filter(r => r.id !== rule.id && r.status === "ENABLED");
  const mine = allActions(rule);
  const myCond = new Set(); rule.blocks.forEach(b=>flatConds(b).forEach(c=>myCond.add(c.fieldId)));
  for (const o of others){
    if (!triggerOverlap(rule, o)) continue;
    for (const da of mine) for (const oa of allActions(o)){
      if (da.fieldId !== oa.fieldId) continue;
      if (OPPOSITE[da.type] === oa.type){
        out.push({ type:"CONTRADICTORY", category:"CONTRADICTORY", severity:"HIGH", with:o, field:da.fieldId,
          text:`This rule does "${actionPhrase(da)}" while ${ruleName(o)} does "${actionPhrase(oa)}" on the same trigger.` });
      } else if (da.type === oa.type){
        if (da.type==="SET_VALUE" && da.value!==oa.value)
          out.push({ type:"CONTRADICTORY", category:"CONTRADICTORY", severity:"HIGH", with:o, field:da.fieldId,
            text:`This rule sets ${fLabel(da.fieldId)} to "${da.value}" but ${ruleName(o)} sets it to "${oa.value}".` });
        else
          out.push({ type:"REDUNDANT", category:"DUPLICATE", severity:"MEDIUM", with:o, field:da.fieldId,
            text:`This rule duplicates "${actionPhrase(da)}" already done by ${ruleName(o)}.` });
      } else {
        out.push({ type:"SAME_TIME", category:"SAME_TIME", severity:"LOW", with:o, field:da.fieldId,
          text:`This rule and ${ruleName(o)} both change ${fLabel(da.fieldId)} at the same moment.` });
      }
    }
    const oCond = new Set(); o.blocks.forEach(b=>flatConds(b).forEach(c=>oCond.add(c.fieldId)));
    const shared = [...myCond].find(f=>oCond.has(f));
    if (shared) out.push({ type:"OVERLAP", category:"OVERLAP", severity:"LOW", with:o, field:shared,
      text:`This rule and ${ruleName(o)} can both run — they each check ${fLabel(shared)}.` });
  }
  const seen = new Set();
  return out.filter(c => { const k=c.with.id+c.category+c.field; if(seen.has(k)) return false; seen.add(k); return true; });
}
function ruleName(r){
  const s = summarize(r);
  if (s) return `“${s.replace(/\.$/,"")}”`;
  return `a ${r.blocks.length}-block rule`;
}

/* ============================================================ SIMULATION */
function evalCondition(c, values){
  if(!c) return true;
  if(!c.fieldId || !c.op) return true;   // not yet configured → don't constrain the preview
  const raw = values[c.fieldId];
  const v = raw === undefined ? "" : raw;
  const arr = Array.isArray(c.value) ? c.value : (c.value==null || c.value==="" ? [] : [c.value]);
  const s = String(v).toLowerCase();
  const isBlank = (v==="" || v==null || (Array.isArray(v) && v.length===0));
  switch(c.op){
    case "BECOMES":
    case "EQUALS":       return String(v) === String(c.value);
    case "NOT_EQUALS":   return String(v) !== String(c.value);
    case "STARTS_WITH":  return s.startsWith(String(c.value).toLowerCase());
    case "ENDS_WITH":    return s.endsWith(String(c.value).toLowerCase());
    case "CONTAINS":     return s.includes(String(c.value).toLowerCase());
    case "IS_BLANK":
    case "IS_EMPTY":     return isBlank;
    case "IS_NOT_BLANK":
    case "IS_NOT_EMPTY": return !isBlank;
    case "MATCH_ANY":
    case "IN":           return arr.map(String).includes(String(v));
    case "NOT_IN":       return !arr.map(String).includes(String(v));
    case "MATCH_ALL":    return arr.length>0 && arr.every(x => String(x) === String(v));
    case "GREATER_THAN": return parseFloat(v) >  parseFloat(c.value);
    case "LESS_THAN":    return parseFloat(v) <  parseFloat(c.value);
    default: return false;
  }
}
function evalGroup(g, values){
  if(!g.conditions || !g.conditions.length) return true;
  const r = g.conditions.map(c => evalCondition(c, values));
  return g.match === "ALL" ? r.every(Boolean) : r.some(Boolean);
}
function evalBlock(block, values){
  const items = block.conditions || [];
  if (!items.length) return true;
  const res = items.map(it => (it && it.kind==="GROUP") ? evalGroup(it, values) : evalCondition(it, values));
  return block.match === "ALL" ? res.every(Boolean) : res.some(Boolean);
}
function scopeMatchPersona(aud, persona){
  if (aud === "ALL") return true;
  if (aud === "LOGGED_IN") return true; // all demo personas are logged in
  return aud === persona;
}
function applyAction(state, a){
  actFields(a).forEach(fid=>{
    const s = state[fid] || (state[fid] = { visible:true, required:false, enabled:true, value: "" });
    switch(a.type){
      case "SHOW": s.visible=true; break;
      case "HIDE": s.visible=false; break;
      case "MANDATE": s.required=true; break;
      case "OPTIONAL": s.required=false; break;
      case "ENABLE": s.enabled=true; break;
      case "DISABLE": s.enabled=false; break;
      case "SET_VALUE": s.value=a.value; break;
      case "CLEAR_VALUE": s.value=""; break;
    }
  });
}
function simulate(draft, all, persona, values, moment){
  const ruleset = [...all.filter(r => r.id !== draft.id && r.status === "ENABLED"), draft];
  const applicable = ruleset.filter(r => r.trigger.moment === moment && scopeMatchPersona(r.scope.audience, persona));
  const state = {};
  // init touched fields
  applicable.forEach(r => allActions(r).forEach(a => {
    actFields(a).forEach(fid=>{ if (!state[fid]) state[fid] = { visible:true, required:false, enabled:true, value: values[fid]||"" }; });
  }));
  const trace = [];
  applicable.forEach(r => r.blocks.forEach((b, bi) => {
    const matched = evalBlock(b, values);
    if (matched){
      b.actions.forEach(a => applyAction(state, a));
      trace.push({ ruleId:r.id, isDraft:r.id===draft.id, blockIndex:bi, matched:true, actions:b.actions });
    } else {
      trace.push({ ruleId:r.id, isDraft:r.id===draft.id, blockIndex:bi, matched:false, actions:[] });
    }
  }));
  return { state, trace, applicableCount: applicable.length };
}

function genSlug(rule){
  const b = rule.blocks[0]; if (!b) return "rule";
  const parts = [];
  const c = firstLeaf(b); if (c) parts.push(`${c.fieldId}_${String(condValText(c)||opLabel(c.op)).toLowerCase().replace(/\s+/g,"")}`);
  const a = b.actions[0]; if (a) parts.push(`${a.type.toLowerCase()}_${a.fieldId}`);
  if (rule.blocks.length>1) parts.push(`plus${rule.blocks.length-1}`);
  return parts.join("_") || "rule";
}

function Dropdown({ trigger, children, align }){
  const [open,setOpen]=useState(false);
  const ref = React.useRef(null);
  const [pos,setPos]=useState(null);
  const menuRef = React.useRef(null);
  // Open the menu inside the nearest scrollable ancestor (the form's middle area) so a tall menu extends THAT
  // container's scroll height — the middle scrolls to reveal it, the page + sticky footer stay put, and the menu
  // itself never needs a scrollbar. Falls back to a viewport-fixed menu when there is no scroll container.
  const place = () => {
    const el = ref.current; if(!el) return;
    let sc = el.parentElement;
    while (sc && sc !== document.body) { const oy = getComputedStyle(sc).overflowY; if (oy==="auto"||oy==="scroll") break; sc = sc.parentElement; }
    const r = el.getBoundingClientRect();
    if (sc && sc !== document.body) {
      if (getComputedStyle(sc).position==="static") sc.style.position = "relative";
      const cr = sc.getBoundingClientRect();
      setPos({ host:sc, abs:true, top: r.bottom - cr.top + sc.scrollTop + 4, left: r.left - cr.left + sc.scrollLeft });
    } else {
      const vw = (typeof window!=="undefined"?window.innerWidth:1280);
      let left = align==="right" ? r.right - 224 : r.left;
      left = Math.max(8, Math.min(left, vw - 232));
      setPos({ host:(typeof document!=="undefined"?document.body:null), abs:false, top: r.bottom + 4, left });
    }
  };
  const toggle = () => { if(!open){ place(); setOpen(true); } else setOpen(false); };
  React.useLayoutEffect(()=>{
    if(!open || !menuRef.current || !pos) return;
    const m = menuRef.current;
    if (pos.abs && pos.host){ const sc=pos.host; const L=Math.max(sc.scrollLeft+8, Math.min(pos.left, sc.scrollLeft+sc.clientWidth-m.offsetWidth-8)); if (L!==pos.left) setPos(p=>p?{...p,left:L}:p); }
    m.scrollIntoView({ block:"nearest", behavior:"smooth" });
  }, [open]);
  React.useEffect(()=>{
    if(!open) return;
    const onDown = (e)=>{ if(ref.current && ref.current.contains(e.target)) return; if(menuRef.current && menuRef.current.contains(e.target)) return; setOpen(false); };
    const onResize = ()=>setOpen(false);
    document.addEventListener("mousedown", onDown, true);
    window.addEventListener("resize", onResize);
    return ()=>{ document.removeEventListener("mousedown", onDown, true); window.removeEventListener("resize", onResize); };
  }, [open]);
  const menu = (open && pos && pos.host) ? ReactDOM.createPortal(
    <div ref={menuRef} className="v7in min-w-[190px] rounded-lg border border-slate-200 bg-white p-1 shadow-xl"
      style={{ position: pos.abs?"absolute":"fixed", top:pos.top, left:pos.left, zIndex:9999 }}>
      {typeof children==="function" ? children(()=>setOpen(false)) : children}
    </div>, pos.host) : null;
  return (
    <span ref={ref} className="relative inline-block align-middle">
      <span onClick={toggle}>{trigger}</span>
      {menu}
    </span>
  );
}

const blockWhen = (rule,b) => b.when || rule.trigger.moment;

function blockSummary(rule, b){
  const actor = audActor(blockWho(rule,b));
  let lead = `when ${actor} ${lcVerb(rule.trigger.lifecycle)}`;
  const m = blockWhen(rule,b);
  if (m==="ON_SUBMIT") lead += " and submits the request";
  else if (m==="ON_LOAD") lead += " and opens the form";
  const cond = condClause(b);
  const ac = actClause(b);
  const s = lead + (cond ? ` and ${cond}` : "") + (ac ? `, ${ac}` : ", do nothing yet");
  return cap(s + ".");

function blockOverlap(rA,bA,rB,bB){
  if (blockWhen(rA,bA) !== blockWhen(rB,bB)) return false;
  return scopeOverlap(blockWho(rA,bA), blockWho(rB,bB));

function workspaceConflicts(draft, allRules){
  const map = {}; draft.blocks.forEach(b => map[b.id]=[]);
  const others = allRules.filter(r => r.id!==draft.id && r.status==="ENABLED");
  draft.blocks.forEach((b,bi)=>{
    draft.blocks.forEach((ob,obi)=>{
      if (obi===bi || !blockOverlap(draft,b,draft,ob)) return;
      b.actions.forEach(a=>ob.actions.forEach(oa=>{
        actFields(a).filter(fid=>actFields(oa).includes(fid)).forEach(fid=>{
          if (OPPOSITE[a.type]===oa.type) map[b.id].push({category:"CONTRADICTORY",severity:"HIGH",field:fid,text:`Conflicts with Block ${obi+1}: it does "${actionPhrase(oa)}" in the same situation.`,jumpBlock:ob.id});
          else if (a.type===oa.type && obi>bi) map[b.id].push({category:"DUPLICATE",severity:"MEDIUM",field:fid,text:`Same as Block ${obi+1}: both "${actionPhrase(a)}".`,jumpBlock:ob.id});
          else if (a.type!==oa.type && obi>bi) map[b.id].push({category:"SAME_TIME",severity:"LOW",field:fid,text:`Block ${obi+1} also changes ${fLabel(fid)} at the same time.`,jumpBlock:ob.id});
        });
      }));
    });
    others.forEach(o=>o.blocks.forEach(ob=>{
      if (!blockOverlap(draft,b,o,ob)) return;
      b.actions.forEach(a=>ob.actions.forEach(oa=>{
        actFields(a).filter(fid=>actFields(oa).includes(fid)).forEach(fid=>{
          if (OPPOSITE[a.type]===oa.type) map[b.id].push({category:"CONTRADICTORY",severity:"HIGH",field:fid,text:`Conflicts with rule "${o.name||genSlug(o)}": it does "${actionPhrase(oa)}" in the same situation.`});
          else if (a.type===oa.type) map[b.id].push({category:"DUPLICATE",severity:"MEDIUM",field:fid,text:`Same as rule "${o.name||genSlug(o)}": both "${actionPhrase(a)}".`});
          else map[b.id].push({category:"SAME_TIME",severity:"LOW",field:fid,text:`Rule "${o.name||genSlug(o)}" also changes ${fLabel(fid)} at the same time.`});
        });
      }));
    }));
  });
  Object.keys(map).forEach(k=>{const seen=new Set();map[k]=map[k].filter(c=>{const key=c.field+c.text;if(seen.has(key))return false;seen.add(key);return true;});});
  return map;
}

   Actions (target fields) so both use one familiar pattern: a compact box shows up to 2 chips (+N),
   opening a list with a "Selected Items" summary + a toggle list. options = [{value,label}]. */
function ValueMultiSelect({ options, selected, onToggle, addLabel="value", search }){
  const sel = Array.isArray(selected) ? selected : [];
  const [q,setQ] = useState("");
  const label = v => { const o=options.find(x=>x.value===v); return o ? o.label : v; };
  const filtered = search ? options.filter(o=>String(o.label).toLowerCase().includes(q.toLowerCase())) : options;
  return (
    <Dropdown trigger={
      <span className={cx("inline-flex min-w-[150px] max-w-full cursor-pointer flex-wrap items-center gap-1 rounded-md border px-2 py-1 text-sm transition-colors",
        sel.length ? "border-slate-200 bg-white hover:bg-slate-50" : "border-dashed border-slate-300 text-slate-400 hover:border-slate-400")}>
        {sel.length===0 && <span>Select {addLabel}s…</span>}
        {sel.slice(0,2).map(v=>(
          <span key={v} className="inline-flex items-center gap-1 rounded bg-slate-100 px-1.5 py-0.5 text-xs text-slate-700">
            {label(v)}<span onClick={e=>{e.stopPropagation();onToggle(v);}} className="cursor-pointer text-slate-400 transition-colors hover:text-slate-600">×</span>
          </span>
        ))}
        {sel.length>2 && <span className="rounded bg-slate-100 px-1.5 py-0.5 text-xs text-slate-500">+{sel.length-2}</span>}
        <span className="ml-auto text-[9px] opacity-50">▾</span>
      </span>}>
      {close => (
        <div className="w-56">
          {search && <input autoFocus value={q} onChange={e=>setQ(e.target.value)} placeholder="Search…"
            className="mb-1 w-full rounded-md border border-slate-200 px-2.5 py-1.5 text-sm focus:border-sky-400 focus:outline-none focus:ring-1 focus:ring-sky-100" />}
          {sel.length>0 && (
            <div className="mb-1 border-b border-slate-100 pb-1">
              <p className="px-2 py-0.5 text-[11px] font-semibold text-sky-600">Selected Items</p>
              <div className="flex flex-wrap gap-1 px-2 py-1">
                {sel.map(v=>(
                  <span key={v} className="inline-flex items-center gap-1 rounded bg-sky-50 px-1.5 py-0.5 text-xs text-sky-700">
                    {label(v)}<span onClick={()=>onToggle(v)} className="cursor-pointer">×</span>
                  </span>
                ))}
              </div>
            </div>
          )}
          <div className="max-h-48 overflow-y-auto">
            {filtered.map(o=>(
              <button key={o.value} onClick={()=>onToggle(o.value)}
                className={cx("flex w-full items-center justify-between rounded px-2 py-1.5 text-left text-sm transition-colors hover:bg-sky-50", sel.includes(o.value) && "text-sky-700")}>
                <span>{o.label}</span>{sel.includes(o.value) && <span className="text-sky-500">✓</span>}
              </button>
            ))}
            {filtered.length===0 && <p className="px-2 py-1 text-sm text-slate-400">No matches</p>}
          </div>
        </div>
      )}
    </Dropdown>
  );
}
function ValueControl({ cond, onChange }){
  if(!cond.fieldId || !cond.op) return null;   // value appears only after a field + operator are chosen
  const f = fieldOf(cond.fieldId);
  const kind = opVal(cond.op);
  if(kind==="none") return <span className="px-1 text-xs italic text-slate-400">no value needed</span>;
  if(kind==="multi"){ const sel = Array.isArray(cond.value)?cond.value:[];
    return <ValueMultiSelect options={(f.options||[]).map(o=>({value:o,label:o}))} selected={sel} addLabel="value"
      onToggle={v=>onChange(sel.includes(v) ? sel.filter(x=>x!==v) : [...sel, v])} />; }
  if(f.options) return (
    <Dropdown trigger={<span className={cx("cursor-pointer rounded-md border px-3 py-1.5 text-sm", cond.value ? "border-slate-200 bg-slate-50 text-slate-700" : "border-dashed border-slate-300 text-slate-400")}>{cond.value || "choose value"} ▾</span>}>
      {close => <PickList search items={f.options.map(o=>({value:o,label:o}))} onPick={v=>{onChange(v);close();}} />}
    </Dropdown>
  );
  return <input value={cond.value||""} onChange={e=>onChange(e.target.value)} type={f.type==="number"?"number":f.type==="date"?"date":"text"} placeholder="Enter value"
    className="min-w-[140px] flex-1 rounded-md border border-slate-300 px-3 py-1.5 text-sm focus:border-sky-400 focus:outline-none" />;
}
function ConditionRow({ cond, onField, onOp, onValue, onRemove }){
  return (
    <div className="v7in flex items-center gap-2">
      <div className="flex flex-1 flex-wrap items-center gap-2 rounded-md border border-slate-200 bg-white p-1.5">
        <Dropdown trigger={<span className={cx("cursor-pointer rounded-md px-3 py-1.5 text-sm font-medium transition-colors", cond.fieldId ? "bg-slate-100 text-slate-700 hover:bg-slate-200" : "border border-dashed border-slate-300 italic text-slate-400 hover:bg-slate-50")}>{cond.fieldId ? fLabel(cond.fieldId) : "choose field"} ▾</span>}>
          {close => <GroupedFieldPicker value={cond.fieldId} onPick={v=>{onField(v);close();}} />}
        </Dropdown>
        {cond.fieldId && (
          <Dropdown trigger={<span className={cx("cursor-pointer rounded-md border px-2.5 py-1.5 text-sm transition-colors", cond.op ? "border-slate-200 text-slate-600 hover:bg-slate-50" : "border-dashed border-slate-300 italic text-slate-400 hover:bg-slate-50")}>{cond.op ? opLabel(cond.op) : "choose"} ▾</span>}>
            {close => <div className="-m-1 overflow-hidden rounded-lg"><GuidedPanel options={fieldOps(cond.fieldId).map(opGuide2)} value={cond.op} onPick={v=>{onOp(v);close();}} /></div>}
          </Dropdown>
        )}
        <ValueControl cond={cond} onChange={onValue} />
      </div>
      <button onClick={onRemove} title="Remove condition" className="flex h-6 w-6 shrink-0 items-center justify-center rounded-full bg-red-500 text-base leading-none text-white transition-colors hover:bg-red-600">✕</button>
    </div>
  );
}
function MatchToggle({ match, onChange }){
  return (
    <div className="inline-flex items-center gap-0.5 rounded-md border border-slate-200 bg-slate-50 p-0.5 text-xs">
      {["ALL","ANY"].map(m=>(
        <button key={m} onClick={()=>onChange(m)}
          className={cx("rounded px-2 py-1 font-medium", match===m ? "bg-white text-sky-700 shadow-sm" : "text-slate-500 hover:text-slate-700")}>Match {m==="ALL"?"All":"Any"}</button>
      ))}
    </div>
  );
}
/* ONE logic control rendered at TWO levels that always coexist and never share state:
   level "groups" → divider BETWEEN group cards (block.match)
   level "groupConditions"/"conditions" → inline at the BOTTOM of a card (group.match) */
function LogicConnector({ match, onChange, level, divider }){
  const L = level==="groups"
    ? { all:"Match ALL Groups", any:"Match ANY Group", allHelp:"Every condition group must match.", anyHelp:"At least one condition group must match." }
    : level==="groupConditions"
      ? { all:"Match ALL Conditions", any:"Match ANY Condition", allHelp:"All conditions inside this group must be true.", anyHelp:"At least one condition inside this group must be true." }
      : { all:"Match ALL Conditions", any:"Match ANY Condition", allHelp:"All conditions must be true.", anyHelp:"At least one condition must be true." };
  const toggle = (
    <div className="inline-flex items-center gap-0.5 rounded-md border border-slate-200 bg-white p-0.5 text-xs">
      {[["ALL",L.all],["ANY",L.any]].map(([m,label])=>(
        <button key={m} onClick={()=>onChange(m)}
          className={cx("rounded px-2.5 py-1 font-medium transition-colors", match===m ? "bg-sky-50 text-sky-700 shadow-sm ring-1 ring-sky-100" : "text-slate-500 hover:text-slate-700")}>{label}</button>
      ))}
    </div>
  );
  const help = <p className="text-[11px] italic text-slate-400">{match==="ALL" ? L.allHelp : L.anyHelp}</p>;
  if(divider) return (
    <div className="v7in my-1.5 flex flex-col items-center gap-1.5">
      <div className="flex w-full items-center gap-3"><span className="h-px flex-1 bg-slate-200" />{toggle}<span className="h-px flex-1 bg-slate-200" /></div>
      {help}
    </div>
  );
  return <div className="mt-2.5 flex flex-col gap-1">{toggle}{help}</div>;
}
function ConditionsEditor({ block, mutate }){
  const items = block.conditions || [];
  const hasGroups = items.some(it => it && it.kind==="GROUP");
  const setField = idx => v => mutate(b=>{ const c=b.conditions[idx]; c.fieldId=v; c.op=""; c.value=""; });   // pick a field; operator stays empty until chosen
  const setOp    = idx => v => mutate(b=>{ const c=b.conditions[idx]; c.op=v; c.value=defaultVal(v); });
  const setVal   = idx => v => mutate(b=>{ b.conditions[idx].value=v; });
  const rmItem   = idx => mutate(b=>{ b.conditions.splice(idx,1); });
  const addCond  = () => mutate(b=>{ b.conditions.push(newCondition()); });   // flat list (button only shown when there are no groups)
  const addGroup = () => mutate(b=>{
    const its = b.conditions || [];
    const bare = its.filter(x=>x && x.kind!=="GROUP");
    if(bare.length){
      // wrap the existing flat conditions into their own group, so condition-logic and group-logic get separate state
      const groups = its.filter(x=>x && x.kind==="GROUP");
      b.conditions = [{ id:uid("g"), kind:"GROUP", match:(b.match||"ALL"), conditions:bare }, ...groups, newGroup()];
      b.match = "ALL";   // block.match now carries GROUP-level logic
    } else {
      b.conditions = [...its, newGroup()];
    }
  });
  const clearAll = () => mutate(b=>{ b.conditions=[]; });
  const gSetMatch= gi => v => mutate(b=>{ b.conditions[gi].match=v; });
  const gSetField= (gi,ci) => v => mutate(b=>{ const c=b.conditions[gi].conditions[ci]; c.fieldId=v; c.op=""; c.value=""; });   // operator stays empty until chosen
  const gSetOp   = (gi,ci) => v => mutate(b=>{ const c=b.conditions[gi].conditions[ci]; c.op=v; c.value=defaultVal(v); });
  const gSetVal  = (gi,ci) => v => mutate(b=>{ b.conditions[gi].conditions[ci].value=v; });
  const gRm      = (gi,ci) => mutate(b=>{ b.conditions[gi].conditions.splice(ci,1); });
  const gAdd     = gi => mutate(b=>{ b.conditions[gi].conditions.push(newCondition()); });

  return (
    <div>
      <div className="flex items-center gap-3">
        <span className="text-xs text-slate-500">When the rule runs, check:</span>
      </div>
      <div className="mt-3 space-y-2">
        {items.length===0 && <p className="text-sm italic text-slate-400">No conditions — this rule always runs.</p>}
        {items.map((it,idx)=>{
          const isGroup = it && it.kind==="GROUP";
          const prevIsGroup = idx>0 && items[idx-1] && items[idx-1].kind==="GROUP";
          const gNo = items.slice(0,idx+1).filter(x=>x&&x.kind==="GROUP").length;   // this group's position among groups
          return (
          <React.Fragment key={it.id}>
            {/* GROUP-level logic — lives BETWEEN group cards, never inside one */}
            {isGroup && prevIsGroup && <LogicConnector level="groups" divider match={block.match} onChange={v=>mutate(b=>{ b.match=v; })} />}
            {isGroup ? (
            <div className="v7in rounded-lg border border-slate-200 bg-slate-50/70 p-3">
              <div className="mb-2 flex items-center justify-between gap-2">
                <span className="text-[11px] font-semibold uppercase tracking-wide text-slate-400">Condition group {gNo}</span>
                <button onClick={()=>rmItem(idx)} className="text-xs font-medium text-red-500 hover:underline">Remove group</button>
              </div>
              <div className="space-y-2">
                {it.conditions.map((c,ci)=>(
                  <ConditionRow key={c.id} cond={c} onField={gSetField(idx,ci)} onOp={gSetOp(idx,ci)} onValue={gSetVal(idx,ci)} onRemove={()=>gRm(idx,ci)} />
                ))}
              </div>
              {/* CONDITION-level logic — lives at the BOTTOM of this group; always shown when it has 2+ conditions */}
              {it.conditions.length>1 && <LogicConnector level="groupConditions" match={it.match} onChange={gSetMatch(idx)} />}
              <button onClick={()=>gAdd(idx)} className="mt-2.5 flex items-center gap-1.5 text-xs font-medium text-sky-600 hover:underline">
                <span className="flex h-4 w-4 items-center justify-center rounded-full bg-emerald-500 text-[11px] leading-none text-white">+</span> Add condition to group
              </button>
            </div>
            ) : (
              <ConditionRow cond={it} onField={setField(idx)} onOp={setOp(idx)} onValue={setVal(idx)} onRemove={()=>rmItem(idx)} />
            )}
          </React.Fragment>
          );
        })}
        {/* CONDITION-level logic for a flat list (no groups yet) — bottom of the list */}
        {!hasGroups && items.length>1 && <LogicConnector level="conditions" match={block.match} onChange={v=>mutate(b=>{ b.match=v; })} />}
      </div>
      <div className="mt-3 flex flex-wrap items-center gap-2">
        {!hasGroups && <button onClick={addCond} className="inline-flex items-center gap-1.5 rounded-md border border-slate-200 bg-white px-3 py-1.5 text-sm font-medium text-sky-600 transition-colors hover:bg-sky-50">
          <span className="flex h-4 w-4 items-center justify-center rounded-full bg-emerald-500 text-[11px] leading-none text-white">+</span> Add Condition
        </button>}
        <button onClick={addGroup} className="inline-flex items-center gap-1.5 rounded-md border border-slate-200 bg-white px-3 py-1.5 text-sm font-medium text-slate-600 transition-colors hover:bg-slate-50">
          <span className="text-sky-500">⊕</span> Add Condition Group
        </button>
        {items.length>0 && (
          <button onClick={clearAll} className="ml-auto inline-flex items-center gap-1.5 rounded-md px-3 py-1.5 text-sm font-medium text-red-500 transition-colors hover:bg-red-50">
            <span>⊘</span> Remove All Condition
          </button>
        )}
      </div>
    </div>
  );
}

/* ============================================================ STEP IDENTITY (numbered badge + semantic tag)
   Subtle block-identity header reused by each step inside an expanded rule block — gives the builder a
   guided When → If → Then → Review progression without changing any behavior. */
const V7_STEP_TONE = {
  when:   { badge:"bg-sky-50 text-sky-600 ring-sky-100",         tag:"bg-sky-50 text-sky-600 ring-sky-100",         bar:"before:bg-sky-200" },
  if:     { badge:"bg-amber-50 text-amber-600 ring-amber-100",   tag:"bg-amber-50 text-amber-600 ring-amber-100",   bar:"before:bg-amber-200" },
  then:   { badge:"bg-emerald-50 text-emerald-600 ring-emerald-100", tag:"bg-emerald-50 text-emerald-600 ring-emerald-100", bar:"before:bg-emerald-200" },
  review: { badge:"bg-slate-100 text-slate-500 ring-slate-200",  tag:"bg-slate-100 text-slate-500 ring-slate-200",  bar:"before:bg-slate-200" },
};
function V7StepHead({ n, tone, tag, title, hint }){

      <span className="text-sm font-semibold text-slate-800">{title}</span>
      {hint && <span className="ml-auto text-xs text-slate-400">{hint}</span>}
    </div>
  );
}
const V7_STEP_CARD = "relative overflow-hidden rounded-xl border border-slate-200 bg-slate-50/50 p-4 pl-5 shadow-sm before:absolute before:left-0 before:top-0 before:h-full before:w-1 before:content-['']";

/* ============================================================ RULE STUDIO (V3 BLOCK WORKSPACE) */
function RuleStudio({ initial, isNew, allRules, onCancel, onSave }){
  const [draft, setDraft] = useState(() => {
    const d = JSON.parse(JSON.stringify(initial));
    if (isNew) {
      // Progressive disclosure: a new block starts with only its context (Runs/For) — unset.
      const id0 = (d.blocks[0] && d.blocks[0].id) || uid("b");
      d.blocks = [{ id:id0, match:"ALL", when:null, who:null, conditions:[], actions:[] }];
    } else {
      // Editing a built rule: its context is already decided, so everything is revealed.
      d.blocks.forEach(b => { if(!b.when) b.when = d.trigger.moment; if(!b.who) b.who = d.scope.audience; });
    }
    return d;
  });
  const ctxReady = b => !!(b.when && b.who);   // both "Runs" and "For" chosen → reveal the rest
  const update = fn => setDraft(d => { const n = JSON.parse(JSON.stringify(d)); fn(n); return n; });
  const [showDesc, setShowDesc] = useState(!!initial.description);
  const [tagEditing, setTagEditing] = useState(false);
  const [tagDraft, setTagDraft] = useState("");
  const commitTag = ()=>{ const t=tagDraft.trim(); if(t) update(d=>{ d.tags=[...(d.tags||[]), t]; }); setTagDraft(""); setTagEditing(false); };
  const cancelTag = ()=>{ setTagDraft(""); setTagEditing(false); };
  const rmTag = i=>update(d=>{ (d.tags||[]).splice(i,1); });
  const [showTest, setShowTest] = useState(false);
  const [dismissed, setDismissed] = useState(() => new Set());
  const [expandedId, setExpandedId] = useState(() => (initial.blocks[0] && initial.blocks[0].id) || null);
  const [previewOpen, setPreviewOpen] = useState({});
  const [advOpen, setAdvOpen] = useState({});   // Advanced Conditions — collapsed by default, per block (keyed by block id)
  const [samples, setSamples] = useState({});

  const confMap = useMemo(() => workspaceConflicts(draft, allRules), [draft, allRules]);
  const blockConfs = b => (confMap[b.id]||[]).filter(c => !dismissed.has(b.id+"|"+c.field+"|"+c.text));
  const totalConflicts = draft.blocks.reduce((n,b)=>n+blockConfs(b).length, 0);
  const allConflicts = (()=>{ const seen=new Set(); return draft.blocks.flatMap(b=>blockConfs(b)).filter(c=>{const k=(c.category||"")+"|"+c.text; if(seen.has(k))return false; seen.add(k); return true;}); })();

  const setMatch = (bi,v)=>update(d=>d.blocks[bi].match=v);
  const addCond  = bi=>update(d=>d.blocks[bi].conditions.push(newCondition()));
  const setCond  = (bi,ci,k,v)=>update(d=>{d.blocks[bi].conditions[ci][k]=v;});
  const rmCond   = (bi,ci)=>update(d=>d.blocks[bi].conditions.splice(ci,1));
  const addAct   = bi=>update(d=>d.blocks[bi].actions.push(newAction()));
  const clearAllActions = bi=>update(d=>{ d.blocks[bi].actions=[]; });   // bulk remove — mirrors clearAll for conditions
  const setAct   = (bi,ai,k,v)=>update(d=>{d.blocks[bi].actions[ai][k]=v;});
  // Filter Data cascade — changing the type or an earlier step resets every step after it
  const setActType = (bi,ai,v)=>update(d=>{ const a=d.blocks[bi].actions[ai]; const wasFilter=a.type==="FILTER_DATA"; a.type=v; if(v==="FILTER_DATA"||wasFilter){ a.entity=""; a.srcField=""; a.fieldId=""; a.fieldIds=[]; a.value=""; } });
  const setFDEntity= (bi,ai,v)=>update(d=>{ const a=d.blocks[bi].actions[ai]; a.entity=v; a.srcField=""; a.fieldId=""; a.fieldIds=[]; a.value=""; });   // new source resets the whole path
  const setFDField = (bi,ai,v)=>update(d=>{ const a=d.blocks[bi].actions[ai]; a.srcField=v; a.fieldId=""; a.fieldIds=[]; a.value=""; });                // new source field resets the target
  const setFDTarget= (bi,ai,v)=>update(d=>{ const a=d.blocks[bi].actions[ai]; a.fieldId=v; a.fieldIds=[v]; });                                          // target Request field the rule filters
  const rmAct    = (bi,ai)=>update(d=>d.blocks[bi].actions.splice(ai,1));
  // one action can target many fields — fieldIds is the source of truth, fieldId stays = first field
  const addActField = (bi,ai,fid)=>update(d=>{ const a=d.blocks[bi].actions[ai]; const cur=(a.fieldIds&&a.fieldIds.length)?a.fieldIds:(a.fieldId?[a.fieldId]:[]); if(!cur.includes(fid)) cur.push(fid); a.fieldIds=cur; a.fieldId=cur[0]; });
  const rmActField  = (bi,ai,fid)=>update(d=>{ const a=d.blocks[bi].actions[ai]; const cur=((a.fieldIds&&a.fieldIds.length)?a.fieldIds:(a.fieldId?[a.fieldId]:[])).filter(x=>x!==fid); a.fieldIds=cur; a.fieldId=cur[0]||""; });
  const removeBlock = bi=>update(d=>d.blocks.splice(bi,1));
  const setBlockWhen = (bi,v)=>update(d=>{d.blocks[bi].when=v; if(bi===0) d.trigger.moment=v;});
  const setBlockWho  = (bi,v)=>update(d=>{d.blocks[bi].who=v;  if(bi===0) d.scope.audience=v;});
  const dismiss = (b,c)=>setDismissed(s=>{const n=new Set(s);n.add(b.id+"|"+c.field+"|"+c.text);return n;});
  const addBlock = ()=>{ const nb={ id:uid("b"), match:"ALL", when:null, who:null, conditions:[], actions:[] }; setDraft(d=>{const n=JSON.parse(JSON.stringify(d)); n.blocks.push(nb); return n;}); setExpandedId(nb.id); };
  const duplicateBlock = bi=>{ const nb=cloneBlock(draft.blocks[bi]); setDraft(d=>{const n=JSON.parse(JSON.stringify(d)); n.blocks.splice(bi+1,0,nb); return n;}); setExpandedId(nb.id); };

  const condDone = c => (c && c.kind==="GROUP") ? ((c.conditions||[]).length>0 && (c.conditions||[]).every(x=>x&&x.fieldId&&x.op)) : !!(c&&c.fieldId&&c.op);
  const actDone  = a => !!(a && a.type && actFields(a).length);
  const valid = (draft.name||"").trim().length>0 && draft.blocks.length>0 &&
    draft.blocks.every(b => b.actions.length>0 && b.actions.every(actDone) && (b.conditions||[]).every(condDone));

  const sampleVal = (bid,fid)=> (samples[bid+":"+fid] || "");
  const setSample = (bid,fid,v)=> setSamples(s=>({...s,[bid+":"+fid]:v}));
  const blockSampleValues = b=>{ const o={}; flatConds(b).forEach(c=>{o[c.fieldId]=sampleVal(b.id,c.fieldId);}); return o; };

  return (
    <div className="flex h-full min-h-0 flex-1 flex-col bg-slate-50">
      {/* header + breadcrumb */}
      <div className="border-b border-slate-200 bg-white px-8 py-4">
        <div className="flex items-start justify-between gap-4">
          <div>
            <nav className="flex items-center gap-2 text-xs">
              <button onClick={onCancel} className="font-medium text-sky-600 hover:underline">Admin</button>
              <span className="text-slate-300">›</span>
              <span className="text-slate-500">Request Management</span>
              <span className="text-slate-300">›</span>
              <button onClick={onCancel} className="text-slate-500 hover:underline">Request Form Rules</button>
              <span className="text-slate-300">›</span>
              <span className="text-slate-700">{isNew ? "Create" : "Edit"}</span>
            </nav>
            <h1 className="mt-1 text-xl font-bold text-slate-800">{isNew ? "Create Request Form Rule" : "Edit Request Form Rule"}</h1>
          </div>
          <div className="flex shrink-0 items-center gap-2">
            <button onClick={onCancel} className="h-10 rounded-full border border-slate-200 bg-white px-5 text-sm font-medium text-slate-600 hover:bg-slate-50">Cancel</button>
            <button onClick={()=>onSave(draft)} className={cx("h-10 rounded-full bg-sky-500 px-6 text-sm font-semibold text-white shadow-sm hover:bg-sky-600", !valid && "opacity-50 pointer-events-none")}>Save rules</button>
          </div>
        </div>
      </div>

      {/* workspace body */}
      <div className="flex-1 overflow-y-auto">
        <div className="mx-auto max-w-3xl px-6 py-6">

          {/* workspace meta */}
          <div className="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
            <div className="flex flex-wrap items-end gap-4">
              <div className="min-w-[240px] flex-1">
                <label className="block text-sm font-semibold text-slate-700">Rule set name <span className="text-red-500">*</span></label>
                <input value={draft.name} onChange={e=>update(d=>d.name=e.target.value)} placeholder="e.g. Hardware request automation"
                  className="mt-1.5 w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-sky-400 focus:outline-none focus:ring-1 focus:ring-sky-300" />
              </div>
              <div className="w-52">
                <label className="block text-sm font-semibold text-slate-700">Execute on</label>
                <GuidedSelect value={draft.trigger.lifecycle} onChange={v=>update(d=>d.trigger.lifecycle=v)} options={EXEC_GUIDE} className="mt-1.5 w-full" />
              </div>
            </div>
            {/* metadata row: description link · tags (chips + inline entry) */}
            <div className="mt-2 flex flex-wrap items-center gap-2">
              {!showDesc && (
                <React.Fragment>
                  <button onClick={()=>setShowDesc(true)} className="text-sm font-medium text-sky-600 hover:underline">Add description</button>
                  <span className="h-4 w-px bg-slate-200" />
                </React.Fragment>
              )}
              {(draft.tags||[]).map((t,i)=>(
                <span key={i} className="inline-flex items-center gap-1 rounded-full border border-slate-200 bg-slate-100 px-2.5 py-0.5 text-xs font-medium text-slate-600">
                  {t}
                  <button onClick={()=>rmTag(i)} className="text-slate-400 hover:text-slate-600" title="Remove tag">✕</button>
                </span>
              ))}
              {tagEditing
                ? <span className="inline-flex items-center gap-1.5">
                    <input autoFocus value={tagDraft} onChange={e=>setTagDraft(e.target.value)}
                      onKeyDown={e=>{ if(e.key==="Enter") commitTag(); if(e.key==="Escape") cancelTag(); }}
                      placeholder="Tag" className="h-7 w-28 rounded-md border border-sky-300 px-2 text-xs focus:border-sky-400 focus:outline-none focus:ring-1 focus:ring-sky-200" />
                    <button onClick={commitTag} title="Save tag" className="flex h-6 w-6 items-center justify-center rounded-md bg-emerald-50 text-xs font-bold text-emerald-600 hover:bg-emerald-100">✓</button>
                    <button onClick={cancelTag} title="Cancel" className="flex h-6 w-6 items-center justify-center rounded-md bg-red-50 text-xs font-bold text-red-500 hover:bg-red-100">✕</button>
                  </span>
                : <button onClick={()=>setTagEditing(true)} title="Add tag"
                    className="inline-flex h-6 items-center gap-1 rounded-md border border-sky-200 bg-sky-50 px-2 text-xs font-medium leading-none text-sky-600 hover:bg-sky-100">
                    <span className="text-sm font-semibold">+</span> Tags
                  </button>}
            </div>
            {showDesc && <textarea value={draft.description} onChange={e=>update(d=>d.description=e.target.value)} rows={2} placeholder="Describe this rule set…"
                  className="mt-2 w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-sky-400 focus:outline-none focus:ring-1 focus:ring-sky-300" />}
          </div>

          {/* grouped conflict review across all blocks */}
          <div className="mt-6"><ConflictReview conflicts={allConflicts} /></div>

          {/* blocks heading */}
          <div className="mb-2 mt-6 flex items-center justify-between">
            <h2 className="text-xs font-semibold uppercase tracking-wide text-slate-400">Rule blocks ({draft.blocks.length})</h2>
            <span className="text-xs text-slate-400">Each block is one IF → THEN business rule</span>
          </div>

          {/* block cards */}
          <div className="space-y-3">
            {draft.blocks.map((b,bi)=>{
              const expanded = expandedId===b.id;
              const bConf = blockConfs(b);
              const bConfFields = new Set(bConf.map(c=>c.field));
              const pOpen = !!previewOpen[b.id];
              const pv = pOpen ? previewBlock(b, blockSampleValues(b)) : null;
              return (
                <div key={b.id} className={cx("overflow-hidden rounded-xl border bg-white shadow-sm", bConf.length?"border-amber-200":"border-slate-200")}>
                  {/* card header (collapsed summary) */}
                  <div className="flex items-center gap-3 px-4 py-3">
                    <span className="cursor-grab text-slate-300">⠿</span>
                    <span className="flex h-7 w-7 shrink-0 items-center justify-center rounded-lg bg-sky-50 text-sm font-bold text-sky-600 ring-1 ring-sky-100">{bi+1}</span>
                    <button onClick={()=>setExpandedId(expanded?null:b.id)} className="flex min-w-0 flex-1 items-center gap-3 text-left">
                      <span className={cx("h-2 w-2 shrink-0 rounded-full", b.actions.length?"bg-emerald-400":"bg-slate-300")} />
                      <span className="min-w-0">
                        <span className="block truncate font-medium text-slate-800">{blockSummary(draft,b)}</span>
                        <span className="block text-xs text-slate-400">{eventLabel(blockWhen(draft,b))} · {audFriendly(blockWho(draft,b))}</span>
                      </span>
                    </button>
                    {bConf.length>0 && <span className="shrink-0 rounded-full border border-amber-200 bg-amber-50 px-2 py-0.5 text-[11px] font-semibold text-amber-700">⚠ {bConf.length}</span>}
                    <button title="Duplicate" onClick={()=>duplicateBlock(bi)} className="shrink-0 text-slate-400 hover:text-slate-600"><IconCopy/></button>
                    <button title="Delete" onClick={()=>removeBlock(bi)} className="shrink-0 text-red-400 hover:text-red-600"><IconTrash/></button>
                    <button onClick={()=>setExpandedId(expanded?null:b.id)} className="shrink-0 text-slate-400">{expanded?"▾":"▸"}</button>
                  </div>

                  {expanded && (
                    <div className="border-t border-slate-100 px-4 py-5">
                      {/* STEP 1 — context: when does this run, and who is it for (always shown first) */}
                      <div className={cx(V7_STEP_CARD, V7_STEP_TONE.when.bar)}>
                      <V7StepHead n={1} tone="when" tag="When" title="When this runs" hint="and who it’s for" />
                      <div className="flex flex-wrap items-center gap-2">
                        <Dropdown trigger={<span className="cursor-pointer rounded-md border border-slate-300 bg-white px-3 py-1.5 text-sm shadow-sm transition hover:border-slate-400 hover:bg-slate-50 hover:shadow active:bg-slate-100"><span className="text-slate-400">Runs </span>{b.when ? <span className="font-semibold text-slate-800">{momentGuideLabel(b.when).toLowerCase()}</span> : <span className="text-slate-400">choose when</span>} <span className="text-[10px] text-slate-500">▾</span></span>}>
                          {close => <div className="-m-1 overflow-hidden rounded-lg"><GuidedPanel options={MOMENT_GUIDE} value={blockWhen(draft,b)} onPick={v=>{setBlockWhen(bi,v);close();}} /></div>}
                        </Dropdown>
                        <Dropdown trigger={<span className="cursor-pointer rounded-md border border-slate-300 bg-white px-3 py-1.5 text-sm shadow-sm transition hover:border-slate-400 hover:bg-slate-50 hover:shadow active:bg-slate-100"><span className="text-slate-400">for </span>{b.who ? <span className="font-semibold text-slate-800">{audFriendly(b.who)}</span> : <span className="text-slate-400">choose who</span>} <span className="text-[10px] text-slate-500">▾</span></span>}>
                          {close => <div className="-m-1 overflow-hidden rounded-lg"><GuidedPanel options={AUD_GUIDE} value={b.who||""} onPick={v=>{setBlockWho(bi,v);close();}} /></div>}
                        </Dropdown>
                      </div>
                      {!ctxReady(b) && <p className="mt-2 text-xs text-slate-400">Start by choosing when this runs and who it’s for — the next steps appear as you go.</p>}
                      </div>

                      {/* STEP 2 — condition (revealed once the context is set) */}
                      {ctxReady(b) && (
                      <div className={cx("mt-4", V7_STEP_CARD, V7_STEP_TONE.if.bar)}>
                        <V7StepHead n={2} tone="if" tag="If" title="What needs to be true" hint="conditions" />
                        <ConditionsEditor block={b} mutate={fn=>update(d=>fn(d.blocks[bi]))} />
                      </div>
                      )}

                      {/* STEP 3 — outcome (revealed after the first condition is added) */}
                      {ctxReady(b) && b.conditions.length>0 && (
                      <div className={cx("mt-4", V7_STEP_CARD, V7_STEP_TONE.then.bar)}>
                        <V7StepHead n={3} tone="then" tag="Then" title="What should happen" hint="actions" />
                        <div className="mt-2 space-y-2">
                          {b.actions.map((a,ai)=>(
                            <div key={a.id} className="v7in flex items-center gap-2">
                              <div className={cx("flex flex-1 flex-wrap items-center gap-2 rounded-md border p-1.5", actFields(a).some(fid=>bConfFields.has(fid))?"border-amber-300 ring-1 ring-amber-200":"border-slate-200 bg-white")}>
                                <Dropdown trigger={<span className={cx("cursor-pointer rounded-md px-3 py-1.5 text-sm font-medium transition-colors", a.type ? "bg-slate-100 text-slate-700 hover:bg-slate-200" : "border border-dashed border-slate-300 italic text-slate-400 hover:bg-slate-50")}>{a.type ? (ACTION_TYPES.find(t=>t.id===a.type)||{}).label : "choose action"} ▾</span>}>
                                  {close => <div className="-m-1 overflow-hidden rounded-lg"><GuidedPanel options={ACTION_GUIDE2} value={a.type} onPick={v=>{setActType(bi,ai,v);close();}} /></div>}
                                </Dropdown>
                                {a.type && a.type!=="FILTER_DATA" && <ValueMultiSelect search addLabel="field"
                                  options={ACTION_FIELDS.map(f=>({value:f.id,label:f.name}))}
                                  selected={actFields(a)}
                                  onToggle={fid=> actFields(a).includes(fid) ? rmActField(bi,ai,fid) : addActField(bi,ai,fid)} />}
                                {a.type==="FILTER_DATA" && (<React.Fragment>
                                  <Dropdown trigger={<span className={cx("cursor-pointer rounded-md border px-3 py-1.5 text-sm transition-colors", a.entity ? "border-slate-200 bg-slate-50 text-slate-700 hover:bg-slate-100" : "border-dashed border-slate-300 italic text-slate-400 hover:bg-slate-50")}>{a.entity?fieldOf(a.entity).name:"Select"} ▾</span>}>
                                    {close => <PickList search items={FD_PERSONS} onPick={v=>{setFDEntity(bi,ai,v);close();}} />}
                                  </Dropdown>
                                  {a.entity && <span className="text-sm text-slate-400">›</span>}
                                  {a.entity && <Dropdown trigger={<span className={cx("cursor-pointer rounded-md border px-3 py-1.5 text-sm transition-colors", a.srcField ? "border-slate-200 bg-slate-50 text-slate-700 hover:bg-slate-100" : "border-dashed border-slate-300 italic text-slate-400 hover:bg-slate-50")}>{a.srcField?fieldOf(a.srcField).name:"Select User Field"} ▾</span>}>
                                    {close => <PickList search items={fdUserFields(a.entity)} onPick={v=>{setFDField(bi,ai,v);close();}} />}
                                  </Dropdown>}
                                  {a.srcField && <span className="text-sm text-slate-400">›</span>}
                                  {a.srcField && <Dropdown trigger={<span className={cx("cursor-pointer rounded-md border px-3 py-1.5 text-sm transition-colors", a.fieldId ? "border-slate-200 bg-slate-50 text-slate-700 hover:bg-slate-100" : "border-dashed border-slate-300 italic text-slate-400 hover:bg-slate-50")}>{a.fieldId || ("Select "+(fieldOf(a.srcField).name||"Value"))} ▾</span>}>
                                    {close => <PickList search items={fdTargets(a.srcField)} onPick={v=>{setFDTarget(bi,ai,v);close();}} />}
                                  </Dropdown>}
                                </React.Fragment>)}
                                {a.type==="SET_VALUE" && a.fieldId && <span className="text-sm text-slate-400">to</span>}
                                {a.type==="SET_VALUE" && a.fieldId && (
                                  (fieldOf(a.fieldId)||{}).options
                                    ? <Dropdown trigger={<span className="cursor-pointer rounded-md border border-slate-200 bg-slate-50 px-3 py-1.5 text-sm text-slate-700 transition-colors hover:bg-slate-100">{a.value||"choose"} ▾</span>}>
                                        {close => <PickList items={fieldOf(a.fieldId).options.map(o=>({value:o,label:o}))} onPick={v=>{setAct(bi,ai,"value",v);close();}} />}
                                      </Dropdown>
                                    : <input value={a.value} onChange={e=>setAct(bi,ai,"value",e.target.value)} placeholder="value" className="rounded-md border border-slate-300 px-3 py-1.5 text-sm focus:border-sky-400 focus:outline-none" />
                                )}
                              </div>
                              <button onClick={()=>rmAct(bi,ai)} title="Remove action" className="flex h-6 w-6 shrink-0 items-center justify-center rounded-full bg-red-500 text-base leading-none text-white transition-colors hover:bg-red-600">✕</button>
                            </div>
                          ))}
                        </div>
                        <div className="mt-3 flex flex-wrap items-center gap-2">
                          <button onClick={()=>addAct(bi)} className="inline-flex items-center gap-1.5 rounded-md border border-slate-200 bg-white px-3 py-1.5 text-sm font-medium text-sky-600 transition-colors hover:bg-sky-50">
                            <span className="flex h-4 w-4 items-center justify-center rounded-full bg-emerald-500 text-[11px] leading-none text-white">+</span> Add Action
                          </button>
                          {b.actions.length>0 && (
                            <button onClick={()=>clearAllActions(bi)} className="ml-auto inline-flex items-center gap-1.5 rounded-md px-3 py-1.5 text-sm font-medium text-red-500 transition-colors hover:bg-red-50">
                              <span>⊘</span> Remove All Actions
                            </button>
                          )}
                        </div>
                      </div>
                      )}

                      {/* inline conflicts for this block */}
                      {bConf.map((c,i)=>(
                        <div key={i} className="mt-3 rounded-lg border border-amber-200 bg-amber-50 px-3 py-2 text-sm">
                          <p className="text-amber-800"><span className="font-medium">{c.severity==="HIGH"?"Conflict: ":"Heads up: "}</span>{c.text}</p>
                          <div className="mt-1.5 flex flex-wrap gap-3 text-xs font-medium">
                            {c.jumpBlock && <button onClick={()=>setExpandedId(c.jumpBlock)} className="text-amber-700 hover:underline">Jump to that block</button>}
                            <button onClick={()=>dismiss(b,c)} className="text-amber-700 hover:underline">Let this block win</button>
                            <button onClick={()=>dismiss(b,c)} className="text-slate-400 hover:underline">Ignore</button>
                          </div>
                        </div>
                      ))}

                      {/* STEP 4 — preview (revealed after the first action is added) */}
                      {ctxReady(b) && b.actions.length>0 && (
                      <div className="mt-4">
                        <V7StepHead n={4} tone="review" tag="Review" title="This rule will…" />
                        <button onClick={()=>setPreviewOpen(s=>({...s,[b.id]:!s[b.id]}))} className="text-sm font-medium text-sky-600 hover:underline">{pOpen?"▾ Hide preview":"▸ Show preview"}</button>
                        {pOpen && (
                          <div className="mt-2 rounded-lg border border-slate-200 bg-white p-3 text-sm">
                            {flatConds(b).length>0 ? (
                              <div className="flex flex-wrap items-center gap-3">
                                <span className="text-slate-500">Try a value:</span>
                                {flatConds(b).map(c=>(
                                  <span key={c.id} className="flex items-center gap-1.5">
                                    <span className="text-slate-500">{fLabel(c.fieldId)} =</span>
                                    {fieldOf(c.fieldId).options
                                      ? <Select value={sampleVal(b.id,c.fieldId)} onChange={v=>setSample(b.id,c.fieldId,v)} options={[{value:"",label:"—"},...fieldOf(c.fieldId).options.map(o=>({value:o,label:o}))]} className="h-8" />
                                      : <input value={sampleVal(b.id,c.fieldId)} onChange={e=>setSample(b.id,c.fieldId,e.target.value)} className="h-8 w-28 rounded-md border border-slate-300 px-2 text-sm focus:border-sky-400 focus:outline-none" />}
                                  </span>
                                ))}
                              </div>
                            ) : <p className="text-slate-500">This block always runs.</p>}
                            <div className="mt-2">
                              {pv && pv.matched
                                ? <div className="space-y-1">{pv.effects.map((e,i)=>(<div key={i} className="flex items-center gap-2 text-slate-700"><span className="h-1.5 w-1.5 rounded-full bg-emerald-500"/> {cap(e.text)}.</div>))}</div>
                                : <p className="text-slate-400">Conditions not met — nothing happens with these values.</p>}
                            </div>
                          </div>
                        )}
                      </div>
                      )}

                      {/* Advanced — optional, collapsed, belongs to THIS block (not a global/page-level setting) */}
                      {ctxReady(b) && (
                      <div className="mt-4 border-t border-slate-100 pt-3">
                        <button onClick={()=>setAdvOpen(s=>({...s,[b.id]:!s[b.id]}))} className="flex items-center gap-2 text-xs font-medium text-slate-500 transition-colors hover:text-slate-700">
                          <span className="text-[10px]">{advOpen[b.id]?"▾":"▸"}</span>
                          Advanced behavior for this block
                          {(b.advanced||{}).reverseOnFalse
                            ? <span className="rounded-full bg-sky-50 px-1.5 py-0.5 text-[10px] font-semibold text-sky-600 ring-1 ring-sky-100">On</span>
                            : <span className="rounded-full bg-slate-100 px-1.5 py-0.5 text-[10px] font-medium text-slate-400">Optional</span>}
                        </button>
                        {advOpen[b.id] && (
                          <div className="mt-2">
                            <button onClick={()=>update(d=>{ const blk=d.blocks[bi]; blk.advanced=blk.advanced||{}; blk.advanced.reverseOnFalse=!blk.advanced.reverseOnFalse; })}
                              className={cx("flex w-full items-start gap-3 rounded-lg border px-3 py-2.5 text-left transition-colors", (b.advanced||{}).reverseOnFalse?"border-sky-200 bg-sky-50/60":"border-slate-200 bg-white hover:bg-slate-50")}>
                              <span className={cx("mt-0.5 flex h-5 w-9 shrink-0 items-center rounded-full p-0.5 transition-colors", (b.advanced||{}).reverseOnFalse?"bg-sky-500":"bg-slate-300")}>
                                <span className={cx("h-4 w-4 rounded-full bg-white shadow-sm transition-transform", (b.advanced||{}).reverseOnFalse&&"translate-x-4")} />
                              </span>
                              <span className="min-w-0">
                                <span className={cx("block text-sm font-medium", (b.advanced||{}).reverseOnFalse?"text-sky-900":"text-slate-700")}>Reverse when the condition is no longer true</span>
                                <span className="mt-0.5 block text-[11px] leading-tight text-slate-400">Undo this block's action automatically when its conditions stop matching</span>
                              </span>
                            </button>
                          </div>
                        )}
                      </div>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* add block + templates */}
          <div className="mt-4 rounded-xl border border-dashed border-slate-300 bg-white p-4 text-center">
            <button onClick={addBlock} className="rounded-full bg-sky-500 px-5 py-2 text-sm font-semibold text-white shadow-sm hover:bg-sky-600">+ Add rule block</button>
            <p className="mt-2 text-xs text-slate-400">Each block is one independent IF → THEN business rule.</p>
          </div>
        </div>
      </div>

      {/* sticky footer */}
      <div className="flex items-center justify-between border-t border-slate-200 bg-white px-5 py-3">
        <span className={cx("text-sm font-medium", totalConflicts ? "text-amber-600" : "text-emerald-600")}>
          {totalConflicts ? `⚠ ${totalConflicts} conflict${totalConflicts>1?"s":""} across ${draft.blocks.length} block${draft.blocks.length>1?"s":""}` : `✓ No conflicts · ${draft.blocks.length} block${draft.blocks.length>1?"s":""}`}
        </span>
        <div className="flex items-center gap-2">
          <button onClick={()=>setShowTest(true)} className="h-10 rounded-full border border-sky-200 bg-sky-50 px-5 text-sm font-medium text-sky-700 hover:bg-sky-100">▷ Test the whole form</button>
          <button onClick={onCancel} className="h-10 rounded-full border border-slate-200 bg-white px-5 text-sm font-medium text-slate-600 hover:bg-slate-50">Cancel</button>
          <button onClick={()=>onSave(draft)} className={cx("h-10 rounded-full bg-sky-500 px-6 text-sm font-semibold text-white shadow-sm hover:bg-sky-600", !valid && "opacity-50 pointer-events-none")}>Save rules</button>
        </div>
      </div>

      {/* Test-whole-form drawer (on demand) */}
      {showTest && (
        <React.Fragment>
          <div className="fixed inset-0 z-40 bg-black/20" onClick={()=>setShowTest(false)} />
          <div className="fixed right-0 top-0 z-50 h-full w-[380px] overflow-y-auto bg-white p-4 shadow-2xl">
            <div className="mb-3 flex items-center justify-between">
              <h3 className="font-semibold">Test the whole form</h3>
              <button onClick={()=>setShowTest(false)} className="text-slate-400 hover:text-slate-700">✕</button>
            </div>
            <PreviewPanel draft={draft} allRules={allRules} />
          </div>
        </React.Fragment>
      )}
    </div>
  );
}

/* ============================================================ PREVIEW PANEL */
function PreviewPanel({ draft, allRules }){
  const [persona, setPersona] = useState(draft.scope.audience==="ALL"?"TECHNICIANS":draft.scope.audience);
  const [moment, setMoment]   = useState(draft.trigger.moment);
  const refFields = useMemo(() => {
    const s = new Set();
    if (draft.trigger.moment==="ON_FIELD_CHANGE") s.add(draft.trigger.fieldId);
    draft.blocks.forEach(b => flatConds(b).forEach(c => s.add(c.fieldId)));
    return [...s];
  }, [draft]);
  const [values, setValues] = useState({});
  const [result, setResult] = useState(null);

  const setVal = (id,v) => setValues(o=>({...o,[id]:v}));
  const run = () => setResult(simulate(draft, allRules, persona, values, moment));

  return (
    <div>
      <p className="mb-1.5 text-xs font-semibold uppercase tracking-wide text-slate-400">Preview &amp; Test</p>
      <div className="rounded-md border border-slate-200 p-3 space-y-2 text-sm">
        <div className="flex items-center gap-2">
          <span className="w-16 text-slate-500">Run as</span>
          <Select value={persona} onChange={setPersona} options={AUDIENCES.filter(a=>a.id!=="ALL").map(a=>({value:a.id,label:a.label}))} className="h-8 flex-1" />
        </div>
        <div className="flex items-center gap-2">
          <span className="w-16 text-slate-500">Moment</span>
          <Select value={moment} onChange={setMoment} options={MOMENTS.map(m=>({value:m.id,label:m.label}))} className="h-8 flex-1" />
        </div>
        <div className="border-t border-slate-100 pt-2">
          <p className="mb-1 text-xs font-medium text-slate-500">Test values</p>
          {refFields.length===0 && <p className="text-xs italic text-slate-400">No condition fields — rule always matches.</p>}
          {refFields.map(id=>(
            <div key={id} className="mb-1 flex items-center gap-2">
              <span className="w-24 text-xs text-slate-500">{fLabel(id)}</span>
              {fieldOf(id).options
                ? <Select value={values[id]||""} onChange={v=>setVal(id,v)} options={[{value:"",label:"—"},...fieldOf(id).options.map(o=>({value:o,label:o}))]} className="h-8 flex-1" />
                : <TextInput value={values[id]||""} onChange={v=>setVal(id,v)} type={fieldOf(id).type==="number"?"number":"text"} className="h-8 flex-1" />}
            </div>
          ))}
        </div>
        <Btn onClick={run} className="w-full">▷ Run simulation</Btn>

        {result && (
          <div className="border-t border-slate-100 pt-2 space-y-2">
            <p className="text-xs font-medium text-slate-500">Execution trace ({result.applicableCount} applicable rule{result.applicableCount!==1?"s":""})</p>
            <div className="space-y-1">
              {result.trace.filter(t=>t.matched).length===0 && <p className="text-xs italic text-slate-400">No blocks matched these values.</p>}
              {result.trace.filter(t=>t.matched).map((t,i)=>(
                <div key={i} className={cx("rounded px-2 py-1 text-xs", t.isDraft?"bg-sky-50 text-sky-800":"bg-slate-50 text-slate-600")}>
                  <span className="font-semibold">{t.isDraft?"This rule":"Rule "+t.ruleId.replace("rule_","#")}</span> · block {t.blockIndex+1} matched
                  <span className="block text-slate-500">→ {t.actions.map(actionPhrase).join("; ")}</span>
                </div>
              ))}
            </div>
            <p className="text-xs font-medium text-slate-500">Resulting form state</p>
            <div className="space-y-1">
              {Object.keys(result.state).map(fid=>{
                const s = result.state[fid];
                return (
                  <div key={fid} className="flex items-center gap-2 text-xs">
                    <span className={cx("inline-block h-2 w-2 rounded-full", s.visible?"bg-emerald-500":"bg-slate-300")} />
                    <span className="font-medium">{fLabel(fid)}</span>
                    <span className="text-slate-500">
                      {s.visible?"visible":"hidden"}{s.required?", required":""}{!s.enabled?", disabled":""}{s.value?`, = ${s.value}`:""}
                    </span>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ============================================================ VERSION SWITCHER */
const VERSIONS = [
  { id:"v1",  label:"Sentence-First Builder",  note:"V1",   href:"rule-studio-v1.html" },
  { id:"v2",  label:"Structured Form",         note:"V2",   href:"rule-studio-demo.html" },
  { id:"v3",  label:"Block Workspace",         note:"V3",   href:"rule-studio-v3.html" },
  { id:"v4",  label:"Starter Cards",           note:"V4",   href:"rule-studio-v4.html" },
  { id:"v6",  label:"Refined Classic Form",    note:"V6",   href:"rule-studio-v6.html" },
  { id:"v7",  label:"Progressive Workspace",   note:"V7",   href:"rule-studio-v7.html" },
  { id:"v8",  label:"Guided Form Canvas",      note:"V8",   href:"rule-studio-v8.html" },
  { id:"v9",  label:"Rule Sequence Workspace", note:"V9",   href:"rule-studio-v9.html" },
  { id:"v92", label:"Guided Sequence Editor",  note:"V9.2", href:"rule-studio-v9-2.html" },
  { id:"v10", label:"Form Builder",            note:"V10",  href:"rule-studio-v10.html" },
  { id:"v11", label:"Field Rule Workspace",     note:"V11",  href:"rule-studio-v11.html" },
  { id:"v112", label:"Field Rule Workspace",    note:"V11.2", href:"rule-studio-v11-2.html" },
  { id:"v12", label:"Multi-Field Rule Workspace",    note:"V12", href:"rule-studio-v12.html" },
];
const currentVersionId = () => {
  const p = (typeof window!=="undefined" && window.location.pathname) || "";
  if (p.indexOf("v9-2") >= 0) return "v92";
  if (p.indexOf("v9") >= 0) return "v9";
  if (p.indexOf("v8") >= 0) return "v8";
  if (p.indexOf("v7") >= 0) return "v7";
  if (p.indexOf("v6") >= 0) return "v6";
  if (p.indexOf("v5") >= 0) return "v5";
  if (p.indexOf("v4") >= 0) return "v4";
  if (p.indexOf("v3") >= 0) return "v3";
  if (p.indexOf("v1") >= 0) return "v1";
  return "v2";
};
function VersionBar(){
  const [open,setOpen]=useState(false);
  const cur = currentVersionId();
  const curV = VERSIONS.find(v=>v.id===cur) || VERSIONS[1];
  return (
    <div className="flex shrink-0 items-center justify-between border-b border-slate-800 bg-slate-900 px-4 py-1.5 text-xs text-slate-300">
      <span className="font-semibold tracking-wide text-slate-100">Request Form Rules · Rule Studio</span>
      <div className="relative">
        <button onClick={()=>setOpen(o=>!o)} className="inline-flex items-center gap-2 rounded-md bg-slate-800 px-3 py-1 font-medium text-white hover:bg-slate-700">
          <span className="inline-block h-1.5 w-1.5 rounded-full bg-emerald-400" />
          {curV.label} · {curV.note}
          <span className="opacity-60">▾</span>
        </button>
        {open && (
          <React.Fragment>
            <div className="fixed inset-0 z-40" onClick={()=>setOpen(false)} />
            <div className="absolute right-0 z-50 mt-1 w-60 overflow-hidden rounded-lg border border-slate-200 bg-white p-1 text-slate-700 shadow-xl">
              <p className="px-2 py-1 text-[11px] uppercase tracking-wide text-slate-400">Switch version</p>
              {VERSIONS.map(v=>(
                <a key={v.id} href={v.href}
                   className={cx("flex items-center justify-between rounded px-2 py-2 text-sm hover:bg-slate-100", v.id===cur && "bg-slate-50")}>
                  <span><span className="font-medium">{v.label}</span><span className="block text-xs text-slate-400">{v.note}</span></span>
                  {v.id===cur && <span className="text-xs font-medium text-emerald-600">current</span>}
                </a>
              ))}
            </div>
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

/* ============================================================ MODE (Guided / Example) */
function ModeBar({ mode, onChange }){
  const guided = mode!=="example";
  return (
    <div className="flex shrink-0 flex-wrap items-center gap-3 border-b border-slate-200 bg-white px-8 py-2.5">
      <div className="inline-flex rounded-full border border-slate-200 bg-slate-100 p-0.5 text-sm">
        {[["example","Example"],["guided","Guided"]].map(([id,label])=>(
          <button key={id} onClick={()=>onChange(id)}
            className={cx("rounded-full px-4 py-1.5 font-medium transition-colors",
              (id==="guided")===guided ? "bg-white text-sky-700 shadow-sm" : "text-slate-500 hover:text-slate-700")}>
            {label}
          </button>
        ))}
      </div>
      <span className="text-xs text-slate-500">
        {guided
          ? <React.Fragment><span className="font-semibold text-slate-700">Guided</span> · Start empty and build your own rule step by step.</React.Fragment>
          : <React.Fragment><span className="font-semibold text-amber-700">Example</span> · Loaded sample rule for demonstration.</React.Fragment>}
      </span>
    </div>
  );
}
function GuidedEmptyState({ mode, onCreate }){
  return (
    <div className="mt-8 flex flex-col items-center justify-center rounded-2xl border border-dashed border-slate-300 bg-slate-50/60 px-6 py-16 text-center">
      <div className="flex h-14 w-14 items-center justify-center rounded-2xl bg-sky-100 text-2xl text-sky-600">✎</div>
      <h2 className="mt-4 text-lg font-bold text-slate-800">Start building a rule</h2>
      <p className="mt-1 max-w-md text-sm text-slate-500">Start empty and build your own rule step by step. Nothing is pre-filled — you choose what to control.</p>
      <ol className="mt-5 grid max-w-xl gap-2 text-left text-sm text-slate-600 sm:grid-cols-3">
        <li className="rounded-lg border border-slate-200 bg-white px-3 py-2"><span className="font-semibold text-slate-700">1.</span> Choose what you want to control</li>
        <li className="rounded-lg border border-slate-200 bg-white px-3 py-2"><span className="font-semibold text-slate-700">2.</span> Add your first behavior</li>
        <li className="rounded-lg border border-slate-200 bg-white px-3 py-2"><span className="font-semibold text-slate-700">3.</span> Use the helper text to learn what's next</li>
      </ol>
      <button onClick={onCreate} className="mt-6 h-11 rounded-full bg-sky-500 px-6 text-sm font-semibold text-white shadow-sm hover:bg-sky-600">Start building a rule</button>
      <p className="mt-3 text-xs text-slate-400">Want to see a finished example instead? Switch to <span className="font-semibold text-slate-500">Example</span> mode above.</p>
    </div>
  );
}

/* ============================================================ APP */
function App(){
  const [mode, setMode] = useState("example");                // "example" = sample loaded (default) · "guided" = empty start
  const [rules, setRules] = useState(() => SEED.map(r => ({ ...r, name: r.name || genSlug(r) })));  // example default: sample rules loaded
  const [view, setView] = useState({ screen:"list" }); // {screen:'studio', id|null}
  const switchMode = m => { setMode(m); setRules(m==="example" ? SEED.map(r => ({ ...r, name: r.name || genSlug(r) })) : []); setView({ screen:"list" }); };

  const startCreate = () => setView({ screen:"studio", rule:newRule(), isNew:true });
  const startEdit = id => setView({ screen:"studio", rule:rules.find(r=>r.id===id), isNew:false });
  const cancel = () => setView({ screen:"list" });
  const save = draft => {
    setRules(rs => rs.some(r=>r.id===draft.id) ? rs.map(r=>r.id===draft.id?draft:r) : [...rs, draft]);
    setView({ screen:"list" });
  };

  return (
    <div className="flex h-screen flex-col">
      {view.screen!=="studio" && <ModeBar mode={mode} onChange={switchMode} />}
      {view.screen==="studio"
        ? <RuleStudio initial={view.rule} isNew={view.isNew} allRules={rules} onCancel={cancel} onSave={save} />
        : <div className="flex-1 overflow-y-auto"><RulesList rules={rules} setRules={setRules} onCreate={startCreate} onEdit={startEdit} mode={mode} /></div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<script>
// Same-origin self-compile to surface the REAL Babel error (cross-origin window.onerror hides it as "Script error.")
window.addEventListener('load', function(){
  setTimeout(function(){
    var rootEl = document.getElementById('root');
    try {
      var el = document.querySelector('script[type="text/babel"]');
      if (window.Babel && el) { window.Babel.transform(el.textContent, { presets: ['react'] }); }
    } catch (err) {
      (rootEl||document.body).innerHTML = '<pre style="white-space:pre-wrap;color:#b91c1c;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:16px;margin:24px;font:12px ui-monospace,monospace">[Compile error]\n' + (err && err.message ? err.message : err) + '</pre>';
    }
  }, 600);
});
</script>
