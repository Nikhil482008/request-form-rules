const newCondition = () => { const fieldId="request__priority"; const op=fieldOps(fieldId)[0]; return { id:uid("c"), fieldId, op, value:defaultVal(op) }; };

/* ============================================================ SUMMARIZE */
function triggerClause(rule){
  let s = `When ${audActor(rule.scope.audience)} ${lcVerb(rule.trigger.lifecycle)}`;
  if (rule.trigger.moment === "ON_FIELD_CHANGE") s += ` and changes ${fLabel(rule.trigger.fieldId)}`;
  else if (rule.trigger.moment === "ON_SUBMIT")  s += ` and submits the request`;
  return s;
}
// A block's conditions can contain leaf conditions and one-level GROUP items.
function flatConds(block){
  const out=[];
  (block.conditions||[]).forEach(it=>{ if(it && it.kind==="GROUP") out.push(...(it.conditions||[])); else if(it) out.push(it); });
  return out;
}
function firstLeaf(block){ return flatConds(block)[0] || null; }
function condValText(c){ return Array.isArray(c.value) ? c.value.join("/") : (c.value==null ? "" : String(c.value)); }
function condText(c){
  const f=fLabel(c.fieldId), o=opLabel(c.op).toLowerCase(), k=opVal(c.op);
  if(k==="none") return `${f} ${o}`;
  if(k==="multi"){ const a=Array.isArray(c.value)?c.value:[]; return `${f} ${o} ${a.join(", ")||"…"}`; }
  return `${f} ${o} ${c.value||"…"}`;
}
function condClause(block){
  const sep = block.match === "ALL" ? " and " : " or ";
  const parts = (block.conditions||[]).map(it=>{
    if(it && it.kind==="GROUP"){
      const inner=(it.conditions||[]).map(condText).join(it.match==="ALL"?" and ":" or ");
      return inner ? `(${inner})` : "";
    }
    return condText(it);
  }).filter(Boolean);
  return parts.join(sep);
}
function listJoin(arr){
  if (arr.length <= 1) return arr[0] || "";
  return arr.slice(0,-1).join(", ") + " and " + arr[arr.length-1];
}
function actClause(block){ return listJoin(block.actions.map(actionPhrase)); }
function advClause(rule){
  const x=[];
  if (rule.advanced.reverseOnFalse) x.push("reverses when the condition is no longer true");
  if (rule.advanced.enforceSystemWide) x.push("enforced system-wide");
  return x;
}
const cap = s => s.charAt(0).toUpperCase()+s.slice(1);
// Requirement-framed sentence: "When Priority becomes High, make Assignee required for technicians."
function blockSentence(rule, b){
  const cond = condClause(b);
  let s = cond ? `when ${cond}, ${actClause(b)}` : actClause(b);
  if (rule.scope.audience !== "ALL") s += ` for ${audPlural(rule.scope.audience)}`;
  const adv = advClause(rule); if (adv.length) s += ` (${adv.join(", ")})`;
  return s;
}
function summarize(rule){
  if (rule.blocks.length === 1) return cap(blockSentence(rule, rule.blocks[0]) + ".");
  return null; // multiple requirements rendered as a list
}

/* ============================================================ CONFLICTS */
const lcSet = lc => lc==="CREATE_EDIT" ? ["CREATE","EDIT"] : [lc];
const lcOverlap = (a,b) => lcSet(a).some(x => lcSet(b).includes(x));
const scopeOverlap = (a,b) => a==="ALL" || b==="ALL" || a===b;
function triggerOverlap(r1,r2){
  if (!lcOverlap(r1.trigger.lifecycle, r2.trigger.lifecycle)) return false;
  if (r1.trigger.moment !== r2.trigger.moment) return false;
  return scopeOverlap(r1.scope.audience, r2.scope.audience);
}
const allActions = r => r.blocks.flatMap(b => b.actions);
function detectConflicts(rule, all){
  const out = [];
  const others = all.filter(r => r.id !== rule.id && r.status === "ENABLED");
  const mine = allActions(rule);
  const myCond = new Set(); rule.blocks.forEach(b=>flatConds(b).forEach(c=>myCond.add(c.fieldId)));
  for (const o of others){
    if (!triggerOverlap(rule, o)) continue;
    for (const da of mine) for (const oa of allActions(o)){
      if (da.fieldId !== oa.fieldId) continue;
      if (OPPOSITE[da.type] === oa.type){
        out.push({ type:"CONTRADICTORY", category:"CONTRADICTORY", severity:"HIGH", with:o, field:da.fieldId,
          text:`This rule does "${actionPhrase(da)}" while ${ruleName(o)} does "${actionPhrase(oa)}" on the same trigger.` });
      } else if (da.type === oa.type){
        if (da.type==="SET_VALUE" && da.value!==oa.value)
          out.push({ type:"CONTRADICTORY", category:"CONTRADICTORY", severity:"HIGH", with:o, field:da.fieldId,
            text:`This rule sets ${fLabel(da.fieldId)} to "${da.value}" but ${ruleName(o)} sets it to "${oa.value}".` });
        else
          out.push({ type:"REDUNDANT", category:"DUPLICATE", severity:"MEDIUM", with:o, field:da.fieldId,
            text:`This rule duplicates "${actionPhrase(da)}" already done by ${ruleName(o)}.` });
      } else {
        out.push({ type:"SAME_TIME", category:"SAME_TIME", severity:"LOW", with:o, field:da.fieldId,
          text:`This rule and ${ruleName(o)} both change ${fLabel(da.fieldId)} at the same moment.` });
      }
    }
    const oCond = new Set(); o.blocks.forEach(b=>flatConds(b).forEach(c=>oCond.add(c.fieldId)));
    const shared = [...myCond].find(f=>oCond.has(f));
    if (shared) out.push({ type:"OVERLAP", category:"OVERLAP", severity:"LOW", with:o, field:shared,
      text:`This rule and ${ruleName(o)} can both run — they each check ${fLabel(shared)}.` });
  }
  const seen = new Set();
  return out.filter(c => { const k=c.with.id+c.category+c.field; if(seen.has(k)) return false; seen.add(k); return true; });
}
function ruleName(r){
  const s = summarize(r);
  if (s) return `“${s.replace(/\.$/,"")}”`;
  return `a ${r.blocks.length}-block rule`;
}

/* ============================================================ SIMULATION */
function evalCondition(c, values){
  if(!c) return true;
  const raw = values[c.fieldId];
  const v = raw === undefined ? "" : raw;
  const arr = Array.isArray(c.value) ? c.value : (c.value==null || c.value==="" ? [] : [c.value]);
  const s = String(v).toLowerCase();
  const isBlank = (v==="" || v==null || (Array.isArray(v) && v.length===0));
  switch(c.op){
    case "BECOMES":
    case "EQUALS":       return String(v) === String(c.value);
    case "NOT_EQUALS":   return String(v) !== String(c.value);
    case "STARTS_WITH":  return s.startsWith(String(c.value).toLowerCase());
    case "ENDS_WITH":    return s.endsWith(String(c.value).toLowerCase());
    case "CONTAINS":     return s.includes(String(c.value).toLowerCase());
    case "IS_BLANK":
    case "IS_EMPTY":     return isBlank;
    case "IS_NOT_BLANK":
    case "IS_NOT_EMPTY": return !isBlank;
    case "MATCH_ANY":
    case "IN":           return arr.map(String).includes(String(v));
    case "NOT_IN":       return !arr.map(String).includes(String(v));
    case "MATCH_ALL":    return arr.length>0 && arr.every(x => String(x) === String(v));
    case "GREATER_THAN": return parseFloat(v) >  parseFloat(c.value);
    case "LESS_THAN":    return parseFloat(v) <  parseFloat(c.value);
    default: return false;
  }
}
function evalGroup(g, values){
  if(!g.conditions || !g.conditions.length) return true;
  const r = g.conditions.map(c => evalCondition(c, values));
  return g.match === "ALL" ? r.every(Boolean) : r.some(Boolean);
}
function evalBlock(block, values){
  const items = block.conditions || [];
  if (!items.length) return true;
  const res = items.map(it => (it && it.kind==="GROUP") ? evalGroup(it, values) : evalCondition(it, values));
  return block.match === "ALL" ? res.every(Boolean) : res.some(Boolean);
}
function scopeMatchPersona(aud, persona){
  if (aud === "ALL") return true;
  if (aud === "LOGGED_IN") return true; // all demo personas are logged in
  return aud === persona;
}
function applyAction(state, a){
  const s = state[a.fieldId] || (state[a.fieldId] = { visible:true, required:false, enabled:true, value: "" });
  switch(a.type){
    case "SHOW": s.visible=true; break;
    case "HIDE": s.visible=false; break;
    case "MANDATE": s.required=true; break;
    case "OPTIONAL": s.required=false; break;
    case "ENABLE": s.enabled=true; break;
    case "DISABLE": s.enabled=false; break;
    case "SET_VALUE": s.value=a.value; break;
    case "CLEAR_VALUE": s.value=""; break;
  }
}
function simulate(draft, all, persona, values, moment){
  const ruleset = [...all.filter(r => r.id !== draft.id && r.status === "ENABLED"), draft];
  const applicable = ruleset.filter(r => r.trigger.moment === moment && scopeMatchPersona(r.scope.audience, persona));
  const state = {};
  // init touched fields
  applicable.forEach(r => allActions(r).forEach(a => {
    if (!state[a.fieldId]) state[a.fieldId] = { visible:true, required:false, enabled:true, value: values[a.fieldId]||"" };
  }));
  const trace = [];
  applicable.forEach(r => r.blocks.forEach((b, bi) => {
    const matched = evalBlock(b, values);
    if (matched){
      b.actions.forEach(a => applyAction(state, a));
      trace.push({ ruleId:r.id, isDraft:r.id===draft.id, blockIndex:bi, matched:true, actions:b.actions });
    } else {
      trace.push({ ruleId:r.id, isDraft:r.id===draft.id, blockIndex:bi, matched:false, actions:[] });
    }
  }));
  return { state, trace, applicableCount: applicable.length };
}

function genSlug(rule){
  const b = rule.blocks[0]; if (!b) return "rule";
  const parts = [];
  const c = firstLeaf(b); if (c) parts.push(`${c.fieldId}_${String(condValText(c)||opLabel(c.op)).toLowerCase().replace(/\s+/g,"")}`);
  const a = b.actions[0]; if (a) parts.push(`${a.type.toLowerCase()}_${a.fieldId}`);
  if (rule.blocks.length>1) parts.push(`plus${rule.blocks.length-1}`);
  return parts.join("_") || "rule";
}

function Dropdown({ trigger, children, align }){
  const [open,setOpen]=useState(false);
  const ref = React.useRef(null);
  const [pos,setPos]=useState(null);
  const menuRef = React.useRef(null);
  // Open the menu inside the nearest scrollable ancestor (the form's middle area) so a tall menu extends THAT
  // container's scroll height — the middle scrolls to reveal it, the page + sticky footer stay put, and the menu
  // itself never needs a scrollbar. Falls back to a viewport-fixed menu when there is no scroll container.
  const place = () => {
    const el = ref.current; if(!el) return;
    let sc = el.parentElement;
    while (sc && sc !== document.body) { const oy = getComputedStyle(sc).overflowY; if (oy==="auto"||oy==="scroll") break; sc = sc.parentElement; }
    const r = el.getBoundingClientRect();
    if (sc && sc !== document.body) {
      if (getComputedStyle(sc).position==="static") sc.style.position = "relative";
      const cr = sc.getBoundingClientRect();
      setPos({ host:sc, abs:true, top: r.bottom - cr.top + sc.scrollTop + 4, left: r.left - cr.left + sc.scrollLeft });
    } else {
      const vw = (typeof window!=="undefined"?window.innerWidth:1280);
      let left = align==="right" ? r.right - 224 : r.left;
      left = Math.max(8, Math.min(left, vw - 232));
      setPos({ host:(typeof document!=="undefined"?document.body:null), abs:false, top: r.bottom + 4, left });
    }
  };
  const toggle = () => { if(!open){ place(); setOpen(true); } else setOpen(false); };
  React.useLayoutEffect(()=>{
    if(!open || !menuRef.current || !pos) return;
    const m = menuRef.current;
    if (pos.abs && pos.host){ const sc=pos.host; const L=Math.max(sc.scrollLeft+8, Math.min(pos.left, sc.scrollLeft+sc.clientWidth-m.offsetWidth-8)); if (L!==pos.left) setPos(p=>p?{...p,left:L}:p); }
    m.scrollIntoView({ block:"nearest", behavior:"smooth" });
  }, [open]);
  React.useEffect(()=>{
    if(!open) return;
    const onDown = (e)=>{ if(ref.current && ref.current.contains(e.target)) return; if(menuRef.current && menuRef.current.contains(e.target)) return; setOpen(false); };
    const onResize = ()=>setOpen(false);
    document.addEventListener("mousedown", onDown, true);
    window.addEventListener("resize", onResize);
    return ()=>{ document.removeEventListener("mousedown", onDown, true); window.removeEventListener("resize", onResize); };
  }, [open]);
  const menu = (open && pos && pos.host) ? ReactDOM.createPortal(
    <div ref={menuRef} className="min-w-[190px] rounded-lg border border-slate-200 bg-white p-1 shadow-xl"
      style={{ position: pos.abs?"absolute":"fixed", top:pos.top, left:pos.left, zIndex:9999 }}>
      {typeof children==="function" ? children(()=>setOpen(false)) : children}
    </div>, pos.host) : null;
  return (
    <span ref={ref} className="relative inline-block align-middle">
      <span onClick={toggle}>{trigger}</span>
      {menu}
    </span>
  );
}

  const gRm      = (gi,ci) => mutate(b=>{ b.conditions[gi].conditions.splice(ci,1); });
  const gAdd     = gi => mutate(b=>{ b.conditions[gi].conditions.push(newCondition()); });

  return (
    <div>
      <div className="flex items-center gap-3">
        <span className="text-xs text-slate-500">When the rule runs, check:</span>
        {items.length>1 && <MatchToggle match={block.match} onChange={v=>mutate(b=>{ b.match=v; })} />}
      </div>
      <div className="mt-3 space-y-2">
        {items.length===0 && <p className="text-sm italic text-slate-400">No conditions — this rule always runs.</p>}
        {items.map((it,idx)=> (it && it.kind==="GROUP") ? (
          <div key={it.id} className="rounded-lg border border-slate-200 bg-slate-50/70 p-3">
            <div className="mb-2 flex items-center justify-between gap-2">
              <span className="text-[11px] font-semibold uppercase tracking-wide text-slate-400">Condition group</span>
              <div className="flex items-center gap-2">
                {it.conditions.length>1 && <MatchToggle match={it.match} onChange={gSetMatch(idx)} />}
                <button onClick={()=>rmItem(idx)} className="text-xs font-medium text-red-500 hover:underline">Remove group</button>
              </div>
            </div>
            <div className="space-y-2">
              {it.conditions.map((c,ci)=>(
                <ConditionRow key={c.id} cond={c} onField={gSetField(idx,ci)} onOp={gSetOp(idx,ci)} onValue={gSetVal(idx,ci)} onRemove={()=>gRm(idx,ci)} />
              ))}
            </div>
            <button onClick={()=>gAdd(idx)} className="mt-2 flex items-center gap-1.5 text-xs font-medium text-sky-600 hover:underline">
              <span className="flex h-4 w-4 items-center justify-center rounded-full bg-emerald-500 text-[11px] leading-none text-white">+</span> Add condition to group
            </button>
          </div>
        ) : (
          <ConditionRow key={it.id} cond={it} onField={setField(idx)} onOp={setOp(idx)} onValue={setVal(idx)} onRemove={()=>rmItem(idx)} />
        ))}
      </div>
      <div className="mt-3 flex flex-wrap items-center gap-2">
        <button onClick={addCond} className="inline-flex items-center gap-1.5 rounded-md border border-slate-200 bg-white px-3 py-1.5 text-sm font-medium text-sky-600 hover:bg-sky-50">
          <span className="flex h-4 w-4 items-center justify-center rounded-full bg-emerald-500 text-[11px] leading-none text-white">+</span> Add Condition
        </button>
        <button onClick={addGroup} className="inline-flex items-center gap-1.5 rounded-md border border-slate-200 bg-white px-3 py-1.5 text-sm font-medium text-slate-600 hover:bg-slate-50">
          <span className="text-sky-500">⊕</span> Add Condition Group
        </button>
        {items.length>0 && (
          <button onClick={clearAll} className="inline-flex items-center gap-1.5 rounded-md px-3 py-1.5 text-sm font-medium text-red-500 hover:bg-red-50">
            <span>⊘</span> Remove All Condition
          </button>
        )}
      </div>
    </div>
  );
}

const v9cap = s => s ? s.charAt(0).toUpperCase()+s.slice(1) : s;
const V9_WHEN = [
  { id:"ON_LOAD",         label:"When the form opens",               hint:"As soon as the form is opened." },
  { id:"ON_FIELD_CHANGE", label:"While someone is filling the form", hint:"As someone fills in the form." },
  { id:"ON_SUBMIT",       label:"When the form is submitted",        hint:"Just before the form is submitted." },
];
const V9_LIFE = [
  { id:"CREATE",      label:"New requests only" },
  { id:"EDIT",        label:"Existing requests only" },
  { id:"CREATE_EDIT", label:"New and existing requests" },
];
const V9_THEN = [
  { id:"SHOW",        label:"Show a field" },
  { id:"HIDE",        label:"Hide a field" },
  { id:"MANDATE",     label:"Make mandatory" },
  { id:"OPTIONAL",    label:"Make optional" },
  { id:"ENABLE",      label:"Enable a field" },
  { id:"DISABLE",     label:"Disable a field" },
  { id:"SET_VALUE",   label:"Set a value" },
  { id:"CLEAR_VALUE", label:"Clear a value" },
];
const V9_TEMPLATES = [
  { id:"mandate-assignee", label:"Require Assignee for urgent tickets", hint:"Priority is High/Urgent → Assignee mandatory.",
    build:()=>({ moment:"ON_FIELD_CHANGE", audience:"TECHNICIANS",
      conditions:[{ id:uid("c"), fieldId:"request__priority", op:"MATCH_ANY", value:["High","Urgent"] }],
      actions:[{ id:uid("a"), type:"MANDATE", fieldId:"request__assignee", value:"" }] }) },
  { id:"hide-cc", label:"Hide Cc emails from requesters", hint:"When the form opens → hide Cc emails.",
    build:()=>({ moment:"ON_LOAD", audience:"REQUESTERS",
      conditions:[], actions:[{ id:uid("a"), type:"HIDE", fieldId:"request__cc_emails", value:"" }] }) },
  { id:"set-status", label:"Set Status for Hardware requests", hint:"Category is Hardware → Status = In Progress.",
    build:()=>({ moment:"ON_FIELD_CHANGE", audience:"TECHNICIANS",
      conditions:[{ id:uid("c"), fieldId:"request__category", op:"MATCH_ANY", value:["Hardware"] }],
      actions:[{ id:uid("a"), type:"SET_VALUE", fieldId:"request__status", value:"In Progress" }] }) },
];
function v9BlockLine(b){
  const acts = b.actions.filter(a=>a.type && a.fieldId);
  if (!acts.length) return { title:"New rule block", sub:"Add an action to define what happens" };
  return { title: v9cap(acts.map(actionPhrase).join(", ")),
           sub: b.conditions.length ? "When "+condClause(b) : "Always (no conditions)" };
}

/* ============================================================ V9 RULE OVERVIEW (read-only outline + navigation) */
const v9WhenPhrase = m => ({ ON_LOAD:"When the form opens", ON_FIELD_CHANGE:"While someone is filling the form", ON_SUBMIT:"When the form is submitted" }[m]) || "";
function v9condLine(c){
  const f = fieldOf(c.fieldId).name || fLabel(c.fieldId);
  if(opVal(c.op)==="none") return f+" "+opLabel(c.op).toLowerCase();
  const v = Array.isArray(c.value) ? (c.value.join(", ")||"…") : (c.value || "…");
  return f+" = "+v;
}
function v9condHasValue(c){
  const k = opVal(c.op);
  if(k==="none") return true;
  if(k==="multi") return Array.isArray(c.value) && c.value.length>0;
  return c.value!=null && String(c.value).trim()!=="";
}
function v9condLines(blocks){
  const lines=[]; let gN=0;
  blocks.forEach(b=>{
    (b.conditions||[]).forEach(it=>{
      if(it && it.kind==="GROUP"){
        gN++; lines.push("Group "+gN+":");
        (it.conditions||[]).forEach(c=> lines.push(v9condLine(c)));
      } else if(it){
        lines.push(v9condLine(it));
      }
    });
  });
  return lines;
}
function v9advLines(adv){
  const l=[]; if(adv.reverseOnFalse) l.push("Reverse when false enabled"); if(adv.enforceSystemWide) l.push("Applies to every form"); return l;
}
const V9_STATUS_ICON = { todo:"○", partial:"◐", done:"✓", warn:"⚠" };
const V9_STATUS_COLOR = { todo:"text-slate-300", partial:"text-amber-500", done:"text-emerald-500", warn:"text-amber-500" };

/* one read-only outline row — shows status + summary, navigates on click (never edits) */
function V9OutlineRow({ status, label, count, lines, onClick }){
  return (
    <button onClick={onClick} title={"Go to "+label}
      className="group flex w-full items-start gap-2.5 rounded-lg px-2 py-2 text-left transition-colors hover:bg-slate-100/70">

        </span>
        <span className={cx("mt-0.5 block text-xs", status==="todo" ? "text-slate-400" : "text-slate-500")}>{count}</span>
        {(lines||[]).slice(0,4).map((ln,i)=>(

/* LEFT PANEL — read-only Rule Overview: progress · summaries · conflicts · navigation (never creates/edits) */
function V9Overview({ draft, conflicts, onNavigate }){
  const blocks = draft.blocks || [];
  const allConds = blocks.flatMap(b=>flatConds(b));
  const allActs  = blocks.flatMap(b=>(b.actions||[]).filter(a=>a.type&&a.fieldId));
  const cf = new Set((conflicts||[]).map(c=>c.field));

  const condCount = allConds.length, actCount = allActs.length;
  const advOn = !!(draft.advanced.reverseOnFalse || draft.advanced.enforceSystemWide);

  let condStatus = condCount===0 ? "todo" : (allConds.every(v9condHasValue) ? "done" : "partial");
  let actStatus  = actCount===0 ? "todo" : "done";
  if(allConds.some(c=>cf.has(c.fieldId))) condStatus = "warn";
  if(allActs.some(a=>cf.has(a.fieldId)))  actStatus  = "warn";

  const sections = [
    { key:"trigger", status: draft.trigger.moment ? "done":"todo", label:"Trigger",
      count: draft.trigger.moment ? "Configured" : "Not configured",
      lines: draft.trigger.moment ? [v9WhenPhrase(draft.trigger.moment)] : [] },
    { key:"conditions", status: condStatus, label:"Conditions",
      count: condCount===0 ? "Not configured" : (condCount+" condition"+(condCount>1?"s":"")+" configured"),
      lines: v9condLines(blocks) },
    { key:"actions", status: actStatus, label:"Actions",
      count: actCount===0 ? "Not configured" : (actCount+" action"+(actCount>1?"s":"")+" configured"),
      lines: allActs.map(a=>v9cap(actionPhrase(a))) },
    { key:"advanced", status: advOn ? "done":"todo", label:"Advanced",
      count: advOn ? "Configured" : "Not configured",
      lines: v9advLines(draft.advanced) },
  ];
  const configured = sections.filter(s=>s.status==="done"||s.status==="warn").length;

  return (
    <div className="flex h-full flex-col overflow-y-auto">
      <div className="px-4 pt-4">
        <h2 className="text-sm font-bold text-slate-800">Rule Overview</h2>
        <p className="mt-0.5 text-[11px] leading-relaxed text-slate-400">Track your progress and quickly navigate through the rule.</p>
        <div className="mt-2.5 flex items-center gap-2">
          <div className="h-1.5 flex-1 overflow-hidden rounded-full bg-slate-100">
            <div className="h-full rounded-full bg-emerald-400 transition-all duration-300" style={{ width: (configured/sections.length*100)+"%" }} />
          </div>
          <span className="shrink-0 text-[11px] font-medium text-slate-400">{configured}/{sections.length}</span>
        </div>
      </div>
      <div className="mt-2 space-y-0.5 px-2">
        {sections.map(s=>(
          <V9OutlineRow key={s.key} status={s.status} label={s.label} count={s.count} lines={s.lines} onClick={()=>onNavigate(s.key)} />
        ))}
      </div>
      {conflicts && conflicts.length>0 && (
        <div className="px-3 pt-2">
          <button onClick={()=>onNavigate("conflicts")}
            className="flex w-full items-start gap-2 rounded-lg border border-amber-200 bg-amber-50 px-3 py-2.5 text-left transition-colors hover:bg-amber-100/70">
            <span className="mt-px shrink-0 text-amber-500">⚠</span>
            <span className="min-w-0">
              <span className="block text-sm font-semibold text-amber-800">{conflicts.length} conflict{conflicts.length>1?"s":""} detected</span>
              <span className="mt-0.5 block text-[11px] leading-snug text-amber-700/80">{fieldOf(conflicts[0].field).name||fLabel(conflicts[0].field)} is also modified by another rule.</span>
              <span className="mt-1 block text-[11px] font-semibold text-amber-700">Review in workspace →</span>
            </span>
          </button>
        </div>
      )}
      <div className="mt-auto px-4 py-3">
        <p className="text-[11px] leading-relaxed text-slate-300">This panel tracks progress only. Build and edit the rule in the canvas.</p>
      </div>
    </div>
  );
}

function RuleStudioV9({ initial, isNew, allRules, onCancel, onSave }){
  const [draft, setDraft] = useState(()=>{
    const d = JSON.parse(JSON.stringify(initial));
    if(isNew){ d.trigger.moment=""; d.trigger.lifecycle=""; d.scope.audience=""; } // start unconfigured so the overview is honest
    return d;
  });
  const update = fn => setDraft(d=>{ const n=JSON.parse(JSON.stringify(d)); fn(n); return n; });
  const [tab, setTab] = useState("build");          // build | try
  const [active, setActive] = useState(0);
  const [collapsed, setCollapsed] = useState(()=>new Set());

  const mutateBlock = bi => (fn => update(d => fn(d.blocks[bi])));
  const conflicts = useMemo(()=>detectConflicts(draft, allRules), [draft, allRules]);
  const conflictFields = useMemo(()=>new Set(conflicts.map(c=>c.field)), [conflicts]);
  const affectedFields = useMemo(()=>{ const s=new Set(); draft.blocks.forEach(b=>b.actions.forEach(a=>{ if(a.type && a.fieldId) s.add(a.fieldId); })); return [...s]; }, [draft]);
  const hasBehavior = draft.blocks.some(b=>b.actions.some(a=>a.type && a.fieldId));
  const valid = (draft.name||"").trim().length>0 && hasBehavior;

  const blk = () => draft.blocks[active] || draft.blocks[0];
  const setWhen   = m => update(d=>{ d.trigger.moment=m; if(m==="ON_SUBMIT" && !d.trigger.lifecycle) d.trigger.lifecycle="CREATE_EDIT"; });
  const addCond   = () => update(d=>{ (d.blocks[active]||d.blocks[0]).conditions.push(newCondition()); });
  const addGroup  = () => update(d=>{ (d.blocks[active]||d.blocks[0]).conditions.push(newGroup()); });
  const toggleMatch = () => update(d=>{ const b=d.blocks[active]||d.blocks[0]; b.match = b.match==="ALL"?"ANY":"ALL"; });
  const setMatch = v => update(d=>{ const b=d.blocks[active]||d.blocks[0]; b.match = v; });
  const addAction = type => update(d=>{ (d.blocks[active]||d.blocks[0]).actions.push({ id:uid("a"), type, fieldId:"request__assignee", value:"" }); });
  const onAdvanced = k => update(d=>{ if(k==="reverse") d.advanced.reverseOnFalse=!d.advanced.reverseOnFalse; else if(k==="system") d.advanced.enforceSystemWide=!d.advanced.enforceSystemWide; });
  const onTemplate = t => update(d=>{ const cfg=t.build(); d.trigger.moment=cfg.moment; d.scope.audience=cfg.audience; const b=d.blocks[active]||d.blocks[0]; b.conditions=cfg.conditions; b.actions=cfg.actions; });

  const addBlock = () => { const at=draft.blocks.length; update(d=>d.blocks.push({ id:uid("b"), match:"ALL", mode:"ACTION", conditions:[], actions:[] })); setActive(at); };
  const dupBlock = bi => update(d=>{ const copy=JSON.parse(JSON.stringify(d.blocks[bi])); copy.id=uid("b"); flatConds(copy).forEach(c=>c.id=uid("c")); copy.actions.forEach(a=>a.id=uid("a")); d.blocks.splice(bi+1,0,copy); });
  const rmBlock  = bi => update(d=>{ d.blocks.splice(bi,1); });
  const toggleCollapse = bi => setCollapsed(s=>{ const n=new Set(s); const id=draft.blocks[bi].id; n.has(id)?n.delete(id):n.add(id); return n; });

  // ----- save finalizes any still-empty trigger defaults so the saved rule is valid -----
  const saveRule = () => {
    const d = JSON.parse(JSON.stringify(draft));
    if(!d.trigger.moment)    d.trigger.moment    = "ON_FIELD_CHANGE";
    if(!d.trigger.lifecycle) d.trigger.lifecycle = "CREATE_EDIT";
    if(!d.scope.audience)    d.scope.audience     = "ALL";
    onSave(d);
  };

  // ----- read-only overview navigation: scroll to + briefly highlight a canvas section -----
  const triggerRef=React.useRef(null), condRef=React.useRef(null), actRef=React.useRef(null), advRef=React.useRef(null), conflictRef=React.useRef(null);
  const secRefs = { trigger:triggerRef, conditions:condRef, actions:actRef, advanced:advRef, conflicts:conflictRef };
  const [flash, setFlash] = useState(null);
  React.useEffect(()=>{ if(!flash) return; const t=window.setTimeout(()=>setFlash(null), 1400); return ()=>window.clearTimeout(t); }, [flash]);
  const focusSection = key => {
    const doScroll = () => { const r=secRefs[key]; if(r && r.current) r.current.scrollIntoView({ behavior:"smooth", block:"center" }); };
    if(key!=="conflicts" && tab!=="build"){ setTab("build"); window.setTimeout(doScroll, 80); } else doScroll();
    setFlash(key);
  };

  return (
    <div className="v9root flex h-full min-h-0 flex-1 flex-col">
      {/* header */}
      <div className="flex shrink-0 items-center justify-between gap-4 border-b border-slate-200 bg-white px-6 py-3">
        <div className="flex min-w-0 items-center gap-3">
          <button onClick={onCancel} className="rounded-lg border border-slate-200 px-3 py-1.5 text-sm text-slate-600 hover:bg-slate-50">‹ Back</button>
          <div className="min-w-0">
            <input value={draft.name} onChange={e=>update(d=>d.name=e.target.value)} placeholder="Untitled rule"
              className="w-72 max-w-full rounded-md border border-transparent px-1 py-0.5 text-base font-semibold text-slate-800 placeholder:text-slate-300 hover:border-slate-200 focus:border-sky-300 focus:outline-none" />
            <p className="px-1 text-xs text-slate-400">On the <span className="font-medium text-slate-500">New Incident</span> form · {isNew?"new rule":"editing rule"}</p>
          </div>
        </div>
        <div className="flex shrink-0 items-center gap-2">
          <div className="inline-flex rounded-full border border-slate-200 bg-slate-100 p-0.5 text-sm">
            {[["build","Build"],["try","Try"]].map(([id,label])=>(
              <button key={id} onClick={()=>setTab(id)} className={cx("rounded-full px-4 py-1 font-medium transition-colors", tab===id?"bg-white text-sky-700 shadow-sm":"text-slate-500 hover:text-slate-700")}>{label}</button>
            ))}
          </div>
          <span className={cx("hidden text-xs font-medium sm:inline", conflicts.length?"text-amber-600":"text-emerald-600")}>{conflicts.length?`⚠ ${conflicts.length} to review`:"✓ No conflicts"}</span>
          <button onClick={onCancel} className="rounded-full border border-slate-200 bg-white px-4 py-1.5 text-sm font-medium text-slate-600 hover:bg-slate-50">Cancel</button>
          <button onClick={saveRule} className={cx("rounded-full bg-sky-500 px-5 py-1.5 text-sm font-semibold text-white shadow-sm hover:bg-sky-600", !valid && "opacity-50 pointer-events-none")}>Save rule</button>
        </div>
      </div>

      {/* three panels */}
      <div className="flex min-h-0 flex-1">
        {/* LEFT — read-only Rule Overview (progress · summaries · conflicts · navigation) */}
        <aside className="hidden w-64 shrink-0 border-r border-slate-200 bg-white lg:block">
          <V9Overview draft={draft} conflicts={conflicts} onNavigate={focusSection} />
        </aside>

        {/* CENTER — sequence builder / try */}
        <main className="min-w-0 flex-1 overflow-y-auto bg-slate-50 px-6 py-5">
          {tab==="build" ? (
            <div className="mx-auto max-w-2xl space-y-4">
              {isNew && !hasBehavior && (
                <div className="v9in rounded-xl border border-dashed border-slate-300 bg-white px-4 py-3 text-sm text-slate-500">
                  <span className="font-semibold text-slate-700">Build your rule step by step.</span> Choose <em>when</em> it runs, add a condition if you need one, then pick what should happen. The panel on the right explains it as you go.
                </div>
              )}

              {/* When + Who — plain language (the Trigger section) */}
              <div ref={triggerRef} className={cx("v9in rounded-xl border bg-white p-4 shadow-sm transition-shadow", flash==="trigger" ? "border-sky-300 v9flash" : "border-slate-200")}>
                <h3 className="text-sm font-semibold text-slate-800">When should this happen?</h3>
                <p className="mt-0.5 text-xs text-slate-500">Choose when this behavior should take effect.</p>
                <div className="mt-3 flex flex-wrap gap-2">
                  <Dropdown trigger={<span className={cx("inline-flex cursor-pointer items-center gap-1.5 rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100", isNew && !hasBehavior && "v9beckon")}>{(V9_WHEN.find(w=>w.id===draft.trigger.moment)||{label:"Choose a time"}).label}<span className="text-slate-400">▾</span></span>}>
                    {close=><PickList items={V9_WHEN.map(w=>({value:w.id,label:w.label}))} onPick={v=>{setWhen(v);close();}} />}
                  </Dropdown>
                  <Dropdown trigger={<span className="inline-flex cursor-pointer items-center gap-1.5 rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100">{(V9_LIFE.find(l=>l.id===draft.trigger.lifecycle)||{label:"Which requests"}).label}<span className="text-slate-400">▾</span></span>}>
                    {close=><PickList items={V9_LIFE.map(l=>({value:l.id,label:l.label}))} onPick={v=>{update(d=>d.trigger.lifecycle=v);close();}} />}
                  </Dropdown>
                </div>

                <div className="my-3 border-t border-slate-100" />

                <h3 className="text-sm font-semibold text-slate-800">Who should this affect?</h3>
                <p className="mt-0.5 text-xs text-slate-500">Pick who this rule applies to.</p>
                <div className="mt-3">
                  <Dropdown trigger={<span className="inline-flex cursor-pointer items-center gap-1.5 rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100">{(AUD_FRIENDLY.find(a=>a.id===draft.scope.audience)||{label:"Choose people"}).label}<span className="text-slate-400">▾</span></span>}>
                    {close=><PickList items={AUD_FRIENDLY.map(a=>({value:a.id,label:a.label}))} onPick={v=>{update(d=>d.scope.audience=v);close();}} />}
                  </Dropdown>
                </div>
              </div>

              {/* IF→THEN blocks (Conditions + Actions sections) */}
              {draft.blocks.map((b,bi)=>(
                <V9Block key={b.id} b={b} bi={bi}
                  active={bi===active} onActivate={()=>setActive(bi)}
                  mutateBlock={mutateBlock(bi)}
                  onDuplicate={()=>dupBlock(bi)} onRemove={()=>rmBlock(bi)} canRemove={draft.blocks.length>1}
                  collapsed={collapsed.has(b.id)} onToggleCollapse={()=>toggleCollapse(bi)}
                  conflicts={conflicts} conflictFields={conflictFields}
                  ifRef={bi===0?condRef:null} thenRef={bi===0?actRef:null}
                  flashIf={bi===0 && flash==="conditions"} flashThen={bi===0 && flash==="actions"} />
              ))}

              <button onClick={addBlock} className="flex w-full items-center justify-center gap-2 rounded-xl border border-dashed border-slate-300 bg-white py-3 text-sm font-medium text-slate-500 transition-colors hover:border-slate-400 hover:text-sky-600">
                + Add another rule block
              </button>

              {/* Advanced section (lives in the canvas now that the sidebar is read-only) */}
              <div ref={advRef} className={cx("v9in rounded-xl border bg-white p-4 shadow-sm transition-shadow", flash==="advanced" ? "border-sky-300 v9flash" : "border-slate-200")}>
                <h3 className="text-sm font-semibold text-slate-800">Advanced options</h3>
                <p className="mt-0.5 text-xs text-slate-500">Optional fine-tuning for how this rule behaves.</p>
                <div className="mt-3 space-y-2">
                  <V9Toggle on={draft.advanced.reverseOnFalse} onClick={()=>onAdvanced("reverse")}
                    label="Reverse when the condition is no longer true" sub="Undo the action automatically when the rule stops matching" />
                  <V9Toggle on={draft.advanced.enforceSystemWide} onClick={()=>onAdvanced("system")}
                    label="Apply this rule to every form" sub="Enforce system-wide, overriding “Who should this affect”" />
                </div>
              </div>
            </div>
          ) : (
            <div className="mx-auto max-w-2xl">
              <div className="mb-3 rounded-lg border border-sky-100 bg-sky-50 px-4 py-2.5 text-sm text-slate-600">
                <span className="font-semibold text-sky-700">Try mode.</span> Simulate this rule with sample values — it stays right here in your workspace.
              </div>
              <div className="rounded-xl border border-slate-200 bg-white p-4">
                <PreviewPanel draft={draft} allRules={allRules} />
              </div>
            </div>
          )}
        </main>

        {/* RIGHT — assistant (summary · impact · conflicts · test) */}
        <aside className="hidden w-80 shrink-0 border-l border-slate-200 bg-slate-50 xl:block">
          <V9Assistant draft={draft} conflicts={conflicts} affectedFields={affectedFields} hasBehavior={hasBehavior} conflictRef={conflictRef} flash={flash==="conflicts"} />
        </aside>
      </div>
    </div>
  );
}

function RuleStudio({ initial, isNew, allRules, onCancel, onSave }){
  const [draft, setDraft] = useState(() => JSON.parse(JSON.stringify(initial)));
  const update = fn => setDraft(d => { const n = JSON.parse(JSON.stringify(d)); fn(n); return n; });
  const [showAdvanced, setShowAdvanced] = useState(false);
  const [showTest, setShowTest] = useState(false);
  const [showDesc, setShowDesc] = useState(!!initial.description);
  const [dismissed, setDismissed] = useState(() => new Set());

  const conflicts = useMemo(
    () => detectConflicts(draft, allRules).filter(c => !dismissed.has(c.with.id+c.field+c.type)),
    [draft, allRules, dismissed]
  );
  const conflictFields = useMemo(() => new Set(conflicts.map(c=>c.field)), [conflicts]);

  const setMatch = (bi,v) => update(d => d.blocks[bi].match=v);
  const addCond  = bi => update(d => d.blocks[bi].conditions.push(newCondition()));
  const setCond  = (bi,ci,k,v) => update(d => { d.blocks[bi].conditions[ci][k]=v; });
  const rmCond   = (bi,ci) => update(d => d.blocks[bi].conditions.splice(ci,1));
  const addAct   = bi => update(d => d.blocks[bi].actions.push(newAction()));
  const setAct   = (bi,ai,k,v) => update(d => { d.blocks[bi].actions[ai][k]=v; });
  const rmAct    = (bi,ai) => update(d => d.blocks[bi].actions.splice(ai,1));
  const addBlock = () => update(d => d.blocks.push(newBlock()));
  const removeBlock = bi => update(d => d.blocks.splice(bi,1));
  const setAdv   = (k,v) => update(d => { d.advanced[k]=v; });
  const setBlockMode = (bi,m) => update(d => { d.blocks[bi].mode=m; });
  const dismiss  = c => setDismissed(s => { const n=new Set(s); n.add(c.with.id+c.field+c.type); return n; });

  const allActionsReversible = draft.blocks.every(b => b.actions.every(a => REVERSIBLE.includes(a.type)));
  const affectedFields = useMemo(() => { const s=new Set(); draft.blocks.forEach(b=>b.actions.forEach(a=>s.add(a.fieldId))); return [...s]; }, [draft]);
  const valid = (draft.name||"").trim().length>0 && draft.blocks.length>0 && draft.blocks.every(b => b.actions.length>0);

  return (
    <div className="flex h-full min-h-0 flex-1 flex-col bg-slate-50">
      {/* product-style header + breadcrumb */}
      <div className="border-b border-slate-200 bg-white px-8 py-4">
        <div className="flex items-start justify-between gap-4">
          <div>
            <nav className="flex items-center gap-2 text-xs">
              <button onClick={onCancel} className="font-medium text-sky-600 hover:underline">Admin</button>
              <span className="text-slate-300">›</span>
              <span className="text-slate-500">Request Management</span>
              <span className="text-slate-300">›</span>
              <button onClick={onCancel} className="text-slate-500 hover:underline">Request Form Rules</button>
              <span className="text-slate-300">›</span>
              <span className="text-slate-700">{isNew ? "Create" : "Edit"}</span>
            </nav>
            <h1 className="mt-1 text-xl font-bold text-slate-800">{isNew ? "Create Request Form Rule" : "Edit Request Form Rule"}</h1>
          </div>
          <div className="flex shrink-0 items-center gap-2">
            <button onClick={onCancel} className="h-10 rounded-full border border-slate-200 bg-white px-5 text-sm font-medium text-slate-600 hover:bg-slate-50">Cancel</button>
            <button onClick={()=>onSave(draft)} className={cx("h-10 rounded-full bg-sky-500 px-6 text-sm font-semibold text-white shadow-sm hover:bg-sky-600", !valid && "opacity-50 pointer-events-none")}>Save Rule</button>
          </div>
        </div>
      </div>

      {/* structured form body */}
      <div className="flex-1 overflow-y-auto">
        <div className="max-w-3xl px-8 py-6">

          {/* live plain-English banner (refined UX, kept) */}
          <div className="mb-6 rounded-lg border border-sky-100 bg-sky-50 px-4 py-3 text-sm text-slate-700">
            <span className="font-semibold text-sky-700">In plain English:</span> {summarize(draft) || `${draft.blocks.length} requirements set.`}
            <span className="ml-1 text-slate-400">· Affects {affectedFields.length} field{affectedFields.length!==1?"s":""}.</span>
          </div>

          {/* grouped conflict review */}
          <div className="mb-6"><ConflictReview conflicts={conflicts} /></div>

          {/* Rule Name + Description */}
          <label className="block text-sm font-semibold text-slate-700">Rule Name <span className="text-red-500">*</span></label>
          <input value={draft.name} onChange={e=>update(d=>d.name=e.target.value)} placeholder="e.g. Mandate assignee for high-priority tickets"
            className="mt-1.5 w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-sky-400 focus:outline-none focus:ring-1 focus:ring-sky-300" />
          {!showDesc
            ? <button onClick={()=>setShowDesc(true)} className="mt-2 text-sm font-medium text-sky-600 hover:underline">Add Description</button>
            : <textarea value={draft.description} onChange={e=>update(d=>d.description=e.target.value)} rows={2} placeholder="Describe what this rule does…"
                className="mt-2 w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-sky-400 focus:outline-none focus:ring-1 focus:ring-sky-300" />}

          {/* Applies to / Execute On */}
          <div className="mt-5 grid grid-cols-2 gap-4">
            <div>
              <label className="block text-sm font-semibold text-slate-700">Applies to</label>
              <Select value={draft.scope.audience} onChange={v=>update(d=>d.scope.audience=v)} options={AUD_FRIENDLY.map(a=>({value:a.id,label:a.label}))} className="mt-1.5 h-10 w-full" />
            </div>
            <div>
              <label className="block text-sm font-semibold text-slate-700">Execute On</label>
              <GuidedSelect value={draft.trigger.lifecycle} onChange={v=>update(d=>d.trigger.lifecycle=v)} options={EXEC_GUIDE} className="mt-1.5 w-full" />
            </div>
          </div>

          {/* Advanced Settings */}
          <button onClick={()=>setShowAdvanced(s=>!s)} className="mt-4 flex items-center gap-2 text-sm font-medium text-sky-600 hover:underline">
            <span className="flex h-4 w-4 items-center justify-center rounded-full border border-sky-400 text-[10px] leading-none">{showAdvanced?"˅":"›"}</span> Advanced Settings
          </button>
          {showAdvanced && (
            <div className="mt-3 space-y-3 rounded-lg border border-slate-200 bg-slate-50 p-4 text-sm">
              <div className="flex items-center gap-3">
                <span className="w-28 text-slate-600">Rule Event</span>
                <GuidedSelect value={draft.trigger.moment} onChange={v=>update(d=>d.trigger.moment=v)} options={MOMENT_GUIDE} className="flex-1" />
              </div>
              <label className={cx("flex items-start gap-2", !allActionsReversible && "opacity-40")}>
                <input type="checkbox" disabled={!allActionsReversible} checked={draft.advanced.reverseOnFalse} onChange={e=>setAdv("reverseOnFalse",e.target.checked)} className="mt-0.5" />
                <span>Reverse the action when the condition is no longer true
                  {!allActionsReversible && <em className="block text-xs text-slate-400">Not available with “Set value” (it has no opposite).</em>}</span>
              </label>
              <label className="flex items-start gap-2">
                <input type="checkbox" checked={draft.advanced.enforceSystemWide} onChange={e=>setAdv("enforceSystemWide",e.target.checked)} className="mt-0.5" />
                <span>Enforce across every form
                  {draft.advanced.enforceSystemWide && <em className="block text-xs text-amber-600">Overrides “Applies to” everywhere — use with care.</em>}</span>
              </label>
            </div>
          )}

          {/* per-block Conditions + Actions */}
          {draft.blocks.map((b,bi)=>(
            <div key={b.id}>
              <div className="my-6 border-t border-slate-200" />
              {draft.blocks.length>1 && (
                <div className="mb-3 flex items-center justify-between">
                  <span className="text-xs font-semibold uppercase tracking-wide text-slate-400">Condition &amp; action set {bi+1}</span>
                  <button onClick={()=>removeBlock(bi)} className="text-xs font-medium text-red-500 hover:underline">Remove set</button>
                </div>
              )}

              {/* CONDITIONS */}
              <h3 className="text-base font-bold text-slate-800">Conditions</h3>
              <div className="mt-4">
                <ConditionsEditor block={b} mutate={fn=>update(d=>fn(d.blocks[bi]))} />
              </div>

              {/* ACTIONS */}
              <h3 className="mt-7 text-base font-bold text-slate-800">Actions</h3>

              <div className="mt-4 space-y-3">
                {b.actions.map((a,ai)=>(
                  <div key={a.id}>
                    <div className="flex items-center gap-3">
                      <button onClick={()=>rmAct(bi,ai)} title="Remove" className="flex h-5 w-5 shrink-0 items-center justify-center rounded-full bg-red-500 text-sm leading-none text-white hover:bg-red-600">−</button>
                      <div className={cx("flex flex-1 flex-wrap items-center gap-2 rounded-md border p-1.5", conflictFields.has(a.fieldId) ? "border-amber-300 ring-1 ring-amber-200" : "border-slate-200 bg-white")}>
                        <Dropdown trigger={<span className="cursor-pointer rounded-md bg-slate-100 px-3 py-1.5 text-sm text-slate-700 hover:bg-slate-200">{(ACTION_TYPES.find(t=>t.id===a.type)||{}).label} ▾</span>}>
                          {close => <PickList items={ACTION_TYPES.map(t=>({value:t.id,label:t.label}))} onPick={v=>{setAct(bi,ai,"type",v);close();}} />}
                        </Dropdown>
                        <Dropdown trigger={<span className="cursor-pointer px-2 text-sm text-slate-700 hover:text-slate-900">{fieldOf(a.fieldId).name} ▾</span>}>
                          {close => <PickList search items={ACTION_FIELDS.map(f=>({value:f.id,label:f.name}))} onPick={v=>{setAct(bi,ai,"fieldId",v);close();}} />}
                        </Dropdown>
                        {a.type==="SET_VALUE" && <span className="text-sm text-slate-400">to</span>}
                        {a.type==="SET_VALUE" && (
                          fieldOf(a.fieldId).options
                            ? <Dropdown trigger={<span className="cursor-pointer rounded-md border border-slate-200 bg-slate-50 px-3 py-1.5 text-sm text-slate-700">{a.value||"choose"} ▾</span>}>
                                {close => <PickList items={fieldOf(a.fieldId).options.map(o=>({value:o,label:o}))} onPick={v=>{setAct(bi,ai,"value",v);close();}} />}
                              </Dropdown>
                            : <input value={a.value} onChange={e=>setAct(bi,ai,"value",e.target.value)} placeholder="value" className="rounded-md border border-slate-300 px-3 py-1.5 text-sm focus:border-sky-400 focus:outline-none" />
                        )}
                      </div>
                    </div>
                    {conflicts.filter(c => c.field===a.fieldId).map((c,i)=>(
                      <div key={i} className="ml-8 mt-2 rounded-md border border-amber-200 bg-amber-50 px-3 py-2 text-xs">
                        <p className="text-amber-800"><span className="font-medium">Heads up:</span> {c.text}</p>
                        <div className="mt-1 flex gap-3 font-medium">
                          <button className="text-amber-700 hover:underline">View that rule</button>
                          <button onClick={()=>dismiss(c)} className="text-amber-700 hover:underline">Let this one win</button>
                          <button onClick={()=>dismiss(c)} className="text-slate-400 hover:underline">Dismiss</button>
                        </div>
                      </div>
                    ))}
                  </div>
                ))}
              </div>
              <button onClick={()=>addAct(bi)} className="mt-3 flex items-center gap-2 text-sm font-medium text-sky-600 hover:underline">
                <span className="flex h-5 w-5 items-center justify-center rounded-full bg-emerald-500 text-sm leading-none text-white">+</span> Add new action
              </button>
            </div>
          ))}

          {/* add another condition→action set (Scenario B) */}
          <div className="my-6 border-t border-dashed border-slate-200" />
          <button onClick={addBlock} className="text-sm font-medium text-slate-500 hover:text-sky-600">+ Add another condition &amp; action set</button>
        </div>
      </div>

      {/* sticky footer */}
      <div className="flex items-center justify-between border-t border-slate-200 bg-white px-5 py-3">
        <span className={cx("text-sm font-medium", conflicts.length ? "text-amber-600" : "text-emerald-600")}>
          {conflicts.length ? `⚠ ${conflicts.length} thing${conflicts.length>1?"s":""} to review` : "✓ No conflicts"}
        </span>
        <div className="flex items-center gap-2">
          <button onClick={()=>setShowTest(true)} className="h-10 rounded-full border border-sky-200 bg-sky-50 px-5 text-sm font-medium text-sky-700 hover:bg-sky-100">▷ Try it</button>
          <button onClick={onCancel} className="h-10 rounded-full border border-slate-200 bg-white px-5 text-sm font-medium text-slate-600 hover:bg-slate-50">Cancel</button>
          <button onClick={()=>onSave(draft)} className={cx("h-10 rounded-full bg-sky-500 px-6 text-sm font-semibold text-white shadow-sm hover:bg-sky-600", !valid && "opacity-50 pointer-events-none")}>Save Rule</button>
        </div>
      </div>

      {/* Try-it drawer (on demand) */}
      {showTest && (

                  <span className="font-semibold">{t.isDraft?"This rule":"Rule "+t.ruleId.replace("rule_","#")}</span> · block {t.blockIndex+1} matched

            <div className="space-y-1">
              {Object.keys(result.state).map(fid=>{
                const s = result.state[fid];
                return (

                    <span className={cx("inline-block h-2 w-2 rounded-full", s.visible?"bg-emerald-500":"bg-slate-300")} />

/* conditions editor with two clear logic layers: Match ALL/ANY inside a group · Group Logic between groups */
function V92Conditions({ block, mutate }){
  const items = block.conditions || [];
  const groupCount = items.filter(it=>it && it.kind==="GROUP").length;
  const setField = idx => v => mutate(b=>{ const c=b.conditions[idx]; c.fieldId=v; c.op=fieldOps(v)[0]; c.value=defaultVal(c.op); });
  const setOp    = idx => v => mutate(b=>{ const c=b.conditions[idx]; c.op=v; c.value=defaultVal(v); });
  const setVal   = idx => v => mutate(b=>{ b.conditions[idx].value=v; });
  const rmItem   = idx => mutate(b=>{ b.conditions.splice(idx,1); });
  const addCond  = () => mutate(b=>{ b.conditions.push(newCondition()); });
  const addGroup = () => mutate(b=>{ b.conditions.push(newGroup()); });
  const setGL    = v  => mutate(b=>{ b.match=v; });
  const gSetMatch= gi => v => mutate(b=>{ b.conditions[gi].match=v; });
  const gSetField= (gi,ci) => v => mutate(b=>{ const c=b.conditions[gi].conditions[ci]; c.fieldId=v; c.op=fieldOps(v)[0]; c.value=defaultVal(c.op); });
  const gSetOp   = (gi,ci) => v => mutate(b=>{ const c=b.conditions[gi].conditions[ci]; c.op=v; c.value=defaultVal(v); });
  const gSetVal  = (gi,ci) => v => mutate(b=>{ b.conditions[gi].conditions[ci].value=v; });
  const gRm      = (gi,ci) => mutate(b=>{ b.conditions[gi].conditions.splice(ci,1); });
  const gAdd     = gi => mutate(b=>{ b.conditions[gi].conditions.push(newCondition()); });
  let gSeen = 0;
  return (
    <div className="space-y-3">
      {items.length===0 && <p className="rounded-lg bg-slate-50 px-3 py-2 text-sm text-slate-400">No conditions yet — this rule runs every time. Add a condition to narrow when it applies.</p>}
      {items.map((it,idx)=>{
        if(it && it.kind==="GROUP"){
          gSeen++; const gn = gSeen;
          return (
            <React.Fragment key={it.id}>
              {(groupCount>=2 && gn>=2) && <V92GroupLogic value={block.match} onChange={setGL} />}
              <div className="rounded-xl border border-violet-100 bg-violet-50/40 p-3">
                <div className="mb-2 flex items-center justify-between gap-2">
                  <span className="text-[10px] font-bold uppercase tracking-wide text-violet-700">Condition group {gn}</span>
                  <button onClick={()=>rmItem(idx)} className="text-xs font-medium text-red-500 hover:underline">Remove group</button>
                </div>
                <div className="mb-2 flex flex-wrap items-center gap-2">
                  <V92Seg value={it.match} onChange={gSetMatch(idx)} options={[["ALL","Match ALL"],["ANY","Match ANY"]]} />
                  <span className="text-[11px] text-slate-500">{it.match==="ALL" ? "All conditions in this group must match" : "Any condition in this group can match"}</span>
                </div>
                <div className="space-y-2">
                  {it.conditions.map((c,ci)=>(
                    <ConditionRow key={c.id} cond={c} onField={gSetField(idx,ci)} onOp={gSetOp(idx,ci)} onValue={gSetVal(idx,ci)} onRemove={()=>gRm(idx,ci)} />
                  ))}
                </div>
                <button onClick={()=>gAdd(idx)} className="mt-2 flex items-center gap-1.5 text-xs font-medium text-sky-600 hover:underline">
                  <span className="flex h-4 w-4 items-center justify-center rounded-full bg-emerald-500 text-[11px] leading-none text-white">+</span> Add condition to group
                </button>
              </div>
            </React.Fragment>
          );
        }
        return <ConditionRow key={it.id} cond={it} onField={setField(idx)} onOp={setOp(idx)} onValue={setVal(idx)} onRemove={()=>rmItem(idx)} />;
      })}
      <div className="flex flex-wrap items-center gap-2">
        <button onClick={addCond} className="inline-flex items-center gap-1.5 rounded-lg border border-slate-200 bg-white px-3 py-1.5 text-sm font-medium text-sky-600 hover:bg-sky-50">
          <span className="flex h-4 w-4 items-center justify-center rounded-full bg-emerald-500 text-[11px] leading-none text-white">+</span> Add condition
        </button>
        <button onClick={addGroup} className="inline-flex items-center gap-1.5 rounded-lg border border-slate-200 bg-white px-3 py-1.5 text-sm font-medium text-slate-600 hover:bg-slate-50">
          <span className="text-sky-500">⊕</span> Add condition group
        </button>
      </div>
      {groupCount>=2 && (
        <p className="rounded-lg bg-slate-50 px-3 py-2 text-[11px] leading-relaxed text-slate-500">
          <span className="font-semibold text-slate-600">Two logic levels:</span> <span className="font-medium text-violet-700">Match ALL / ANY</span> sets how conditions combine <em>inside</em> a group · <span className="font-medium text-sky-700">Group Logic</span> sets how groups combine <em>with each other</em>.
        </p>
      )}
    </div>
  );
}

    if(isNew){ d.trigger.moment=""; d.trigger.lifecycle=""; d.scope.audience=""; } // start unconfigured so the overview is honest
    return d;
  });
  const update = fn => setDraft(d=>{ const n=JSON.parse(JSON.stringify(d)); fn(n); return n; });
  const mutate0 = fn => update(d=>fn(d.blocks[0]));
  const block = draft.blocks[0];

  const [tab, setTab] = useState("create");          // create | settings | results
  const [advOpen, setAdvOpen] = useState(false);

  const allConflicts = useMemo(()=>detectConflicts(draft, allRules), [draft, allRules]);
  const conflicts = useMemo(()=>allConflicts.filter(c=>!dismissed.has(v92ConflictKey(c))), [allConflicts, dismissed]);
  const cf = useMemo(()=>new Set(conflicts.map(c=>c.field)), [conflicts]);

  const conds = flatConds(block);
  const validActions = (block.actions||[]).filter(a=>a.type && a.fieldId);
  const advOn = !!(draft.advanced.reverseOnFalse || draft.advanced.enforceSystemWide);
  const hasBehavior = validActions.length>0;
  const valid = (draft.name||"").trim().length>0 && hasBehavior;

  const condComplete = conds.length>0 && conds.every(c=>{ const k=opVal(c.op); return k==="none" || (k==="multi" ? (Array.isArray(c.value) && c.value.length>0) : (c.value!=null && String(c.value).trim()!=="")); });
  const trigStatus = draft.trigger.moment ? "completed" : "empty";
  const condStatus = conds.length===0 ? "empty" : (condComplete ? "completed" : "partial");
  const actStatus  = validActions.length>0 ? "completed" : "empty";
  const advStatus  = advOn ? "completed" : "empty";

  const condConflicts = conflicts.filter(c=>conds.some(x=>x.fieldId===c.field));
  const actConflicts  = conflicts.filter(c=>validActions.some(a=>a.fieldId===c.field));

  const tRef=React.useRef(null), cRef=React.useRef(null), aRef=React.useRef(null), advRef=React.useRef(null);
  const secRefs = { trigger:tRef, conditions:cRef, actions:aRef, advanced:advRef };
  const focusSection = key => {
    setTab("create");
    let target = key;
    if(key==="conflicts") target = condConflicts.length ? "conditions" : (actConflicts.length ? "actions" : "trigger");
    if(target==="advanced") setAdvOpen(true);
    setFlash(target);
    const r = secRefs[target];
    window.setTimeout(()=>{ if(r && r.current) r.current.scrollIntoView({ behavior:"smooth", block:"center" }); }, 60);
  };
  React.useEffect(()=>{ if(!flash) return; const t=window.setTimeout(()=>setFlash(null), 1300); return ()=>window.clearTimeout(t); }, [flash]);

  const onAdvanced = k => update(d=>{ if(k==="reverse") d.advanced.reverseOnFalse=!d.advanced.reverseOnFalse; else if(k==="system") d.advanced.enforceSystemWide=!d.advanced.enforceSystemWide; });
  const resolve = c => setDismissed(s=>{ const n=new Set(s); n.add(v92ConflictKey(c)); return n; });
  const saveRule = () => {
    const d = JSON.parse(JSON.stringify(draft));
    if(!d.trigger.moment) d.trigger.moment="ON_FIELD_CHANGE";
    if(!d.trigger.lifecycle) d.trigger.lifecycle="CREATE_EDIT";
    if(!d.scope.audience) d.scope.audience="ALL";
    onSave(d);
  };

  const bannerSummary = (draft.trigger.moment && draft.scope.audience && hasBehavior) ? summarize(draft) : "";
  const trigSummary = draft.trigger.moment ? (v9WhenPhrase(draft.trigger.moment) + (draft.scope.audience ? " · " + (AUD_FRIENDLY.find(a=>a.id===draft.scope.audience)||{label:""}).label : "")) : "";
  const condSummary = conds.length ? (condClause(block)||"") : "";
  const actSummary  = validActions.length ? v9cap(validActions.map(actionPhrase).join(", ")) : "";
  const advSummary  = advOn ? v9advLines(draft.advanced).join(" · ") : "";

  return (
    <div className="v9root flex h-full min-h-0 flex-1 flex-col">
      {/* header + tab bar */}
      <div className="flex shrink-0 items-end justify-between gap-4 border-b border-slate-200 bg-white px-6 pt-3">
        <div className="flex min-w-0 flex-1 flex-col">
          <div className="flex items-center gap-3">
            <button onClick={onCancel} className="rounded-lg border border-slate-200 px-3 py-1.5 text-sm text-slate-600 hover:bg-slate-50">‹ Back</button>
            <div className="min-w-0">
              <input value={draft.name} onChange={e=>update(d=>d.name=e.target.value)} placeholder="Untitled rule"
                className="w-64 max-w-full rounded-md border border-transparent px-1 py-0.5 text-base font-semibold text-slate-800 placeholder:text-slate-300 hover:border-slate-200 focus:border-sky-300 focus:outline-none" />
              <p className="px-1 text-xs text-slate-400">On the <span className="font-medium text-slate-500">New Incident</span> form · {isNew?"new rule":"editing rule"}</p>
            </div>
            <span className="rounded-full bg-slate-100 px-2 py-0.5 text-[10px] font-semibold uppercase tracking-wide text-slate-500">V9.2 · Sequence editor</span>
          </div>
          <div className="mt-2 flex items-center gap-1">
            {[["create","Create"],["settings","Settings"],["results","Results"]].map(([id,label])=>(
              <button key={id} onClick={()=>setTab(id)} className={cx("relative px-3 py-2 text-sm font-medium transition-colors", tab===id?"text-sky-700":"text-slate-500 hover:text-slate-700")}>
                {label}
                {tab===id && <span className="absolute inset-x-2 -bottom-px h-0.5 rounded-full bg-sky-500" />}
              </button>
            ))}
          </div>
        </div>
        <div className="flex shrink-0 items-center gap-2 pb-2">
          <span className={cx("hidden text-xs font-medium sm:inline", conflicts.length?"text-amber-600":"text-emerald-600")}>{conflicts.length?`⚠ ${conflicts.length} to review`:"✓ No conflicts"}</span>
          <button onClick={onCancel} className="rounded-full border border-slate-200 bg-white px-4 py-1.5 text-sm font-medium text-slate-600 hover:bg-slate-50">Cancel</button>
          <button onClick={saveRule} className={cx("rounded-full bg-sky-500 px-5 py-1.5 text-sm font-semibold text-white shadow-sm hover:bg-sky-600", !valid && "opacity-50 pointer-events-none")}>Save rule</button>
        </div>
      </div>

      {/* body */}
      <div className="flex min-h-0 flex-1">
        {tab==="create" && (
          <React.Fragment>
            <aside className="hidden w-64 shrink-0 border-r border-slate-200 bg-white lg:block">
              <V9Overview draft={draft} conflicts={conflicts} onNavigate={focusSection} />
            </aside>
            <main className="min-w-0 flex-1 overflow-y-auto bg-slate-50 px-6 py-5">
              <div className="mx-auto max-w-2xl space-y-3">
                <div className="flex items-start gap-2 rounded-lg border border-slate-200 bg-white px-3 py-2">
                  <span className="mt-px shrink-0 text-[10px] font-bold uppercase tracking-wide text-sky-500">Summary</span>
                  <p className="text-xs leading-relaxed text-slate-600">{bannerSummary || "Build the rule in the cards below — a plain-English summary appears here as you go."}</p>
                </div>

                <V92Block refEl={tRef} flash={flash==="trigger"} icon="⚡" iconTone="bg-sky-50 text-sky-600"
                  title="Trigger" desc="When this rule runs and who it affects" status={trigStatus}>
                  <div className="flex flex-wrap items-center gap-x-2 gap-y-2 text-sm text-slate-600">
                    <span className="text-slate-400">Runs</span>
                    <Dropdown trigger={<span className={cx("inline-flex cursor-pointer items-center gap-1 rounded-md border px-2.5 py-1 text-sm font-medium", draft.trigger.moment ? "border-slate-200 bg-slate-50 text-slate-700 hover:bg-slate-100" : "border-dashed border-slate-300 bg-white text-slate-400")}>{(V9_WHEN.find(w=>w.id===draft.trigger.moment)||{label:"choose when"}).label}<span className="text-slate-400">▾</span></span>}>
                      {close=><PickList items={V9_WHEN.map(w=>({value:w.id,label:w.label}))} onPick={v=>{update(d=>d.trigger.moment=v);close();}} />}
                    </Dropdown>
                    <span className="text-slate-400">for</span>
                    <Dropdown trigger={<span className={cx("inline-flex cursor-pointer items-center gap-1 rounded-md border px-2.5 py-1 text-sm font-medium", draft.scope.audience ? "border-slate-200 bg-slate-50 text-slate-700 hover:bg-slate-100" : "border-dashed border-slate-300 bg-white text-slate-400")}>{(AUD_FRIENDLY.find(a=>a.id===draft.scope.audience)||{label:"choose who"}).label}<span className="text-slate-400">▾</span></span>}>
                      {close=><PickList items={AUD_FRIENDLY.map(a=>({value:a.id,label:a.label}))} onPick={v=>{update(d=>d.scope.audience=v);close();}} />}
                    </Dropdown>
                    <span className="text-slate-400">on</span>
                    <Dropdown trigger={<span className={cx("inline-flex cursor-pointer items-center gap-1 rounded-md border px-2.5 py-1 text-sm font-medium", draft.trigger.lifecycle ? "border-slate-200 bg-slate-50 text-slate-700 hover:bg-slate-100" : "border-dashed border-slate-300 bg-white text-slate-400")}>{(V9_LIFE.find(l=>l.id===draft.trigger.lifecycle)||{label:"choose requests"}).label}<span className="text-slate-400">▾</span></span>}>
                      {close=><PickList items={V9_LIFE.map(l=>({value:l.id,label:l.label}))} onPick={v=>{update(d=>d.trigger.lifecycle=v);close();}} />}
                    </Dropdown>
                  </div>
                </V92Block>

                <V92Block refEl={cRef} flash={flash==="conditions"} icon="🔍" iconTone="bg-violet-50 text-violet-600"
                  title="Conditions" desc="Limit when this rule applies — optional" status={condStatus} conflict={condConflicts.length>0}
                  onClear={conds.length ? ()=>mutate0(b=>{ b.conditions=[]; }) : null}>
                  <V92ConflictCallout items={condConflicts} allRules={allRules} onEditOther={onEditRule} onDisableOther={onDisableRule} onResolve={resolve} />
                  <V92Conditions block={block} mutate={mutate0} />
                </V92Block>

                <V92Block refEl={aRef} flash={flash==="actions"} icon="→" iconTone="bg-emerald-50 text-emerald-600"
                  title="Actions" desc="What should happen to the form" status={actStatus} conflict={actConflicts.length>0}
                  onClear={validActions.length ? ()=>mutate0(b=>{ b.actions=[]; }) : null}>
                  <V92ConflictCallout items={actConflicts} allRules={allRules} onEditOther={onEditRule} onDisableOther={onDisableRule} onResolve={resolve} />
                  <V9Actions block={block} conflictFields={cf} update={mutate0} />
                </V92Block>

                <V92Advanced refEl={advRef} flash={flash==="advanced"} adv={draft.advanced} open={advOpen} setOpen={setAdvOpen} onToggle={onAdvanced} />
              </div>
            </main>
          </React.Fragment>
        )}

        {tab==="settings" && (
          <main className="min-w-0 flex-1 overflow-y-auto bg-slate-50 px-6 py-6">
            <div className="mx-auto max-w-xl">
              <div className="rounded-2xl border border-slate-200 bg-white p-5">
                <h3 className="text-sm font-semibold text-slate-800">Rule settings</h3>
                <p className="mt-0.5 text-xs text-slate-500">Basic details for this rule. The behavior is built in the <button onClick={()=>setTab("create")} className="font-medium text-sky-600 hover:underline">Create</button> tab.</p>
                <label className="mt-4 block text-xs font-semibold uppercase tracking-wide text-slate-400">Rule name</label>
                <input value={draft.name} onChange={e=>update(d=>d.name=e.target.value)} placeholder="Untitled rule" className="mt-1.5 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-sky-400 focus:outline-none" />
                <label className="mt-4 block text-xs font-semibold uppercase tracking-wide text-slate-400">Description</label>
                <textarea value={draft.description||""} onChange={e=>update(d=>d.description=e.target.value)} rows={2} placeholder="What does this rule do?" className="mt-1.5 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-sky-400 focus:outline-none" />
                <div className="mt-4 flex items-center justify-between rounded-lg border border-slate-200 px-3 py-2.5">
                  <span className="text-sm text-slate-700">Rule enabled</span>
                  <button onClick={()=>update(d=>d.status=d.status==="ENABLED"?"DISABLED":"ENABLED")} className={cx("relative h-6 w-11 rounded-full transition-colors", draft.status==="ENABLED"?"bg-emerald-500":"bg-slate-300")}>
                    <span className={cx("absolute top-0.5 h-5 w-5 rounded-full bg-white shadow transition-all", draft.status==="ENABLED"?"left-[22px]":"left-0.5")} />
                  </button>
                </div>
              </div>
            </div>
          </main>
        )}

        {tab==="results" && (
          <main className="min-w-0 flex-1 overflow-y-auto bg-slate-50 px-6 py-6">
            <div className="mx-auto max-w-xl space-y-3">
              <div className="rounded-lg border border-sky-100 bg-sky-50 px-4 py-2.5 text-sm text-slate-600">
                <span className="font-semibold text-sky-700">Results.</span> Try this rule with sample values and see how the form behaves — without leaving the editor.
              </div>
              <div className="rounded-2xl border border-slate-200 bg-white p-4">
                <PreviewPanel draft={draft} allRules={allRules} />
              </div>
            </div>
          </main>
        )}
      </div>
    </div>
  );
}

/* ============================================================ APP */
function App(){
  const [mode, setMode] = useState("example");                // "example" = sample loaded (default) · "guided" = empty start
  const [rules, setRules] = useState(() => SEED.map(r => ({ ...r, name: r.name || genSlug(r) })));  // example default: sample rules loaded
  const [view, setView] = useState({ screen:"list" }); // {screen:'studio', id|null}
  const switchMode = m => { setMode(m); setRules(m==="example" ? SEED.map(r => ({ ...r, name: r.name || genSlug(r) })) : []); setView({ screen:"list" }); };

  const startCreate = () => setView({ screen:"studio", rule:newRule(), isNew:true });
  const startEdit = id => setView({ screen:"studio", rule:rules.find(r=>r.id===id), isNew:false });
  const cancel = () => setView({ screen:"list" });
  const save = draft => {
    setRules(rs => rs.some(r=>r.id===draft.id) ? rs.map(r=>r.id===draft.id?draft:r) : [...rs, draft]);
    setView({ screen:"list" });
  };
  const disableRule = id => setRules(rs => rs.map(r => r.id===id ? {...r, status:"DISABLED"} : r));

  return (
    <div className="flex h-screen flex-col">
      <VersionBar />
      {view.screen!=="studio" && <ModeBar mode={mode} onChange={switchMode} />}
      {view.screen==="studio"
        ? <RuleStudioV92 initial={view.rule} isNew={view.isNew} allRules={rules} onCancel={cancel} onSave={save} onEditRule={startEdit} onDisableRule={disableRule} />
        : <div className="flex-1 overflow-y-auto"><RulesList rules={rules} setRules={setRules} onCreate={startCreate} onEdit={startEdit} mode={mode} /></div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<!-- self-compile safety net: prints the exact Babel error on screen if the app fails to compile (silent on success) -->
<script>
(function(){
  function check(){
    var root = document.getElementById("root");
    if (root && root.children.length) return; // rendered fine
    try {
      var s = document.querySelector('script[type="text/babel"]');
      if (s && window.Babel) Babel.transform(s.textContent, { presets:["react"] });
    } catch(err){
      var pre = document.createElement("pre");
      pre.style.cssText = "white-space:pre-wrap;background:#fff1f2;color:#9f1239;padding:14px 16px;margin:0;font:13px/1.5 ui-monospace,Menlo,Consolas,monospace;border-bottom:3px solid #e11d48;";
      pre.textContent = "⚠ Rule Studio failed to compile:\n\n" + (err && err.message ? err.message : String(err));
      document.body.insertBefore(pre, document.body.firstChild);
    }
  }
  setTimeout(check, 1500);
})();
</script>
</body>
</html>
