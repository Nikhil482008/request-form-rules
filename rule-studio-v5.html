/* ============================================================ SUMMARIZE */
function triggerClause(rule){
  let s = `When ${audActor(rule.scope.audience)} ${lcVerb(rule.trigger.lifecycle)}`;
  if (rule.trigger.moment === "ON_FIELD_CHANGE") s += ` and changes ${fLabel(rule.trigger.fieldId)}`;
  else if (rule.trigger.moment === "ON_SUBMIT")  s += ` and submits the request`;
  return s;
}
function condClause(block){
  const parts = block.conditions.map(c =>
    VALUELESS.includes(c.op) ? `${fLabel(c.fieldId)} ${opLabel(c.op)}`
                             : `${fLabel(c.fieldId)} ${opLabel(c.op)} ${c.value}`);
  return parts.join(block.match === "ALL" ? " and " : " or ");
}
function listJoin(arr){
  if (arr.length <= 1) return arr[0] || "";
  return arr.slice(0,-1).join(", ") + " and " + arr[arr.length-1];
}
function actClause(block){ return listJoin(block.actions.map(actionPhrase)); }
function advClause(rule){
  const x=[];
  if (rule.advanced.reverseOnFalse) x.push("reverses when the condition is no longer true");
  if (rule.advanced.enforceSystemWide) x.push("enforced system-wide");
  return x;
}
const cap = s => s.charAt(0).toUpperCase()+s.slice(1);
// Requirement-framed sentence: "When Priority becomes High, make Assignee required for technicians."
function blockSentence(rule, b){
  const cond = condClause(b);
  let s = cond ? `when ${cond}, ${actClause(b)}` : actClause(b);
  if (rule.scope.audience !== "ALL") s += ` for ${audPlural(rule.scope.audience)}`;
  const adv = advClause(rule); if (adv.length) s += ` (${adv.join(", ")})`;
  return s;
}
function summarize(rule){
  if (rule.blocks.length === 1) return cap(blockSentence(rule, rule.blocks[0]) + ".");
  return null; // multiple requirements rendered as a list
}

/* ============================================================ CONFLICTS */
const lcSet = lc => lc==="CREATE_EDIT" ? ["CREATE","EDIT"] : [lc];
const lcOverlap = (a,b) => lcSet(a).some(x => lcSet(b).includes(x));
const scopeOverlap = (a,b) => a==="ALL" || b==="ALL" || a===b;
function triggerOverlap(r1,r2){
  if (!lcOverlap(r1.trigger.lifecycle, r2.trigger.lifecycle)) return false;
  if (r1.trigger.moment !== r2.trigger.moment) return false;
  return scopeOverlap(r1.scope.audience, r2.scope.audience);
}
const allActions = r => r.blocks.flatMap(b => b.actions);
function detectConflicts(rule, all){
  const out = [];
  const others = all.filter(r => r.id !== rule.id && r.status === "ENABLED");
  const mine = allActions(rule);
  for (const o of others){
    if (!triggerOverlap(rule, o)) continue;
    for (const da of mine) for (const oa of allActions(o)){
      if (da.fieldId !== oa.fieldId) continue;
      if (OPPOSITE[da.type] === oa.type){
        out.push({ type:"CONTRADICTORY", severity:"HIGH", with:o, field:da.fieldId,
          text:`This rule does “${actionPhrase(da)}” while ${ruleName(o)} does “${actionPhrase(oa)}” on the same trigger.` });
      } else if (da.type === oa.type){
        out.push({ type:"REDUNDANT", severity:"MEDIUM", with:o, field:da.fieldId,
          text:`This rule duplicates “${actionPhrase(da)}” already done by ${ruleName(o)}.` });
      } else if (da.type==="SET_VALUE" && oa.type==="SET_VALUE" && da.value!==oa.value){
        out.push({ type:"CONTRADICTORY", severity:"HIGH", with:o, field:da.fieldId,
          text:`This rule sets ${fLabel(da.fieldId)} to “${da.value}” but ${ruleName(o)} sets it to “${oa.value}”.` });
      }
    }
  }
  // dedupe by with+field+type
  const seen = new Set();
  return out.filter(c => { const k=c.with.id+c.field+c.type; if(seen.has(k)) return false; seen.add(k); return true; });
}
function ruleName(r){
  const s = summarize(r);
  if (s) return `“${s.replace(/\.$/,"")}”`;
  return `a ${r.blocks.length}-block rule`;
}

/* ============================================================ SIMULATION */
function evalCondition(c, values){
  const raw = values[c.fieldId];
  const v = raw === undefined ? "" : raw;
  switch(c.op){
    case "BECOMES":      return String(v) === String(c.value);
    case "EQUALS":       return String(v) === String(c.value);
    case "NOT_EQUALS":   return String(v) !== String(c.value);
    case "GREATER_THAN": return parseFloat(v) >  parseFloat(c.value);
    case "LESS_THAN":    return parseFloat(v) <  parseFloat(c.value);
    case "CONTAINS":     return String(v).toLowerCase().includes(String(c.value).toLowerCase());
    case "IS_EMPTY":     return !v;
    case "IS_NOT_EMPTY": return !!v;
    default: return false;
  }
}
function evalBlock(block, values){
  if (!block.conditions.length) return true;
  const res = block.conditions.map(c => evalCondition(c, values));
  return block.match === "ALL" ? res.every(Boolean) : res.some(Boolean);
}
function scopeMatchPersona(aud, persona){
  if (aud === "ALL") return true;
  if (aud === "LOGGED_IN") return true; // all demo personas are logged in
  return aud === persona;
}
function applyAction(state, a){
  const s = state[a.fieldId] || (state[a.fieldId] = { visible:true, required:false, enabled:true, value: "" });
  switch(a.type){
    case "SHOW": s.visible=true; break;
    case "HIDE": s.visible=false; break;
    case "MANDATE": s.required=true; break;
    case "OPTIONAL": s.required=false; break;
    case "ENABLE": s.enabled=true; break;
    case "DISABLE": s.enabled=false; break;
    case "SET_VALUE": s.value=a.value; break;
  }
}
function simulate(draft, all, persona, values, moment){
  const ruleset = [...all.filter(r => r.id !== draft.id && r.status === "ENABLED"), draft];
  const applicable = ruleset.filter(r => r.trigger.moment === moment && scopeMatchPersona(r.scope.audience, persona));
  const state = {};
  // init touched fields
  applicable.forEach(r => allActions(r).forEach(a => {
    if (!state[a.fieldId]) state[a.fieldId] = { visible:true, required:false, enabled:true, value: values[a.fieldId]||"" };
  }));
  const trace = [];
  applicable.forEach(r => r.blocks.forEach((b, bi) => {
    const matched = evalBlock(b, values);
    if (matched){
      b.actions.forEach(a => applyAction(state, a));
      trace.push({ ruleId:r.id, isDraft:r.id===draft.id, blockIndex:bi, matched:true, actions:b.actions });
    } else {
      trace.push({ ruleId:r.id, isDraft:r.id===draft.id, blockIndex:bi, matched:false, actions:[] });
    }
  }));
  return { state, trace, applicableCount: applicable.length };
}

function TriggerChip({ trigger }){

}

/* ============================================================ LIST LABELS + ICONS */
const execLabel = lc => ({ CREATE:"On Create", EDIT:"On Edit", CREATE_EDIT:"On Create and Edit" }[lc] || lc);
const eventLabel = m => ({ ON_LOAD:"On Form Load", ON_FIELD_CHANGE:"On Field Change", ON_SUBMIT:"On Form Submit" }[m] || m);
const applicableLabel = a => ({ ALL:"All Users", REQUESTERS:"All Requesters", TECHNICIANS:"All Technicians", LOGGED_IN:"All Logged-in Users" }[a] || a);
function genSlug(rule){
  const b = rule.blocks[0]; if (!b) return "rule";
  const parts = [];
  const c = b.conditions[0]; if (c) parts.push(`${c.fieldId}_${String(c.value||opLabel(c.op)).toLowerCase().replace(/\s+/g,"")}`);
  const a = b.actions[0]; if (a) parts.push(`${a.type.toLowerCase()}_${a.fieldId}`);
  if (rule.blocks.length>1) parts.push(`plus${rule.blocks.length-1}`);
  return parts.join("_") || "rule";
}

/* ============================================================ RULES LIST */
function RulesList({ rules, setRules, onCreate, onEdit }){
  const [expanded, setExpanded] = useState(null);
  const [q, setQ] = useState("");
  const [statusFilter, setStatusFilter] = useState("ALL");
  const [filterOpen, setFilterOpen] = useState(false);

  const conflictsByRule = useMemo(() => { const m={}; rules.forEach(r => m[r.id]=detectConflicts(r,rules)); return m; }, [rules]);

  const toggleStatus = id => setRules(rs => rs.map(r => r.id===id ? {...r, status:r.status==="ENABLED"?"DISABLED":"ENABLED"} : r));
  const duplicate = r => setRules(rs => { const i=rs.findIndex(x=>x.id===r.id); const copy={...JSON.parse(JSON.stringify(r)), id:uid("rule"), audit:{...r.audit, createdBy:"You", createdAt:"just now", version:1}}; const n=[...rs]; n.splice(i+1,0,copy); return n; });
  const remove = id => setRules(rs => rs.filter(r => r.id!==id));

  const visible = rules.filter(r => {

/* ============================================================ V5 CONTROL TYPES + HELPERS */
const CONTROL_TYPES = [
  { id:"VISIBILITY",   target:"FIELD", glyph:"◉", tint:"bg-sky-50 text-sky-600",        title:"Show or hide",                  desc:"Control whether something appears on the form.",          behaviors:["SHOW","HIDE"],     defAction:"SHOW",     field:"assetTag",     moment:"ON_FIELD_CHANGE" },
  { id:"REQUIREDNESS", target:"FIELD", glyph:"✱", tint:"bg-rose-50 text-rose-600",       title:"Require or make optional",      desc:"Control whether someone must fill something in.",         behaviors:["MANDATE","OPTIONAL"], defAction:"MANDATE", field:"assignee",     moment:"ON_FIELD_CHANGE" },
  { id:"EDITABILITY",  target:"FIELD", glyph:"🔒", tint:"bg-violet-50 text-violet-600",   title:"Lock or unlock",                desc:"Control whether something can be edited or is read-only.", behaviors:["DISABLE","ENABLE"],  defAction:"DISABLE", field:"status",       moment:"ON_LOAD" },
  { id:"VALUE",        target:"FIELD", glyph:"≔", tint:"bg-emerald-50 text-emerald-600", title:"Fill in a value automatically", desc:"Set or suggest a value for the person.",                  behaviors:["SET_VALUE"], defAction:"SET_VALUE", field:"status", value:"Open", moment:"ON_LOAD" },
  { id:"VALIDATE",     target:"FORM",  glyph:"✔", tint:"bg-indigo-50 text-indigo-600",   title:"Check the form before it's sent", desc:"Validate entries and block submission if something's wrong.", behaviors:["MANDATE"], defAction:"MANDATE", field:"assignee", moment:"ON_SUBMIT", conditionLed:true, single:true },
];
const ctOf = id => CONTROL_TYPES.find(c=>c.id===id);
const ctByTarget = t => CONTROL_TYPES.filter(c=>c.target===t);
function inferControlType(rule){
  if (rule.intent && ctOf(rule.intent)) return rule.intent;
  const a = rule.blocks[0] && rule.blocks[0].actions[0];
  if (!a) return null;
  if (a.type==="MANDATE" && rule.trigger.moment==="ON_SUBMIT") return "VALIDATE";
  const map = { SHOW:"VISIBILITY", HIDE:"VISIBILITY", MANDATE:"REQUIREDNESS", OPTIONAL:"REQUIREDNESS", ENABLE:"EDITABILITY", DISABLE:"EDITABILITY", SET_VALUE:"VALUE" };
  return map[a.type] || null;
}
function applyControlType(ct){
  const action = { id:uid("a"), type:ct.defAction, fieldId:ct.field, value:ct.value||"" };
  return { intent:ct.id, target:ct.target, trigger:{ lifecycle:"CREATE_EDIT", moment:ct.moment }, scope:{ audience:"ALL" },
           blocks:[{ id:uid("b"), match:"ALL", conditions: ct.conditionLed ? [newCondition()] : [], actions:[action] }] };
}
// action-first read-only summary; scope is a TRAILING clause (never mid-sentence)
function v5Summary(rule){
  const b = rule.blocks[0]; if(!b || !b.actions.length) return "Your rule summary will appear here as you build it.";
  let s = cap(actClause(b));
  const cond = condClause(b);
  if (cond) s += ` when ${cond}`;
  if (rule.trigger.moment==="ON_LOAD") s += ", applied as soon as the form opens";
  else if (rule.trigger.moment==="ON_SUBMIT") s += ", checked when the form is submitted";
  if (rule.scope.audience!=="ALL") s += `, for ${audPlural(rule.scope.audience)}`;
  const adv=[];
  if (rule.advanced.reverseOnFalse) adv.push("reverts automatically when the condition no longer matches");
  if (rule.advanced.enforceSystemWide) adv.push("enforced across all request forms");
  if (rule.trigger.lifecycle==="EDIT") adv.push("only when editing existing requests");
  if (adv.length) s += `; ${adv.join("; ")}`;
  return s + ".";
}
function Info({ t }){ return <span title={t} className="ml-1 cursor-help select-none text-slate-300 hover:text-slate-500">ⓘ</span>; }

/* ============================================================ RULE STUDIO (V5 GUIDED COMPOSER) */
function RuleStudio({ initial, isNew, allRules, onCancel, onSave }){
  const [draft, setDraft] = useState(() => JSON.parse(JSON.stringify(initial)));
  const update = fn => setDraft(d => { const n = JSON.parse(JSON.stringify(d)); fn(n); return n; });
  const [target, setTarget] = useState(() => (isNew ? "FIELD" : (initial.target || (ctOf(inferControlType(initial))||{}).target || "FIELD")));
  const [intentId, setIntentId] = useState(() => isNew ? null : inferControlType(initial));
  const [showAdvanced, setShowAdvanced] = useState(false);
  const [showTest, setShowTest] = useState(false);
  const [dismissed, setDismissed] = useState(() => new Set());

  const conflicts = useMemo(
    () => detectConflicts(draft, allRules).filter(c => !dismissed.has(c.with.id+c.field+c.type)),
    [draft, allRules, dismissed]
  );
  const conflictFields = useMemo(() => new Set(conflicts.map(c=>c.field)), [conflicts]);

  const ct = intentId ? ctOf(intentId) : null;
  const b0 = draft.blocks[0];
  const lockTiming = intentId === "VALIDATE";

  const chooseType = c => {
    setDraft(d => { const n=JSON.parse(JSON.stringify(d)); const seed=applyControlType(c); n.intent=seed.intent; n.target=seed.target; n.trigger=seed.trigger; n.scope=seed.scope; n.blocks=seed.blocks; return n; });
    setIntentId(c.id); setShowAdvanced(false);
  };
  const pickTarget = t => { setTarget(t); if (!ct || ct.target!==t) setIntentId(null); };

  const behaviorOpts = ct ? ct.behaviors.map(t=>({ value:t, label:(ACTION_TYPES.find(x=>x.id===t)||{}).label })) : ACTION_TYPES.map(t=>({value:t.id,label:t.label}));
  const opsFor = () => draft.trigger.moment==="ON_FIELD_CHANGE" ? OPERATORS : OPERATORS.filter(o=>o.id!=="BECOMES");

  const setMatch = v => update(d => d.blocks[0].match=v);
  const addCond  = () => update(d => d.blocks[0].conditions.push(newCondition()));
  const setCond  = (ci,k,v) => update(d => { d.blocks[0].conditions[ci][k]=v; });
  const rmCond   = ci => update(d => d.blocks[0].conditions.splice(ci,1));
  const addAct   = () => update(d => d.blocks[0].actions.push({ id:uid("a"), type:(ct?ct.defAction:"MANDATE"), fieldId:"assignee", value:"" }));
  const setAct   = (ai,k,v) => update(d => { d.blocks[0].actions[ai][k]=v; });
  const rmAct    = ai => update(d => d.blocks[0].actions.splice(ai,1));
  const setMoment = v => update(d => d.trigger.moment=v);
  const setAudience = v => update(d => d.scope.audience=v);
  const setAdv   = (k,v) => update(d => { d.advanced[k]=v; });
  const dismiss  = c => setDismissed(s => { const n=new Set(s); n.add(c.with.id+c.field+c.type); return n; });

  const allActionsReversible = b0 && b0.actions.every(a => REVERSIBLE.includes(a.type));
  const affected = b0 ? [...new Set(b0.actions.map(a=>a.fieldId))] : [];
  const valid = !!(intentId && b0 && b0.actions.length>0);
  const usesSetValue = b0 && b0.actions.some(a=>a.type==="SET_VALUE");
  const summaryText = intentId ? v5Summary(draft) : "Your rule summary will appear here as you build it.";

  const SectionHint = ({ children }) => <p className="mt-2 text-sm italic text-slate-400">{children}</p>;

  return (
    <div className="flex h-full min-h-0 flex-1 flex-col bg-slate-50">
      {/* header */}
      <div className="border-b border-slate-200 bg-white px-8 py-4">
        <div className="flex items-start justify-between gap-4">
          <div>
            <nav className="flex items-center gap-2 text-xs">
              <span className="font-medium text-sky-600">Admin</span><span className="text-slate-300">›</span>
              <span className="text-slate-500">Request Form Rules</span><span className="text-slate-300">›</span>
              <span className="text-slate-700">{isNew ? "Create" : "Edit"}</span>
            </nav>
            <h1 className="mt-1 text-xl font-bold text-slate-800">{isNew ? "Create Request Form Rule" : "Edit Request Form Rule"}</h1>
          </div>
          <div className="flex shrink-0 items-center gap-2">
            <button onClick={onCancel} className="h-10 rounded-full border border-slate-200 bg-white px-5 text-sm font-medium text-slate-600 hover:bg-slate-50">Cancel</button>
            <button onClick={()=>onSave(draft)} className={cx("h-10 rounded-full bg-sky-500 px-6 text-sm font-semibold text-white shadow-sm hover:bg-sky-600", !valid && "opacity-50 pointer-events-none")}>Save rule</button>
          </div>
        </div>
      </div>

      {/* body: composer + impact rail */}
      <div className="flex min-h-0 flex-1">
        <main className="flex-1 overflow-y-auto">
          <div className="mx-auto max-w-2xl px-6 py-7 space-y-8">

            {/* 1 — INTENT */}
            <section>
              <h3 className="flex items-center text-base font-bold text-slate-800"><span className="mr-2 text-slate-300">1</span>What do you want to control?<Info t="Each rule controls one thing — a field or the whole form. Keep rules focused; add more rules for other parts." /></h3>

            </section>

            {/* 2 — BEHAVIOR */}
            <section>
              <h3 className="flex items-center text-base font-bold text-slate-800"><span className="mr-2 text-slate-300">2</span>What should happen?<Info t="The outcome: show/hide, require, lock, set a value, or check before submit." /></h3>
              <p className="mt-0.5 text-sm text-slate-500">Pick the change this rule makes.</p>
              {!intentId ? <SectionHint>Choose what you want to control above to continue.</SectionHint> : (
                <React.Fragment>
                  <div className="mt-3 space-y-2">
                    {b0.actions.map((a,ai)=>(
                      <div key={a.id} className="flex flex-wrap items-center gap-2">
                        {ai>0 && <span className="text-sm text-slate-400">and</span>}
                        <Dropdown trigger={<span className="cursor-pointer rounded-md bg-slate-100 px-3 py-1.5 text-sm font-medium text-slate-700 hover:bg-slate-200">{(ACTION_TYPES.find(t=>t.id===a.type)||{}).label} ▾</span>}>
                          {close => <PickList items={behaviorOpts} onPick={v=>{setAct(ai,"type",v);close();}} />}
                        </Dropdown>
                        <Dropdown trigger={<span className={cx("cursor-pointer rounded-md border px-3 py-1.5 text-sm", conflictFields.has(a.fieldId)?"border-amber-300 bg-amber-50 text-amber-800":"border-slate-200 bg-white text-slate-700 hover:bg-slate-50")}>{fLabel(a.fieldId)} ▾</span>}>
                          {close => <PickList search items={FIELDS.map(f=>({value:f.id,label:f.label}))} onPick={v=>{setAct(ai,"fieldId",v);close();}} />}
                        </Dropdown>
                        {a.type==="SET_VALUE" && <span className="text-sm text-slate-400">to</span>}
                        {a.type==="SET_VALUE" && (
                          fieldOf(a.fieldId).type==="select"
                            ? <Dropdown trigger={<span className="cursor-pointer rounded-md border border-slate-200 bg-slate-50 px-3 py-1.5 text-sm text-slate-700">{a.value||"choose"} ▾</span>}>
                                {close => <PickList items={fieldOf(a.fieldId).options.map(o=>({value:o,label:o}))} onPick={v=>{setAct(ai,"value",v);close();}} />}
                              </Dropdown>
                            : <input value={a.value} onChange={e=>setAct(ai,"value",e.target.value)} placeholder="value" className="rounded-md border border-slate-300 px-3 py-1.5 text-sm focus:border-sky-400 focus:outline-none" />
                        )}
                        {b0.actions.length>1 && <button onClick={()=>rmAct(ai)} className="flex h-5 w-5 items-center justify-center rounded-full bg-red-500 text-xs leading-none text-white hover:bg-red-600">−</button>}
                      </div>
                    ))}
                  </div>
                  {usesSetValue && <p className="mt-2 text-xs text-slate-400">People can still change this value unless you also lock the field.</p>}
                  {!(ct && ct.single) && <button onClick={addAct} className="mt-2 text-sm font-medium text-sky-600 hover:underline">+ also do this</button>}
                </React.Fragment>
              )}
            </section>

            {/* 3 — TIMING */}
            <section>
              <h3 className="flex items-center text-base font-bold text-slate-800"><span className="mr-2 text-slate-300">3</span>When should it happen?<Info t="When the form opens = once, before anyone types. While filling = reacts to entries. When submitted = the final checks." /></h3>
              <p className="mt-0.5 text-sm text-slate-500">Most rules react as the form is filled. Change this only if you need a specific point.</p>
              {!intentId ? <SectionHint>Choose a control type to set this.</SectionHint> : (
                <div className="mt-3 flex flex-wrap gap-2">
                  {MOMENTS.map(m=>{
                    const sel = draft.trigger.moment===m.id;
                    return <button key={m.id} disabled={lockTiming} onClick={()=>setMoment(m.id)}
                      className={cx("rounded-full border px-4 py-1.5 text-sm", sel?"border-sky-400 bg-sky-50 font-medium text-sky-700":"border-slate-200 bg-white text-slate-600 hover:bg-slate-50", lockTiming && !sel && "opacity-40")}>{m.label}</button>;
                  })}
                  {lockTiming && <span className="self-center text-xs text-slate-400">A check always runs when the form is submitted.</span>}
                </div>
              )}
            </section>

            {/* 4 — SCOPE */}
            <section>
              <h3 className="flex items-center text-base font-bold text-slate-800"><span className="mr-2 text-slate-300">4</span>Who should this affect?<Info t="Scope is about people, not fields. Leave on Everyone for a universal rule; narrow to a role when only they should experience it." /></h3>
              <p className="mt-0.5 text-sm text-slate-500">Choose which people this rule applies to.</p>
              {!intentId ? <SectionHint>Choose a control type to set this.</SectionHint> : (
                <div className="mt-3 flex flex-wrap gap-2">
                  {AUD_FRIENDLY.map(a=>{
                    const sel = draft.scope.audience===a.id;
                    return <button key={a.id} onClick={()=>setAudience(a.id)} className={cx("rounded-full border px-4 py-1.5 text-sm", sel?"border-sky-400 bg-sky-50 font-medium text-sky-700":"border-slate-200 bg-white text-slate-600 hover:bg-slate-50")}>{a.label}</button>;
                  })}
                  <button disabled className="rounded-full border border-dashed border-slate-200 px-4 py-1.5 text-sm text-slate-300">+ Add a user group</button>
                </div>
              )}
            </section>

            {/* 5 — CONDITIONS */}
            <section>
              <h3 className="flex items-center text-base font-bold text-slate-800"><span className="mr-2 text-slate-300">5</span>What conditions must match?<Info t="With no conditions the rule is always on. Match all needs every condition true; Match any needs at least one." /></h3>
              <p className="mt-0.5 text-sm text-slate-500">Optional — leave empty and the rule is always on.</p>
              {!intentId ? <SectionHint>Choose a control type to add conditions.</SectionHint> : (
                (b0.conditions.length===0) ? (
                  <div className="mt-3 rounded-lg border border-dashed border-slate-300 bg-white px-4 py-4 text-center">
                    <p className="text-sm text-slate-500">No conditions yet. <span className="text-slate-400">This rule is always on.</span></p>
                    <button onClick={addCond} className="mt-2 text-sm font-medium text-sky-600 hover:underline">+ Add a condition</button>
                  </div>
                ) : (
                  <div className="mt-3">
                    {b0.conditions.length>1 && (
                      <div className="mb-3 flex items-center gap-2 text-sm">
                        <span className="text-slate-500">Run this rule when</span>
                        <div className="inline-flex rounded-lg border border-slate-200 bg-white p-0.5">
                          <button onClick={()=>setMatch("ALL")} className={cx("rounded-md px-3 py-1 text-sm font-medium", b0.match==="ALL"?"bg-sky-500 text-white":"text-slate-600 hover:bg-slate-50")}>Match all</button>
                          <button onClick={()=>setMatch("ANY")} className={cx("rounded-md px-3 py-1 text-sm font-medium", b0.match==="ANY"?"bg-sky-500 text-white":"text-slate-600 hover:bg-slate-50")}>Match any</button>
                        </div>
                      </div>
                    )}
                    <div className="space-y-2">
                      {b0.conditions.map((c,ci)=>(
                        <div key={c.id} className="flex items-center gap-2">
                          {ci>0 && <span className="w-7 shrink-0 text-right text-xs lowercase text-slate-400">{b0.match==="ALL"?"and":"or"}</span>}
                          {ci===0 && <span className="w-7 shrink-0" />}
                          <button onClick={()=>rmCond(ci)} className="flex h-5 w-5 shrink-0 items-center justify-center rounded-full bg-red-500 text-sm leading-none text-white hover:bg-red-600">−</button>
                          <div className="flex flex-1 flex-wrap items-center gap-2 rounded-md border border-slate-200 bg-white p-1.5">
                            <Dropdown trigger={<span className="cursor-pointer rounded-md bg-slate-100 px-3 py-1.5 text-sm text-slate-700 hover:bg-slate-200">{fLabel(c.fieldId)} ▾</span>}>
                              {close => <PickList search items={FIELDS.map(f=>({value:f.id,label:f.label}))} onPick={v=>{setCond(ci,"fieldId",v);close();}} />}
                            </Dropdown>
                            <Dropdown trigger={<span className="cursor-pointer px-1 text-sm text-slate-500 hover:text-slate-700">{opLabel(c.op)} ▾</span>}>
                              {close => <PickList items={opsFor().map(o=>({value:o.id,label:o.label}))} onPick={v=>{setCond(ci,"op",v);close();}} />}
                            </Dropdown>
                            {!VALUELESS.includes(c.op) && (
                              fieldOf(c.fieldId).type==="select"
                                ? <Dropdown trigger={<span className={cx("cursor-pointer rounded-md border px-3 py-1.5 text-sm", c.value?"border-slate-200 bg-slate-50 text-slate-700":"border-dashed border-slate-300 text-slate-400")}>{c.value||"choose value"} ▾</span>}>
                                    {close => <PickList items={fieldOf(c.fieldId).options.map(o=>({value:o,label:o}))} onPick={v=>{setCond(ci,"value",v);close();}} />}
                                  </Dropdown>
                                : <input value={c.value} onChange={e=>setCond(ci,"value",e.target.value)} type={fieldOf(c.fieldId).type==="number"?"number":"text"} placeholder="value" className="flex-1 rounded-md border border-slate-300 px-3 py-1.5 text-sm focus:border-sky-400 focus:outline-none" />
                            )}
                          </div>
                        </div>
                      ))}
                    </div>
                    <button onClick={addCond} className="ml-9 mt-2 text-sm font-medium text-sky-600 hover:underline">+ Add a condition</button>
                  </div>
                )
              )}
            </section>

            {/* Advanced */}
            {intentId && (
              <section>
                <button onClick={()=>setShowAdvanced(s=>!s)} className="flex items-center gap-2 text-sm font-medium text-slate-400 hover:text-slate-600">{showAdvanced?"▾":"▸"} Advanced behavior</button>
                {showAdvanced && (
                  <div className="mt-3 space-y-3 rounded-lg border border-slate-200 bg-white p-4 text-sm">
                    <div className="flex items-center gap-3">
                      <span className="w-28 text-slate-600">Use this rule on</span>
                      <Select value={draft.trigger.lifecycle} onChange={v=>update(d=>d.trigger.lifecycle=v)} options={LIFECYCLES_FRIENDLY.map(l=>({value:l.id,label:l.label}))} className="h-9" />
                    </div>
                    <label className={cx("flex items-start gap-2", !allActionsReversible && "opacity-40")}>
                      <input type="checkbox" disabled={!allActionsReversible} checked={draft.advanced.reverseOnFalse} onChange={e=>setAdv("reverseOnFalse",e.target.checked)} className="mt-0.5" />
                      <span>Revert automatically when the condition no longer matches
                        {!allActionsReversible && <em className="block text-xs text-slate-400">Not available with “Set value”.</em>}</span>
                    </label>
                    <label className="flex items-start gap-2">
                      <input type="checkbox" checked={draft.advanced.enforceSystemWide} onChange={e=>setAdv("enforceSystemWide",e.target.checked)} className="mt-0.5" />
                      <span>Apply this everywhere, not just here
                        {draft.advanced.enforceSystemWide && <em className="block text-xs text-amber-600">Enforces across all request forms. Overrides form-level rules.</em>}</span>
                    </label>
                  </div>
                )}
              </section>
            )}

            {/* compact impact (small screens only) */}
            <div className="rounded-xl border border-sky-100 bg-sky-50 p-4 lg:hidden">
              <p className="text-sm text-slate-800"><span className="font-semibold text-sky-700">In plain words:</span> “{summaryText}”</p>
            </div>
          </div>
        </main>

        {/* IMPACT RAIL */}
        <aside className="hidden w-80 shrink-0 overflow-y-auto border-l border-slate-200 bg-white p-5 lg:block">
          <p className="text-xs font-semibold uppercase tracking-wide text-slate-400">In plain words</p>
          <p className="mt-2 text-sm leading-relaxed text-slate-800">“{summaryText}”</p>

          <div className="my-4 border-t border-slate-100" />
          <dl className="space-y-2 text-sm">
            <div className="flex gap-2"><dt className="w-24 shrink-0 text-slate-400">What changes</dt><dd className="text-slate-700">{intentId && affected.length?affected.map(fLabel).join(", "):"—"}</dd></div>
            <div className="flex gap-2"><dt className="w-24 shrink-0 text-slate-400">Who sees it</dt><dd className="text-slate-700">{intentId?audPlural(draft.scope.audience):"—"}</dd></div>
            <div className="flex gap-2"><dt className="w-24 shrink-0 text-slate-400">When</dt><dd className="text-slate-700">{intentId?(MOMENTS.find(m=>m.id===draft.trigger.moment)||{}).label:"—"}</dd></div>
            <div className="flex gap-2"><dt className="w-24 shrink-0 text-slate-400">On a match</dt><dd className="text-slate-700">{intentId && b0?cap(actClause(b0)):"—"}</dd></div>
          </dl>

          <div className="my-4 border-t border-slate-100" />
          {conflicts.length===0
            ? <p className="text-sm font-medium text-emerald-600">· Looks consistent.</p>
            : <p className="text-sm font-medium text-amber-600">△ {conflicts.length} thing{conflicts.length>1?"s":""} worth a look</p>}
          {conflicts.map((c,i)=>(
            <div key={i} className="mt-2 rounded-md border border-amber-200 bg-amber-50 px-3 py-2 text-xs">
              <p className="text-amber-800">{c.text}</p>
              <div className="mt-1 flex gap-3 font-medium">
                <button onClick={()=>dismiss(c)} className="text-amber-700 hover:underline">Let this win</button>
                <button onClick={()=>dismiss(c)} className="text-slate-400 hover:underline">Dismiss</button>
              </div>
            </div>
          ))}

          <div className="my-4 border-t border-slate-100" />
          <button onClick={()=>setShowTest(true)} className="w-full rounded-full border border-sky-200 bg-sky-50 px-4 py-2 text-sm font-medium text-sky-700 hover:bg-sky-100">Test this rule ▷</button>
        </aside>
      </div>

      {/* sticky footer */}
      <div className="flex items-center justify-between border-t border-slate-200 bg-white px-5 py-3">
        <span className={cx("text-sm font-medium", conflicts.length ? "text-amber-600" : "text-emerald-600")}>
          {conflicts.length ? `△ ${conflicts.length} to review` : (valid ? "✓ Ready to save" : "Choose what to control to begin")}
        </span>
        <div className="flex items-center gap-2">
          <button onClick={()=>setShowTest(true)} className="h-10 rounded-full border border-sky-200 bg-sky-50 px-5 text-sm font-medium text-sky-700 hover:bg-sky-100 lg:hidden">Test ▷</button>
          <button onClick={onCancel} className="h-10 rounded-full border border-slate-200 bg-white px-5 text-sm font-medium text-slate-600 hover:bg-slate-50">Cancel</button>
          <button onClick={()=>onSave(draft)} className={cx("h-10 rounded-full bg-sky-500 px-6 text-sm font-semibold text-white shadow-sm hover:bg-sky-600", !valid && "opacity-50 pointer-events-none")}>Save rule</button>
        </div>
      </div>

      {/* preview drawer (on demand) */}
      {showTest && (
        <React.Fragment>
          <div className="fixed inset-0 z-40 bg-black/20" onClick={()=>setShowTest(false)} />
          <div className="fixed right-0 top-0 z-50 h-full w-[380px] overflow-y-auto bg-white p-4 shadow-2xl">
            <div className="mb-3 flex items-center justify-between">
              <h3 className="font-semibold">Test this rule</h3>
              <button onClick={()=>setShowTest(false)} className="text-slate-400 hover:text-slate-700">✕</button>
            </div>
            <PreviewPanel draft={draft} allRules={allRules} />
          </div>
        </React.Fragment>
      )}
    </div>
  );
}

/* ============================================================ PREVIEW PANEL */
function PreviewPanel({ draft, allRules }){
  const [persona, setPersona] = useState(draft.scope.audience==="ALL"?"TECHNICIANS":draft.scope.audience);
  const [moment, setMoment]   = useState(draft.trigger.moment);
  const refFields = useMemo(() => {
    const s = new Set();
    if (draft.trigger.moment==="ON_FIELD_CHANGE") s.add(draft.trigger.fieldId);
    draft.blocks.forEach(b => b.conditions.forEach(c => s.add(c.fieldId)));
    return [...s];
  }, [draft]);
  const [values, setValues] = useState({});
  const [result, setResult] = useState(null);

  const setVal = (id,v) => setValues(o=>({...o,[id]:v}));
  const run = () => setResult(simulate(draft, allRules, persona, values, moment));

  return (
    <div>
      <p className="mb-1.5 text-xs font-semibold uppercase tracking-wide text-slate-400">Preview &amp; Test</p>
      <div className="rounded-md border border-slate-200 p-3 space-y-2 text-sm">
        <div className="flex items-center gap-2">
          <span className="w-16 text-slate-500">Run as</span>
          <Select value={persona} onChange={setPersona} options={AUDIENCES.filter(a=>a.id!=="ALL").map(a=>({value:a.id,label:a.label}))} className="h-8 flex-1" />
        </div>
        <div className="flex items-center gap-2">
          <span className="w-16 text-slate-500">Moment</span>
          <Select value={moment} onChange={setMoment} options={MOMENTS.map(m=>({value:m.id,label:m.label}))} className="h-8 flex-1" />
        </div>
        <div className="border-t border-slate-100 pt-2">
          <p className="mb-1 text-xs font-medium text-slate-500">Test values</p>
          {refFields.length===0 && <p className="text-xs italic text-slate-400">No condition fields — rule always matches.</p>}
          {refFields.map(id=>(
            <div key={id} className="mb-1 flex items-center gap-2">
              <span className="w-24 text-xs text-slate-500">{fLabel(id)}</span>
              {fieldOf(id).type==="select"
                ? <Select value={values[id]||""} onChange={v=>setVal(id,v)} options={[{value:"",label:"—"},...fieldOf(id).options.map(o=>({value:o,label:o}))]} className="h-8 flex-1" />
                : <TextInput value={values[id]||""} onChange={v=>setVal(id,v)} type={fieldOf(id).type==="number"?"number":"text"} className="h-8 flex-1" />}
            </div>
          ))}
        </div>
        <Btn onClick={run} className="w-full">▷ Run simulation</Btn>

        {result && (
          <div className="border-t border-slate-100 pt-2 space-y-2">
            <p className="text-xs font-medium text-slate-500">Execution trace ({result.applicableCount} applicable rule{result.applicableCount!==1?"s":""})</p>
            <div className="space-y-1">
              {result.trace.filter(t=>t.matched).length===0 && <p className="text-xs italic text-slate-400">No blocks matched these values.</p>}
              {result.trace.filter(t=>t.matched).map((t,i)=>(
                <div key={i} className={cx("rounded px-2 py-1 text-xs", t.isDraft?"bg-sky-50 text-sky-800":"bg-slate-50 text-slate-600")}>
                  <span className="font-semibold">{t.isDraft?"This rule":"Rule "+t.ruleId.replace("rule_","#")}</span> · block {t.blockIndex+1} matched
                  <span className="block text-slate-500">→ {t.actions.map(actionPhrase).join("; ")}</span>
                </div>
              ))}
            </div>
            <p className="text-xs font-medium text-slate-500">Resulting form state</p>
            <div className="space-y-1">
              {Object.keys(result.state).map(fid=>{
                const s = result.state[fid];
                return (
                  <div key={fid} className="flex items-center gap-2 text-xs">
                    <span className={cx("inline-block h-2 w-2 rounded-full", s.visible?"bg-emerald-500":"bg-slate-300")} />
                    <span className="font-medium">{fLabel(fid)}</span>
                    <span className="text-slate-500">
                      {s.visible?"visible":"hidden"}{s.required?", required":""}{!s.enabled?", disabled":""}{s.value?`, = ${s.value}`:""}
                    </span>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ============================================================ VERSION SWITCHER */
const VERSIONS = [
  { id:"v1", label:"Version 1", note:"Sentence-first builder", href:"rule-studio-v1.html" },
  { id:"v2", label:"Version 2", note:"Structured form",        href:"rule-studio-demo.html" },
  { id:"v3", label:"Version 3", note:"Block workspace",        href:"rule-studio-v3.html" },
  { id:"v4", label:"Version 4", note:"Starter cards",          href:"rule-studio-v4.html" },
  { id:"v5", label:"Version 5", note:"Guided composer",        href:"rule-studio-v5.html" },
  { id:"v6", label:"Version 6", note:"Refined classic form",   href:"rule-studio-v6.html" },
];
const currentVersionId = () => {
  const p = (typeof window!=="undefined" && window.location.pathname) || "";
  if (p.indexOf("v6") >= 0) return "v6";
  if (p.indexOf("v5") >= 0) return "v5";
  if (p.indexOf("v4") >= 0) return "v4";
  if (p.indexOf("v3") >= 0) return "v3";
  if (p.indexOf("v1") >= 0) return "v1";
  return "v2";
};
function VersionBar(){
  const [open,setOpen]=useState(false);
  const cur = currentVersionId();
  const curV = VERSIONS.find(v=>v.id===cur) || VERSIONS[1];
  return (
    <div className="flex shrink-0 items-center justify-between border-b border-slate-800 bg-slate-900 px-4 py-1.5 text-xs text-slate-300">
      <span className="font-semibold tracking-wide text-slate-100">Request Form Rules · Rule Studio</span>
      <div className="relative">
        <button onClick={()=>setOpen(o=>!o)} className="inline-flex items-center gap-2 rounded-md bg-slate-800 px-3 py-1 font-medium text-white hover:bg-slate-700">
          <span className="inline-block h-1.5 w-1.5 rounded-full bg-emerald-400" />
          {curV.label} · {curV.note}
          <span className="opacity-60">▾</span>
        </button>
        {open && (
          <React.Fragment>
            <div className="fixed inset-0 z-40" onClick={()=>setOpen(false)} />
            <div className="absolute right-0 z-50 mt-1 w-60 overflow-hidden rounded-lg border border-slate-200 bg-white p-1 text-slate-700 shadow-xl">
              <p className="px-2 py-1 text-[11px] uppercase tracking-wide text-slate-400">Switch version</p>
              {VERSIONS.map(v=>(
                <a key={v.id} href={v.href}
                   className={cx("flex items-center justify-between rounded px-2 py-2 text-sm hover:bg-slate-100", v.id===cur && "bg-slate-50")}>
                  <span><span className="font-medium">{v.label}</span><span className="block text-xs text-slate-400">{v.note}</span></span>
                  {v.id===cur && <span className="text-xs font-medium text-emerald-600">current</span>}
                </a>
              ))}
            </div>
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

/* ============================================================ APP */
function App(){
  const [rules, setRules] = useState(() => SEED.map(r => ({ ...r, name: r.name || genSlug(r) })));
  const [view, setView] = useState({ screen:"list" }); // {screen:'studio', id|null}

  const startCreate = () => setView({ screen:"studio", rule:newRule(), isNew:true });
  const startEdit = id => setView({ screen:"studio", rule:rules.find(r=>r.id===id), isNew:false });
  const cancel = () => setView({ screen:"list" });
  const save = draft => {
    setRules(rs => rs.some(r=>r.id===draft.id) ? rs.map(r=>r.id===draft.id?draft:r) : [...rs, draft]);
    setView({ screen:"list" });
  };

  return (
    <div className="flex h-screen flex-col">
      <VersionBar />
      {view.screen==="studio"
        ? <RuleStudio initial={view.rule} isNew={view.isNew} allRules={rules} onCancel={cancel} onSave={save} />
        : <div className="flex-1 overflow-y-auto"><RulesList rules={rules} setRules={setRules} onCreate={startCreate} onEdit={startEdit} /></div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<script>
// safety net: surface the real Babel error if the script fails to compile
window.addEventListener('load', function(){
  setTimeout(function(){
    try {
      var el = document.querySelector('script[type="text/babel"]');
      if (window.Babel && el) { window.Babel.transform(el.textContent, { presets: ['react'] }); }
    } catch (err) {
      (document.getElementById('root')||document.body).innerHTML = '<pre style="white-space:pre-wrap;color:#b91c1c;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:16px;margin:24px;font:12px ui-monospace,monospace">[Compile error]\n' + (err && err.message ? err.message : err) + '</pre>';
    }
  }, 600);
});
</script>
</body>
</html>
