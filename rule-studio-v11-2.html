// ---- Rule model (mock data; no engine in this step) ------------------------------------------
// A rule = trigger (when) + audience + conditions (IF) + actions (THEN). Per-field rule awareness,
// the insight-rich picker, and the plain-English summary are all DERIVED from this one model.
// V9 operator / action vocabulary (reused verbatim so V9 and V10 read identically).
// Operator sets are FIELD-TYPE-AWARE (mirrors V9's OP_SETS / fieldOps): a field's kind decides which
// operators it offers — TEXT fields get text matches, CHOICE (select) fields get Match Any/All + empties,
// MEMBERSHIP fields (tags / templates) get In / Not In.
const OP_SETS = {
  TEXT:       ["Equals","Not Equals","Start With","End With","Contains","Is Not Blank","Is Blank"],
  CHOICE:     ["Match Any","Match All","Is Empty","Is Not Empty"],
  MEMBERSHIP: ["In","Not In"],
};
const OPS = [...OP_SETS.TEXT, ...OP_SETS.CHOICE, ...OP_SETS.MEMBERSHIP];   // full set (fallback / lookups)
const MEMBERSHIP_FIELDS = ["tags","fill_template","transition_model"];
const opsetOf = id => { if(MEMBERSHIP_FIELDS.indexOf(id)>=0) return "MEMBERSHIP"; const f=ALL_FIELDS.find(x=>x.id===id); return (f && f.kind==="select") ? "CHOICE" : "TEXT"; };
const fieldOps = id => OP_SETS[opsetOf(id)] || OP_SETS.TEXT;              // operators valid for this field
// Keep a saved/legacy operator visible even if it isn't in the field's current set (so editing never blanks it).
const condOps = c => { const set = fieldOps(c && c.fieldId); return (c && c.op && set.indexOf(c.op)<0) ? [c.op, ...set] : set; };
const OPS_NOVALUE = ["Is Empty","Is Not Empty","Is Blank","Is Not Blank"];
const OPS_MULTI = ["Match Any","Match All","In","Not In"];
const OP_PHRASE = { "Equals":"is", "Not Equals":"is not", "Start With":"starts with", "End With":"ends with", "Contains":"contains", "Match Any":"is any of", "Match All":"is all of", "Is Empty":"is empty", "Is Not Empty":"is not empty", "Is Blank":"is blank", "Is Not Blank":"is not blank", "In":"is in", "Not In":"is not in" };

const WHENS = ["When the form opens","While the form is being filled","When the form is submitted"];
const AUDS  = ["Everyone","Requesters only","Technicians only","Signed-in users only"];
const EXEC_OPTS = ["On Create and Edit","On Create","On Edit"];   // rule-level execution scope (ss2 vocabulary)

// Contextual help shown in the right panel of every guided dropdown (When to use / How it works / Output / Example).
const G = (desc,when,how,output,example)=>({desc,when,how,output,example});
const WHEN_GUIDE = {

  "While the form is being filled": G("Reacts as the user changes values.","Use this when the rule should react as the user changes fields.","The rule checks again whenever a watched field changes.","The action happens immediately after the condition becomes true.","Recalculate the rule as the user changes the Department field."),
  "When the form is submitted": G("Runs just before the request is saved.","Use this for final checks before the request is saved.","The rule runs only at the point of submission.","The form can be validated or blocked if conditions are not met.","Validate the rule just before the request is saved."),
};

  "Enable": { when:"Allow editing of a field that is otherwise locked.", how:"The field becomes editable when the condition is met.", output:"The user can change the field's value.", example:"Enable the Impact field when the user selects Hardware." },
  "Disable": { when:"Lock a field so it can't be edited.", how:"The field is made read-only when the condition is met.", output:"The user can see but not change it.", example:"Disable the Category field until Department is chosen." },
  "Set Value": { when:"Auto-fill a field with a chosen value.", how:"The field's value is set when the condition is met.", output:"The field is pre-filled for the user.", example:"Set Status to Open automatically when the rule runs." },
  "Clear Value": { when:"Reset a field back to empty.", how:"The field's value is removed when the condition is met.", output:"The field becomes blank.", example:"Clear the Assignee field when the request is reassigned." },
  "Show Options": { when:"Reveal specific choices within a dropdown field.", how:"Selected options are added when the condition is met.", output:"Only the relevant choices are available.", example:"Show only laptop models when Category is Hardware." },
  "Hide Options": { when:"Remove specific choices from a dropdown field.", how:"Selected options are taken out when the condition is met.", output:"Those choices can no longer be picked.", example:"Hide closed statuses while a new request is being created." },
  "Run Custom Script": { when:"Handle advanced logic the standard actions can't.", how:"A custom script runs when the condition is met.", output:"Behaviour defined by your script is applied.", example:"Run a script to fetch asset details when the form loads." },
  "Filter Data": { when:"Limit the records a field can show.", how:"The field's data is filtered when the condition is met.", output:"Only matching data appears in the field.", example:"Show only assets from the requester's own department." },
};

const cap = s => s ? s.charAt(0).toUpperCase() + s.slice(1) : s;
const condPhrase = c => {
  const f = labelOf(c.fieldId);
  if (OPS_NOVALUE.indexOf(c.op) >= 0) return f + " " + (OP_PHRASE[c.op] || "is set");
  const v = Array.isArray(c.value) ? c.value.join(" / ") : c.value;
  return f + " " + (OP_PHRASE[c.op] || "is") + " " + (v || "a value");
};
const actionPhrase = a => {
  const ids = (a.fieldIds && a.fieldIds.length) ? a.fieldIds : (a.fieldId ? [a.fieldId] : []);
  const f = ids.length ? ids.map(labelOf).join(" & ") : "the field";
  if (a.behavior==="Show") return "show " + f;
  if (a.behavior==="Hide") return "hide " + f;
  if (a.behavior==="Mandate") return "make " + f + " mandatory";
  if (a.behavior==="Non-Mandate") return "make " + f + " optional";
  if (a.behavior==="Enable") return "enable " + f;
  if (a.behavior==="Disable") return "disable " + f;
  if (a.behavior==="Set Value") return "set " + f + (a.value ? " to " + a.value : "");
  if (a.behavior==="Clear Value") return "clear " + f;
  if (a.behavior==="Show Options") return "show options for " + f + (Array.isArray(a.value)&&a.value.length ? " (" + a.value.join(", ") + ")" : "");
  if (a.behavior==="Hide Options") return "hide options for " + f + (Array.isArray(a.value)&&a.value.length ? " (" + a.value.join(", ") + ")" : "");
  if (a.behavior==="Run Custom Script") return "run a custom script";
  if (a.behavior==="Filter Data"){
    const ent = (FD_PERSONS.find(p=>p.value===a.entity)||{}).label;
    const sf  = (FD_USER_FIELDS.find(p=>p.value===a.srcField)||{}).label;
    return (ent && sf) ? ("filter data by " + ent + "’s " + sf + (a.value ? " = " + a.value : "")) : "filter data";
  }
  return (a.behavior || "update") + " " + f;
};
function summarize(rule){
  const conds = (rule.conditions || []).filter(c=>c.fieldId);
  const acts  = (rule.actions || []).filter(a=>a.fieldId);
  if (!acts.length) return "Add an action to describe what this rule does.";
  const condText = conds.length ? "when " + conds.map(condPhrase).join(" and ") + ", " : "";
  const actText  = acts.map(actionPhrase).join(", and ");
  const aud = (rule.audience && rule.audience !== "Everyone") ? " for " + rule.audience : "";
  return cap(condText + actText + aud) + ".";
}

const fieldsOfRule = r => {
  const s = [];
  (r.conditions || []).forEach(c=> { if (c.fieldId && s.indexOf(c.fieldId) < 0) s.push(c.fieldId); });
  (r.actions || []).forEach(a=> { if (a.fieldId && s.indexOf(a.fieldId) < 0) s.push(a.fieldId); });
  return s;
};
const affectedFields = r => {
  const s = [];
  (r.actions || []).forEach(a=> { if (a.fieldId && s.indexOf(a.fieldId) < 0) s.push(a.fieldId); });
  return s;
};
const ruleUsesField = (r, fieldId) => fieldsOfRule(r).indexOf(fieldId) >= 0;
// Role-specific relevance: rules that already use the field as a condition / as an action target.
const condRulesFor = fieldId => RULE_DB.filter(r=> (r.conditions||[]).some(c=> c.fieldId===fieldId));
const actRulesFor  = fieldId => RULE_DB.filter(r=> (r.actions||[]).some(a=> a.fieldId===fieldId));
const ruleList   = fieldId => RULE_DB.filter(r=> ruleUsesField(r, fieldId));
const ruleCount  = fieldId => ruleList(fieldId).length;
const totalRules = () => RULE_DB.length;
const coveredFields = () => ALL_FIELDS.filter(f=> ruleCount(f.id) > 0).length;

// Mock metadata so the table reads like a live inventory (V10 rules don't store exec-on / created date).
const RULE_EXEC    = ["On Create","On Edit","On Create and Edit"];
const RULE_CREATED = ["02 Jun 2026","27 May 2026","14 Jun 2026","18 May 2026","09 Jun 2026","05 Jun 2026","21 May 2026"];
// Freeze the mock exec / created onto each seeded rule (one-time, by original position) so the inventory can be
// reordered or have new rules added without the existing rows' columns shifting. Saved rules carry their own values.
RULE_DB.forEach((r,i)=>{ if(!r.exec) r.exec = RULE_EXEC[i % RULE_EXEC.length]; if(!r.created) r.created = RULE_CREATED[i % RULE_CREATED.length]; });
// ---- Local persistence: ONE inventory shared by Form Builder + Form Rules, surviving refresh/navigation ----
// The store key is versioned — bump it to discard saved rules and fall back to the seeds above.
const RULE_STORE_KEY = "v10_form_rules_v1";
function saveStoredRules(){ try { localStorage.setItem(RULE_STORE_KEY, JSON.stringify(RULE_DB)); } catch(_){} }
(function hydrateRules(){
  try {
    const raw = localStorage.getItem(RULE_STORE_KEY);
    if(raw){ const arr = JSON.parse(raw); if(Array.isArray(arr) && arr.length){ RULE_DB.length = 0; arr.forEach(r=> RULE_DB.push(r)); } }
  } catch(_){}
})();
// --- Listing conflict model: a rule's actions/conditions vs every other saved rule. -----------------
// Two ways rules collide: (1) both act on the same field (contradict / duplicate / both change it), and
// (2) one rule hides/disables/clears a field another rule relies on in its conditions.
const HIDE_LIKE = { Hide:1, Disable:1, "Clear Value":1 };
const actVerb = (b, f) => {
  const L = labelOf(f);
  switch(b){
    case "Show": return "shows " + L;
    case "Hide": return "hides " + L;
    case "Mandate": return "makes " + L + " mandatory";
    case "Non-Mandate": return "makes " + L + " optional";
    case "Enable": return "enables " + L;
    case "Disable": return "disables " + L;
    case "Set Value": return "sets " + L;
    case "Clear Value": return "clears " + L;
    case "Filter Data": return "filters " + L;
    default: return (b ? b.toLowerCase() : "changes") + " " + L;
  }
};
// A rule's action / condition rows, honoring multi-block rules (blocks) AND flat seeds alike — so the SAME
// targets are read whether the input is a live draft, a freshly-saved multi-block rule, or a flat seeded rule.
const flatGroups = items => (items||[]).flatMap(it => (it && it.group) ? (it.conditions||[]) : [it]);
const ruleActions    = r => (r && r.blocks && r.blocks.length) ? r.blocks.flatMap(b=> b.actions||[]) : ((r && r.actions)||[]);
const ruleConditions = r => (r && r.blocks && r.blocks.length) ? flatGroups(r.blocks.flatMap(b=> b.conditions||[])) : flatGroups((r && r.conditions)||[]);
const actTargets = r => { const m={}; ruleActions(r).forEach(a=>{ const ids=(a.fieldIds&&a.fieldIds.length)?a.fieldIds:(a.fieldId?[a.fieldId]:[]); ids.forEach(f=>{ if(f) m[f]=a.behavior; }); }); return m; };
const condTargets = r => { const s={}; ruleConditions(r).forEach(c=>{ if(c && c.fieldId) s[c.fieldId]=true; }); return s; };
function conflictsFor(rule){
  if(!rule) return [];
  const out = []; const myAct = actTargets(rule), myCond = condTargets(rule);
  RULE_DB.forEach(o=>{
    if(o.id===rule.id) return;
    const oAct = actTargets(o), oCond = condTargets(o);
    const reasons = []; const seen = {};
    const push = (field, reason) => { const key=field+"|"+reason; if(!seen[key]){ seen[key]=1; reasons.push({field, reason}); } };
    Object.keys(myAct).forEach(f=>{
      if(f in oAct){
        const mb=myAct[f], ob=oAct[f];
        if(OPP_BEHAVIOR[mb]===ob) push(f, "Contradicts — this rule " + actVerb(mb,f) + ", while “" + o.name + "” " + actVerb(ob,f) + ".");
        else if(mb===ob) push(f, "Duplicate — both rules " + actVerb(mb,f) + ".");
        else push(f, "Both rules change " + labelOf(f) + " — “" + o.name + "” " + actVerb(ob,f) + ".");
      }
    });
    Object.keys(myAct).forEach(f=>{ if(HIDE_LIKE[myAct[f]] && (f in oCond)) push(f, "This rule " + actVerb(myAct[f],f) + ", but “" + o.name + "” relies on " + labelOf(f) + " in its conditions."); });
    Object.keys(oAct).forEach(f=>{ if(HIDE_LIKE[oAct[f]] && (f in myCond)) push(f, "“" + o.name + "” " + actVerb(oAct[f],f) + ", which this rule needs in its conditions."); });
    if(reasons.length) out.push({ rule:o, reasons });
  });
  return out;
}

function RulesListing({customSel, onEditRule, onCustom, onToast}){

  const [expandedKey, setExpandedKey] = useState(null);   // conflict expansion — one row open at a time
  const [order, setOrder] = useState(null);               // drag-reorder: keys in display order (null = natural)
  const [dragKey, setDragKey] = useState(null);
  const [dropTarget, setDropTarget] = useState(null);     // { key, edge: 'before' | 'after' }
  const [confirmDel, setConfirmDel] = useState(null);     // row pending delete confirmation
  const [, bump] = useReducer(x=>x+1, 0);                 // force a re-read of RULE_DB after a delete
  const doDelete = row => { deleteRule(row.id); setExpandedKey(k=> k===("form-"+row.id) ? null : k); setConfirmDel(null); bump(); onToast && onToast("“" + row.name + "” deleted from Form Rules."); };
  const doDuplicate = row => { const c = duplicateRule(row.id); bump(); onToast && onToast(c ? ("Duplicated as “" + c.name + "”.") : "Could not duplicate rule."); };
  const formRows = RULE_DB.map((r,i)=>({
    kind:"form", id:r.id, name:r.name, summary:summarize(r),
    exec: r.exec || RULE_EXEC[i % RULE_EXEC.length], applicable: r.audience, event: r.when,
    created: r.created || RULE_CREATED[i % RULE_CREATED.length], enabledDef: r.status==="Active", rule:r,
  }));
  // Only CONFIGURED custom rules appear — unconfigured categories stay in the drawer, not the list.
  const customRows = CR_FAMILIES
    .map((f,i)=>({f,i}))
    .filter(x=> !!famStatus(x.f, customSel||{}))
    .map(({f,i})=>({
      kind:"custom", id:f.id, name:f.label, summary:f.desc,
      exec:"All forms", applicable:"Everyone", event:"Governance",
      created: RULE_CREATED[(i+2) % RULE_CREATED.length], enabledDef:true, fam:f,
    }));
  const all = formRows.concat(customRows);
  let rows = tab==="form" ? formRows : tab==="custom" ? customRows : all;

  const keyOf = row => row.kind + "-" + row.id;

  if(order){ const oi = k => { const i=order.indexOf(k); return i<0 ? 1e6 : i; }; rows = [...rows].sort((a,b)=> oi(keyOf(a)) - oi(keyOf(b))); }
  const reorder = (dragK, dropK, before) => setOrder(prev=>{
    const base = (prev && prev.length) ? prev.slice() : all.map(keyOf);
    const arr = base.filter(k=>k!==dragK);
    let pos = arr.indexOf(dropK); if(pos<0) pos = arr.length; if(!before) pos += 1;
    arr.splice(pos, 0, dragK); return arr;

  const isOn  = row => { const k=keyOf(row); return k in enabled ? enabled[k] : row.enabledDef; };
  const setOn = (row,v) => setEnabled(e=>({ ...e, [keyOf(row)]: v }));
  const toggleSel = row => setSel(s=>{ const n=new Set(s); const k=keyOf(row); n.has(k)?n.delete(k):n.add(k); return n; });
  const visKeys = rows.map(keyOf);
  const allOn = visKeys.length>0 && visKeys.every(k=>sel.has(k));

    </button>

function crList(arr){
  if(arr.length===1) return arr[0];
  if(arr.length===2) return arr[0] + " and " + arr[1];
  return arr.slice(0,-1).join(", ") + " and " + arr[arr.length-1];
}
// Translate a section's selection into a plain-English policy sentence.
function crSectionPreview(section, ids){
  if(!ids || !ids.length) return null;
  const opts = section.options.filter(o=> ids.indexOf(o.id)>=0);
  if(!opts.length) return null;
  if(section.type==="radio"){
    const o = opts[0];
    return (section.lead ? section.lead + " " : "") + (o.clause || o.label) + (section.tail ? " " + section.tail : "") + ".";
  }
  const list = crList(opts.map(o=> o.clause || o.label));
  return (section.lead ? section.lead + " " : "") + list + (section.tail ? (" " + section.tail) : "") + ".";
}

// --- Resizable side drawers (V10) -------------------------------------------------------------------
// Right-anchored drawers can be widened/narrowed by dragging their LEFT edge. Default width is unchanged
// (each drawer seeds the hook with its existing width); width is clamped to sensible min/max + viewport.
function useDrawerResize(initialWidth, min, max){
  const [width, setWidth] = useState(initialWidth);
  const [dragging, setDragging] = useState(false);
  const onMouseDown = e => {
    e.preventDefault();
    const startX = e.clientX, startW = width;
    setDragging(true);
    document.body.style.userSelect = "none";
    document.body.style.cursor = "col-resize";
    const onMove = ev => {
      const hi = Math.min(max, window.innerWidth - 40);
      let w = startW + (startX - ev.clientX);   // right-anchored: drag left → wider, drag right → narrower
      w = Math.max(min, Math.min(hi, w));
      setWidth(w);
    };
    const onUp = () => {
      setDragging(false);
      document.body.style.userSelect = "";
      document.body.style.cursor = "";
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
    };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
  };
  return { width, dragging, onMouseDown };
}
// Visual cue on the drawer's left edge: a hairline that brightens on hover, plus a small grip pill (3 dots).
function DrawerResizer({onMouseDown, dragging}){

        {[0,1,2].map(i=> <span key={i} className={"h-[3px] w-[3px] rounded-full " + (dragging ? "bg-sky-500" : "bg-slate-300 group-hover:bg-sky-400")}/>)}

const REQUESTS = ["All requests","Incidents","Service requests","Problems","Changes"];
const itemPhrase = it => it.group
  ? "(" + (it.conditions||[]).filter(c=>c.fieldId).map(condPhrase).join(it.match==="any" ? " or " : " and ") + ")"
  : condPhrase(it);
function summarizeBlock(block, people){
  const conds = (block.conditions||[]).filter(it=> it.group ? (it.conditions||[]).some(c=>c.fieldId) : it.fieldId);
  const acts  = (block.actions||[]).filter(a=> a.behavior && (a.fieldId || (a.fieldIds && a.fieldIds.length) || (a.behavior==="Filter Data" && a.entity && a.srcField)));
  if (!acts.length) return null;
  const join = block.match==="any" ? " or " : " and ";
  const condText = conds.length ? "when " + conds.map(itemPhrase).join(join) + ", " : "";
  const actText  = acts.map(actionPhrase).join(", and ");
  const aud = (people && people!=="Everyone") ? " for " + people : "";
  return cap(condText + actText + aud) + ".";
}
function summarizeRule(draft){
  const parts = (draft.blocks||[]).map(b=> summarizeBlock(b, b.people)).filter(Boolean);
  if (!parts.length) return "Add an action to describe what this rule does.";
  return parts.join("  Also, ");
}

function GuidedDropdown({value, onChange, options, guide, placeholder, hint, variant, highlight, multi}){
  const [open, setOpen] = useState(false);
  const [q, setQ] = useState("");
  const [active, setActive] = useState("");
  const [pos, setPos] = useState(null);
  const btnRef = useRef(null);
  const norm = options.map(o=> (o && typeof o==="object") ? o : {value:o, label:o});
  const isMulti = !!multi;
  const arr = Array.isArray(value) ? value : (value ? [value] : []);
  const sel = norm.find(o=> o.value===value);
  const hasPanel = !!guide || !!hint;
  const ql = q.trim().toLowerCase();
  const filtered = ql ? norm.filter(o=> (o.label||"").toLowerCase().indexOf(ql) >= 0) : norm;
  const showSearch = norm.length > 6;
  const subOf = o => o.desc || (guide && guide[o.value] && guide[o.value].desc) || null;
  const labelFor = v => { const o = norm.find(x=>x.value===v); return o ? o.label : v; };
  const openMenu = () => {
    const r = btnRef.current.getBoundingClientRect();
    const W = hasPanel ? 460 : 300, H = 360;
    let left = r.left; if (left + W > window.innerWidth - 8) left = window.innerWidth - W - 8; if (left < 8) left = 8;
    // Anchor to the trigger: open below if it fits (or there's no room above); otherwise flip directly
    // ABOVE the trigger (bottom-anchored) — never jump to the top of the screen.
    const fitsBelow = r.bottom + 4 + H <= window.innerHeight - 8;
    const next = (fitsBelow || r.top < H)
      ? { left, top: r.bottom + 4, W }
      : { left, bottom: (window.innerHeight - r.top) + 4, W };
    setPos(next); setActive(value || (norm[0] && norm[0].value) || ""); setQ(""); setOpen(true);
  };
  const pick = v => { if (isMulti){ const next = arr.indexOf(v)>=0 ? arr.filter(x=>x!==v) : arr.concat([v]); onChange(next); } else { onChange(v); setOpen(false); } };
  const triggerCls = variant==="pill"
    ? "appearance-none h-11 rounded-lg border bg-white pl-4 pr-9 text-[14px] font-semibold inline-flex items-center justify-between gap-2 min-w-[150px] relative " + (sel?"text-slate-700":"text-slate-400") + " " + (open?"border-sky-300 ring-2 ring-sky-100":"border-slate-200 hover:border-slate-300")
    : "h-9 rounded-md border bg-white px-2.5 text-[13px] inline-flex items-center justify-between gap-1.5 w-full relative " + ((sel||arr.length)?"text-slate-700":"text-slate-400") + " " + (open?"border-sky-300 ring-1 ring-sky-200":(highlight?"border-sky-300 ring-1 ring-sky-200":"border-slate-200 hover:border-slate-300"));
  const triggerText = isMulti ? (arr.length ? arr.map(labelFor).join(", ") : (placeholder||"Select")) : (sel ? sel.label : (placeholder||"Select"));
  const g = guide && active && guide[active];
  return (
    <>
      <button ref={btnRef} type="button" onClick={()=> open?setOpen(false):openMenu()} className={triggerCls}>
        <span className="truncate">{triggerText}</span>
        <Ico name="chevdown" size={14} cls="text-slate-400 shrink-0"/>
      </button>
      {open && pos && ReactDOM.createPortal(
        <div className="fixed inset-0 z-[60]" onMouseDown={()=>setOpen(false)}>
          <div onMouseDown={e=>e.stopPropagation()} className="absolute v10-pop bg-white rounded-xl shadow-2xl ring-1 ring-slate-200 overflow-hidden flex" style={{left:pos.left, width:pos.W, ...(pos.top!=null ? {top:pos.top} : {bottom:pos.bottom})}}>
            <div className={(hasPanel ? "w-[210px] border-r border-slate-100" : "w-full") + " shrink-0 flex flex-col max-h-[340px]"}>
              {showSearch &&
                <div className="p-2 border-b border-slate-100">
                  <input autoFocus value={q} onChange={e=>setQ(e.target.value)} placeholder="Search"
                    className="w-full h-8 px-2 rounded-md border border-slate-200 text-[12.5px] outline-none focus:border-sky-300"/>
                </div>}
              <div className="overflow-y-auto py-1">
                {filtered.map(o=>{
                  const on = isMulti ? arr.indexOf(o.value)>=0 : o.value===value;
                  const sub = subOf(o);

  const rmBlock = i => setDraft(d=>({...d, blocks: d.blocks.filter((_,j)=>j!==i)}));
  const addBlock = () => setDraft(d=>{ const blocks=[...d.blocks, {match:"all", advanced:false, advOpen:false, time:"", requests:"", people:"", conditions:[{fieldId:"", op:"", value:""}], actions:[{behavior:"", fieldId:"", value:""}]}]; setExpandedIdx(blocks.length-1); return {...d, blocks}; });
  const summary = summarizeRule(draft);
  // Save gates — identical to the Form Rules editor so a Form Builder rule is treated exactly the same: a NAME,
  // an execution TRIGGER, and at least one usable When → Then block. Validation surfaces inline on a save attempt.
  const [showErrors, setShowErrors] = useState(false);
  const nameOk   = (draft.name||"").trim().length>0;
  const execOk   = !!(draft.exec||"").trim();
  const actionOk = draft.blocks.some(b=> b.time && b.actions.some(actComplete));
  const canSave  = nameOk && execOk && actionOk;
  const missing  = []; if(!nameOk) missing.push("rule name"); if(!execOk) missing.push("execution trigger"); if(!actionOk) missing.push("a When → Then action");
  const save = () => {
    if(!canSave){ setShowErrors(true); return; }
    setSaved(true);
    const rule = ruleFromDraft(draft, baseRule);
    setTimeout(()=> onSaved && onSaved(rule), 700);
  };
  return (
    <div>
      <div className="flex items-end gap-3 mb-3">
        <div className="flex-1 min-w-0">
          <label className="block text-[11px] font-bold uppercase tracking-[0.12em] text-slate-400 mb-1.5">Rule name <span className="text-rose-500">*</span></label>

            className={"w-full h-9 rounded-md border px-3 text-[13.5px] font-medium outline-none focus:ring-1 " + (showErrors && !nameOk ? "border-rose-400 focus:border-rose-400 focus:ring-rose-200 bg-rose-50/40" : "border-slate-200 focus:ring-sky-200 focus:border-sky-300")}/>
          {showErrors && !nameOk && <p className="mt-1 text-[11.5px] font-medium text-rose-500">Give this rule a name to save it.</p>}
        </div>
        <div className="w-48 shrink-0">
          <label className="block text-[11px] font-bold uppercase tracking-[0.12em] text-slate-400 mb-1.5">Execute on <span className="text-rose-500">*</span></label>
          <div className={"rounded-md " + (showErrors && !execOk ? "ring-1 ring-rose-400" : "")}><GuidedDropdown value={draft.exec} onChange={v=>patch({exec:v})} options={EXEC_OPTS} guide={EXEC_GUIDE} placeholder="Apply rule on"/></div>
          {showErrors && !execOk && <p className="mt-1 text-[11.5px] font-medium text-rose-500">Choose when this rule runs.</p>}
        </div>
      </div>
      {/* metadata — Add description · tag chips with inline entry (matches the Form Rules editor) */}
      <div className="flex flex-wrap items-center gap-2 mb-3">
        {!showDesc &&
          <>
            <button onClick={()=>setShowDesc(true)} className="text-[13px] font-medium text-[#1180c1] hover:underline">Add description</button>
            <span className="h-4 w-px bg-slate-200"/>
          </>}
        {(draft.tags||[]).map((t,i)=>(
          <span key={i} className="inline-flex items-center gap-1 rounded-full border border-slate-200 bg-slate-100 px-2.5 py-0.5 text-[12px] font-medium text-slate-600">
            {t}<button onClick={()=>rmTag(i)} className="text-slate-400 hover:text-slate-600" title="Remove tag"><Ico name="x" size={11}/></button>
          </span>
        ))}
        {tagEditing
          ? <span className="inline-flex items-center gap-1.5">
              <input autoFocus value={tagDraft} onChange={e=>setTagDraft(e.target.value)}
                onKeyDown={e=>{ if(e.key==="Enter") commitTag(); else if(e.key==="Escape") cancelTag(); }}
                placeholder="Tag" className="h-7 w-28 rounded-md border border-sky-300 px-2 text-[12px] outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-200"/>
              <button onClick={commitTag} title="Save tag" className="flex h-6 w-6 items-center justify-center rounded-md bg-emerald-50 text-emerald-600 hover:bg-emerald-100"><Ico name="check" size={13}/></button>
              <button onClick={cancelTag} title="Cancel" className="flex h-6 w-6 items-center justify-center rounded-md bg-rose-50 text-rose-500 hover:bg-rose-100"><Ico name="x" size={13}/></button>
            </span>
          : <button onClick={()=>setTagEditing(true)} title="Add tag" className="inline-flex h-6 items-center gap-1 rounded-md border border-sky-200 bg-sky-50 px-2 text-[12px] font-medium text-[#1180c1] hover:bg-sky-100"><span className="text-sm font-semibold leading-none">+</span> Tags</button>}
      </div>
      {showDesc &&
        <div className="mb-4">
          <label className="block text-[11px] font-bold uppercase tracking-[0.12em] text-slate-400 mb-1.5">Description</label>
          <textarea value={draft.description} onChange={e=>patch({description:e.target.value})} rows={2} placeholder="What does this rule do?"
            className="w-full rounded-md border border-slate-200 px-3 py-2 text-[13px] outline-none focus:ring-1 focus:ring-sky-200 focus:border-sky-300 resize-y"/>
        </div>}
      <div className="space-y-3">
        {draft.blocks.map((b,i)=>
          <V9Block key={i} block={b} index={i} total={draft.blocks.length} fieldOpts={fieldOpts}
            expanded={expandedIdx===i} onToggle={()=>setExpandedIdx(expandedIdx===i?null:i)}
            onChange={p=>setBlock(i,p)} onDuplicate={()=>dupBlock(i)} onRemove={()=>rmBlock(i)}/>)}
      </div>
      <button onClick={addBlock}
        className="mt-3 w-full inline-flex items-center justify-center gap-1.5 h-11 rounded-xl border border-dashed border-slate-300 text-[13.5px] font-medium text-slate-500 hover:border-sky-300 hover:text-[#1180c1] hover:bg-sky-50/40 transition">
        <Ico name="plus" size={15}/> Add another rule block
      </button>
      <div className="mt-4 flex items-center justify-end gap-3">
        {!canSave && !saved && <span className="hidden sm:inline text-[11.5px] text-slate-400">Needed to save: <span className="font-medium text-slate-500">{missing.join(" · ")}</span></span>}
        <button onClick={onClose} className="h-9 px-4 rounded-md text-[13px] font-medium text-slate-600 border border-slate-200 bg-white hover:bg-slate-50">Cancel</button>
        <button onClick={save} aria-disabled={!canSave} title={canSave ? "" : ("Needed to save: " + missing.join(", "))}
          className={"h-9 px-5 rounded-md text-[13px] font-medium text-white transition " + (canSave ? "" : "opacity-50 cursor-not-allowed")}
          style={{background: saved ? "#16a34a" : BRAND}}>
          {saved ? "Saved ✓" : (baseRule ? "Update rule" : "Save rule")}
        </button>
      </div>
    </div>
  );
}

/* ============================================================ V7-STYLE FORM RULE EDITOR
   Opened from the Form Rules tab → "Create Form Rule" (and when editing an existing form rule from the
   listing). A large workspace panel that recreates the V7 progressive block builder — When → If → Then →
   Review + collapsed Advanced, step cards, grouped+searchable field picker, and the guided dropdowns.
   It does NOT reuse the compact Form Builder configure drawer. Reuses V10 data + GuidedDropdown/ValueControl. */
const V7_FIELD_GROUPS = [
  { label:"Request Details",     ids:["fill_template","transition_model","subject","description","status","priority","urgency","impact","category","tags","attachment"] },
  { label:"People & Assignment", ids:["requester","cc_emails","assignee","tech_group","department","location","vendor"] },
];
// Flat, deduped field index (built once) — the source list for the dual-pane target selector. Scales to
// 500+ fields: filtering is a single linear pass and the available list is render-capped.
const V7_FIELD_FLAT = V7_FIELD_GROUPS.flatMap(g=> g.ids.map(id=>{ const f=ALL_FIELDS.find(x=>x.id===id); return f ? {id, label:f.label, group:g.label} : null; }).filter(Boolean));
// Grouped + searchable field picker (V7 field organisation over V10's form fields).
function V7FieldPicker({value, onChange, placeholder}){
  const [open, setOpen] = useState(false);
  const [q, setQ] = useState("");
  const [pos, setPos] = useState(null);
  const btn = useRef(null);
  const openMenu = () => {
    const r = btn.current.getBoundingClientRect();
    const W = 280, H = 360;
    let left = r.left; if (left + W > window.innerWidth - 8) left = window.innerWidth - W - 8; if (left < 8) left = 8;
    // Anchor to the trigger: below if it fits, else directly above (never jump to the top of the screen).
    const fitsBelow = r.bottom + 4 + H <= window.innerHeight - 8;
    setPos((fitsBelow || r.top < H)
      ? { left, top: r.bottom + 4 }
      : { left, bottom: (window.innerHeight - r.top) + 4 });
    setQ(""); setOpen(true);
  };
  const ql = q.trim().toLowerCase();
  const groups = V7_FIELD_GROUPS
    .map(g=>({ label:g.label, items: g.ids.map(id=>ALL_FIELDS.find(f=>f.id===id)).filter(Boolean).filter(f=> !ql || f.label.toLowerCase().indexOf(ql)>=0) }))
    .filter(g=> g.items.length);
  return (
    <>
      <button ref={btn} type="button" onClick={()=> open?setOpen(false):openMenu()}
        className={"cursor-pointer rounded-md px-3 py-1.5 text-[13px] font-medium transition inline-flex items-center gap-1 " + (value ? "bg-slate-100 text-slate-700 hover:bg-slate-200" : "border border-dashed border-slate-300 italic text-slate-400 hover:bg-slate-50")}>
        {value ? labelOf(value) : (placeholder || "choose field")}<span className="text-[10px] opacity-50">▾</span>
      </button>
      {open && pos && ReactDOM.createPortal(
        <div className="fixed inset-0 z-[60]" onMouseDown={()=>setOpen(false)}>
          <div onMouseDown={e=>e.stopPropagation()} className="absolute v10-pop bg-white rounded-xl shadow-2xl ring-1 ring-slate-200 overflow-hidden w-[280px]" style={{left:pos.left, ...(pos.top!=null ? {top:pos.top} : {bottom:pos.bottom})}}>
            <div className="p-2 border-b border-slate-100">
              <input autoFocus value={q} onChange={e=>setQ(e.target.value)} placeholder="Search fields"
                className="w-full h-8 px-2 rounded-md border border-slate-200 text-[12.5px] outline-none focus:border-sky-300"/>
            </div>
            <div className="max-h-72 overflow-y-auto py-1">

  return <span className={"inline-flex items-center rounded-full px-2 py-0.5 text-[10.5px] font-semibold ring-1 " + cls}>{label}</span>;

      else if(mb==="Set Value" && ob==="Set Value"){ kind="Scope Conflict"; reason="Both set a value on " + labelOf(f) + " — the last rule to run wins."; }
      else if(mb===ob){ kind=""; reason="Both rules " + actVerb(mb,f) + "."; }   // same behavior → no extra sub-tag (was "Duplicate", now removed)
      else { kind="Partial Overlap"; reason="Both rules change " + labelOf(f) + " — “" + rule.name + "” " + actVerb(ob,f) + "."; }
      pushAct(f, kind, reason);
    }

  return { actionConflicts, conditionConflicts, kinds, total, where };

function AppV10(){
  const [tab, setTab]           = useState("builder");
  const [selField, setSelField] = useState(null);
  const [intent, setIntent]     = useState(null);
  const [flash, setFlash]       = useState(null);
  const [flow, setFlow]         = useState(null);   // field-driven rule-attachment flow
  const [customOpen, setCustomOpen] = useState(false); // Create Custom Rule drawer
  const [customFamily, setCustomFamily] = useState(null); // open the drawer straight into a family (null = dashboard)
  // Custom-rule selections lifted here so the Form Rules listing can show live Configured/Not-configured status.
  // Seeded so Show Dialog + Add Worklog read as configured by default.
  const [customSel, setCustomSel] = useState({ "d-fields":["category","assignee"], "d-act":["confirm"], "w-who":["either"], "w-act":["restrict"] });
  const [formRule, setFormRule] = useState(null);   // V7-style Form Rule editor (large panel) — {baseRule}
  const [toast, setToast]       = useState("");

  const openFlow   = (fieldId) => { setSelField(null); setFlash(fieldId); setFlow({ field:fieldId, mode:null, ruleId:null, dir:null, entered:false, creating:false }); };
  const closeFlow  = () => { setFlow(null); setFlash(null); };
  // Create Form Rule → open the V7-style rule editor (large workspace panel), NOT the field-config drawer.
  const createForm = () => { setFlow(null); setFlash(null); setSelField(null); setFormRule({ baseRule:null }); };
  // Edit an existing form rule from the listing — open the same V7 editor with the rule loaded (all steps revealed).
  const openRule = (ruleId) => { setFlow(null); setFlash(null); setSelField(null); setFormRule({ baseRule: RULE_DB.find(x=>x.id===ruleId) || null }); };
  const openCustom = () => { setCustomFamily(null); setCustomOpen(true); };
  const openCustomFamily = (famId) => { setFlow(null); setFlash(null); setCustomFamily(famId); setCustomOpen(true); };  // from an inline custom-rule entry
  const closeCustom= () => setCustomOpen(false);
  // Save Custom Rules: persist the session (mock), close the drawer, refresh the Form Rules view + toast.
  const saveCustom = () => { setCustomOpen(false); setTab("rules"); setToast("Custom rules saved successfully."); };
  useEffect(()=>{ if(!toast) return; const t=setTimeout(()=>setToast(""), 3000); return ()=>clearTimeout(t); }, [toast]);
  // "Add rule" launches the guided attach flow; View / Edit go to the Form Rules tab.
  const goRules    = (fieldId) => openFlow(fieldId);   // field-centric: one action opens the rule sidebar
  const openTab    = () => { setTab("rules"); };
  const openBuilder= () => { setTab("builder"); };
  const onOpen     = (fieldId, it) => { setSelField(fieldId); setIntent(it); };
  const onClear    = () => { setSelField(null); setIntent(null); };

  // When we return to the builder carrying a field context, flash that field.
  useEffect(()=>{
    if(tab==="builder" && selField){
      setFlash(selField);
      const t = setTimeout(()=> setFlash(null), 2300);
      return ()=> clearTimeout(t);
    }
  }, [tab, selField]);

  return (
    <div className="v10 h-screen flex flex-col bg-slate-100 text-slate-800 overflow-hidden">
      <TopBar/>
      <div className="flex flex-1 min-h-0">
        <IconRail/>
        <main className="flex-1 flex flex-col min-w-0">
          <HeaderRow/>
          <TabsRow tab={tab} onBuilder={openBuilder} onRules={openTab} total={totalRules()} onCreateForm={createForm} onCreateCustom={openCustom}/>
          <div className="flex-1 min-h-0 overflow-hidden">
            <div key={tab} className={(tab==="rules" ? "v10-slide" : "v10-fade") + " h-full"}>
              {tab==="builder"
                ? <FormBuilder flash={flash} goRules={goRules}/>
                : <FormRulesHome field={selField} intent={intent} onBack={openBuilder} onOpen={onOpen} onClear={onClear} onCreateForm={createForm} onCreateCustom={openCustom} onCustomFamily={openCustomFamily} customSel={customSel} onEditRule={openRule} onToast={setToast}/>}
            </div>
          </div>
        </main>
      </div>
      {flow && <RuleFlow flow={flow} setFlow={setFlow} onClose={closeFlow} onCustom={openCustomFamily} onToast={setToast}
        onSaved={(rule)=>{ if(rule){ const editing = RULE_DB.some(r=>r.id===rule.id); persistRule(rule); closeFlow(); setToast("“"+rule.name+"” "+(editing?"updated":"saved to Form Rules")+"."); } else { closeFlow(); } }}/>}
      {formRule && <FormRuleEditorV7 baseRule={formRule.baseRule} onClose={()=>setFormRule(null)} onSaved={(rule)=>{ const editing=!!(formRule&&formRule.baseRule); if(rule) persistRule(rule); setFormRule(null); setTab("rules"); setToast(rule ? ("“"+rule.name+"” "+(editing?"updated":"saved")+" in Form Rules.") : "Form rule saved successfully."); }}/>}
      {customOpen && <CustomRuleDrawer initialFamily={customFamily} sel={customSel} setSel={setCustomSel} onClose={closeCustom} onSaved={saveCustom}/>}
      {toast && <div className="fixed bottom-5 left-1/2 -translate-x-1/2 z-[60] rounded-lg bg-slate-900 text-white text-[13px] px-4 py-2.5 shadow-lg flex items-center gap-2"><Ico name="check" size={15} cls="text-emerald-400"/>{toast}</div>}
    </div>
  );
}

<!-- self-compile safety net: prints the exact Babel error on screen if the app fails to compile (silent on success) -->
<script>
  window.addEventListener("load", function(){
    setTimeout(function(){
      var root = document.getElementById("root");
      if (root && root.children.length) return;      // rendered fine
      if (document.getElementById("v10err")) return; // runtime error already shown by the render try/catch
      var msg;
      if (!window.React || !window.ReactDOM) {
        msg = "React / ReactDOM did not load from the CDN (unpkg.com).\nCheck your internet connection or an ad-blocker, then hard-reload (Ctrl+Shift+R).";
      } else if (!window.Babel) {
        msg = "Babel did not load from the CDN (unpkg.com).\nCheck your internet connection or an ad-blocker, then hard-reload (Ctrl+Shift+R).";
      } else {
        try {
          var s = document.querySelector('script[type="text/babel"]');
          if (s) Babel.transform(s.textContent, { presets:["react"] });
          msg = "Scripts loaded and compiled OK, but nothing rendered — likely a runtime error.\nOpen DevTools (F12) and copy the red Console error.";
        } catch(err){
          msg = "V10 failed to compile:\n\n" + (err && err.message ? err.message : err);
        }
      }
      var pre = document.createElement("pre");
      pre.style.cssText = "white-space:pre-wrap;background:#fff1f2;color:#9f1239;padding:14px 16px;margin:0;font:13px/1.5 ui-monospace,Menlo,Consolas,monospace;border-bottom:3px solid #e11d48;";
      pre.textContent = msg;
      document.body.insertBefore(pre, document.body.firstChild);
    }, 600);
  });
</script>
