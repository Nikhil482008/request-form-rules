// Action target fields (shown after an action is chosen) — short names, real-product order

const momentLabel = id => (MOMENTS.find(m=>m.id===id)||{}).label || id;
const lcVerb = id => (LIFECYCLES.find(l=>l.id===id)||{}).verb || "uses a request";

// who experiences the rule, in plain language
const AUD_FRIENDLY = [

// val: how DD3 behaves — "single" (one value), "multi" (multi-select chips), "none" (no value)
const OPERATORS = [
  { id:"EQUALS",       label:"Equals",          val:"single" },
  { id:"NOT_EQUALS",   label:"Not Equals",      val:"single" },
  { id:"STARTS_WITH",  label:"Start With",      val:"single" },
  { id:"ENDS_WITH",    label:"End With",        val:"single" },
  { id:"CONTAINS",     label:"Contains",        val:"single" },
  { id:"IS_NOT_BLANK", label:"Is Not Blank",    val:"none" },
  { id:"IS_BLANK",     label:"Is Blank",        val:"none" },
  { id:"MATCH_ANY",    label:"Match Any",       val:"multi" },
  { id:"MATCH_ALL",    label:"Match All",       val:"multi" },
  { id:"IS_EMPTY",     label:"Is Empty",        val:"none" },
  { id:"IS_NOT_EMPTY", label:"Is Not Empty",    val:"none" },
  { id:"IN",           label:"in",              val:"multi" },
  { id:"NOT_IN",       label:"not in",          val:"multi" },
  // legacy ids kept so older summaries/eval paths never throw
  { id:"BECOMES",      label:"becomes",         val:"single" },
  { id:"GREATER_THAN", label:"is greater than", val:"single" },
  { id:"LESS_THAN",    label:"is less than",    val:"single" },
];
const opLabel = id => (OPERATORS.find(o=>o.id===id)||{}).label || id;
const opVal   = id => (OPERATORS.find(o=>o.id===id)||{}).val || "single";

const ACTION_TYPES = [
  { id:"SHOW",         label:"Show",              phrase:(f)=>`show ${f}` },
  { id:"HIDE",         label:"Hide",              phrase:(f)=>`hide ${f}` },
  { id:"MANDATE",      label:"Mandate",           phrase:(f)=>`make ${f} mandatory` },
  { id:"OPTIONAL",     label:"Non-Mandate",       phrase:(f)=>`make ${f} non-mandatory` },
  { id:"ENABLE",       label:"Enable",            phrase:(f)=>`enable ${f}` },
  { id:"DISABLE",      label:"Disable",           phrase:(f)=>`disable ${f}` },
  { id:"SET_VALUE",    label:"Set Value",         phrase:(f,v)=>`set ${f} to ${v||"…"}` },
  { id:"CLEAR_VALUE",  label:"Clear Value",       phrase:(f)=>`clear ${f}` },
  { id:"SHOW_OPTIONS", label:"Show Options",      phrase:(f)=>`show options for ${f}` },
  { id:"HIDE_OPTIONS", label:"Hide Options",      phrase:(f)=>`hide options for ${f}` },
  { id:"RUN_SCRIPT",   label:"Run Custom Script", phrase:(f)=>`run a custom script` },
  { id:"FILTER_DATA",  label:"Filter Data",       phrase:(f)=>`filter the data in ${f}` },
];
const REVERSIBLE = ["SHOW","HIDE","MANDATE","OPTIONAL","ENABLE","DISABLE","SHOW_OPTIONS","HIDE_OPTIONS"];
const OPPOSITE = { SHOW:"HIDE", HIDE:"SHOW", MANDATE:"OPTIONAL", OPTIONAL:"MANDATE", ENABLE:"DISABLE", DISABLE:"ENABLE", SHOW_OPTIONS:"HIDE_OPTIONS", HIDE_OPTIONS:"SHOW_OPTIONS" };
const actionPhrase = a => {
  const t = ACTION_TYPES.find(x=>x.id===a.type);
  const fName = fieldOf(a.fieldId).name || fLabel(a.fieldId);
  return t ? t.phrase(fName, a.value) : a.type;
};

let _uid = 100;
const uid = p => `${p}_${++_uid}`;

/* ============================================================ FACTORIES */
const defaultVal  = op => { const k=opVal(op); return k==="multi" ? [] : k==="none" ? undefined : ""; };
const newCondition = () => { const fieldId="request__priority"; const op=fieldOps(fieldId)[0]; return { id:uid("c"), fieldId, op, value:defaultVal(op) }; };
const newGroup     = () => ({ id:uid("g"), kind:"GROUP", match:"ANY", conditions:[ newCondition() ] });
const newAction    = () => ({ id:uid("a"), type:"MANDATE", fieldId:"request__assignee", value:"" });
const newBlock     = () => ({ id:uid("b"), match:"ALL", conditions:[ newCondition() ], actions:[ newAction() ] });
const newRule = () => ({
  id: uid("rule"),
  trigger: { lifecycle:"CREATE", moment:"ON_FIELD_CHANGE", fieldId:"request__priority" },
  scope:   { audience:"TECHNICIANS" },
  blocks:  [ { id: uid("b"), match:"ALL", mode:"ACTION", conditions:[], actions:[] } ],  // guided: start empty (no prefilled condition/action)
  advanced:{ reverseOnFalse:false, enforceSystemWide:false },
  status:  "ENABLED",
  audit:   { createdBy:"You", createdAt:"just now", modifiedBy:"You", modifiedAt:"just now", version:1 },
});

/* ============================================================ SEED RULES */
const SEED = [
  { id:"rule_1",
    trigger:{ lifecycle:"CREATE", moment:"ON_FIELD_CHANGE", fieldId:"request__priority" },
    scope:{ audience:"TECHNICIANS" },
    blocks:[{ id:"b1", match:"ALL",
      conditions:[{id:"c1", fieldId:"request__priority", op:"MATCH_ANY", value:["High","Urgent"]}],
      actions:[{id:"a1", type:"MANDATE", fieldId:"request__assignee", value:""}] }],
    advanced:{ reverseOnFalse:false, enforceSystemWide:false }, status:"ENABLED",
    audit:{ createdBy:"Priya", createdAt:"May 20", modifiedBy:"Marco", modifiedAt:"2h ago", version:3 } },

  { id:"rule_2",
    trigger:{ lifecycle:"CREATE_EDIT", moment:"ON_LOAD" },
    scope:{ audience:"ALL" },
    blocks:[{ id:"b1", match:"ALL", conditions:[],
      actions:[{id:"a1", type:"HIDE", fieldId:"request__cc_emails", value:""}] }],
    advanced:{ reverseOnFalse:false, enforceSystemWide:false }, status:"ENABLED",
    audit:{ createdBy:"Marco", createdAt:"May 18", modifiedBy:"Marco", modifiedAt:"3d ago", version:1 } },

  { id:"rule_3",
    trigger:{ lifecycle:"EDIT", moment:"ON_SUBMIT" },
    scope:{ audience:"REQUESTERS" },
    blocks:[{ id:"b1", match:"ALL",
      conditions:[{id:"c1", fieldId:"request__impact", op:"MATCH_ANY", value:["High"]}],
      actions:[{id:"a1", type:"MANDATE", fieldId:"request__subject", value:""}] }],
    advanced:{ reverseOnFalse:false, enforceSystemWide:false }, status:"DISABLED",
    audit:{ createdBy:"Priya", createdAt:"May 12", modifiedBy:"Priya", modifiedAt:"1w ago", version:2 } },

  { id:"rule_4",
    trigger:{ lifecycle:"CREATE", moment:"ON_FIELD_CHANGE", fieldId:"request__priority" },
    scope:{ audience:"ALL" },
    blocks:[{ id:"b1", match:"ALL",
      conditions:[{id:"c1", fieldId:"request__priority", op:"MATCH_ANY", value:["High","Urgent"]}],
      actions:[{id:"a1", type:"OPTIONAL", fieldId:"request__assignee", value:""}] }],

/* ============================================================ SUMMARIZE */
function triggerClause(rule){
  let s = `When ${audActor(rule.scope.audience)} ${lcVerb(rule.trigger.lifecycle)}`;
  if (rule.trigger.moment === "ON_FIELD_CHANGE") s += ` and changes ${fLabel(rule.trigger.fieldId)}`;
  else if (rule.trigger.moment === "ON_SUBMIT")  s += ` and submits the request`;
  return s;
}
// A block's conditions can contain leaf conditions and one-level GROUP items.
function flatConds(block){
  const out=[];
  (block.conditions||[]).forEach(it=>{ if(it && it.kind==="GROUP") out.push(...(it.conditions||[])); else if(it) out.push(it); });
  return out;
}
function firstLeaf(block){ return flatConds(block)[0] || null; }
function condValText(c){ return Array.isArray(c.value) ? c.value.join("/") : (c.value==null ? "" : String(c.value)); }
function condText(c){
  const f=fLabel(c.fieldId), o=opLabel(c.op).toLowerCase(), k=opVal(c.op);
  if(k==="none") return `${f} ${o}`;
  if(k==="multi"){ const a=Array.isArray(c.value)?c.value:[]; return `${f} ${o} ${a.join(", ")||"…"}`; }
  return `${f} ${o} ${c.value||"…"}`;
}
function condClause(block){
  const sep = block.match === "ALL" ? " and " : " or ";
  const parts = (block.conditions||[]).map(it=>{
    if(it && it.kind==="GROUP"){
      const inner=(it.conditions||[]).map(condText).join(it.match==="ALL"?" and ":" or ");
      return inner ? `(${inner})` : "";
    }
    return condText(it);
  }).filter(Boolean);
  return parts.join(sep);
}
function listJoin(arr){
  if (arr.length <= 1) return arr[0] || "";
  return arr.slice(0,-1).join(", ") + " and " + arr[arr.length-1];
}
function actClause(block){ return listJoin(block.actions.map(actionPhrase)); }
function advClause(rule){
  const x=[];
  if (rule.advanced.reverseOnFalse) x.push("reverses when the condition is no longer true");
  if (rule.advanced.enforceSystemWide) x.push("enforced system-wide");
  return x;
}
const cap = s => s.charAt(0).toUpperCase()+s.slice(1);
// Requirement-framed sentence: "When Priority becomes High, make Assignee required for technicians."
function blockSentence(rule, b){
  const cond = condClause(b);
  let s = cond ? `when ${cond}, ${actClause(b)}` : actClause(b);
  if (rule.scope.audience !== "ALL") s += ` for ${audPlural(rule.scope.audience)}`;
  const adv = advClause(rule); if (adv.length) s += ` (${adv.join(", ")})`;
  return s;
}
function summarize(rule){
  if (rule.blocks.length === 1) return cap(blockSentence(rule, rule.blocks[0]) + ".");
  return null; // multiple requirements rendered as a list
}

/* ============================================================ CONFLICTS */
const lcSet = lc => lc==="CREATE_EDIT" ? ["CREATE","EDIT"] : [lc];
const lcOverlap = (a,b) => lcSet(a).some(x => lcSet(b).includes(x));
const scopeOverlap = (a,b) => a==="ALL" || b==="ALL" || a===b;
function triggerOverlap(r1,r2){
  if (!lcOverlap(r1.trigger.lifecycle, r2.trigger.lifecycle)) return false;
  if (r1.trigger.moment !== r2.trigger.moment) return false;
  return scopeOverlap(r1.scope.audience, r2.scope.audience);
}
const allActions = r => r.blocks.flatMap(b => b.actions);
function detectConflicts(rule, all){
  const out = [];
  const others = all.filter(r => r.id !== rule.id && r.status === "ENABLED");
  const mine = allActions(rule);
  const myCond = new Set(); rule.blocks.forEach(b=>flatConds(b).forEach(c=>myCond.add(c.fieldId)));
  for (const o of others){
    if (!triggerOverlap(rule, o)) continue;
    for (const da of mine) for (const oa of allActions(o)){
      if (da.fieldId !== oa.fieldId) continue;
      if (OPPOSITE[da.type] === oa.type){
        out.push({ type:"CONTRADICTORY", category:"CONTRADICTORY", severity:"HIGH", with:o, field:da.fieldId,
          text:`This rule does "${actionPhrase(da)}" while ${ruleName(o)} does "${actionPhrase(oa)}" on the same trigger.` });
      } else if (da.type === oa.type){
        if (da.type==="SET_VALUE" && da.value!==oa.value)
          out.push({ type:"CONTRADICTORY", category:"CONTRADICTORY", severity:"HIGH", with:o, field:da.fieldId,
            text:`This rule sets ${fLabel(da.fieldId)} to "${da.value}" but ${ruleName(o)} sets it to "${oa.value}".` });
        else
          out.push({ type:"REDUNDANT", category:"DUPLICATE", severity:"MEDIUM", with:o, field:da.fieldId,
            text:`This rule duplicates "${actionPhrase(da)}" already done by ${ruleName(o)}.` });
      } else {
        out.push({ type:"SAME_TIME", category:"SAME_TIME", severity:"LOW", with:o, field:da.fieldId,
          text:`This rule and ${ruleName(o)} both change ${fLabel(da.fieldId)} at the same moment.` });
      }
    }
    const oCond = new Set(); o.blocks.forEach(b=>flatConds(b).forEach(c=>oCond.add(c.fieldId)));
    const shared = [...myCond].find(f=>oCond.has(f));
    if (shared) out.push({ type:"OVERLAP", category:"OVERLAP", severity:"LOW", with:o, field:shared,
      text:`This rule and ${ruleName(o)} can both run — they each check ${fLabel(shared)}.` });
  }
  const seen = new Set();
  return out.filter(c => { const k=c.with.id+c.category+c.field; if(seen.has(k)) return false; seen.add(k); return true; });
}
function ruleName(r){
  const s = summarize(r);
  if (s) return `“${s.replace(/\.$/,"")}”`;
  return `a ${r.blocks.length}-block rule`;
}
/* ============================================================ CONFLICT REVIEW (shared)
   Groups conflicts by type into calm, expandable categories with a short summary — or a success state. */
const CONFLICT_CATS = [
  { id:"CONTRADICTORY", label:"Contradictory Rules",            short:"Contradictory", blurb:"Two rules try to do opposite things to the same field.",      tone:"red" },
  { id:"DUPLICATE",     label:"Duplicate Rules",                short:"Duplicate",     blurb:"Two rules do the same thing under similar conditions.",        tone:"amber" },
  { id:"OVERLAP",       label:"Overlapping Conditions",         short:"Overlapping",   blurb:"Two rules may run together because their conditions overlap.", tone:"violet" },
  { id:"SAME_TIME",     label:"Rules Running at the Same Time", short:"Same time",     blurb:"Two rules affect the same field at the same moment.",          tone:"slate" },
];
const CONFLICT_TONE = {
  red:"border-red-200 bg-red-50 text-red-700", amber:"border-amber-200 bg-amber-50 text-amber-700",
  violet:"border-violet-200 bg-violet-50 text-violet-700", slate:"border-slate-200 bg-slate-100 text-slate-600",
};
function groupConflicts(list){
  return CONFLICT_CATS.map(cat => ({ cat, items:(list||[]).filter(c => (c.category||"CONTRADICTORY")===cat.id) })).filter(g => g.items.length);
}
function ConflictReview({ conflicts }){
  const list = conflicts || [];
  const groups = groupConflicts(list);
  const [openCat, setOpenCat] = useState(groups[0] ? groups[0].cat.id : null);
  if (!list.length) return (
    <div className="flex items-center gap-2 rounded-lg border border-emerald-100 bg-emerald-50 px-3 py-2 text-sm text-emerald-700">
      <span className="text-emerald-500">✓</span><span>No conflicts with your other rules — good to save.</span>
    </div>
  );
  return (
    <div className="rounded-lg border border-amber-200 bg-amber-50/50 p-3">
      <div className="flex flex-wrap items-center gap-2">
        <span className="text-sm font-semibold text-amber-800">{list.length} conflict{list.length>1?"s":""} to review before saving</span>
        {groups.map(g => <span key={g.cat.id} className={cx("rounded-full border px-2 py-0.5 text-[11px] font-medium", CONFLICT_TONE[g.cat.tone])}>{g.items.length} {g.cat.short}</span>)}
      </div>
      <div className="mt-2 space-y-1.5">
        {groups.map(g => {
          const ex = openCat===g.cat.id;
          return (
            <div key={g.cat.id} className="overflow-hidden rounded-md border border-slate-200 bg-white">

/* ============================================================ SIMULATION */
function evalCondition(c, values){
  if(!c) return true;
  const raw = values[c.fieldId];
  const v = raw === undefined ? "" : raw;
  const arr = Array.isArray(c.value) ? c.value : (c.value==null || c.value==="" ? [] : [c.value]);
  const s = String(v).toLowerCase();
  const isBlank = (v==="" || v==null || (Array.isArray(v) && v.length===0));
  switch(c.op){
    case "BECOMES":
    case "EQUALS":       return String(v) === String(c.value);
    case "NOT_EQUALS":   return String(v) !== String(c.value);
    case "STARTS_WITH":  return s.startsWith(String(c.value).toLowerCase());
    case "ENDS_WITH":    return s.endsWith(String(c.value).toLowerCase());
    case "CONTAINS":     return s.includes(String(c.value).toLowerCase());
    case "IS_BLANK":
    case "IS_EMPTY":     return isBlank;
    case "IS_NOT_BLANK":
    case "IS_NOT_EMPTY": return !isBlank;
    case "MATCH_ANY":
    case "IN":           return arr.map(String).includes(String(v));
    case "NOT_IN":       return !arr.map(String).includes(String(v));
    case "MATCH_ALL":    return arr.length>0 && arr.every(x => String(x) === String(v));
    case "GREATER_THAN": return parseFloat(v) >  parseFloat(c.value);
    case "LESS_THAN":    return parseFloat(v) <  parseFloat(c.value);
    default: return false;
  }
}
function evalGroup(g, values){
  if(!g.conditions || !g.conditions.length) return true;
  const r = g.conditions.map(c => evalCondition(c, values));
  return g.match === "ALL" ? r.every(Boolean) : r.some(Boolean);
}
function evalBlock(block, values){
  const items = block.conditions || [];
  if (!items.length) return true;
  const res = items.map(it => (it && it.kind==="GROUP") ? evalGroup(it, values) : evalCondition(it, values));
  return block.match === "ALL" ? res.every(Boolean) : res.some(Boolean);
}
function scopeMatchPersona(aud, persona){
  if (aud === "ALL") return true;
  if (aud === "LOGGED_IN") return true; // all demo personas are logged in
  return aud === persona;
}
function applyAction(state, a){
  const s = state[a.fieldId] || (state[a.fieldId] = { visible:true, required:false, enabled:true, value: "" });
  switch(a.type){
    case "SHOW": s.visible=true; break;
    case "HIDE": s.visible=false; break;
    case "MANDATE": s.required=true; break;
    case "OPTIONAL": s.required=false; break;
    case "ENABLE": s.enabled=true; break;
    case "DISABLE": s.enabled=false; break;
    case "SET_VALUE": s.value=a.value; break;
    case "CLEAR_VALUE": s.value=""; break;
  }
}
function simulate(draft, all, persona, values, moment){
  const ruleset = [...all.filter(r => r.id !== draft.id && r.status === "ENABLED"), draft];
  const applicable = ruleset.filter(r => r.trigger.moment === moment && scopeMatchPersona(r.scope.audience, persona));
  const state = {};
  // init touched fields
  applicable.forEach(r => allActions(r).forEach(a => {
    if (!state[a.fieldId]) state[a.fieldId] = { visible:true, required:false, enabled:true, value: values[a.fieldId]||"" };
  }));
  const trace = [];
  applicable.forEach(r => r.blocks.forEach((b, bi) => {
    const matched = evalBlock(b, values);
    if (matched){
      b.actions.forEach(a => applyAction(state, a));
      trace.push({ ruleId:r.id, isDraft:r.id===draft.id, blockIndex:bi, matched:true, actions:b.actions });
    } else {
      trace.push({ ruleId:r.id, isDraft:r.id===draft.id, blockIndex:bi, matched:false, actions:[] });
    }
  }));
  return { state, trace, applicableCount: applicable.length };
}

/* ============================================================ TOKEN BUILDER UI */
function Dropdown({ trigger, children, align }){
  const [open,setOpen]=useState(false);
  const ref = React.useRef(null);
  const [pos,setPos]=useState(null);
  const menuRef = React.useRef(null);
  // Open the menu inside the nearest scrollable ancestor (the form's middle area) so a tall menu extends THAT
  // container's scroll height — the middle scrolls to reveal it, the page + sticky footer stay put, and the menu
  // itself never needs a scrollbar. Falls back to a viewport-fixed menu when there is no scroll container.
  const place = () => {
    const el = ref.current; if(!el) return;
    let sc = el.parentElement;
    while (sc && sc !== document.body) { const oy = getComputedStyle(sc).overflowY; if (oy==="auto"||oy==="scroll") break; sc = sc.parentElement; }
    const r = el.getBoundingClientRect();
    if (sc && sc !== document.body) {
      if (getComputedStyle(sc).position==="static") sc.style.position = "relative";
      const cr = sc.getBoundingClientRect();
      setPos({ host:sc, abs:true, top: r.bottom - cr.top + sc.scrollTop + 4, left: r.left - cr.left + sc.scrollLeft });
    } else {
      const vw = (typeof window!=="undefined"?window.innerWidth:1280);
      let left = align==="right" ? r.right - 224 : r.left;
      left = Math.max(8, Math.min(left, vw - 232));
      setPos({ host:(typeof document!=="undefined"?document.body:null), abs:false, top: r.bottom + 4, left });
    }
  };
  const toggle = () => { if(!open){ place(); setOpen(true); } else setOpen(false); };
  React.useLayoutEffect(()=>{
    if(!open || !menuRef.current || !pos) return;
    const m = menuRef.current;
    if (pos.abs && pos.host){ const sc=pos.host; const L=Math.max(sc.scrollLeft+8, Math.min(pos.left, sc.scrollLeft+sc.clientWidth-m.offsetWidth-8)); if (L!==pos.left) setPos(p=>p?{...p,left:L}:p); }
    m.scrollIntoView({ block:"nearest", behavior:"smooth" });
  }, [open]);
  React.useEffect(()=>{
    if(!open) return;
    const onDown = (e)=>{ if(ref.current && ref.current.contains(e.target)) return; if(menuRef.current && menuRef.current.contains(e.target)) return; setOpen(false); };
    const onResize = ()=>setOpen(false);
    document.addEventListener("mousedown", onDown, true);
    window.addEventListener("resize", onResize);
    return ()=>{ document.removeEventListener("mousedown", onDown, true); window.removeEventListener("resize", onResize); };
  }, [open]);
  const menu = (open && pos && pos.host) ? ReactDOM.createPortal(
    <div ref={menuRef} className="min-w-[190px] rounded-lg border border-slate-200 bg-white p-1 shadow-xl"
      style={{ position: pos.abs?"absolute":"fixed", top:pos.top, left:pos.left, zIndex:9999 }}>
      {typeof children==="function" ? children(()=>setOpen(false)) : children}
    </div>, pos.host) : null;
  return (
    <span ref={ref} className="relative inline-block align-middle">
      <span onClick={toggle}>{trigger}</span>
      {menu}
    </span>
  );
}

  FILTER_DATA: { when:"Limit the records a field can show.", how:"The field's data is filtered when the condition is met.", output:"Only matching data appears in the field." },
};
const ACTION_GUIDE2 = ACTION_TYPES.map(t => ({ value:t.id, label:t.label, ...(ACTION_INFO[t.id] || { when:"Apply this behaviour to a form field.", how:"Applied when the condition is met.", output:"The form behaviour changes accordingly." }) }));
const OP_INFO = {
  EQUALS:      { when:"Match one exact value.", how:"Checks the field equals exactly what you choose.", output:"True only for that single value." },
  NOT_EQUALS:  { when:"Match anything except one value.", how:"Checks the field is different from what you choose.", output:"True for every value but that one." },
  STARTS_WITH: { when:"Match text that begins a certain way.", how:"Checks the start of the text against what you type.", output:"True when the text begins with it." },
  ENDS_WITH:   { when:"Match text that ends a certain way.", how:"Checks the end of the text against what you type.", output:"True when the text ends with it." },
  CONTAINS:    { when:"Match text that includes something.", how:"Checks whether the text contains what you type.", output:"True when the text includes it." },
  IS_NOT_BLANK:{ when:"Check that a field has been filled.", how:"Checks the field holds any value at all.", output:"True whenever the field isn't empty." },
  IS_BLANK:    { when:"Check that a field is empty.", how:"Checks the field holds no value.", output:"True whenever the field is empty." },
  MATCH_ANY:   { when:"Match any one of several choices.", how:"Checks the field equals any value you select.", output:"True if it matches at least one." },
  MATCH_ALL:   { when:"Require every selected choice.", how:"Checks the field equals every value you select.", output:"True only if all of them match." },
  IS_EMPTY:    { when:"Check that nothing is selected.", how:"Checks the choice field has no selection.", output:"True when nothing is chosen." },
  IS_NOT_EMPTY:{ when:"Check that something is selected.", how:"Checks the choice field has at least one selection.", output:"True when one or more are chosen." },
  IN:          { when:"Match one of a list of items.", how:"Checks the value is among the items you pick.", output:"True when it's one of them." },
  NOT_IN:      { when:"Exclude a list of items.", how:"Checks the value is none of the items you pick.", output:"True when it's none of them." },
};
const opGuide2 = id => ({ value:id, label:opLabel(id), ...(OP_INFO[id] || { when:opLabel(id), how:"Compares the field using this operator.", output:"True when the comparison holds." }) });
function PickList({ items, onPick, search }){
  const [q,setQ]=useState("");

    <div>

      </div>
    </div>
  );
}
function FieldToken({ value, onChange, kind, warn }){
  return <Dropdown trigger={<TokenBtn label={fieldOf(value).name} kind={kind||"field"} warn={warn} />}>
    {close => <PickList search items={ACTION_FIELDS.map(f=>({value:f.id,label:f.name}))} onPick={v=>{onChange(v);close();}} />}
  </Dropdown>;
}
function OpToken({ value, onChange }){

    {close => <PickList items={OPERATORS.map(o=>({value:o.id,label:o.label}))} onPick={v=>{onChange(v);close();}} />}
  </Dropdown>;
}
function ValueToken({ field, value, onChange }){
  const f = fieldOf(field);
  if (f.options)
    return <Dropdown trigger={<TokenBtn label={value||"choose"} kind="value" placeholder={!value} />}>
      {close => <PickList items={f.options.map(o=>({value:o,label:o}))} onPick={v=>{onChange(v);close();}} />}
    </Dropdown>;

    {close => <div className="p-1">
      <input autoFocus type={f.type==="number"?"number":"text"} defaultValue={value}

}
function VerbToken({ value, onChange }){
  const label = (ACTION_TYPES.find(t=>t.id===value)||{}).label || value;
  return <Dropdown trigger={<TokenBtn label={label} kind="verb" />}>

// timing phrased to read after "runs when …"
const RUNS_WHEN = { ON_LOAD:"the form loads", ON_FIELD_CHANGE:"the form is being filled", ON_SUBMIT:"the form is submitted" };
function Pill({ labelPrefix, value, items, onChange }){

/* ============================================================ CONDITIONS EDITOR (shared)
   DD1 = grouped + searchable field picker · DD2 = operators for that field ·
   DD3 = value control that depends on the operator (single / multi-chips / none) ·
   plus one level of nested condition groups. */
function GroupedFieldPicker({ value, onPick, fields }){
  const [q,setQ] = useState("");
  const ql = q.trim().toLowerCase();
  const pool = fields || FIELDS;
  return (
    <div className="w-72">
      <input autoFocus value={q} onChange={e=>setQ(e.target.value)} placeholder="Search…"
        className="mb-1 w-full rounded border border-slate-200 px-2 py-1 text-sm focus:border-sky-400 focus:outline-none" />
      <div className="max-h-64 overflow-y-auto">
        {FIELD_GROUPS.map(g=>{
          const fs = pool.filter(f => f.group===g.id && (!ql || f.name.toLowerCase().includes(ql) || g.label.toLowerCase().includes(ql)));
          if(!fs.length) return null;
          return (
            <div key={g.id}>
              <p className="sticky top-0 bg-sky-50 px-2 py-1 text-[11px] font-semibold uppercase tracking-wide text-slate-500">{g.label}</p>
              {fs.map(f=>(
                <button key={f.id} onClick={()=>onPick(f.id)}
                  className={cx("block w-full rounded px-2 py-1.5 text-left text-sm hover:bg-sky-50", f.id===value && "bg-sky-50 font-medium text-sky-700")}>{f.name}</button>
              ))}
            </div>
          );
        })}
        {pool.every(f => ql && !f.name.toLowerCase().includes(ql)) && <p className="px-2 py-1 text-sm text-slate-400">No matches</p>}
      </div>
    </div>
  );
}
function MultiSelect({ field, value, onChange }){
  const opts = fieldOf(field).options || [];
  const sel = Array.isArray(value) ? value : [];
  const toggle = o => onChange(sel.includes(o) ? sel.filter(x=>x!==o) : [...sel, o]);
  return (
    <Dropdown trigger={
      <span className={cx("inline-flex min-w-[150px] max-w-full cursor-pointer flex-wrap items-center gap-1 rounded-md border px-2 py-1 text-sm",
        sel.length ? "border-slate-200 bg-white" : "border-dashed border-slate-300 text-slate-400")}>
        {sel.length===0 && <span>Select values…</span>}
        {sel.slice(0,2).map(o=>(
          <span key={o} className="inline-flex items-center gap-1 rounded bg-slate-100 px-1.5 py-0.5 text-xs text-slate-700">
            {o}<span onClick={e=>{e.stopPropagation();toggle(o);}} className="cursor-pointer text-slate-400 hover:text-slate-600">×</span>
          </span>
        ))}
        {sel.length>2 && <span className="rounded bg-slate-100 px-1.5 py-0.5 text-xs text-slate-500">+{sel.length-2}</span>}
        <span className="ml-auto text-[9px] opacity-50">▾</span>
      </span>}>
      {close => (
        <div className="w-56">
          {sel.length>0 && (
            <div className="mb-1 border-b border-slate-100 pb-1">
              <p className="px-2 py-0.5 text-[11px] font-semibold text-sky-600">Selected Items</p>
              <div className="flex flex-wrap gap-1 px-2 py-1">
                {sel.map(o=>(
                  <span key={o} className="inline-flex items-center gap-1 rounded bg-sky-50 px-1.5 py-0.5 text-xs text-sky-700">
                    {o}<span onClick={()=>toggle(o)} className="cursor-pointer">×</span>
                  </span>
                ))}
              </div>
            </div>
          )}
          <div className="max-h-48 overflow-y-auto">
            {opts.map(o=>(
              <button key={o} onClick={()=>toggle(o)}
                className={cx("flex w-full items-center justify-between rounded px-2 py-1.5 text-left text-sm hover:bg-sky-50", sel.includes(o) && "text-sky-700")}>
                <span>{o}</span>{sel.includes(o) && <span className="text-sky-500">✓</span>}
              </button>
            ))}
            {opts.length===0 && <p className="px-2 py-1 text-sm text-slate-400">No options</p>}
          </div>
        </div>
      )}
    </Dropdown>
  );
}
function ValueControl({ cond, onChange }){
  const f = fieldOf(cond.fieldId);
  const kind = opVal(cond.op);
  if(kind==="none") return <span className="px-1 text-xs italic text-slate-400">no value needed</span>;
  if(kind==="multi") return <MultiSelect field={cond.fieldId} value={cond.value} onChange={onChange} />;
  if(f.options) return (
    <Dropdown trigger={<span className={cx("cursor-pointer rounded-md border px-3 py-1.5 text-sm", cond.value ? "border-slate-200 bg-slate-50 text-slate-700" : "border-dashed border-slate-300 text-slate-400")}>{cond.value || "choose value"} ▾</span>}>
      {close => <PickList search items={f.options.map(o=>({value:o,label:o}))} onPick={v=>{onChange(v);close();}} />}
    </Dropdown>
  );
  return <input value={cond.value||""} onChange={e=>onChange(e.target.value)} type={f.type==="number"?"number":f.type==="date"?"date":"text"} placeholder="Enter value"
    className="min-w-[140px] flex-1 rounded-md border border-slate-300 px-3 py-1.5 text-sm focus:border-sky-400 focus:outline-none" />;
}
function ConditionRow({ cond, onField, onOp, onValue, onRemove }){
  return (
    <div className="flex items-center gap-2">
      <div className="flex flex-1 flex-wrap items-center gap-2 rounded-md border border-slate-200 bg-white p-1.5">
        <Dropdown trigger={<span className="cursor-pointer rounded-md bg-slate-100 px-3 py-1.5 text-sm font-medium text-slate-700 hover:bg-slate-200">{fLabel(cond.fieldId)} ▾</span>}>
          {close => <GroupedFieldPicker value={cond.fieldId} onPick={v=>{onField(v);close();}} />}
        </Dropdown>
        <Dropdown trigger={<span className="cursor-pointer rounded-md border border-slate-200 px-2.5 py-1.5 text-sm text-slate-600 hover:bg-slate-50">{opLabel(cond.op)} ▾</span>}>
          {close => <div className="-m-1 overflow-hidden rounded-lg"><GuidedPanel options={fieldOps(cond.fieldId).map(opGuide2)} value={cond.op} onPick={v=>{onOp(v);close();}} /></div>}
        </Dropdown>
        <ValueControl cond={cond} onChange={onValue} />
      </div>
      <button onClick={onRemove} title="Remove condition" className="flex h-6 w-6 shrink-0 items-center justify-center rounded-full bg-red-500 text-base leading-none text-white hover:bg-red-600">×</button>
    </div>
  );
}
function MatchToggle({ match, onChange }){
  return (
    <div className="inline-flex items-center gap-0.5 rounded-md border border-slate-200 bg-slate-50 p-0.5 text-xs">
      {["ALL","ANY"].map(m=>(
        <button key={m} onClick={()=>onChange(m)}
          className={cx("rounded px-2 py-1 font-medium", match===m ? "bg-white text-sky-700 shadow-sm" : "text-slate-500 hover:text-slate-700")}>Match {m==="ALL"?"All":"Any"}</button>
      ))}
    </div>
  );
}
function ConditionsEditor({ block, mutate }){
  const items = block.conditions || [];
  const setField = idx => v => mutate(b=>{ const c=b.conditions[idx]; c.fieldId=v; c.op=fieldOps(v)[0]; c.value=defaultVal(c.op); });
  const setOp    = idx => v => mutate(b=>{ const c=b.conditions[idx]; c.op=v; c.value=defaultVal(v); });
  const setVal   = idx => v => mutate(b=>{ b.conditions[idx].value=v; });
  const rmItem   = idx => mutate(b=>{ b.conditions.splice(idx,1); });
  const addCond  = () => mutate(b=>{ b.conditions.push(newCondition()); });
  const addGroup = () => mutate(b=>{ b.conditions.push(newGroup()); });
  const clearAll = () => mutate(b=>{ b.conditions=[]; });
  const gSetMatch= gi => v => mutate(b=>{ b.conditions[gi].match=v; });
  const gSetField= (gi,ci) => v => mutate(b=>{ const c=b.conditions[gi].conditions[ci]; c.fieldId=v; c.op=fieldOps(v)[0]; c.value=defaultVal(c.op); });
  const gSetOp   = (gi,ci) => v => mutate(b=>{ const c=b.conditions[gi].conditions[ci]; c.op=v; c.value=defaultVal(v); });
  const gSetVal  = (gi,ci) => v => mutate(b=>{ b.conditions[gi].conditions[ci].value=v; });
  const gRm      = (gi,ci) => mutate(b=>{ b.conditions[gi].conditions.splice(ci,1); });
  const gAdd     = gi => mutate(b=>{ b.conditions[gi].conditions.push(newCondition()); });

  return (
    <div>
      <div className="flex items-center gap-3">
        <span className="text-xs text-slate-500">When the rule runs, check:</span>
        {items.length>1 && <MatchToggle match={block.match} onChange={v=>mutate(b=>{ b.match=v; })} />}
      </div>
      <div className="mt-3 space-y-2">
        {items.length===0 && <p className="text-sm italic text-slate-400">No conditions — this rule always runs.</p>}
        {items.map((it,idx)=> (it && it.kind==="GROUP") ? (
          <div key={it.id} className="rounded-lg border border-slate-200 bg-slate-50/70 p-3">
            <div className="mb-2 flex items-center justify-between gap-2">
              <span className="text-[11px] font-semibold uppercase tracking-wide text-slate-400">Condition group</span>
              <div className="flex items-center gap-2">
                {it.conditions.length>1 && <MatchToggle match={it.match} onChange={gSetMatch(idx)} />}
                <button onClick={()=>rmItem(idx)} className="text-xs font-medium text-red-500 hover:underline">Remove group</button>
              </div>
            </div>
            <div className="space-y-2">
              {it.conditions.map((c,ci)=>(
                <ConditionRow key={c.id} cond={c} onField={gSetField(idx,ci)} onOp={gSetOp(idx,ci)} onValue={gSetVal(idx,ci)} onRemove={()=>gRm(idx,ci)} />
              ))}
            </div>
            <button onClick={()=>gAdd(idx)} className="mt-2 flex items-center gap-1.5 text-xs font-medium text-sky-600 hover:underline">
              <span className="flex h-4 w-4 items-center justify-center rounded-full bg-emerald-500 text-[11px] leading-none text-white">+</span> Add condition to group
            </button>
          </div>
        ) : (
          <ConditionRow key={it.id} cond={it} onField={setField(idx)} onOp={setOp(idx)} onValue={setVal(idx)} onRemove={()=>rmItem(idx)} />
        ))}
      </div>
      <div className="mt-3 flex flex-wrap items-center gap-2">
        <button onClick={addCond} className="inline-flex items-center gap-1.5 rounded-md border border-slate-200 bg-white px-3 py-1.5 text-sm font-medium text-sky-600 hover:bg-sky-50">
          <span className="flex h-4 w-4 items-center justify-center rounded-full bg-emerald-500 text-[11px] leading-none text-white">+</span> Add Condition
        </button>
        <button onClick={addGroup} className="inline-flex items-center gap-1.5 rounded-md border border-slate-200 bg-white px-3 py-1.5 text-sm font-medium text-slate-600 hover:bg-slate-50">
          <span className="text-sky-500">⊕</span> Add Condition Group
        </button>
        {items.length>0 && (
          <button onClick={clearAll} className="inline-flex items-center gap-1.5 rounded-md px-3 py-1.5 text-sm font-medium text-red-500 hover:bg-red-50">
            <span>⊘</span> Remove All Condition
          </button>
        )}
      </div>
    </div>
  );
}

/* ============================================================ RULE STUDIO */
function RuleStudio({ initial, isNew, allRules, onCancel, onSave }){
  const [draft, setDraft] = useState(() => JSON.parse(JSON.stringify(initial)));
  const update = fn => setDraft(d => { const n = JSON.parse(JSON.stringify(d)); fn(n); return n; });
  const [showAdvanced, setShowAdvanced] = useState(false);
  const [showTest, setShowTest] = useState(false);
  const [dismissed, setDismissed] = useState(() => new Set());

  const conflicts = useMemo(
    () => detectConflicts(draft, allRules).filter(c => !dismissed.has(c.with.id+c.field+c.type)),
    [draft, allRules, dismissed]
  );
  const conflictFields = useMemo(() => new Set(conflicts.map(c=>c.field)), [conflicts]);

  const setMatch = (bi,v) => update(d => d.blocks[bi].match=v);
  const addCond  = bi => update(d => d.blocks[bi].conditions.push(newCondition()));
  const setCond  = (bi,ci,k,v) => update(d => { d.blocks[bi].conditions[ci][k]=v; });
  const rmCond   = (bi,ci) => update(d => d.blocks[bi].conditions.splice(ci,1));
  const addAct   = bi => update(d => d.blocks[bi].actions.push(newAction()));
  const setAct   = (bi,ai,k,v) => update(d => { d.blocks[bi].actions[ai][k]=v; });
  const rmAct    = (bi,ai) => update(d => d.blocks[bi].actions.splice(ai,1));
  const addBlock = () => update(d => d.blocks.push(newBlock()));
  const removeBlock = bi => update(d => d.blocks.splice(bi,1));
  const setAdv   = (k,v) => update(d => { d.advanced[k]=v; });
  const dismiss  = c => setDismissed(s => { const n=new Set(s); n.add(c.with.id+c.field+c.type); return n; });

  const allActionsReversible = draft.blocks.every(b => b.actions.every(a => REVERSIBLE.includes(a.type)));
  const affectedFields = useMemo(() => { const s=new Set(); draft.blocks.forEach(b=>b.actions.forEach(a=>s.add(a.fieldId))); return [...s]; }, [draft]);
  const valid = draft.blocks.length>0 && draft.blocks.every(b => b.actions.length>0);

  return (
    <div className="flex h-full min-h-0 flex-1 flex-col bg-slate-50">
      {/* slim top bar */}
      <div className="flex items-center justify-between border-b border-slate-200 bg-white px-5 py-3">
        <button onClick={onCancel} className="flex items-center gap-2 text-sm text-slate-500 hover:text-slate-800">← Rules</button>
        <div className="flex items-center gap-2">
          <Btn variant="outline" onClick={onCancel}>Cancel</Btn>
          <Btn onClick={()=>onSave(draft)} className={cx(!valid && "opacity-50 pointer-events-none")}>Save</Btn>
        </div>
      </div>

      {/* single calm column */}
      <div className="flex-1 overflow-y-auto">
        <div className="mx-auto max-w-2xl px-6 py-8">
          <h1 className="text-2xl font-semibold tracking-tight text-slate-800">{isNew ? "Add a requirement" : "Edit requirement"}</h1>
          <p className="mt-1 text-sm text-slate-500">Describe what should happen, in plain language.</p>

          {/* requirement statement card(s) */}
          <div className="mt-6 space-y-4">
            {draft.blocks.map((b,bi)=>(
              <div key={b.id} className="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
                {draft.blocks.length>1 && (
                  <div className="mb-3 flex items-center justify-between">
                    <span className="text-xs font-semibold uppercase tracking-wide text-slate-400">{bi===0?"Requirement":"Also"}</span>
                    <button onClick={()=>removeBlock(bi)} className="text-slate-300 hover:text-red-500">✕</button>
                  </div>
                )}

                {/* WHEN (optional) */}
                {/* WHEN — conditions (grouped fields, dependent operators, nested groups) */}
                <div className="mb-3">
                  <span className="text-sm font-semibold text-slate-400">WHEN</span>
                  <div className="mt-2"><ConditionsEditor block={b} mutate={fn=>update(d=>fn(d.blocks[bi]))} /></div>
                </div>

                {/* THEN */}
                <div className="flex flex-wrap items-center gap-x-2 gap-y-2">
                  <span className="text-sm font-semibold text-slate-400">{b.conditions.length>0 ? "THEN" : "ALWAYS"}</span>
                  {b.actions.map((a,ai)=>(
                    <React.Fragment key={a.id}>
                      {ai>0 && <span className="text-sm text-slate-400">and</span>}
                      <VerbToken value={a.type} onChange={v=>setAct(bi,ai,"type",v)} />
                      <FieldToken value={a.fieldId} onChange={v=>setAct(bi,ai,"fieldId",v)} warn={conflictFields.has(a.fieldId)} />
                      {a.type==="SET_VALUE" && <span className="text-sm text-slate-400">to</span>}
                      {a.type==="SET_VALUE" && <ValueToken field={a.fieldId} value={a.value} onChange={v=>setAct(bi,ai,"value",v)} />}
                      <button onClick={()=>rmAct(bi,ai)} className="px-1 text-slate-300 hover:text-red-500">✕</button>
                    </React.Fragment>
                  ))}
                  <button onClick={()=>addAct(bi)} className="text-sm font-medium text-indigo-600 hover:text-indigo-800">+ also</button>
                </div>

                {/* FOR (audience) — inline token, same feel as WHEN/THEN */}
                <div className="mt-3 flex flex-wrap items-center gap-x-2 gap-y-2">
                  <span className="text-sm font-semibold text-slate-400">FOR</span>
                  <Dropdown trigger={<TokenBtn label={audFriendly(draft.scope.audience)} kind="field" />}>
                    {close => <PickList items={AUD_FRIENDLY.map(a=>({value:a.id,label:a.label}))} onPick={v=>{update(d=>d.scope.audience=v);close();}} />}
                  </Dropdown>
                </div>

                {/* RUN IT WHEN (timing) — inline token */}
                <div className="mt-2 flex flex-wrap items-center gap-x-2 gap-y-2">
                  <span className="text-sm font-semibold text-slate-400">RUN IT WHEN</span>
                  <Dropdown trigger={<TokenBtn label={RUNS_WHEN[draft.trigger.moment]} kind="verb" />}>
                    {close => <div className="-m-1 overflow-hidden rounded-lg"><GuidedPanel options={MOMENT_GUIDE} value={draft.trigger.moment} onPick={v=>{update(d=>d.trigger.moment=v);close();}} /></div>}
                  </Dropdown>
                </div>

                {/* contextual conflict — under the offending block */}
                {conflicts.filter(c => b.actions.some(a=>a.fieldId===c.field)).map((c,i)=>(
                  <div key={i} className="mt-3 rounded-lg border border-amber-200 bg-amber-50 px-3 py-2 text-sm">
                    <p className="text-amber-800"><span className="font-medium">Heads up:</span> {c.text}</p>
                    <div className="mt-1.5 flex gap-3 text-xs font-medium">
                      <button className="text-amber-700 hover:underline">View that rule</button>
                      <button onClick={()=>dismiss(c)} className="text-amber-700 hover:underline">Let this one win</button>
                      <button onClick={()=>dismiss(c)} className="text-slate-400 hover:underline">Dismiss</button>
                    </div>
                  </div>
                ))}
              </div>
            ))}
          </div>

          <button onClick={addBlock} className="mt-3 text-sm font-medium text-slate-500 hover:text-indigo-600">+ Add another requirement</button>

          {/* advanced toggle */}
          <button onClick={()=>setShowAdvanced(s=>!s)} className="mt-4 inline-flex text-sm text-slate-400 hover:text-slate-600">{showAdvanced?"▾":"▸"} Advanced</button>

          {showAdvanced && (
            <div className="mt-3 space-y-3 rounded-lg border border-slate-200 bg-white p-4 text-sm">
              <div className="flex items-center gap-2">
                <span className="text-slate-500">Apply on</span>
                <Select value={draft.trigger.lifecycle} onChange={v=>update(d=>d.trigger.lifecycle=v)} options={LIFECYCLES_FRIENDLY.map(l=>({value:l.id,label:l.label}))} className="h-8" />
              </div>
              <label className={cx("flex items-start gap-2", !allActionsReversible && "opacity-40")}>
                <input type="checkbox" disabled={!allActionsReversible} checked={draft.advanced.reverseOnFalse} onChange={e=>setAdv("reverseOnFalse",e.target.checked)} className="mt-0.5" />
                <span>Undo automatically when this is no longer true
                  {!allActionsReversible && <em className="block text-xs text-slate-400">Not available with “Set value” (it has no opposite).</em>}
                </span>
              </label>
              <label className="flex items-start gap-2">
                <input type="checkbox" checked={draft.advanced.enforceSystemWide} onChange={e=>setAdv("enforceSystemWide",e.target.checked)} className="mt-0.5" />
                <span>Apply across every form
                  {draft.advanced.enforceSystemWide && <em className="block text-xs text-amber-600">Overrides “Applies to” everywhere — use with care.</em>}
                </span>
              </label>
            </div>
          )}

          {/* inline impact + plain-English readout */}
          <p className="mt-7 text-sm text-slate-600"><span className="font-medium">In plain English:</span> {summarize(draft) || `${draft.blocks.length} requirements set.`}</p>
          <p className="mt-1 text-xs text-slate-400">ⓘ Affects {affectedFields.length} field{affectedFields.length!==1?"s":""}{affectedFields.length?` (${affectedFields.map(fLabel).join(", ")})`:""}.</p>
          {/* grouped conflict review */}
          <div className="mt-4"><ConflictReview conflicts={conflicts} /></div>
        </div>
      </div>

      {/* sticky footer */}
      <div className="flex items-center justify-between border-t border-slate-200 bg-white px-5 py-3">
        <span className={cx("text-sm font-medium", conflicts.length ? "text-amber-600" : "text-emerald-600")}>
          {conflicts.length ? `⚠ ${conflicts.length} thing${conflicts.length>1?"s":""} to review` : "✓ No conflicts"}
        </span>
        <div className="flex items-center gap-2">
          <Btn variant="outline" onClick={()=>setShowTest(true)}>Try it</Btn>
          <Btn variant="outline" onClick={onCancel}>Cancel</Btn>
          <Btn onClick={()=>onSave(draft)} className={cx(!valid && "opacity-50 pointer-events-none")}>Save</Btn>
        </div>
      </div>

      {/* Try-it drawer (on demand) */}
      {showTest && (
        <React.Fragment>
          <div className="fixed inset-0 z-40 bg-black/20" onClick={()=>setShowTest(false)} />
          <div className="fixed right-0 top-0 z-50 h-full w-[380px] overflow-y-auto bg-white p-4 shadow-2xl">
            <div className="mb-3 flex items-center justify-between">
              <h3 className="font-semibold">Try it</h3>
              <button onClick={()=>setShowTest(false)} className="text-slate-400 hover:text-slate-700">✕</button>
            </div>
            <PreviewPanel draft={draft} allRules={allRules} />
          </div>
        </React.Fragment>
      )}
    </div>
  );
}

/* ============================================================ PREVIEW PANEL */
function PreviewPanel({ draft, allRules }){
  const [persona, setPersona] = useState(draft.scope.audience==="ALL"?"TECHNICIANS":draft.scope.audience);
  const [moment, setMoment]   = useState(draft.trigger.moment);
  const refFields = useMemo(() => {
    const s = new Set();
    if (draft.trigger.moment==="ON_FIELD_CHANGE") s.add(draft.trigger.fieldId);
    draft.blocks.forEach(b => flatConds(b).forEach(c => s.add(c.fieldId)));
    return [...s];
  }, [draft]);
  const [values, setValues] = useState({});
  const [result, setResult] = useState(null);

  const setVal = (id,v) => setValues(o=>({...o,[id]:v}));
  const run = () => setResult(simulate(draft, allRules, persona, values, moment));

  return (
    <div>
      <p className="mb-1.5 text-xs font-semibold uppercase tracking-wide text-slate-400">Preview &amp; Test</p>
      <div className="rounded-md border border-slate-200 p-3 space-y-2 text-sm">
        <div className="flex items-center gap-2">
          <span className="w-16 text-slate-500">Run as</span>
          <Select value={persona} onChange={setPersona} options={AUDIENCES.filter(a=>a.id!=="ALL").map(a=>({value:a.id,label:a.label}))} className="h-8 flex-1" />
        </div>
        <div className="flex items-center gap-2">
          <span className="w-16 text-slate-500">Moment</span>
          <Select value={moment} onChange={setMoment} options={MOMENTS.map(m=>({value:m.id,label:m.label}))} className="h-8 flex-1" />
        </div>
        <div className="border-t border-slate-100 pt-2">
          <p className="mb-1 text-xs font-medium text-slate-500">Test values</p>
          {refFields.length===0 && <p className="text-xs italic text-slate-400">No condition fields — rule always matches.</p>}
          {refFields.map(id=>(
            <div key={id} className="mb-1 flex items-center gap-2">
              <span className="w-24 text-xs text-slate-500">{fLabel(id)}</span>
              {fieldOf(id).options
                ? <Select value={values[id]||""} onChange={v=>setVal(id,v)} options={[{value:"",label:"—"},...fieldOf(id).options.map(o=>({value:o,label:o}))]} className="h-8 flex-1" />
                : <TextInput value={values[id]||""} onChange={v=>setVal(id,v)} type={fieldOf(id).type==="number"?"number":"text"} className="h-8 flex-1" />}
            </div>
          ))}
        </div>
        <Btn onClick={run} className="w-full">▷ Run simulation</Btn>

        {result && (
          <div className="border-t border-slate-100 pt-2 space-y-2">
            <p className="text-xs font-medium text-slate-500">Execution trace ({result.applicableCount} applicable rule{result.applicableCount!==1?"s":""})</p>
            <div className="space-y-1">
              {result.trace.filter(t=>t.matched).length===0 && <p className="text-xs italic text-slate-400">No blocks matched these values.</p>}
              {result.trace.filter(t=>t.matched).map((t,i)=>(
                <div key={i} className={cx("rounded px-2 py-1 text-xs", t.isDraft?"bg-indigo-50 text-indigo-800":"bg-slate-50 text-slate-600")}>
                  <span className="font-semibold">{t.isDraft?"This rule":"Rule "+t.ruleId.replace("rule_","#")}</span> · block {t.blockIndex+1} matched
                  <span className="block text-slate-500">→ {t.actions.map(actionPhrase).join("; ")}</span>
                </div>
              ))}
            </div>
            <p className="text-xs font-medium text-slate-500">Resulting form state</p>
            <div className="space-y-1">
              {Object.keys(result.state).map(fid=>{
                const s = result.state[fid];
                return (
                  <div key={fid} className="flex items-center gap-2 text-xs">
                    <span className={cx("inline-block h-2 w-2 rounded-full", s.visible?"bg-emerald-500":"bg-slate-300")} />
                    <span className="font-medium">{fLabel(fid)}</span>
                    <span className="text-slate-500">
                      {s.visible?"visible":"hidden"}{s.required?", required":""}{!s.enabled?", disabled":""}{s.value?`, = ${s.value}`:""}
                    </span>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ============================================================ VERSION SWITCHER */
const VERSIONS = [
  { id:"v1", label:"Version 1", note:"Sentence-first builder", href:"rule-studio-v1.html" },
  { id:"v2", label:"Version 2", note:"Structured form",        href:"rule-studio-demo.html" },
  { id:"v3", label:"Version 3", note:"Block workspace",        href:"rule-studio-v3.html" },
  { id:"v4", label:"Version 4", note:"Starter cards",          href:"rule-studio-v4.html" },
  { id:"v6", label:"Version 6", note:"Refined classic form",   href:"rule-studio-v6.html" },
  { id:"v7", label:"Version 7", note:"Progressive workspace",  href:"rule-studio-v7.html" },
  { id:"v8", label:"Version 8", note:"Guided form canvas",     href:"rule-studio-v8.html" },
  { id:"v9", label:"Version 9", note:"Rule sequence workspace", href:"rule-studio-v9.html" },
  { id:"v92", label:"Version 9.2", note:"Guided sequence editor", href:"rule-studio-v9-2.html" },
  { id:"v10", label:"Version 10", note:"Form Builder + Form Rules", href:"rule-studio-v10.html" },
  { id:"v11", label:"Version 11", note:"Field Rule Workspace", href:"rule-studio-v11.html" },
];
const currentVersionId = () => {
  const p = (typeof window!=="undefined" && window.location.pathname) || "";
  if (p.indexOf("v9-2") >= 0) return "v92";
  if (p.indexOf("v9") >= 0) return "v9";
  if (p.indexOf("v8") >= 0) return "v8";
  if (p.indexOf("v7") >= 0) return "v7";
  if (p.indexOf("v6") >= 0) return "v6";
  if (p.indexOf("v5") >= 0) return "v5";
  if (p.indexOf("v4") >= 0) return "v4";
  if (p.indexOf("v3") >= 0) return "v3";
  if (p.indexOf("v1") >= 0) return "v1";
  return "v2";
};
function VersionBar(){
  const [open,setOpen]=useState(false);
  const cur = currentVersionId();
  const curV = VERSIONS.find(v=>v.id===cur) || VERSIONS[1];
  return (
    <div className="flex shrink-0 items-center justify-between border-b border-slate-800 bg-slate-900 px-4 py-1.5 text-xs text-slate-300">
      <span className="font-semibold tracking-wide text-slate-100">Request Form Rules · Rule Studio</span>
      <div className="relative">
        <button onClick={()=>setOpen(o=>!o)} className="inline-flex items-center gap-2 rounded-md bg-slate-800 px-3 py-1 font-medium text-white hover:bg-slate-700">
          <span className="inline-block h-1.5 w-1.5 rounded-full bg-emerald-400" />
          {curV.label} · {curV.note}
          <span className="opacity-60">▾</span>
        </button>
        {open && (
          <React.Fragment>
            <div className="fixed inset-0 z-40" onClick={()=>setOpen(false)} />
            <div className="absolute right-0 z-50 mt-1 w-60 overflow-hidden rounded-lg border border-slate-200 bg-white p-1 text-slate-700 shadow-xl">
              <p className="px-2 py-1 text-[11px] uppercase tracking-wide text-slate-400">Switch version</p>
              {VERSIONS.map(v=>(
                <a key={v.id} href={v.href}
                   className={cx("flex items-center justify-between rounded px-2 py-2 text-sm hover:bg-slate-100", v.id===cur && "bg-slate-50")}>
                  <span><span className="font-medium">{v.label}</span><span className="block text-xs text-slate-400">{v.note}</span></span>
                  {v.id===cur && <span className="text-xs font-medium text-emerald-600">current</span>}
                </a>
              ))}
            </div>
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

/* ============================================================ APP */
/* ============================================================ MODE (Guided / Example) */
function ModeBar({ mode, onChange }){
  const guided = mode!=="example";
  return (
    <div className="flex shrink-0 flex-wrap items-center gap-3 border-b border-slate-200 bg-white px-8 py-2.5">
      <div className="inline-flex rounded-full border border-slate-200 bg-slate-100 p-0.5 text-sm">
        {[["example","Example"],["guided","Guided"]].map(([id,label])=>(
          <button key={id} onClick={()=>onChange(id)}
            className={cx("rounded-full px-4 py-1.5 font-medium transition-colors",
              (id==="guided")===guided ? "bg-white text-sky-700 shadow-sm" : "text-slate-500 hover:text-slate-700")}>
            {label}
          </button>
        ))}
      </div>
      <span className="text-xs text-slate-500">
        {guided
          ? <React.Fragment><span className="font-semibold text-slate-700">Guided</span> · Start empty and build your own rule step by step.</React.Fragment>
          : <React.Fragment><span className="font-semibold text-amber-700">Example</span> · Loaded sample rule for demonstration.</React.Fragment>}
      </span>
    </div>
  );
}
function GuidedEmptyState({ mode, onCreate }){
  return (
    <div className="mt-8 flex flex-col items-center justify-center rounded-2xl border border-dashed border-slate-300 bg-slate-50/60 px-6 py-16 text-center">
      <div className="flex h-14 w-14 items-center justify-center rounded-2xl bg-sky-100 text-2xl text-sky-600">✎</div>
      <h2 className="mt-4 text-lg font-bold text-slate-800">Start building a rule</h2>
      <p className="mt-1 max-w-md text-sm text-slate-500">Start empty and build your own rule step by step. Nothing is pre-filled — you choose what to control.</p>
      <ol className="mt-5 grid max-w-xl gap-2 text-left text-sm text-slate-600 sm:grid-cols-3">
        <li className="rounded-lg border border-slate-200 bg-white px-3 py-2"><span className="font-semibold text-slate-700">1.</span> Choose what you want to control</li>
        <li className="rounded-lg border border-slate-200 bg-white px-3 py-2"><span className="font-semibold text-slate-700">2.</span> Add your first behavior</li>
        <li className="rounded-lg border border-slate-200 bg-white px-3 py-2"><span className="font-semibold text-slate-700">3.</span> Use the helper text to learn what's next</li>
      </ol>
      <button onClick={onCreate} className="mt-6 h-11 rounded-full bg-sky-500 px-6 text-sm font-semibold text-white shadow-sm hover:bg-sky-600">Start building a rule</button>
      <p className="mt-3 text-xs text-slate-400">Want to see a finished example instead? Switch to <span className="font-semibold text-slate-500">Example</span> mode above.</p>
    </div>
  );
}

function App(){
  const [mode, setMode] = useState("example");                // "example" = sample loaded (default) · "guided" = empty start
  const [rules, setRules] = useState(SEED);                   // example default: sample rules loaded
  const [view, setView] = useState({ screen:"list" }); // {screen:'studio', id|null}
  const switchMode = m => { setMode(m); setRules(m==="example" ? SEED : []); setView({ screen:"list" }); };

  const startCreate = () => setView({ screen:"studio", rule:newRule(), isNew:true });
  const startEdit = id => setView({ screen:"studio", rule:rules.find(r=>r.id===id), isNew:false });
  const cancel = () => setView({ screen:"list" });
  const save = draft => {
    setRules(rs => rs.some(r=>r.id===draft.id) ? rs.map(r=>r.id===draft.id?draft:r) : [...rs, draft]);
    setView({ screen:"list" });
  };

  return (
    <div className="flex h-screen flex-col">
      <VersionBar />
      {view.screen!=="studio" && <ModeBar mode={mode} onChange={switchMode} />}
      {view.screen==="studio"
        ? <RuleStudio initial={view.rule} isNew={view.isNew} allRules={rules} onCancel={cancel} onSave={save} />
        : <div className="flex-1 overflow-y-auto"><RulesList rules={rules} setRules={setRules} onCreate={startCreate} onEdit={startEdit} mode={mode} /></div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<!-- self-compile safety net: prints the exact Babel error on screen if the app fails to compile (silent on success) -->
<script>
(function(){
  function check(){
    var root = document.getElementById("root");
    if (root && root.children.length) return; // rendered fine
    try {
      var s = document.querySelector('script[type="text/babel"]');
      if (s && window.Babel) Babel.transform(s.textContent, { presets:["react"] });
    } catch(err){
      var pre = document.createElement("pre");
      pre.style.cssText = "white-space:pre-wrap;background:#fff1f2;color:#9f1239;padding:14px 16px;margin:0;font:13px/1.5 ui-monospace,Menlo,Consolas,monospace;border-bottom:3px solid #e11d48;";
      pre.textContent = "⚠ Rule Studio failed to compile:\n\n" + (err && err.message ? err.message : String(err));
      document.body.insertBefore(pre, document.body.firstChild);
    }
  }
  setTimeout(check, 1500);
})();
</script>
