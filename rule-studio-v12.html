  if (OPS_NOVALUE.indexOf(c.op) >= 0) return f + " " + (OP_PHRASE[c.op] || "is set");
  const v = Array.isArray(c.value) ? c.value.join(" / ") : c.value;
  return f + " " + (OP_PHRASE[c.op] || "is") + " " + (v || "a value");
};
const actionPhrase = a => {
  const f = labelOf(a.fieldId);
  if (a.behavior==="Show") return "show " + f;
  if (a.behavior==="Hide") return "hide " + f;
  if (a.behavior==="Mandate") return "make " + f + " mandatory";
  if (a.behavior==="Non-Mandate") return "make " + f + " optional";
  if (a.behavior==="Enable") return "enable " + f;
  if (a.behavior==="Disable") return "disable " + f;
  if (a.behavior==="Set Value") return "set " + f + (a.value ? " to " + a.value : "");
  if (a.behavior==="Clear Value") return "clear " + f;
  if (a.behavior==="Filter Data") return "filter the options for " + f;
  return (a.behavior || "update") + " " + f;
};
function summarize(rule){
  const conds = (rule.conditions || []).filter(c=>c.fieldId);
  const acts  = (rule.actions || []).filter(a=>a.fieldId);
  if (!acts.length) return "Add an action to describe what this rule does.";
  const condText = conds.length ? "when " + conds.map(condPhrase).join(" and ") + ", " : "";
  const actText  = acts.map(actionPhrase).join(", and ");
  const aud = (rule.audience && rule.audience !== "Everyone") ? " for " + rule.audience : "";
  return cap(condText + actText + aud) + ".";
}

const fieldsOfRule = r => {
  const s = [];
  (r.conditions || []).forEach(c=> { if (c.fieldId && s.indexOf(c.fieldId) < 0) s.push(c.fieldId); });
  (r.actions || []).forEach(a=> { if (a.fieldId && s.indexOf(a.fieldId) < 0) s.push(a.fieldId); });
  return s;
};
const affectedFields = r => {
  const s = [];
  (r.actions || []).forEach(a=> { if (a.fieldId && s.indexOf(a.fieldId) < 0) s.push(a.fieldId); });
  return s;
};
const ruleUsesField = (r, fieldId) => fieldsOfRule(r).indexOf(fieldId) >= 0;
// Role-specific relevance: rules that already use the field as a condition / as an action target.
const condRulesFor = fieldId => RULE_DB.filter(r=> (r.conditions||[]).some(c=> c.fieldId===fieldId));
const actRulesFor  = fieldId => RULE_DB.filter(r=> (r.actions||[]).some(a=> a.fieldId===fieldId));
const ruleList   = fieldId => RULE_DB.filter(r=> ruleUsesField(r, fieldId));
const ruleCount  = fieldId => ruleList(fieldId).length;
const totalRules = () => RULE_DB.length;
const coveredFields = () => ALL_FIELDS.filter(f=> ruleCount(f.id) > 0).length;

function summarizeBlock(block, people){

function RuleEditor({fieldId, dir, baseRule, onClose, onSaved}){

    const fieldAct  = {behavior:"Mandate", fieldId, value:"", _new:true};

      const block = { match:"all", advanced:!!baseRule.advanced, advOpen:false,
        conditions: baseRule.conditions.map(c=>({...c})), actions: baseRule.actions.map(a=>({...a})) };
      if (dir==="condition") block.conditions.push(fieldCond); else block.actions.push(fieldAct);

      name: "",
      time: dir==="condition" ? "When a field changes" : "While the form is filled",
      requests: "All requests",
      people: "Everyone",

        actions: dir==="action" ? [fieldAct] : [] }],
    };
  }, [baseRule, dir, fieldId]);
  const [draft, setDraft] = useState(init);
  const [saved, setSaved] = useState(false);
  const fieldOpts = ALL_FIELDS.map(f=>({value:f.id, label:f.label}));

  const rmBlock = i => setDraft(d=>({...d, blocks: d.blocks.filter((_,j)=>j!==i)}));
  const addBlock = () => setDraft(d=>({...d, blocks:[...d.blocks, {match:"all", advanced:false, advOpen:false, conditions:[], actions:[]}]}));
  const summary = summarizeRule(draft);
  const canSave = draft.blocks.some(b=> b.actions.some(a=>a.fieldId));
  const save = () => { setSaved(true); setTimeout(()=>{ onSaved && onSaved(); }, 750); };
  return (
    <div>
      <input value={draft.name} onChange={e=>patch({name:e.target.value})} placeholder="Name this rule"
        className="w-full h-11 rounded-lg border border-slate-200 px-3.5 text-[15px] font-semibold outline-none focus:ring-2 focus:ring-sky-100 focus:border-sky-300 mb-4"/>
      <div className="rounded-2xl border border-slate-200 bg-white p-4 mb-4">
        <h4 className="text-[14px] font-semibold text-slate-800">When should this happen?</h4>
        <p className="text-[12px] text-slate-400 mb-2.5">Choose when this behavior should take effect.</p>

          <GuidedDropdown variant="pill" value={draft.time} onChange={v=>patch({time:v})} options={WHENS} guide={WHEN_GUIDE} placeholder="Choose a time"/>
          <GuidedDropdown variant="pill" value={draft.requests} onChange={v=>patch({requests:v})} options={REQUESTS} guide={REQ_GUIDE} placeholder="Which requests"/>
        </div>
        <div className="border-t border-slate-100 my-3.5"/>
        <h4 className="text-[14px] font-semibold text-slate-800">Who should this affect?</h4>
        <p className="text-[12px] text-slate-400 mb-2.5">Pick who this rule applies to.</p>
        <GuidedDropdown variant="pill" value={draft.people} onChange={v=>patch({people:v})} options={AUDS} guide={AUD_GUIDE} placeholder="Choose people"/>
      </div>
      <div className="space-y-3">
        {draft.blocks.map((b,i)=>
          <V9Block key={i} block={b} index={i} total={draft.blocks.length} people={draft.people} fieldOpts={fieldOpts}
            onChange={p=>setBlock(i,p)} onDuplicate={()=>dupBlock(i)} onRemove={()=>rmBlock(i)}/>)}
      </div>

        className="mt-3 w-full inline-flex items-center justify-center gap-1.5 h-11 rounded-xl border border-dashed border-slate-300 text-[13.5px] font-medium text-slate-500 hover:border-sky-300 hover:text-[#1180c1] hover:bg-sky-50/40 transition">
        <Ico name="plus" size={15}/> Add another rule block
      </button>
      <div className="mt-4 rounded-lg bg-slate-50 ring-1 ring-slate-200 px-3.5 py-3">
        <div className="text-[10.5px] font-semibold uppercase tracking-wider text-slate-400 mb-1 flex items-center gap-1.5"><Ico name="info" size={12}/> In plain English</div>
        <p className="text-[13.5px] text-slate-700 leading-snug">{summary}</p>
      </div>

          className={"h-9 px-5 rounded-md text-[13px] font-medium text-white transition " + (canSave ? "" : "opacity-50 cursor-not-allowed")}
          style={{background: saved ? "#16a34a" : BRAND}}>

  );

// The field-centric rule workspace: execution tabs · default entry · existing block stack.
function FieldWorkspace({field, clipboard, onCopy, onClose}){
  const lbl = labelOf(field);
  const seq = useRef(1);
  const nid = () => "v11-" + (seq.current++);
  const seed = useMemo(()=> ruleList(field).map(r=>({
    id: r.id, origin:"existing", linkedId:null, exec: ruleExec(r.id), expanded:false,
    name: r.name, time: r.when, requests: r.requests || "All requests", people: r.audience, match:"all",
    conditions: r.conditions.map(c=>({...c})), actions: r.actions.map(a=>({...a})), advanced: !!r.advanced, advOpen:false,
  })), [field]);
  const [blocks, setBlocks] = useState(seed);
  const [tab, setTab] = useState(()=> { for (let i=0;i<EXEC_TABS.length;i++){ if (seed.some(b=>b.exec===EXEC_TABS[i].k)) return EXEC_TABS[i].k; } return "new"; });
  const [toast, setToast] = useState("");
  useEffect(()=>{ if(!toast) return; const t=setTimeout(()=>setToast(""), 3200); return ()=>clearTimeout(t); }, [toast]);
  const [saving, setSaving] = useState(false);
  const save = () => { setSaving(true); setTimeout(onClose, 650); };

  const counts = { new:0, existing:0, both:0 };
  blocks.forEach(b=> { counts[b.exec] = (counts[b.exec]||0) + 1; });
  const visible = blocks.filter(b=> b.exec===tab);

  const setBlock = (id,p)=> setBlocks(bs=> bs.map(b=> b.id===id ? {...b, ...p} : b));
  const removeBlock = id => setBlocks(bs=> bs.filter(b=> b.id!==id));
  const dupBlock = id => setBlocks(bs=> {
    const i = bs.findIndex(b=>b.id===id); if (i<0) return bs;
    const src = bs[i];
    const copy = {...src, id:nid(), origin:"new", linkedId:null, expanded:false, name:(src.name || "Rule block") + " (copy)",
      conditions: src.conditions.map(c=>({...c})), actions: src.actions.map(a=>({...a}))};
    const out = bs.slice(); out.splice(i+1, 0, copy); return out;
  });
  const addNew = () => {
    const nb = { id:nid(), origin:"new", linkedId:null, exec:tab, expanded:true,
      name:"", time:"", requests:"All requests", people:"Everyone", match:"all",
      conditions:[], actions:[{behavior:"", fieldId:field, value:"", _new:true}], advanced:false, advOpen:false };
    setBlocks(bs=> [nb, ...bs]);
  };
  // Paste = a direct action: drop the copied rule in as a new block (expanded, with an inline preview).
  const pasteNow = () => {
    if (!clipboard){ setToast("Copy a rule from a block first, then Paste to reuse it."); return; }
    const b = clipboard.block;
    const nb = { id:nid(), origin:"copied", linkedId:(RULE_DB.some(x=>x.id===clipboard.id) ? clipboard.id : null),
      copiedFrom:clipboard.fromField, copiedRule:clipboard.name, reuseOn:lbl, exec:tab, expanded:true,
      name:clipboard.name, time:b.time, requests:b.requests, people:b.people, match:b.match,
      conditions:b.conditions.map(c=>({...c})), actions:b.actions.map(a=>({...a})), advanced:b.advanced, advOpen:false };
    setBlocks(bs=> [nb, ...bs]);
  };
  const copyBlock = (block) => {
    const b = { time:block.time, requests:block.requests, people:block.people, match:block.match,
      conditions: block.conditions.map(c=>({...c})), actions: block.actions.map(a=>({...a})), advanced:!!block.advanced };
    onCopy({ id: block.id, name: block.name || "Untitled rule", fromField: lbl, block: b });
    setToast("Copied “" + (block.name || "Untitled rule") + "” — open another field and Paste to reuse it.");
  };

  return (
    <>
      <div className="fixed inset-0 z-40 bg-slate-900/10" onMouseDown={onClose}/>
      <aside className="fixed top-0 right-0 z-50 h-full w-[620px] max-w-[94vw] bg-white shadow-2xl border-l border-slate-200 flex flex-col v10-drawer">
        <div className="px-5 py-4 border-b border-slate-100 flex items-start justify-between gap-3 shrink-0">
          <div className="min-w-0">
            <div className="flex items-center gap-2">
              <span className="w-7 h-7 rounded-md bg-sky-50 text-[#1593d4] grid place-items-center shrink-0"><Ico name="flag" size={15}/></span>
              <h3 className="text-[16px] font-semibold text-slate-800 truncate">{lbl} — Rules</h3>
            </div>
            <p className="text-[12px] text-slate-400 mt-1">Manage the rule blocks that apply to this field.</p>
          </div>
          <button onClick={onClose} className="w-8 h-8 grid place-items-center rounded-md text-slate-400 hover:bg-slate-100 hover:text-slate-600 shrink-0" title="Close"><Ico name="x" size={17}/></button>
        </div>
        <div className="flex gap-1 px-3 py-2 border-b border-slate-100 bg-slate-50/60 shrink-0">
          {EXEC_TABS.map(t=>
            <button key={t.k} onClick={()=>setTab(t.k)} title={t.label}
              className={"flex-1 h-9 rounded-lg text-[12.5px] font-medium transition inline-flex items-center justify-center gap-1.5 " + (tab===t.k ? "bg-white text-[#1180c1] ring-1 ring-sky-200 shadow-sm" : "text-slate-500 hover:bg-white/70")}>
              {t.label}
              {counts[t.k]>0 && <span className={"text-[10px] rounded-full px-1.5 font-bold " + (tab===t.k ? "bg-sky-100 text-[#1180c1]" : "bg-slate-200 text-slate-500")}>{counts[t.k]}</span>}
            </button>)}
        </div>
        <div className="flex-1 overflow-y-auto px-5 py-4 space-y-4">
          {toast && <div className="rounded-lg bg-emerald-50 ring-1 ring-emerald-200 text-emerald-700 text-[12px] px-3 py-2 flex items-center gap-2"><Ico name="check" size={13}/>{toast}</div>}
          <div className="rounded-xl border border-slate-200 bg-gradient-to-br from-sky-50/70 to-white p-3.5">
            <div className="text-[12px] font-semibold text-slate-700 mb-2">Add a rule for {lbl}</div>
            <div className="flex gap-2 flex-wrap">
              <button onClick={addNew} className="inline-flex items-center gap-1.5 h-9 px-3.5 rounded-lg text-[13px] font-medium text-white shadow-sm" style={{background:BRAND}}>
                <Ico name="plus" size={15}/> Add new block
              </button>
              <button onClick={pasteNow}
                className="relative inline-flex items-center gap-1.5 h-9 px-3.5 rounded-lg text-[13px] font-medium border transition border-slate-200 bg-white text-slate-600 hover:border-slate-300">
                <Ico name="clipboard" size={14}/> Paste rule
                {clipboard && <span className="absolute -top-1 -right-1 w-2.5 h-2.5 rounded-full bg-violet-500 ring-2 ring-white" title="A copied rule is ready to paste"/>}
              </button>
            </div>
          </div>
          <div>
            <div className="flex items-center justify-between mb-2">
              <h4 className="text-[13px] font-semibold text-slate-700">Rules on {lbl} · {execLabel(tab)}</h4>
              <span className="text-[11px] text-slate-400">{visible.length} block{visible.length===1?"":"s"}</span>
            </div>
            <div className="space-y-2.5">
              {visible.length===0 &&
                <div className="rounded-xl border border-dashed border-slate-200 bg-slate-50/60 px-4 py-8 text-center text-[12.5px] text-slate-400">No rule blocks for {execLabel(tab).toLowerCase()} yet. Add one above.</div>}
              {visible.map(b=> b.expanded
                ? <V11Block key={b.id} block={b} onCopy={()=>copyBlock(b)} onToggle={()=>setBlock(b.id,{disabled:!b.disabled})} onChange={p=>setBlock(b.id,p)} onDuplicate={()=>dupBlock(b.id)} onRemove={()=>removeBlock(b.id)}/>
                : <V11BlockCard key={b.id} block={b} onCopy={()=>copyBlock(b)} onToggle={()=>setBlock(b.id,{disabled:!b.disabled})} onExpand={()=>setBlock(b.id,{expanded:true})} onDuplicate={()=>dupBlock(b.id)} onRemove={()=>removeBlock(b.id)}/>)}
            </div>
          </div>
        </div>
        <div className="shrink-0 border-t border-slate-200 px-5 py-3 flex items-center justify-between gap-2 bg-white">
          <span className="text-[11.5px] text-slate-400">{blocks.length} rule block{blocks.length===1?"":"s"} on {lbl}</span>
          <div className="flex items-center gap-2">
            <button onClick={onClose} className="h-9 px-4 rounded-md text-[13px] font-medium text-slate-600 border border-slate-200 bg-white hover:bg-slate-50 transition">Cancel</button>
            <button onClick={save} className="h-9 px-5 rounded-md text-[13px] font-medium text-white transition" style={{background: saving ? "#16a34a" : BRAND}}>{saving ? "Saved ✓" : "Save"}</button>
          </div>
        </div>
      </aside>
    </>
  );
}

// V12 — bulk workspace: one familiar sidebar, an accordion per selected field; Add/Paste apply to every field
// (each field keeps its own editable copy underneath). Reuses the exact V11.2 block UI inside each accordion.
function BulkFieldWorkspace({fields, clipboard, onCopy, onClose}){
  const seq = useRef(1);
  const nid = () => "v12-" + (seq.current++);
  // Seed each selected field with its own block list (field-specific data underneath one bulk session).
  const seed = useMemo(()=>{
    const m = {};
    fields.forEach(fid=>{
      m[fid] = ruleList(fid).map(r=>({
        id: r.id, origin:"existing", linkedId:null, exec: ruleExec(r.id), expanded:false,
        name: r.name, time: r.when, requests: r.requests || "All requests", people: r.audience, match:"all",
        conditions: r.conditions.map(c=>({...c})), actions: r.actions.map(a=>({...a})), advanced: !!r.advanced, advOpen:false,
      }));
    });
    return m;
  }, [fields]);
  const [data, setData] = useState(seed);
  // V12 refinement: keep every field accordion collapsed by default (no auto-expand on open).
  const [open, setOpen] = useState({});
  // Restored top-level execution tabs (same model as the V11.2 sidebar); default to the first tab that has rules.
  const [tab, setTab] = useState(()=>{ for(let i=0;i<EXEC_TABS.length;i++){ if(fields.some(fid=> (seed[fid]||[]).some(b=>b.exec===EXEC_TABS[i].k))) return EXEC_TABS[i].k; } return "new"; });
  const [shared, setShared] = useState([]);   // one shared pasted-rule representation across all selected fields
  const [toast, setToast] = useState("");
  useEffect(()=>{ if(!toast) return; const t=setTimeout(()=>setToast(""), 3200); return ()=>clearTimeout(t); }, [toast]);
  const [saving, setSaving] = useState(false);
  const save = () => { setSaving(true); setTimeout(onClose, 650); };

  const totalBlocks = fields.reduce((n,fid)=> n + ((data[fid]||[]).length), 0);
  const visibleTotal = fields.reduce((n,fid)=> n + ((data[fid]||[]).filter(b=>b.exec===tab).length), 0);
  const allOpen = fields.every(fid=> open[fid]);
  const counts = { new:0, existing:0, both:0 };
  fields.forEach(fid=> (data[fid]||[]).forEach(b=> { counts[b.exec] = (counts[b.exec]||0) + 1; }));

  const setBlock = (fid,id,p)=> setData(d=> ({...d, [fid]: d[fid].map(b=> b.id===id ? {...b, ...p} : b)}));
  const removeBlock = (fid,id)=> setData(d=> ({...d, [fid]: d[fid].filter(b=> b.id!==id)}));
  const dupBlock = (fid,id)=> setData(d=>{
    const arr = d[fid]; const i = arr.findIndex(b=>b.id===id); if(i<0) return d;
    const src = arr[i];
    const copy = {...src, id:nid(), origin:"new", linkedId:null, expanded:false, name:(src.name || "Rule block") + " (copy)",
      conditions: src.conditions.map(c=>({...c})), actions: src.actions.map(a=>({...a}))};
    const out = arr.slice(); out.splice(i+1, 0, copy); return {...d, [fid]:out};
  });
  const copyBlock = (fid, block)=>{
    const b = { time:block.time, requests:block.requests, people:block.people, match:block.match,
      conditions: block.conditions.map(c=>({...c})), actions: block.actions.map(a=>({...a})), advanced:!!block.advanced };
    onCopy({ id: block.id, name: block.name || "Untitled rule", fromField: labelOf(fid), block: b });
    setToast("Copied “" + (block.name || "Untitled rule") + "” — Paste to reuse it on other fields.");
  };
  // Shared pasted-rule block (one representation across all selected fields).
  const updShared = (id,p)=> setShared(s=> s.map(b=> b.id===id ? {...b, ...p} : b));
  const rmShared  = id => setShared(s=> s.filter(b=> b.id!==id));
  const dupShared = id => setShared(s=>{
    const i = s.findIndex(b=>b.id===id); if(i<0) return s;
    const src = s[i]; const c = {...src, id:nid(), name:(src.name || "Rule block") + " (copy)",
      conditions: src.conditions.map(x=>({...x})), actions: src.actions.map(x=>({...x}))};
    const o = s.slice(); o.splice(i+1, 0, c); return o;
  });
  const copyShared = (block)=>{
    const b = { time:block.time, requests:block.requests, people:block.people, match:block.match,
      conditions: block.conditions.map(c=>({...c})), actions: block.actions.map(a=>({...a})), advanced:!!block.advanced };
    onCopy({ id: block.id, name: block.name || "Untitled rule", fromField: fields.length + " selected fields", block: b });
    setToast("Copied “" + (block.name || "Untitled rule") + "”.");
  };
  // SHARED bulk actions — apply to every selected field, each getting its own editable instance.
  const expandAllFields = () => setOpen(()=>{ const o={}; fields.forEach(fid=> o[fid]=true); return o; });
  const addNewAll = () => {
    setData(d=>{
      const nd = {...d};
      fields.forEach(fid=>{
        const nb = { id:nid(), origin:"new", linkedId:null, exec:tab, expanded:true,
          name:"", time:"", requests:"All requests", people:"Everyone", match:"all",
          conditions:[], actions:[{behavior:"", fieldId:fid, value:"", _new:true}], advanced:false, advOpen:false };
        nd[fid] = [nb, ...(d[fid]||[])];
      });
      return nd;
    });
    expandAllFields();
    setToast("Added a new rule block to all " + fields.length + " fields.");
  };
  // Paste in bulk = ONE shared representation that lists the affected fields (not a copy per field).
  const pasteAll = () => {
    if(!clipboard){ setToast("Copy a rule from a block first, then Paste to reuse it on all selected fields."); return; }
    const cb = clipboard.block;
    const nb = { id:nid(), origin:"copied", linkedId:(RULE_DB.some(x=>x.id===clipboard.id) ? clipboard.id : null),
      copiedFrom:clipboard.fromField, copiedRule:clipboard.name, reuseOn:"all selected fields", bulkShared:true, exec:tab, expanded:true,
      name:clipboard.name, time:cb.time, requests:cb.requests, people:cb.people, match:cb.match,
      conditions:cb.conditions.map(c=>({...c})), actions:cb.actions.map(a=>({...a})), advanced:cb.advanced, advOpen:false };
    setShared(s=> [nb, ...s]);
    setToast("Pasted “" + clipboard.name + "” — one shared rule affecting all " + fields.length + " fields.");
  };
  const toggleAll = () => allOpen
    ? setOpen(()=>{ const o={}; fields.forEach(fid=> o[fid]=false); return o; })
    : expandAllFields();

  return (
    <>
      <div className="fixed inset-0 z-40 bg-slate-900/10" onMouseDown={onClose}/>
      <aside className="fixed top-0 right-0 z-50 h-full w-[620px] max-w-[94vw] bg-white shadow-2xl border-l border-slate-200 flex flex-col v10-drawer">
        <div className="px-5 py-4 border-b border-slate-100 flex items-start justify-between gap-3 shrink-0">
          <div className="min-w-0">
            <div className="flex items-center gap-2">
              <span className="w-7 h-7 rounded-md bg-sky-50 text-[#1593d4] grid place-items-center shrink-0"><Ico name="layers" size={15}/></span>
              <h3 className="text-[16px] font-semibold text-slate-800 truncate">Configure {fields.length} fields</h3>
            </div>
            <p className="text-[12px] text-slate-400 mt-1">Add or paste a rule once — it applies to every selected field. Expand a field to fine-tune its own copy.</p>
          </div>
          <button onClick={onClose} className="w-8 h-8 grid place-items-center rounded-md text-slate-400 hover:bg-slate-100 hover:text-slate-600 shrink-0" title="Close"><Ico name="x" size={17}/></button>
        </div>
        {/* Selected fields stay visible in context */}
        <div className="flex items-center gap-1.5 flex-wrap px-5 py-2.5 border-b border-slate-100 bg-slate-50/60 shrink-0">
          <span className="text-[11px] font-semibold uppercase tracking-wider text-slate-400 mr-0.5">Affecting</span>
          {fields.map(fid=>
            <span key={fid} className="inline-flex items-center gap-1 rounded-full bg-white ring-1 ring-slate-200 text-slate-600 text-[11.5px] px-2 py-0.5">
              {labelOf(fid)}<span className="text-slate-300">·</span><span className="text-slate-400">{(data[fid]||[]).length}</span>
            </span>)}
        </div>
        <div className="flex gap-1 px-3 py-2 border-b border-slate-100 bg-slate-50/60 shrink-0">
          {EXEC_TABS.map(t=>
            <button key={t.k} onClick={()=>setTab(t.k)} title={t.label}
              className={"flex-1 h-9 rounded-lg text-[12.5px] font-medium transition inline-flex items-center justify-center gap-1.5 " + (tab===t.k ? "bg-white text-[#1180c1] ring-1 ring-sky-200 shadow-sm" : "text-slate-500 hover:bg-white/70")}>
              {t.label}
              {counts[t.k]>0 && <span className={"text-[10px] rounded-full px-1.5 font-bold " + (tab===t.k ? "bg-sky-100 text-[#1180c1]" : "bg-slate-200 text-slate-500")}>{counts[t.k]}</span>}
            </button>)}
        </div>
        <div className="flex-1 overflow-y-auto px-5 py-4 space-y-4">
          {toast && <div className="rounded-lg bg-emerald-50 ring-1 ring-emerald-200 text-emerald-700 text-[12px] px-3 py-2 flex items-center gap-2"><Ico name="check" size={13}/>{toast}</div>}
          <div className="rounded-xl border border-slate-200 bg-gradient-to-br from-sky-50/70 to-white p-3.5">
            <div className="text-[12px] font-semibold text-slate-700 mb-2">Add a rule to all {fields.length} selected fields</div>
            <div className="flex gap-2 flex-wrap">
              <button onClick={addNewAll} className="inline-flex items-center gap-1.5 h-9 px-3.5 rounded-lg text-[13px] font-medium text-white shadow-sm" style={{background:BRAND}}>
                <Ico name="plus" size={15}/> Add new block
              </button>
              <button onClick={pasteAll}
                className="relative inline-flex items-center gap-1.5 h-9 px-3.5 rounded-lg text-[13px] font-medium border transition border-slate-200 bg-white text-slate-600 hover:border-slate-300">
                <Ico name="clipboard" size={14}/> Paste rule
                {clipboard && <span className="absolute -top-1 -right-1 w-2.5 h-2.5 rounded-full bg-violet-500 ring-2 ring-white" title="A copied rule is ready to paste"/>}
              </button>
            </div>
            <p className="text-[11px] text-slate-400 mt-2">“Add new block” gives each field its own editable copy. “Paste rule” adds one shared rule across all selected fields.</p>
          </div>
          {shared.length>0 &&
            <div>
              <h4 className="text-[13px] font-semibold text-slate-700 mb-2">Pasted rule{shared.length>1?"s":""} — applies to all {fields.length} selected fields</h4>
              <div className="space-y-2.5">
                {shared.map(b=>
                  <div key={b.id}>
                    <div className="flex items-center gap-1.5 flex-wrap mb-1.5">
                      <span className="text-[11px] font-semibold uppercase tracking-wider text-violet-500 mr-0.5">Affecting</span>
                      {fields.map(fid=> <span key={fid} className="rounded-full bg-violet-50 ring-1 ring-violet-200 text-violet-700 text-[11px] px-2 py-0.5">{labelOf(fid)}</span>)}
                    </div>
                    {b.expanded
                      ? <V11Block block={b} onCopy={()=>copyShared(b)} onToggle={()=>updShared(b.id,{disabled:!b.disabled})} onChange={p=>updShared(b.id,p)} onDuplicate={()=>dupShared(b.id)} onRemove={()=>rmShared(b.id)}/>
                      : <V11BlockCard block={b} onCopy={()=>copyShared(b)} onToggle={()=>updShared(b.id,{disabled:!b.disabled})} onExpand={()=>updShared(b.id,{expanded:true})} onDuplicate={()=>dupShared(b.id)} onRemove={()=>rmShared(b.id)}/>}
                  </div>)}
              </div>
            </div>}
          <div>
            <div className="flex items-center justify-between mb-2">
              <h4 className="text-[13px] font-semibold text-slate-700">Fields · {visibleTotal} rule block{visibleTotal===1?"":"s"}</h4>
              <button onClick={toggleAll} className="text-[11.5px] text-slate-500 hover:text-[#1180c1] font-medium">{allOpen ? "Collapse all" : "Expand all"}</button>
            </div>
            <div className="space-y-2.5">
              {fields.map(fid=>{
                const blocks = (data[fid] || []).filter(b=> b.exec===tab);
                const isOpen = !!open[fid];
                const has = blocks.length>0;
                return (
                  <div key={fid} className="rounded-xl border border-slate-200 bg-white">
                    <button onClick={()=>setOpen(o=>({...o,[fid]:!o[fid]}))} className="w-full flex items-center gap-2.5 px-3.5 py-3 text-left">
                      <Ico name="chevdown" size={16} cls={"text-slate-400 transition shrink-0 " + (isOpen ? "" : "-rotate-90")}/>
                      <span className="w-7 h-7 rounded-md bg-sky-50 text-[#1593d4] grid place-items-center shrink-0"><Ico name="flag" size={14}/></span>
                      <span className="flex-1 min-w-0">
                        <span className="block text-[13.5px] font-semibold text-slate-800 truncate">{labelOf(fid)}</span>
                        <span className="block text-[11.5px] text-slate-400">{blocks.length} rule block{blocks.length===1?"":"s"}</span>
                      </span>
                      {has
                        ? <span className="inline-flex items-center gap-1 text-[11px] rounded-full bg-emerald-50 text-emerald-600 ring-1 ring-emerald-200 px-2 py-0.5 shrink-0"><span className="w-1.5 h-1.5 rounded-full bg-emerald-500"/>Has rules</span>
                        : <span className="text-[11px] rounded-full bg-slate-100 text-slate-400 px-2 py-0.5 shrink-0">No rules yet</span>}
                    </button>
                    {isOpen &&
                      <div className="px-3.5 pb-3.5 pt-1 space-y-2.5 border-t border-slate-100">
                        {blocks.length===0 &&
                          <div className="rounded-lg border border-dashed border-slate-200 bg-slate-50/60 px-4 py-6 text-center text-[12.5px] text-slate-400 mt-2.5">No rule blocks for this scope yet. Use “Add new block” above to add an editable copy to every selected field.</div>}
                        {blocks.map(b=> b.expanded
                          ? <V11Block key={b.id} block={b} onCopy={()=>copyBlock(fid,b)} onToggle={()=>setBlock(fid,b.id,{disabled:!b.disabled})} onChange={p=>setBlock(fid,b.id,p)} onDuplicate={()=>dupBlock(fid,b.id)} onRemove={()=>removeBlock(fid,b.id)}/>
                          : <V11BlockCard key={b.id} block={b} onCopy={()=>copyBlock(fid,b)} onToggle={()=>setBlock(fid,b.id,{disabled:!b.disabled})} onExpand={()=>setBlock(fid,b.id,{expanded:true})} onDuplicate={()=>dupBlock(fid,b.id)} onRemove={()=>removeBlock(fid,b.id)}/>)}
                      </div>}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
        <div className="shrink-0 border-t border-slate-200 px-5 py-3 flex items-center justify-between gap-2 bg-white">
          <span className="text-[11.5px] text-slate-400">{totalBlocks} rule block{totalBlocks===1?"":"s"} across {fields.length} fields{shared.length ? " · " + shared.length + " shared" : ""}</span>
          <div className="flex items-center gap-2">
            <button onClick={onClose} className="h-9 px-4 rounded-md text-[13px] font-medium text-slate-600 border border-slate-200 bg-white hover:bg-slate-50 transition">Cancel</button>
            <button onClick={save} className="h-9 px-5 rounded-md text-[13px] font-medium text-white transition" style={{background: saving ? "#16a34a" : BRAND}}>{saving ? "Saved ✓" : "Save"}</button>
          </div>
        </div>
      </aside>
    </>
  );
}

/* ============================================================ APP */
function AppV11(){
  const [tab, setTab]           = useState("builder");
  const [selField, setSelField] = useState(null);
  const [intent, setIntent]     = useState(null);
  const [flash, setFlash]       = useState(null);
  const [flow, setFlow]         = useState(null);   // field-driven rule-attachment flow
  const [clipboard, setClipboard] = useState(null); // copied rule reference — persists across fields
  const [selected, setSelected] = useState([]);     // V12 multi-field selection (preserves tick order)
  const [bulkOpen, setBulkOpen] = useState(false);  // V12 bulk configuration sidebar

  const copyRule  = (clip) => { setClipboard(clip); try { if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(clip.id); } catch(e){} };
  const openFlow   = (fieldId) => { setSelField(null); setFlash(fieldId); setFlow({ field:fieldId }); };
  const closeFlow  = () => { setFlow(null); setFlash(null); };
  const toggleSelect  = (fieldId) => setSelected(s=> s.includes(fieldId) ? s.filter(x=>x!==fieldId) : [...s, fieldId]);
  const clearSelected = () => setSelected([]);
  const openBulk      = () => { if(selected.length>=2) setBulkOpen(true); };
  const closeBulk     = () => setBulkOpen(false);
  // "Add rule" launches the guided attach flow; View / Edit go to the Form Rules tab.
  const goRules    = (fieldId) => openFlow(fieldId);   // field-centric: one action opens the rule sidebar
  const openTab    = () => { setTab("rules"); };
  const openBuilder= () => { setTab("builder"); };
  const onOpen     = (fieldId, it) => { setSelField(fieldId); setIntent(it); };
  const onClear    = () => { setSelField(null); setIntent(null); };

  // When we return to the builder carrying a field context, flash that field.
  useEffect(()=>{
    if(tab==="builder" && selField){
      setFlash(selField);
      const t = setTimeout(()=> setFlash(null), 2300);
      return ()=> clearTimeout(t);
    }
  }, [tab, selField]);

  return (
    <div className="v10 h-screen flex flex-col bg-slate-100 text-slate-800 overflow-hidden">
      <TopBar/>
      <div className="flex flex-1 min-h-0">
        <IconRail/>
        <main className="flex-1 flex flex-col min-w-0">
          <HeaderRow/>
          <TabsRow tab={tab} onBuilder={openBuilder} onRules={openTab} total={totalRules()}/>
          <div className="flex-1 min-h-0 overflow-hidden">
            <div key={tab} className={(tab==="rules" ? "v10-slide" : "v10-fade") + " h-full"}>
              {tab==="builder"
                ? <FormBuilder flash={flash} goRules={goRules} selected={selected} onToggleSelect={toggleSelect} onConfigureBulk={openBulk} onClearSelected={clearSelected}/>
                : <FormRules field={selField} intent={intent} onBack={openBuilder} onOpen={onOpen} onClear={onClear}/>}
            </div>
          </div>
        </main>
      </div>
      {flow && <FieldWorkspace key={flow.field} field={flow.field} clipboard={clipboard} onCopy={copyRule} onClose={closeFlow}/>}
      {bulkOpen && selected.length>=2 && <BulkFieldWorkspace key={selected.join(",")} fields={selected} clipboard={clipboard} onCopy={copyRule} onClose={closeBulk}/>}
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById("root")).render(<AppV11 />);
} catch (e) {
  var _err = document.createElement("pre");
  _err.id = "v10err";
  _err.style.cssText = "white-space:pre-wrap;background:#fff1f2;color:#9f1239;padding:14px 16px;margin:0;font:13px/1.5 ui-monospace,Menlo,Consolas,monospace;border-bottom:3px solid #e11d48;";
  _err.textContent = "V12 runtime error:\n\n" + ((e && e.stack) ? e.stack : (e && e.message ? e.message : e));
  document.body.insertBefore(_err, document.body.firstChild);
}
</script>

<!-- self-compile safety net: prints the exact Babel error on screen if the app fails to compile (silent on success) -->
<script>
  window.addEventListener("load", function(){
    setTimeout(function(){
      var root = document.getElementById("root");
      if (root && root.children.length) return;      // rendered fine
      if (document.getElementById("v10err")) return; // runtime error already shown by the render try/catch
      var msg;
      if (!window.React || !window.ReactDOM) {
        msg = "React / ReactDOM did not load from the CDN (unpkg.com).\nCheck your internet connection or an ad-blocker, then hard-reload (Ctrl+Shift+R).";
      } else if (!window.Babel) {
        msg = "Babel did not load from the CDN (unpkg.com).\nCheck your internet connection or an ad-blocker, then hard-reload (Ctrl+Shift+R).";
      } else {
        try {
          var s = document.querySelector('script[type="text/babel"]');
          if (s) Babel.transform(s.textContent, { presets:["react"] });
          msg = "Scripts loaded and compiled OK, but nothing rendered — likely a runtime error.\nOpen DevTools (F12) and copy the red Console error.";
        } catch(err){
          msg = "V12 failed to compile:\n\n" + (err && err.message ? err.message : err);
        }
      }
      var pre = document.createElement("pre");
      pre.style.cssText = "white-space:pre-wrap;background:#fff1f2;color:#9f1239;padding:14px 16px;margin:0;font:13px/1.5 ui-monospace,Menlo,Consolas,monospace;border-bottom:3px solid #e11d48;";
      pre.textContent = msg;
      document.body.insertBefore(pre, document.body.firstChild);
    }, 600);
  });
</script>
