/* ============================================================ SUMMARIZE */
function triggerClause(rule){
  let s = `When ${audActor(rule.scope.audience)} ${lcVerb(rule.trigger.lifecycle)}`;
  if (rule.trigger.moment === "ON_FIELD_CHANGE") s += ` and changes ${fLabel(rule.trigger.fieldId)}`;
  else if (rule.trigger.moment === "ON_SUBMIT")  s += ` and submits the request`;
  return s;
}
// A block's conditions can contain leaf conditions and one-level GROUP items.
function flatConds(block){
  const out=[];
  (block.conditions||[]).forEach(it=>{ if(it && it.kind==="GROUP") out.push(...(it.conditions||[])); else if(it) out.push(it); });
  return out;
}
function firstLeaf(block){ return flatConds(block)[0] || null; }
function condValText(c){ return Array.isArray(c.value) ? c.value.join("/") : (c.value==null ? "" : String(c.value)); }
function condText(c){
  const f=fLabel(c.fieldId), o=opLabel(c.op).toLowerCase(), k=opVal(c.op);
  if(k==="none") return `${f} ${o}`;
  if(k==="multi"){ const a=Array.isArray(c.value)?c.value:[]; return `${f} ${o} ${a.join(", ")||"…"}`; }
  return `${f} ${o} ${c.value||"…"}`;
}
function condClause(block){
  const sep = block.match === "ALL" ? " and " : " or ";
  const parts = (block.conditions||[]).map(it=>{
    if(it && it.kind==="GROUP"){
      const inner=(it.conditions||[]).map(condText).join(it.match==="ALL"?" and ":" or ");
      return inner ? `(${inner})` : "";
    }
    return condText(it);
  }).filter(Boolean);
  return parts.join(sep);
}
function listJoin(arr){
  if (arr.length <= 1) return arr[0] || "";
  return arr.slice(0,-1).join(", ") + " and " + arr[arr.length-1];
}
function actClause(block){ return listJoin(block.actions.map(actionPhrase)); }
function advClause(rule){
  const x=[];
  if (rule.advanced.reverseOnFalse) x.push("reverses when the condition is no longer true");
  if (rule.advanced.enforceSystemWide) x.push("enforced system-wide");
  return x;
}
const cap = s => s.charAt(0).toUpperCase()+s.slice(1);
// Requirement-framed sentence: "When Priority becomes High, make Assignee required for technicians."
function blockSentence(rule, b){
  const cond = condClause(b);
  let s = cond ? `when ${cond}, ${actClause(b)}` : actClause(b);
  if (rule.scope.audience !== "ALL") s += ` for ${audPlural(rule.scope.audience)}`;
  const adv = advClause(rule); if (adv.length) s += ` (${adv.join(", ")})`;
  return s;
}
function summarize(rule){
  if (rule.blocks.length === 1) return cap(blockSentence(rule, rule.blocks[0]) + ".");
  return null; // multiple requirements rendered as a list
}

/* ============================================================ CONFLICTS */
const lcSet = lc => lc==="CREATE_EDIT" ? ["CREATE","EDIT"] : [lc];
const lcOverlap = (a,b) => lcSet(a).some(x => lcSet(b).includes(x));
const scopeOverlap = (a,b) => a==="ALL" || b==="ALL" || a===b;
function triggerOverlap(r1,r2){
  if (!lcOverlap(r1.trigger.lifecycle, r2.trigger.lifecycle)) return false;
  if (r1.trigger.moment !== r2.trigger.moment) return false;
  return scopeOverlap(r1.scope.audience, r2.scope.audience);
}
const allActions = r => r.blocks.flatMap(b => b.actions);
function detectConflicts(rule, all){
  const out = [];
  const others = all.filter(r => r.id !== rule.id && r.status === "ENABLED");
  const mine = allActions(rule);
  const myCond = new Set(); rule.blocks.forEach(b=>flatConds(b).forEach(c=>myCond.add(c.fieldId)));
  for (const o of others){
    if (!triggerOverlap(rule, o)) continue;
    for (const da of mine) for (const oa of allActions(o)){
      if (da.fieldId !== oa.fieldId) continue;
      if (OPPOSITE[da.type] === oa.type){
        out.push({ type:"CONTRADICTORY", category:"CONTRADICTORY", severity:"HIGH", with:o, field:da.fieldId,
          text:`This rule does "${actionPhrase(da)}" while ${ruleName(o)} does "${actionPhrase(oa)}" on the same trigger.` });
      } else if (da.type === oa.type){
        if (da.type==="SET_VALUE" && da.value!==oa.value)
          out.push({ type:"CONTRADICTORY", category:"CONTRADICTORY", severity:"HIGH", with:o, field:da.fieldId,
            text:`This rule sets ${fLabel(da.fieldId)} to "${da.value}" but ${ruleName(o)} sets it to "${oa.value}".` });
        else
          out.push({ type:"REDUNDANT", category:"DUPLICATE", severity:"MEDIUM", with:o, field:da.fieldId,
            text:`This rule duplicates "${actionPhrase(da)}" already done by ${ruleName(o)}.` });
      } else {
        out.push({ type:"SAME_TIME", category:"SAME_TIME", severity:"LOW", with:o, field:da.fieldId,
          text:`This rule and ${ruleName(o)} both change ${fLabel(da.fieldId)} at the same moment.` });
      }
    }
    const oCond = new Set(); o.blocks.forEach(b=>flatConds(b).forEach(c=>oCond.add(c.fieldId)));
    const shared = [...myCond].find(f=>oCond.has(f));
    if (shared) out.push({ type:"OVERLAP", category:"OVERLAP", severity:"LOW", with:o, field:shared,
      text:`This rule and ${ruleName(o)} can both run — they each check ${fLabel(shared)}.` });
  }
  const seen = new Set();
  return out.filter(c => { const k=c.with.id+c.category+c.field; if(seen.has(k)) return false; seen.add(k); return true; });
}
function ruleName(r){
  const s = summarize(r);
  if (s) return `“${s.replace(/\.$/,"")}”`;
  return `a ${r.blocks.length}-block rule`;
}
/* ============================================================ CONFLICT REVIEW (V6 — actionable)
   V6 diverges from the shared ConflictReview: keeps the grouped categories + summary, but each
   conflict item now carries resolution actions, an inline "View" peek, and a post-action state.
   Behaviour is wired up the tree (RuleStudio -> App): disable/edit the other rule, accept, ignore. */
const CONFLICT_CATS = [
  { id:"CONTRADICTORY", label:"Contradictory Rules",            short:"Contradictory", blurb:"Two rules try to do opposite things to the same field.",      tone:"red" },
  { id:"DUPLICATE",     label:"Duplicate Rules",                short:"Duplicate",     blurb:"Two rules do the same thing under similar conditions.",        tone:"amber" },
  { id:"OVERLAP",       label:"Overlapping Conditions",         short:"Overlapping",   blurb:"Two rules may run together because their conditions overlap.", tone:"violet" },
  { id:"SAME_TIME",     label:"Rules Running at the Same Time", short:"Same time",     blurb:"Two rules affect the same field at the same moment.",          tone:"slate" },
];
const CONFLICT_TONE = {
  red:"border-red-200 bg-red-50 text-red-700", amber:"border-amber-200 bg-amber-50 text-amber-700",
  violet:"border-violet-200 bg-violet-50 text-violet-700", slate:"border-slate-200 bg-slate-100 text-slate-600",
};
function groupConflicts(list){
  return CONFLICT_CATS.map(cat => ({ cat, items:(list||[]).filter(c => (c.category||"CONTRADICTORY")===cat.id) })).filter(g => g.items.length);
}

/* stable id for a single conflict (other rule × field × kind) — used to track its resolution */
const conflictKey = c => c.with.id + "|" + c.field + "|" + c.type;

/* the seven allowed resolution actions, in display order */
const RES_LABEL = {
  VIEW:    "View conflicting rule",
  EDIT:    "Edit the other rule",
  DISABLE: "Disable conflicting rule",
  WIN:     "Let this rule win",
  NARROW:  "Keep both by narrowing conditions",
  MERGE:   "Merge with existing rule",
  LATER:   "Resolve later",
};
const RES_ORDER = ["VIEW","EDIT","DISABLE","WIN","NARROW","MERGE","LATER"];

/* per-category human guidance + which actions to surface first + whether a one-click fix exists */
const CAT_RESOLUTION = {
  CONTRADICTORY: { explain:"These two rules are trying to do opposite things to the same field — only one can win.",            primary:["WIN","VIEW"],    recommend:"WIN",     auto:true  },
  DUPLICATE:     { explain:"The same action already exists in another rule, so this one is repeating it.",                      primary:["DISABLE","VIEW"],recommend:"DISABLE", auto:true  },
  OVERLAP:       { explain:"Both rules can run together because their conditions overlap — that may not be what you intended.", primary:["NARROW","VIEW"],  recommend:"NARROW",  auto:false },
  SAME_TIME:     { explain:"Both rules change the same field at the same moment, so the result depends on which runs last.",     primary:["WIN","VIEW"],    recommend:"WIN",     auto:true  },
};

/* resolution states shown after an action */
const RES_STATE = {
  REVIEW:   { label:"Needs review", cls:"border-amber-200 bg-amber-50 text-amber-700" },
  RESOLVED: { label:"Resolved",     cls:"border-emerald-200 bg-emerald-50 text-emerald-700" },
  ACCEPTED: { label:"Accepted",     cls:"border-sky-200 bg-sky-50 text-sky-700" },
  IGNORED:  { label:"Ignored",      cls:"border-slate-200 bg-slate-100 text-slate-500" },
};
const TERMINAL_STATE = new Set(["RESOLVED","ACCEPTED","IGNORED"]);

/* extra guidance shown inline when the user picks a "guide me" action */
const RES_GUIDE = {
  NARROW: "Make this rule's conditions more specific (in the Conditions section below) so the two rules no longer apply to the same requests. Then both can safely stay on.",
  MERGE:  "Bring the other rule's conditions and actions into this rule, then turn the other rule off — so everything lives in one place.",
};

/* read-only peek at the conflicting rule, shown inline under an item */
function ConflictPeek({ rule }){
  return (
    <div className="mt-2 rounded-md border border-slate-200 bg-slate-50 p-2.5 text-xs">
      <div className="flex items-center gap-2">
        <span className="font-medium text-slate-700">{rule.name || "Untitled rule"}</span>
        <span className={cx("rounded-full px-1.5 py-0.5 text-[10px] font-medium", rule.status==="ENABLED"?"bg-emerald-100 text-emerald-700":"bg-slate-200 text-slate-500")}>{rule.status==="ENABLED"?"On":"Off"}</span>
      </div>
      <p className="mt-1 text-slate-600"><span className="text-slate-400">In plain English: </span>{summarize(rule) || "Multiple requirements."}</p>
      <ul className="mt-1.5 space-y-0.5 text-slate-500">
        {rule.blocks.map(b=>(<li key={b.id}>• {b.conditions.length?`When ${condClause(b)}, `:""}{actClause(b)}.</li>))}
      </ul>
    </div>
  );
}

/* one conflict row: the plain-English problem, a state pill, and calm inline actions + overflow */
function ConflictItem({ c, state, note, onAction }){
  const [peek, setPeek] = useState(false);
  const [guide, setGuide] = useState(null);
  const cfg = CAT_RESOLUTION[c.category || "CONTRADICTORY"] || CAT_RESOLUTION.CONTRADICTORY;
  const done = TERMINAL_STATE.has(state);
  const st = RES_STATE[state] || RES_STATE.REVIEW;

  const fire = id => {
    if (id==="VIEW"){ setPeek(p=>!p); return; }
    if (id==="NARROW" || id==="MERGE") setGuide(g => g===id ? g : id);
    onAction(id, c);
  };
  const ActBtn = ({ id, primary }) => (
    <button onClick={()=>fire(id)}
      className={cx("rounded-md border px-2 py-1 text-[11px] font-medium transition-colors",
        primary ? "border-sky-200 bg-sky-50 text-sky-700 hover:bg-sky-100" : "border-slate-200 bg-white text-slate-600 hover:bg-slate-50")}>
      {RES_LABEL[id]}
    </button>
  );
  const overflow = RES_ORDER.filter(id => id!=="VIEW" && !cfg.primary.includes(id));

  return (
    <li className="rounded-md border border-slate-100 bg-white px-3 py-2">
      <div className="flex items-start justify-between gap-2">
        <div className="flex items-start gap-1.5 text-xs text-slate-600">
          <span className="mt-1.5 h-1 w-1 shrink-0 rounded-full bg-slate-300" />
          <span>{c.text}</span>
        </div>
        <span className={cx("shrink-0 rounded-full border px-2 py-0.5 text-[10px] font-medium", st.cls)}>{st.label}</span>
      </div>

      {note && <p className="mt-1 pl-3 text-[11px] italic text-slate-400">{note}</p>}
      {guide && <p className="mt-1.5 rounded bg-sky-50 px-2 py-1.5 text-[11px] leading-snug text-sky-800">{RES_GUIDE[guide]}</p>}

      <div className="mt-2 flex flex-wrap items-center gap-1.5">
        {done ? (
          <React.Fragment>
            <button onClick={()=>fire("VIEW")} className="rounded-md border border-slate-200 bg-white px-2 py-1 text-[11px] font-medium text-slate-600 hover:bg-slate-50">{RES_LABEL.VIEW}</button>
            <button onClick={()=>onAction("UNDO", c)} className="px-1 text-[11px] font-medium text-slate-400 hover:text-slate-600 hover:underline">Undo</button>
          </React.Fragment>
        ) : (
          <React.Fragment>
            {cfg.primary.map((id,i)=><ActBtn key={id} id={id} primary={i===0 && id===cfg.recommend} />)}
            <Dropdown align="right" trigger={
              <button className="rounded-md border border-slate-200 bg-white px-2 py-1 text-[11px] font-medium text-slate-500 hover:bg-slate-50">More actions ▾</button>}>
              {close => (
                <div className="w-56">
                  {overflow.map(id=>(
                    <button key={id} onClick={()=>{ fire(id); close(); }} className="block w-full rounded px-2 py-1.5 text-left text-xs text-slate-600 hover:bg-slate-100">{RES_LABEL[id]}</button>
                  ))}
                </div>
              )}
            </Dropdown>
          </React.Fragment>
        )}
      </div>

      {peek && <ConflictPeek rule={c.with} />}
    </li>
  );
}

function ConflictReview({ conflicts, resolutions, onAction }){
  const res = resolutions || {};
  const active = conflicts || [];
  const activeKeys = new Set(active.map(conflictKey));
  // keep showing items that dropped out of detection because they were just resolved (e.g. other rule disabled)
  const resolvedExtra = Object.values(res).map(r => r.c).filter(c => c && !activeKeys.has(conflictKey(c)));
  const all = [...active, ...resolvedExtra];
  const stateOf = c => (res[conflictKey(c)] || {}).status || "REVIEW";
  const noteOf  = c => (res[conflictKey(c)] || {}).label;
  const groups = groupConflicts(all);
  const [openCat, setOpenCat] = useState(null);
  const firstPending = groups.find(g => g.items.some(c => stateOf(c)==="REVIEW")) || groups[0];
  const open = openCat || (firstPending ? firstPending.cat.id : null);

  if (!all.length) return (
    <div className="flex items-center gap-2 rounded-lg border border-emerald-100 bg-emerald-50 px-3 py-2 text-sm text-emerald-700">
      <span className="text-emerald-500">✓</span><span>No conflicts with your other rules — good to save.</span>
    </div>
  );

  const pending  = all.filter(c => stateOf(c)==="REVIEW");
  const autoCnt  = pending.filter(c => (CAT_RESOLUTION[c.category||"CONTRADICTORY"]||{}).auto).length;
  const reviewCnt= pending.length - autoCnt;
  const handled  = all.length - pending.length;
  const allDone  = pending.length===0;

  return (
    <div className={cx("rounded-lg border p-3", allDone ? "border-emerald-200 bg-emerald-50/50" : "border-amber-200 bg-amber-50/50")}>
      {/* resolution summary */}
      <div className="flex flex-wrap items-center gap-2">
        <span className={cx("text-sm font-semibold", allDone ? "text-emerald-800" : "text-amber-800")}>
          {allDone ? `All ${all.length} conflict${all.length>1?"s":""} handled — good to save` : `${all.length} conflict${all.length>1?"s":""} found`}
        </span>
        {!allDone && autoCnt>0 && <span className="rounded-full border border-emerald-200 bg-emerald-50 px-2 py-0.5 text-[11px] font-medium text-emerald-700">{autoCnt} can be resolved in one step</span>}
        {!allDone && reviewCnt>0 && <span className="rounded-full border border-amber-200 bg-amber-50 px-2 py-0.5 text-[11px] font-medium text-amber-700">{reviewCnt} need a closer look</span>}
        {handled>0 && <span className="rounded-full border border-slate-200 bg-slate-100 px-2 py-0.5 text-[11px] font-medium text-slate-500">{handled} handled</span>}
      </div>
      {/* category chips */}
      <div className="mt-1.5 flex flex-wrap items-center gap-1.5">
        {groups.map(g => <span key={g.cat.id} className={cx("rounded-full border px-2 py-0.5 text-[11px] font-medium", CONFLICT_TONE[g.cat.tone])}>{g.items.length} {g.cat.short}</span>)}
      </div>

      <div className="mt-2 space-y-1.5">
        {groups.map(g => {
          const ex = open===g.cat.id;
          const cfg = CAT_RESOLUTION[g.cat.id] || {};
          const pend = g.items.filter(c => stateOf(c)==="REVIEW").length;
          return (
            <div key={g.cat.id} className="overflow-hidden rounded-md border border-slate-200 bg-white">
              <button onClick={()=>setOpenCat(ex ? "_none" : g.cat.id)} className="flex w-full items-center justify-between gap-2 px-3 py-2 text-left hover:bg-slate-50">
                <span className="flex items-center gap-2">
                  <span className={cx("inline-flex h-5 min-w-[20px] items-center justify-center rounded-full px-1.5 text-[11px] font-bold", CONFLICT_TONE[g.cat.tone])}>{g.items.length}</span>
                  <span className="text-sm font-medium text-slate-700">{g.cat.label}</span>
                  {pend===0 && <span className="text-[11px] font-medium text-emerald-600">✓ handled</span>}
                </span>
                <span className="text-[10px] text-slate-400">{ex?"▾":"▸"}</span>
              </button>
              {ex && (
                <div className="border-t border-slate-100 px-3 py-2">
                  <p className="mb-2 text-[11px] text-slate-500">{cfg.explain || g.cat.blurb}</p>
                  <ul className="space-y-1.5">
                    {g.items.map((c)=>(
                      <ConflictItem key={conflictKey(c)} c={c} state={stateOf(c)} note={noteOf(c)} onAction={onAction} />
                    ))}
                  </ul>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ============================================================ SIMULATION */
function evalCondition(c, values){
  if(!c) return true;
  const raw = values[c.fieldId];
  const v = raw === undefined ? "" : raw;
  const arr = Array.isArray(c.value) ? c.value : (c.value==null || c.value==="" ? [] : [c.value]);
  const s = String(v).toLowerCase();
  const isBlank = (v==="" || v==null || (Array.isArray(v) && v.length===0));
  switch(c.op){
    case "BECOMES":
    case "EQUALS":       return String(v) === String(c.value);
    case "NOT_EQUALS":   return String(v) !== String(c.value);
    case "STARTS_WITH":  return s.startsWith(String(c.value).toLowerCase());
    case "ENDS_WITH":    return s.endsWith(String(c.value).toLowerCase());
    case "CONTAINS":     return s.includes(String(c.value).toLowerCase());
    case "IS_BLANK":
    case "IS_EMPTY":     return isBlank;
    case "IS_NOT_BLANK":
    case "IS_NOT_EMPTY": return !isBlank;
    case "MATCH_ANY":
    case "IN":           return arr.map(String).includes(String(v));
    case "NOT_IN":       return !arr.map(String).includes(String(v));
    case "MATCH_ALL":    return arr.length>0 && arr.every(x => String(x) === String(v));
    case "GREATER_THAN": return parseFloat(v) >  parseFloat(c.value);
    case "LESS_THAN":    return parseFloat(v) <  parseFloat(c.value);
    default: return false;
  }
}
function evalGroup(g, values){
  if(!g.conditions || !g.conditions.length) return true;
  const r = g.conditions.map(c => evalCondition(c, values));
  return g.match === "ALL" ? r.every(Boolean) : r.some(Boolean);
}
function evalBlock(block, values){
  const items = block.conditions || [];
  if (!items.length) return true;
  const res = items.map(it => (it && it.kind==="GROUP") ? evalGroup(it, values) : evalCondition(it, values));
  return block.match === "ALL" ? res.every(Boolean) : res.some(Boolean);
}
function scopeMatchPersona(aud, persona){
  if (aud === "ALL") return true;
  if (aud === "LOGGED_IN") return true; // all demo personas are logged in
  return aud === persona;
}
function applyAction(state, a){
  const s = state[a.fieldId] || (state[a.fieldId] = { visible:true, required:false, enabled:true, value: "" });
  switch(a.type){
    case "SHOW": s.visible=true; break;
    case "HIDE": s.visible=false; break;
    case "MANDATE": s.required=true; break;
    case "OPTIONAL": s.required=false; break;
    case "ENABLE": s.enabled=true; break;
    case "DISABLE": s.enabled=false; break;
    case "SET_VALUE": s.value=a.value; break;
    case "CLEAR_VALUE": s.value=""; break;
  }
}
function simulate(draft, all, persona, values, moment){
  const ruleset = [...all.filter(r => r.id !== draft.id && r.status === "ENABLED"), draft];
  const applicable = ruleset.filter(r => r.trigger.moment === moment && scopeMatchPersona(r.scope.audience, persona));
  const state = {};
  // init touched fields
  applicable.forEach(r => allActions(r).forEach(a => {
    if (!state[a.fieldId]) state[a.fieldId] = { visible:true, required:false, enabled:true, value: values[a.fieldId]||"" };
  }));
  const trace = [];
  applicable.forEach(r => r.blocks.forEach((b, bi) => {
    const matched = evalBlock(b, values);
    if (matched){
      b.actions.forEach(a => applyAction(state, a));
      trace.push({ ruleId:r.id, isDraft:r.id===draft.id, blockIndex:bi, matched:true, actions:b.actions });
    } else {
      trace.push({ ruleId:r.id, isDraft:r.id===draft.id, blockIndex:bi, matched:false, actions:[] });
    }
  }));
  return { state, trace, applicableCount: applicable.length };
}

/* V6 — guided dropdown: options on the left, a contextual info card (When to use / How it works /

/* shared contextual panel — the SAME two-column decision aid used by setup, action, and operator dropdowns */

  const filtered = options.filter(o => !ql || o.label.toLowerCase().includes(ql));

  const showSearch = options.length > 6;
  return (
    <div className="flex w-[540px] max-w-[92vw]">
      <div className="w-60 shrink-0 border-r border-slate-100 p-2.5">
        {showSearch && <input autoFocus value={q} onChange={e=>setQ(e.target.value)} placeholder="Search…"
          className="mb-2.5 w-full rounded-md border border-slate-200 px-2.5 py-1.5 text-sm focus:border-sky-400 focus:outline-none focus:ring-1 focus:ring-sky-100" />}
        <div className="max-h-72 space-y-1 overflow-y-auto pr-0.5">
          {filtered.map(o=>{
            const sel = o.value===value;
            return (
              <button key={o.value} type="button" onMouseEnter={()=>setHover(o.value)} onFocus={()=>setHover(o.value)} onClick={()=>onPick(o.value)}
                className={cx("w-full rounded-lg px-3 py-2.5 text-left text-sm leading-snug transition-colors", sel ? "bg-sky-50 ring-1 ring-sky-100" : "hover:bg-slate-50")}>
                <span className={cx("flex items-center justify-between gap-2", sel ? "font-semibold text-sky-700" : "text-slate-700")}>
                  <span>{o.label}</span>{sel && <span className="shrink-0 text-sky-500">✓</span>}
                </span>
                {o.desc && <span className={cx("mt-0.5 block text-xs leading-snug", sel ? "text-sky-600" : "text-slate-400")}>{o.desc}</span>}
              </button>
            );
          })}
          {filtered.length===0 && <p className="px-3 py-2 text-xs text-slate-400">No matches</p>}
        </div>
      </div>
      <div className="flex-1 bg-slate-50/60 p-4 text-xs leading-relaxed">
        <p className="mb-3 text-sm font-semibold text-slate-800">{info.label}</p>
        <div className="space-y-3">
          <div><span className="block text-[10px] font-semibold uppercase tracking-wide text-slate-400">When to use</span><span className="mt-0.5 block text-slate-600">{info.when}</span></div>
          <div><span className="block text-[10px] font-semibold uppercase tracking-wide text-slate-400">How it works</span><span className="mt-0.5 block text-slate-600">{info.how}</span></div>
          <div><span className="block text-[10px] font-semibold uppercase tracking-wide text-slate-400">Output</span><span className="mt-0.5 block text-slate-600">{info.output}</span></div>
        </div>
        {info.example && (
          <div className="mt-3 border-t border-slate-200/70 pt-2.5">
            <span className="block text-[10px] font-semibold uppercase tracking-wide text-slate-400">Example</span>
            <span className="mt-0.5 block italic text-slate-500">{info.example}</span>
          </div>
        )}
      </div>
    </div>
  );
}

function SeverityBadge({ severity }){

              MEDIUM:["⚠ Medium","bg-amber-50 text-amber-700 border-amber-200"],

/* ============================================================ LIST LABELS + ICONS */
const execLabel = lc => ({ CREATE:"On Create", EDIT:"On Edit", CREATE_EDIT:"On Create and Edit" }[lc] || lc);
const eventLabel = m => ({ ON_LOAD:"On Form Load", ON_FIELD_CHANGE:"On Field Change", ON_SUBMIT:"On Form Submit" }[m] || m);
const applicableLabel = a => ({ ALL:"All Users", REQUESTERS:"All Requesters", TECHNICIANS:"All Technicians", LOGGED_IN:"All Logged-in Users" }[a] || a);
function genSlug(rule){
  const b = rule.blocks[0]; if (!b) return "rule";
  const parts = [];
  const c = firstLeaf(b); if (c) parts.push(`${c.fieldId}_${String(condValText(c)||opLabel(c.op)).toLowerCase().replace(/\s+/g,"")}`);
  const a = b.actions[0]; if (a) parts.push(`${a.type.toLowerCase()}_${a.fieldId}`);
  if (rule.blocks.length>1) parts.push(`plus${rule.blocks.length-1}`);
  return parts.join("_") || "rule";
}

const IconMove   = () => (<svg {...svgProps}><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="15 19 12 22 9 19"/><polyline points="19 9 22 12 19 15"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></svg>);

                            {!sum && <ol className="mt-1 list-decimal space-y-0.5 pl-5 text-slate-600">{r.blocks.map(b=><li key={b.id}>{b.conditions.length?`When ${condClause(b)}, `:""}{actClause(b)}.</li>)}</ol>}
                            {conflicts.length>0 && (
                              <div className="mt-3 rounded-md border border-amber-200 bg-amber-50 p-3 text-amber-800">
                                <div className="font-semibold">⚠ {conflicts.length} thing{conflicts.length>1?"s":""} to review</div>

                              <span>v{r.audit.version} · modified {r.audit.modifiedAt} by {r.audit.modifiedBy} · created {r.audit.createdAt} by {r.audit.createdBy}</span>
                              <span className="flex gap-3">
                                <button onClick={()=>onEdit(r.id)} className="font-medium text-sky-600 hover:underline">Edit</button>
                                <button onClick={()=>duplicate(r)} className="font-medium text-slate-500 hover:underline">Duplicate</button>
                                <button onClick={()=>remove(r.id)} className="font-medium text-red-500 hover:underline">Delete</button>
                              </span>
                            </div>
                          </div>
                        </td>
                      </tr>
                    )}

                );

            </tbody>
          </table>
          {visible.length===0 && <div className="py-16 text-center text-sm text-slate-400">No rules match your search.</div>}
        </div>
        )}
      </div>
    </div>
  );
}

/* ============================================================ TOKEN BUILDER UI */
function Dropdown({ trigger, children, align }){
  const [open,setOpen]=useState(false);
  const ref = React.useRef(null);
  const [pos,setPos]=useState(null);
  const menuRef = React.useRef(null);
  // Open the menu inside the nearest scrollable ancestor (the form's middle area) so a tall menu extends THAT
  // container's scroll height — the middle scrolls to reveal it, the page + sticky footer stay put, and the menu
  // itself never needs a scrollbar. Falls back to a viewport-fixed menu when there is no scroll container.
  const place = () => {
    const el = ref.current; if(!el) return;
    let sc = el.parentElement;
    while (sc && sc !== document.body) { const oy = getComputedStyle(sc).overflowY; if (oy==="auto"||oy==="scroll") break; sc = sc.parentElement; }
    const r = el.getBoundingClientRect();
    if (sc && sc !== document.body) {
      if (getComputedStyle(sc).position==="static") sc.style.position = "relative";
      const cr = sc.getBoundingClientRect();
      setPos({ host:sc, abs:true, top: r.bottom - cr.top + sc.scrollTop + 4, left: r.left - cr.left + sc.scrollLeft });
    } else {
      const vw = (typeof window!=="undefined"?window.innerWidth:1280);
      let left = align==="right" ? r.right - 224 : r.left;
      left = Math.max(8, Math.min(left, vw - 232));
      setPos({ host:(typeof document!=="undefined"?document.body:null), abs:false, top: r.bottom + 4, left });
    }
  };
  const toggle = () => { if(!open){ place(); setOpen(true); } else setOpen(false); };
  React.useLayoutEffect(()=>{
    if(!open || !menuRef.current || !pos) return;
    const m = menuRef.current;
    if (pos.abs && pos.host){ const sc=pos.host; const L=Math.max(sc.scrollLeft+8, Math.min(pos.left, sc.scrollLeft+sc.clientWidth-m.offsetWidth-8)); if (L!==pos.left) setPos(p=>p?{...p,left:L}:p); }
    m.scrollIntoView({ block:"nearest", behavior:"smooth" });
  }, [open]);
  React.useEffect(()=>{
    if(!open) return;
    const onDown = (e)=>{ if(ref.current && ref.current.contains(e.target)) return; if(menuRef.current && menuRef.current.contains(e.target)) return; setOpen(false); };
    const onResize = ()=>setOpen(false);
    document.addEventListener("mousedown", onDown, true);
    window.addEventListener("resize", onResize);
    return ()=>{ document.removeEventListener("mousedown", onDown, true); window.removeEventListener("resize", onResize); };
  }, [open]);
  const menu = (open && pos && pos.host) ? ReactDOM.createPortal(
    <div ref={menuRef} className="min-w-[190px] rounded-lg border border-slate-200 bg-white p-1 shadow-xl"
      style={{ position: pos.abs?"absolute":"fixed", top:pos.top, left:pos.left, zIndex:9999 }}>
      {typeof children==="function" ? children(()=>setOpen(false)) : children}
    </div>, pos.host) : null;
  return (
    <span ref={ref} className="relative inline-block align-middle">
      <span onClick={toggle}>{trigger}</span>
      {menu}
    </span>
  );
}
const TOKEN_STYLE = {
  field: "bg-sky-50 text-sky-700 border-sky-200 hover:bg-sky-100",
  op:    "bg-slate-100 text-slate-600 border-slate-200 hover:bg-slate-200",

function TokenBtn({ label, kind, warn, placeholder }){
  return (
    <button className={cx("inline-flex items-center gap-1 rounded-md border px-2.5 py-1 text-[15px] font-medium transition-colors",
      placeholder ? "border-dashed border-slate-300 bg-white text-slate-400 hover:text-slate-600" : TOKEN_STYLE[kind||"op"],
      warn && "ring-2 ring-amber-300")}>

    </button>

}
function PickList({ items, onPick, search }){
  const [q,setQ]=useState("");
  const filtered = search ? items.filter(i=>i.label.toLowerCase().includes(q.toLowerCase())) : items;
  return (
    <div>
      {search && <input autoFocus value={q} onChange={e=>setQ(e.target.value)} placeholder="Search…"
        className="mb-1 w-full rounded border border-slate-200 px-2 py-1 text-sm focus:border-sky-400 focus:outline-none" />}
      <div className="max-h-56 overflow-y-auto">
        {filtered.map(i=>(
          <button key={i.value} onClick={()=>onPick(i.value)} className="block w-full rounded px-2 py-1.5 text-left text-sm hover:bg-sky-50">
            {i.label}{i.desc && <span className="mt-0.5 block text-[11px] font-normal leading-snug text-slate-400">{i.desc}</span>}
          </button>
        ))}
        {filtered.length===0 && <p className="px-2 py-1 text-sm text-slate-400">No matches</p>}
      </div>
    </div>
  );
}

function ValueToken({ field, value, onChange }){
  const f = fieldOf(field);
  if (f.options)
    return <Dropdown trigger={<TokenBtn label={value||"choose"} kind="value" placeholder={!value} />}>
      {close => <PickList items={f.options.map(o=>({value:o,label:o}))} onPick={v=>{onChange(v);close();}} />}
    </Dropdown>;
  return <Dropdown trigger={<TokenBtn label={(value===""||value==null)?"a value":String(value)} kind="value" placeholder={value===""||value==null} />}>
    {close => <div className="p-1">
      <input autoFocus type={f.type==="number"?"number":"text"} defaultValue={value}
        onKeyDown={e=>{ if(e.key==="Enter"){ onChange(e.target.value); close(); } }} onBlur={e=>onChange(e.target.value)}
        className="w-40 rounded border border-slate-200 px-2 py-1 text-sm focus:border-sky-400 focus:outline-none" />
      <p className="mt-1 px-1 text-[11px] text-slate-400">Press Enter</p>
    </div>}
  </Dropdown>;
}
function VerbToken({ value, onChange }){
  const label = (ACTION_TYPES.find(t=>t.id===value)||{}).label || value;
  return <Dropdown trigger={<TokenBtn label={label} kind="verb" />}>
    {close => <div className="-m-1 overflow-hidden rounded-lg"><GuidedPanel options={ACTION_GUIDE2} value={value} onPick={v=>{onChange(v);close();}} /></div>}
  </Dropdown>;
}
function Pill({ labelPrefix, value, items, onChange }){
  return <Dropdown trigger={
    <button className="inline-flex items-center gap-1.5 rounded-full border border-slate-200 bg-white px-3 py-1 text-sm text-slate-600 hover:bg-slate-50">

/* ============================================================ CONDITIONS EDITOR (shared)
   DD1 = grouped + searchable field picker · DD2 = operators for that field ·
   DD3 = value control that depends on the operator (single / multi-chips / none) ·
   plus one level of nested condition groups. */
function GroupedFieldPicker({ value, onPick, fields }){
  const [q,setQ] = useState("");
  const ql = q.trim().toLowerCase();
  const pool = fields || FIELDS;
  return (
    <div className="w-72">
      <input autoFocus value={q} onChange={e=>setQ(e.target.value)} placeholder="Search…"
        className="mb-1 w-full rounded border border-slate-200 px-2 py-1 text-sm focus:border-sky-400 focus:outline-none" />
      <div className="max-h-64 overflow-y-auto">
        {FIELD_GROUPS.map(g=>{
          const fs = pool.filter(f => f.group===g.id && (!ql || f.name.toLowerCase().includes(ql) || g.label.toLowerCase().includes(ql)));
          if(!fs.length) return null;
          return (
            <div key={g.id}>
              <p className="sticky top-0 bg-sky-50 px-2 py-1 text-[11px] font-semibold uppercase tracking-wide text-slate-500">{g.label}</p>
              {fs.map(f=>(
                <button key={f.id} onClick={()=>onPick(f.id)}
                  className={cx("block w-full rounded px-2 py-1.5 text-left text-sm hover:bg-sky-50", f.id===value && "bg-sky-50 font-medium text-sky-700")}>{f.name}</button>
              ))}
            </div>
          );
        })}
        {pool.every(f => ql && !f.name.toLowerCase().includes(ql)) && <p className="px-2 py-1 text-sm text-slate-400">No matches</p>}
      </div>
    </div>
  );
}
function MultiSelect({ field, value, onChange }){
  const opts = fieldOf(field).options || [];
  const sel = Array.isArray(value) ? value : [];
  const toggle = o => onChange(sel.includes(o) ? sel.filter(x=>x!==o) : [...sel, o]);
  return (
    <Dropdown trigger={
      <span className={cx("inline-flex min-w-[150px] max-w-full cursor-pointer flex-wrap items-center gap-1 rounded-md border px-2 py-1 text-sm",
        sel.length ? "border-slate-200 bg-white" : "border-dashed border-slate-300 text-slate-400")}>
        {sel.length===0 && <span>Select values…</span>}
        {sel.slice(0,2).map(o=>(
          <span key={o} className="inline-flex items-center gap-1 rounded bg-slate-100 px-1.5 py-0.5 text-xs text-slate-700">
            {o}<span onClick={e=>{e.stopPropagation();toggle(o);}} className="cursor-pointer text-slate-400 hover:text-slate-600">×</span>
          </span>
        ))}
        {sel.length>2 && <span className="rounded bg-slate-100 px-1.5 py-0.5 text-xs text-slate-500">+{sel.length-2}</span>}
        <span className="ml-auto text-[9px] opacity-50">▾</span>
      </span>}>
      {close => (
        <div className="w-56">
          {sel.length>0 && (
            <div className="mb-1 border-b border-slate-100 pb-1">
              <p className="px-2 py-0.5 text-[11px] font-semibold text-sky-600">Selected Items</p>
              <div className="flex flex-wrap gap-1 px-2 py-1">
                {sel.map(o=>(
                  <span key={o} className="inline-flex items-center gap-1 rounded bg-sky-50 px-1.5 py-0.5 text-xs text-sky-700">
                    {o}<span onClick={()=>toggle(o)} className="cursor-pointer">×</span>
                  </span>
                ))}
              </div>
            </div>
          )}
          <div className="max-h-48 overflow-y-auto">
            {opts.map(o=>(
              <button key={o} onClick={()=>toggle(o)}
                className={cx("flex w-full items-center justify-between rounded px-2 py-1.5 text-left text-sm hover:bg-sky-50", sel.includes(o) && "text-sky-700")}>
                <span>{o}</span>{sel.includes(o) && <span className="text-sky-500">✓</span>}
              </button>
            ))}
            {opts.length===0 && <p className="px-2 py-1 text-sm text-slate-400">No options</p>}
          </div>
        </div>
      )}
    </Dropdown>
  );

// V6 — live plain-English summary of how the top-level groups/conditions combine
function groupStructureSummary(block){
  const items = block.conditions || [];
  if(!items.length) return "No conditions yet — this rule runs every time.";
  let g=0;
  const labels = items.map(it => (it && it.kind==="GROUP") ? `Group ${++g}` : "a single condition");
  if(labels.length===1) return `This rule runs when ${labels[0]} matches.`;
  if(block.match==="ALL"){
    const joined = labels.length===2 ? `${labels[0]} and ${labels[1]}` : labels.slice(0,-1).join(", ")+" and "+labels[labels.length-1];
    return `This rule runs when ${joined} ${labels.length===2 ? "both" : "all"} match.`;
  }
  const joined = labels.length===2 ? `either ${labels[0]} or ${labels[1]}` : "any one of "+labels.join(", ");
  return `This rule runs when ${joined} matches.`;
}
// V6 — the visible, clickable AND/OR connector shown between two top-level groups/conditions
function GroupConnector({ match, withHint, onToggle }){
  const isAll = match==="ALL";
  return (
    <div className="flex items-center gap-2 py-0.5">
      <span className="h-px flex-1 bg-slate-200" />
      <button type="button" onClick={onToggle} title="Click to switch how the groups are combined (And also / Or else)"
        className={cx("inline-flex items-center gap-1 rounded-full border px-2.5 py-0.5 text-[11px] font-semibold uppercase tracking-wide transition-colors",
        isAll ? "border-sky-200 bg-sky-50 text-sky-700 hover:bg-sky-100" : "border-violet-200 bg-violet-50 text-violet-700 hover:bg-violet-100")}>
        {isAll ? "And also" : "Or else"}<span className="text-[8px] opacity-60">⇅</span>
      </button>
      {withHint && <InfoHint text={`This decides how one condition group relates to the next. AND ("And also") means both groups must match. OR ("Or else") means either group can match. Each group is evaluated on its own first (using its inner Match all/any), then groups are combined here. Tip: click the connector to switch it.`} />}
      <span className="h-px flex-1 bg-slate-200" />
    </div>
  );
}
function ConditionsEditor({ block, mutate }){
  const items = block.conditions || [];
  const setField = idx => v => mutate(b=>{ const c=b.conditions[idx]; c.fieldId=v; c.op=fieldOps(v)[0]; c.value=defaultVal(c.op); });
  const setOp    = idx => v => mutate(b=>{ const c=b.conditions[idx]; c.op=v; c.value=defaultVal(v); });
  const setVal   = idx => v => mutate(b=>{ b.conditions[idx].value=v; });
  const rmItem   = idx => mutate(b=>{ b.conditions.splice(idx,1); });
  const addCond  = () => mutate(b=>{ b.conditions.push(newCondition()); });
  const addGroup = () => mutate(b=>{ b.conditions.push(newGroup()); });
  const clearAll = () => mutate(b=>{ b.conditions=[]; });
  const gSetMatch= gi => v => mutate(b=>{ b.conditions[gi].match=v; });
  const gSetField= (gi,ci) => v => mutate(b=>{ const c=b.conditions[gi].conditions[ci]; c.fieldId=v; c.op=fieldOps(v)[0]; c.value=defaultVal(c.op); });
  const gSetOp   = (gi,ci) => v => mutate(b=>{ const c=b.conditions[gi].conditions[ci]; c.op=v; c.value=defaultVal(v); });
  const gSetVal  = (gi,ci) => v => mutate(b=>{ b.conditions[gi].conditions[ci].value=v; });
  const gRm      = (gi,ci) => mutate(b=>{ b.conditions[gi].conditions.splice(ci,1); });
  const gAdd     = gi => mutate(b=>{ b.conditions[gi].conditions.push(newCondition()); });

  const groupCount = items.filter(it => it && it.kind==="GROUP").length;
  let _gn = 0;
  const groupNo = items.map(it => (it && it.kind==="GROUP") ? (++_gn) : 0);

  return (
    <div>
      {/* top-level: how the groups/conditions combine (shown only when there's more than one) */}
      {items.length>1 && (
        <div className="mb-3 flex flex-wrap items-center gap-x-3 gap-y-1.5 rounded-lg border border-slate-200 bg-white px-3 py-2">
          <span className="text-xs font-semibold text-slate-600">How should the {groupCount>1?"groups":"conditions"} combine?</span>
          <div className="inline-flex rounded-md border border-slate-200 bg-slate-50 p-0.5 text-xs">
            <button onClick={()=>mutate(b=>{ b.match="ALL"; })}
              className={cx("rounded px-3 py-1 font-medium", block.match==="ALL" ? "bg-sky-500 text-white shadow-sm" : "text-slate-600 hover:bg-white")}>{groupCount>1 ? "All groups must match" : "All must match"}</button>
            <button onClick={()=>mutate(b=>{ b.match="ANY"; })}
              className={cx("rounded px-3 py-1 font-medium", block.match==="ANY" ? "bg-violet-500 text-white shadow-sm" : "text-slate-600 hover:bg-white")}>{groupCount>1 ? "Any one group can match" : "Any one can match"}</button>
          </div>
          <span className="text-[11px] text-slate-500">{block.match==="ALL" ? "groups are joined by “And also”" : "groups are joined by “Or else”"}</span>
          <InfoHint text={`This decides how one condition group relates to the next. AND ("And also") means both groups must match. OR ("Or else") means either group can match. Inside a group, its own Match all/any decides how that group's lines combine.`} />
        </div>
      )}

      {/* live plain-English summary of the condition structure */}
      {items.length>0 && (
        <p className="mb-3 flex items-start gap-1.5 text-xs text-slate-600">
          <span className="mt-px text-sky-500">✦</span>
          <span><span className="font-medium text-slate-700">How it runs: </span>{groupStructureSummary(block)}</span>
        </p>
      )}

      <div className="space-y-2">
        {items.length===0 && <p className="text-sm italic text-slate-400">No conditions — this rule always runs.</p>}
        {items.map((it,idx)=>(
          <React.Fragment key={it.id}>
            {idx>0 && <GroupConnector match={block.match} withHint={idx===1} onToggle={()=>mutate(b=>{ b.match = b.match==="ALL" ? "ANY" : "ALL"; })} />}
            {(it && it.kind==="GROUP") ? (
              <div className="rounded-lg border border-slate-200 bg-slate-50/70 p-3">
                <div className="mb-2 flex flex-wrap items-center justify-between gap-2">
                  <span className="flex items-center text-[11px] font-semibold uppercase tracking-wide text-slate-500">
                    Group {groupNo[idx]}
                    <InfoHint text={`A group is evaluated on its own first — its "Match all/any" below decides how the lines inside it combine. Then this group is combined with the other groups using the connector above (And also / Or else).`} />
                  </span>
                  <div className="flex items-center gap-2">
                    {it.conditions.length>1
                      ? <span className="flex items-center gap-1.5 text-[11px] text-slate-400">lines:<MatchToggle match={it.match} onChange={gSetMatch(idx)} /></span>
                      : <span className="text-[11px] italic text-slate-300">one line</span>}
                    <button onClick={()=>rmItem(idx)} className="text-xs font-medium text-red-500 hover:underline">Remove group</button>
                  </div>
                </div>
                <div className="space-y-2">
                  {it.conditions.map((c,ci)=>(
                    <ConditionRow key={c.id} cond={c} onField={gSetField(idx,ci)} onOp={gSetOp(idx,ci)} onValue={gSetVal(idx,ci)} onRemove={()=>gRm(idx,ci)} />
                  ))}
                </div>
                <button onClick={()=>gAdd(idx)} className="mt-2 flex items-center gap-1.5 text-xs font-medium text-sky-600 hover:underline">
                  <span className="flex h-4 w-4 items-center justify-center rounded-full bg-emerald-500 text-[11px] leading-none text-white">+</span> Add condition to group
                </button>
              </div>
            ) : (
              <ConditionRow cond={it} onField={setField(idx)} onOp={setOp(idx)} onValue={setVal(idx)} onRemove={()=>rmItem(idx)} />
            )}
          </React.Fragment>
        ))}
      </div>
      <div className="mt-3 flex flex-wrap items-center gap-2">
        <button onClick={addCond} className="inline-flex items-center gap-1.5 rounded-md border border-slate-200 bg-white px-3 py-1.5 text-sm font-medium text-sky-600 hover:bg-sky-50">
          <span className="flex h-4 w-4 items-center justify-center rounded-full bg-emerald-500 text-[11px] leading-none text-white">+</span> Add Condition
        </button>
        <button onClick={addGroup} className="inline-flex items-center gap-1.5 rounded-md border border-slate-200 bg-white px-3 py-1.5 text-sm font-medium text-slate-600 hover:bg-slate-50">
          <span className="text-sky-500">⊕</span> Add Condition Group
        </button>
        {items.length>0 && (
          <button onClick={clearAll} className="inline-flex items-center gap-1.5 rounded-md px-3 py-1.5 text-sm font-medium text-red-500 hover:bg-red-50">
            <span>⊘</span> Remove All Condition
          </button>
        )}
      </div>
    </div>
  );
}

function OptionC({ draft, update, conflicts, dismiss, affectedFields, onPreview }){
