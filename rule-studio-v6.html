        <button onClick={addCond} className="mt-2.5 flex items-center gap-2 text-sm font-medium text-sky-600 hover:underline">
          <span className="flex h-5 w-5 items-center justify-center rounded-full bg-sky-100 text-sm leading-none text-sky-600">+</span> Add a condition
        </button>
        {draft.blocks.length>1 && <p className="mt-3 rounded-md border border-slate-200 bg-slate-50 px-3 py-2 text-xs text-slate-500">This rule has {draft.blocks.length-1} more condition–action set{draft.blocks.length-1>1?"s":""}. This view edits the first; the rest are saved unchanged.</p>}
      </SectionB>

      {/* advanced options (collapsed, unnumbered) */}
      <div className="rounded-xl border border-slate-200 bg-white px-5 py-4 shadow-sm">
        <button onClick={()=>setShowAdvanced(s=>!s)} className="flex items-center gap-2 text-sm font-medium text-sky-600 hover:underline">
          <span className="flex h-4 w-4 items-center justify-center rounded-full border border-sky-400 text-[10px] leading-none">{showAdvanced?"˅":"›"}</span> Advanced options
        </button>
        {showAdvanced && (
          <div className="mt-3 space-y-4 rounded-lg border border-slate-200 bg-slate-50 p-4 text-sm">
            <label className={cx("flex items-start gap-2.5", !allActionsReversible && "opacity-40")}>
              <input type="checkbox" disabled={!allActionsReversible} checked={draft.advanced.reverseOnFalse} onChange={e=>setAdv("reverseOnFalse",e.target.checked)} className="mt-0.5" />
              <span className="flex-1">
                <span className="flex items-center font-medium text-slate-700">Undo this automatically when the conditions stop being true<InfoHint text={`Example: if you hide a field when Priority is High, this shows it again the moment Priority changes. Works only with on/off actions (show, hide, required, read-only). Not available with "Set value" — it has no opposite to undo.`} /></span>
                <span className="mt-0.5 block text-xs text-slate-400">Keeps the form tidy — if someone changes a value back, the field returns to how it was.</span>
                {!allActionsReversible && <em className="mt-0.5 block text-xs text-slate-400">Not available with “Set value” (it has no opposite).</em>}
              </span>
            </label>
            <label className="flex items-start gap-2.5">
              <input type="checkbox" checked={draft.advanced.enforceSystemWide} onChange={e=>setAdv("enforceSystemWide",e.target.checked)} className="mt-0.5" />
              <span className="flex-1">
                <span className="flex items-center font-medium text-slate-700">Apply to every request form, not just this one<InfoHint text={`When on, this rule runs on every request form for everyone, ignoring the audience you picked above. Powerful but easy to forget — double-check before saving.`} /></span>
                <span className="mt-0.5 block text-xs text-slate-400">Leave off unless you really need this everywhere. It overrides the “Who should this affect?” choice across all forms.</span>
                {draft.advanced.enforceSystemWide && <em className="mt-0.5 block text-xs text-amber-600">Overrides “Who should this affect?” everywhere — use with care.</em>}
              </span>
            </label>
          </div>
        )}
      </div>

      {/* 5 — Review impact (summary recap · calm conflicts · discoverable preview) */}
      <SectionB n={5} title="Review impact" help={`Check what this rule will do before you save.`}>
        <div className="rounded-lg border border-sky-100 bg-sky-50/70 px-4 py-3 text-sm text-slate-700">
          {affectedFields.length===0
            ? <span className="text-slate-500">No changes yet — add an action above to see the impact.</span>
            : <span><span className="font-semibold text-sky-700">Impact: </span>this rule changes {affectedFields.length} field{affectedFields.length!==1?"s":""} — {affectedFields.map(fLabel).join(", ")}.</span>}
        </div>
        <div className="mt-3">
          {conflicts.length===0
            ? <div className="flex items-center gap-2 text-sm text-emerald-700"><span>✓</span><span>No conflicts with your other rules.</span></div>
            : <div className="rounded-lg border border-amber-200 bg-amber-50 px-4 py-3 text-sm">
                <p className="flex items-center gap-2 font-medium text-amber-800"><span>⚠</span><span>{conflicts.length} thing{conflicts.length>1?"s":""} to review</span></p>
                <p className="mt-1 text-xs text-amber-700">We found another rule that touches the same field at the same moment. You can still save — this is just a heads-up so nothing surprises you later.</p>
                <ul className="mt-2 space-y-1 text-xs text-amber-800">{conflicts.map((c,i)=>(<li key={i} className="flex gap-1.5"><span>•</span><span>{c.text}</span></li>))}</ul>
              </div>}
        </div>
        <div className="mt-4 flex items-center justify-between gap-3 rounded-lg border border-slate-200 bg-slate-50 px-4 py-3">
          <div>
            <p className="text-sm font-medium text-slate-700">Preview this rule</p>
            <p className="text-xs text-slate-400">See how it plays out on a sample form. Nothing is saved.</p>
          </div>
          <button onClick={onPreview} className="h-9 shrink-0 rounded-full bg-sky-500 px-4 text-sm font-semibold text-white shadow-sm hover:bg-sky-600">▷ Preview</button>
        </div>
      </SectionB>

    </div>
  );
}

/* ============================================================ V6 — OPTION C (familiar, "most refined": premium calm layout · live summary hero · save confidence) */
const C_MOMENT_SHORT = { ON_LOAD:"on open", ON_FIELD_CHANGE:"while filling", ON_SUBMIT:"on submit" };

// calm, premium section group: subtle uppercase label (+ InfoHint) · strong helper · content (no heavy chrome)
function GroupC({ label, help, info, children }){
  return (
    <div>
      <h3 className="flex items-center text-[11px] font-semibold uppercase tracking-[0.08em] text-slate-400">{label}{info && <InfoHint text={info} />}</h3>
      {help && <p className="mt-1 text-sm text-slate-500">{help}</p>}
      <div className="mt-3">{children}</div>
    </div>
  );
}

function OptionC({ draft, update, conflicts, dismiss, affectedFields, onPreview }){
  const [showAdvanced, setShowAdvanced] = useState(false);
  const [showDesc, setShowDesc] = useState(!!draft.description);

  const b = draft.blocks[0];
  const conflictFields = new Set(conflicts.map(c=>c.field));
  const allActionsReversible = draft.blocks.every(bk => bk.actions.every(a => REVERSIBLE.includes(a.type)));
  const nameMissing = !(draft.name||"").trim();
  const noActions = draft.blocks.every(bk => bk.actions.length===0);
  const saveState = nameMissing
    ? { dot:"bg-amber-400", tone:"text-amber-700", text:"Add a rule name to save" }
    : noActions
      ? { dot:"bg-amber-400", tone:"text-amber-700", text:"Add an action to save" }
      : conflicts.length
        ? { dot:"bg-sky-400", tone:"text-sky-700", text:`Ready to save · ${conflicts.length} point${conflicts.length>1?"s":""} to review` }
        : { dot:"bg-emerald-400", tone:"text-emerald-700", text:"Ready to save" };

  const setMatch     = v => update(d => d.blocks[0].match=v);
  const addCond      = () => update(d => d.blocks[0].conditions.push(newCondition()));
  const setCond      = (ci,k,v) => update(d => { d.blocks[0].conditions[ci][k]=v; });
  const rmCond       = ci => update(d => d.blocks[0].conditions.splice(ci,1));
  const addAct       = () => update(d => d.blocks[0].actions.push(newAction()));
  const setAct       = (ai,k,v) => update(d => { d.blocks[0].actions[ai][k]=v; });
  const rmAct        = ai => update(d => d.blocks[0].actions.splice(ai,1));
  const setAdv       = (k,v) => update(d => { d.advanced[k]=v; });
  const setBlockMode = m => update(d => { d.blocks[0].mode=m; });

  return (
    <div className="space-y-8">

      {/* HERO — what this rule will do (+ who it affects, emphasised) */}
      <div className="rounded-2xl border border-sky-100 bg-gradient-to-br from-sky-50 to-white p-5 shadow-sm">
        <p className="text-[11px] font-semibold uppercase tracking-[0.08em] text-sky-600">What this rule will do</p>
        <p className="mt-1.5 text-[15px] leading-relaxed text-slate-800">{summarize(draft) || (draft.blocks.length>1 ? `Several changes across ${affectedFields.length} field${affectedFields.length!==1?"s":""}.` : "Choose an action below and your rule will be described here in plain English.")}</p>
        <div className="mt-3 flex flex-wrap gap-2 text-xs">
          <span className="inline-flex items-center gap-1.5 rounded-full bg-white px-3 py-1 font-medium text-slate-700 ring-1 ring-slate-200"><span className="text-slate-400">Affects</span> {audFriendly(draft.scope.audience)}</span>
          <span className="inline-flex items-center gap-1.5 rounded-full bg-white px-3 py-1 font-medium text-slate-700 ring-1 ring-slate-200"><span className="text-slate-400">Runs</span> {C_MOMENT_SHORT[draft.trigger.moment]}</span>
          <span className="inline-flex items-center gap-1.5 rounded-full bg-white px-3 py-1 font-medium text-slate-700 ring-1 ring-slate-200"><span className="text-slate-400">Changes</span> {affectedFields.length} field{affectedFields.length!==1?"s":""}</span>
        </div>
      </div>

      {/* name + optional note */}
      <FieldA label="Rule name" required
        help={`Give it a name a teammate would understand at a glance. You'll see it in the rules list.`}
        info={`A short, recognisable name — e.g. "Require an approver for high-cost requests." It only appears to admins on the rules list, never to end users.`}>
        <input value={draft.name} onChange={e=>update(d=>d.name=e.target.value)} placeholder="e.g. Require an approver for high-cost requests"
          className="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-sky-400 focus:outline-none focus:ring-1 focus:ring-sky-300" />
        {!showDesc
          ? <button onClick={()=>setShowDesc(true)} className="mt-2 text-sm font-medium text-sky-600 hover:underline">Add a note</button>
          : <textarea value={draft.description} onChange={e=>update(d=>d.description=e.target.value)} rows={2} placeholder="Describe what this rule does and why…"
              className="mt-2 w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-sky-400 focus:outline-none focus:ring-1 focus:ring-sky-300" />}
      </FieldA>

      {/* WHAT SHOULD HAPPEN */}
      <GroupC label="What should happen" help={`Choose what this rule does to the form when it runs.`}
        info={`Choose what happens to the field when the rule runs — show or hide it, make it required or optional, lock it, or set its value.`}>
        <div className="mt-3 space-y-2.5">
          {b.actions.length===0 && <p className="rounded-md border border-dashed border-slate-200 bg-slate-50 px-3 py-2.5 text-xs text-slate-400">Add at least one thing to do — for example, make a field required when your conditions match.</p>}
          {b.actions.map((a,ai)=>(
            <div key={a.id} className="flex items-center gap-2.5">
              <button onClick={()=>rmAct(ai)} title="Remove action" className="flex h-5 w-5 shrink-0 items-center justify-center rounded-full bg-slate-200 text-sm leading-none text-slate-500 hover:bg-red-500 hover:text-white">−</button>
              <div className={cx("flex flex-1 flex-wrap items-center gap-2 rounded-md border p-1.5", conflictFields.has(a.fieldId) ? "border-amber-300 ring-1 ring-amber-200" : "border-slate-200 bg-white")}>
                <Dropdown trigger={<span className="cursor-pointer rounded-md bg-slate-100 px-3 py-1.5 text-sm text-slate-700 hover:bg-slate-200">{(ACTION_TYPES.find(t=>t.id===a.type)||{}).label} ▾</span>}>
                  {close => <PickList items={ACTION_TYPES.map(t=>({value:t.id,label:t.label}))} onPick={v=>{setAct(ai,"type",v);close();}} />}
                </Dropdown>
                <span className="text-sm text-slate-400">→</span>
                <Dropdown trigger={<span className="cursor-pointer px-2 text-sm text-slate-700 hover:text-slate-900">{fLabel(a.fieldId)} ▾</span>}>
                  {close => <PickList search items={FIELDS.map(f=>({value:f.id,label:f.label}))} onPick={v=>{setAct(ai,"fieldId",v);close();}} />}
                </Dropdown>
                {a.type==="SET_VALUE" && <span className="text-sm text-slate-400">to</span>}
                {a.type==="SET_VALUE" && (
                  fieldOf(a.fieldId).type==="select"
                    ? <Dropdown trigger={<span className="cursor-pointer rounded-md border border-slate-200 bg-slate-50 px-3 py-1.5 text-sm text-slate-700">{a.value||"choose"} ▾</span>}>
                        {close => <PickList items={fieldOf(a.fieldId).options.map(o=>({value:o,label:o}))} onPick={v=>{setAct(ai,"value",v);close();}} />}
                      </Dropdown>
                    : <input value={a.value} onChange={e=>setAct(ai,"value",e.target.value)} placeholder="value" className="rounded-md border border-slate-300 px-3 py-1.5 text-sm focus:border-sky-400 focus:outline-none" />
                )}
              </div>
            </div>
          ))}
        </div>
        <button onClick={addAct} className="mt-2.5 flex items-center gap-2 text-sm font-medium text-sky-600 hover:underline">
          <span className="flex h-5 w-5 items-center justify-center rounded-full bg-sky-100 text-sm leading-none text-sky-600">+</span> Add an action
        </button>
      </GroupC>

      {/* WHO IT AFFECTS (emphasised) */}
      <GroupC label="Who it affects" help={`Pick who sees this behaviour on the form. Everyone is the safe default.`}
        info={`"Everyone" applies to all users of the form. "Requesters" are the people raising requests; "Technicians" are agents working on them; "Signed-in users only" excludes anyone using the form without logging in.`}>
        <Select value={draft.scope.audience} onChange={v=>update(d=>d.scope.audience=v)} options={AUD_FRIENDLY.map(a=>({value:a.id,label:a.label}))} className="h-10 w-full sm:w-72" />
      </GroupC>

      {/* WHEN IT RUNS */}
      <GroupC label="When it runs" help={`Set which requests this applies to, and the moment it acts.`}>
        <div className="grid gap-4 sm:grid-cols-2">
          <FieldA label="Which requests?" help={`New, existing (being edited), or both.`}
            info={`"New requests" runs while someone raises a request for the first time. "Existing requests" runs when someone reopens and edits a request that's already been raised. Pick "Both" if it should behave the same either way.`}>
            <Select value={draft.trigger.lifecycle} onChange={v=>update(d=>d.trigger.lifecycle=v)} options={A_LIFECYCLE} className="h-10 w-full" />
          </FieldA>
          <FieldA label="At what point?" help={`The moment this rule acts.`}
            info={`"When the form opens" runs once before anyone types. "While the form is being filled" re-checks every time a field changes. "When the form is submitted" runs a final check as someone submits — use this for validation.`}>
            <Select value={draft.trigger.moment} onChange={v=>update(d=>d.trigger.moment=v)} options={A_MOMENT} className="h-10 w-full" />
          </FieldA>
        </div>
        {draft.trigger.moment==="ON_FIELD_CHANGE" && (
          <div className="mt-4">
            <FieldA label="Which field should it watch?" help={`The rule re-checks each time this field changes.`}>
              <Select value={draft.trigger.fieldId||"priority"} onChange={v=>update(d=>d.trigger.fieldId=v)} options={FIELDS.map(f=>({value:f.id,label:f.label}))} className="h-10 w-full sm:w-1/2" />
            </FieldA>
          </div>
        )}
      </GroupC>

      {/* ONLY WHEN (conditions) */}
      <GroupC label="Only when…" help={`Limit when this rule acts. Leave empty to run every time.`}
        info={`"Match all" acts only when every line below is true at the same time. "Match any" acts as soon as a single line is true. With one condition this makes no difference.`}>
        {b.conditions.length>1 && (
          <div className="mb-3 flex flex-wrap items-center gap-x-6 gap-y-2 text-sm text-slate-600">
            <label className="flex cursor-pointer items-center gap-2"><input type="radio" checked={b.match==="ALL"} onChange={()=>setMatch("ALL")} className="accent-sky-500" /> Match all of the conditions below</label>
            <label className="flex cursor-pointer items-center gap-2"><input type="radio" checked={b.match==="ANY"} onChange={()=>setMatch("ANY")} className="accent-sky-500" /> Match any of the conditions below</label>
          </div>
        )}
        <div className="space-y-2.5">
          {b.conditions.length===0 && <p className="rounded-md border border-dashed border-slate-200 bg-slate-50 px-3 py-2.5 text-xs text-slate-400">No conditions yet — this rule runs every time. Add a condition to make it act only in specific cases.</p>}
          {b.conditions.map((c,ci)=>(
            <div key={c.id} className="flex items-center gap-2.5">
              <button onClick={()=>rmCond(ci)} title="Remove condition" className="flex h-5 w-5 shrink-0 items-center justify-center rounded-full bg-slate-200 text-sm leading-none text-slate-500 hover:bg-red-500 hover:text-white">−</button>
              <div className="flex flex-1 flex-wrap items-center gap-2 rounded-md border border-slate-200 bg-white p-1.5">
                <Dropdown trigger={<span className="cursor-pointer rounded-md bg-slate-100 px-3 py-1.5 text-sm text-slate-700 hover:bg-slate-200">{fLabel(c.fieldId)} ▾</span>}>
                  {close => <PickList search items={FIELDS.map(f=>({value:f.id,label:f.label}))} onPick={v=>{setCond(ci,"fieldId",v);close();}} />}
                </Dropdown>
                <Dropdown trigger={<span className="cursor-pointer px-1 text-sm text-slate-500 hover:text-slate-700">{opLabel(c.op)} ▾</span>}>
                  {close => <PickList items={OPERATORS.map(o=>({value:o.id,label:o.label}))} onPick={v=>{setCond(ci,"op",v);close();}} />}
                </Dropdown>
                {!VALUELESS.includes(c.op) && (
                  fieldOf(c.fieldId).type==="select"
                    ? <Dropdown trigger={<span className={cx("cursor-pointer rounded-md border px-3 py-1.5 text-sm", c.value?"border-slate-200 bg-slate-50 text-slate-700":"border-dashed border-slate-300 text-slate-400")}>{c.value||"choose value"} ▾</span>}>
                        {close => <PickList items={fieldOf(c.fieldId).options.map(o=>({value:o,label:o}))} onPick={v=>{setCond(ci,"value",v);close();}} />}
                      </Dropdown>
                    : <input value={c.value} onChange={e=>setCond(ci,"value",e.target.value)} type={fieldOf(c.fieldId).type==="number"?"number":"text"} placeholder="value"
                        className="flex-1 rounded-md border border-slate-300 px-3 py-1.5 text-sm focus:border-sky-400 focus:outline-none" />
                )}
              </div>
            </div>
          ))}
        </div>
        <button onClick={addCond} className="mt-2.5 flex items-center gap-2 text-sm font-medium text-sky-600 hover:underline">
          <span className="flex h-5 w-5 items-center justify-center rounded-full bg-sky-100 text-sm leading-none text-sky-600">+</span> Add a condition
        </button>
        {draft.blocks.length>1 && <p className="mt-3 rounded-md border border-slate-200 bg-slate-50 px-3 py-2 text-xs text-slate-500">This rule has {draft.blocks.length-1} more condition–action set{draft.blocks.length-1>1?"s":""}. This view edits the first; the rest are saved unchanged.</p>}
      </GroupC>

      {/* advanced (collapsed) */}
      <div>
        <button onClick={()=>setShowAdvanced(s=>!s)} className="flex items-center gap-2 text-sm font-medium text-sky-600 hover:underline">
          <span className="flex h-4 w-4 items-center justify-center rounded-full border border-sky-400 text-[10px] leading-none">{showAdvanced?"˅":"›"}</span> Advanced options
        </button>
        {showAdvanced && (
          <div className="mt-3 space-y-4 rounded-lg border border-slate-200 bg-slate-50 p-4 text-sm">
            <label className={cx("flex items-start gap-2.5", !allActionsReversible && "opacity-40")}>
              <input type="checkbox" disabled={!allActionsReversible} checked={draft.advanced.reverseOnFalse} onChange={e=>setAdv("reverseOnFalse",e.target.checked)} className="mt-0.5" />
              <span className="flex-1">
                <span className="flex items-center font-medium text-slate-700">Undo this automatically when the conditions stop being true<InfoHint text={`Example: if you hide a field when Priority is High, this shows it again the moment Priority changes. Works only with on/off actions (show, hide, required, read-only). Not available with "Set value" — it has no opposite to undo.`} /></span>
                <span className="mt-0.5 block text-xs text-slate-400">Keeps the form tidy — if someone changes a value back, the field returns to how it was.</span>
                {!allActionsReversible && <em className="mt-0.5 block text-xs text-slate-400">Not available with “Set value” (it has no opposite).</em>}
              </span>
            </label>
            <label className="flex items-start gap-2.5">
              <input type="checkbox" checked={draft.advanced.enforceSystemWide} onChange={e=>setAdv("enforceSystemWide",e.target.checked)} className="mt-0.5" />
              <span className="flex-1">
                <span className="flex items-center font-medium text-slate-700">Apply to every request form, not just this one<InfoHint text={`When on, this rule runs on every request form for everyone, ignoring the audience you picked above. Powerful but easy to forget — double-check before saving.`} /></span>
                <span className="mt-0.5 block text-xs text-slate-400">Leave off unless you really need this everywhere. It overrides the “Who it affects” choice across all forms.</span>
                {draft.advanced.enforceSystemWide && <em className="mt-0.5 block text-xs text-amber-600">Overrides “Who it affects” everywhere — use with care.</em>}
              </span>
            </label>
          </div>
        )}
      </div>

      {/* review & save — save confidence · compact preview · subtle conflicts (only when real) */}
      <div className="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
        <div className="flex flex-wrap items-center justify-between gap-3">
          <span className={cx("inline-flex items-center gap-2 text-sm font-medium", saveState.tone)}>
            <span className={cx("h-2 w-2 rounded-full", saveState.dot)} /> {saveState.text}
          </span>
          <button onClick={onPreview} className="inline-flex h-9 items-center gap-1.5 rounded-full border border-sky-200 bg-sky-50 px-4 text-sm font-medium text-sky-700 hover:bg-sky-100">▷ Preview impact</button>
        </div>
        {conflicts.length>0 && (
          <div className="mt-3 border-t border-slate-100 pt-3">
            <p className="flex items-center gap-2 text-sm font-medium text-amber-700"><span>⚠</span><span>{conflicts.length} thing{conflicts.length>1?"s":""} worth a look — you can still save</span></p>
            <ul className="mt-1.5 space-y-1.5 text-xs text-amber-800">{conflicts.map((c,i)=>(
              <li key={i} className="flex items-start justify-between gap-3">
                <span className="flex gap-1.5"><span>•</span><span>{c.text}</span></span>
                <button onClick={()=>dismiss(c)} className="shrink-0 font-medium text-slate-400 hover:text-slate-600 hover:underline">Dismiss</button>
              </li>
            ))}</ul>
          </div>
        )}
      </div>

    </div>
  );
}

/* ============================================================ RULE STUDIO (V6 — familiar drawer, refined) */
function RuleStudio({ initial, isNew, allRules, onCancel, onSave }){
  const [draft, setDraft] = useState(() => JSON.parse(JSON.stringify(initial)));
  const update = fn => setDraft(d => { const n = JSON.parse(JSON.stringify(d)); fn(n); return n; });
  const [mode, setMode]       = useState("A");        // A | B | C — UX comparison variant (V6 only)
  const [showTest, setShowTest] = useState(false);    // "Try it" preview drawer (Options A & B & C)
  const [dismissed, setDismissed] = useState(() => new Set());

  const rawConflicts = useMemo(() => detectConflicts(draft, allRules), [draft, allRules]);
  const conflicts = useMemo(() => rawConflicts.filter(c => !dismissed.has(c.with.id+c.field+c.type)), [rawConflicts, dismissed]);
  const dismiss = c => setDismissed(s => { const n=new Set(s); n.add(c.with.id+c.field+c.type); return n; });
  const affectedFields = useMemo(() => { const s=new Set(); draft.blocks.forEach(b=>b.actions.forEach(a=>s.add(a.fieldId))); return [...s]; }, [draft]);
  const valid = (draft.name||"").trim().length>0 && draft.blocks.every(b => b.actions.length>0);
  const curMode = V6_MODES.find(m=>m.id===mode) || V6_MODES[0];

  return (
    <div className="flex h-full min-h-0 flex-1 flex-col bg-slate-50">
      {/* product-style header + breadcrumb */}
      <div className="border-b border-slate-200 bg-white px-8 py-4">
        <div className="flex items-start justify-between gap-4">
          <div>
            <nav className="flex items-center gap-2 text-xs">
              <button onClick={onCancel} className="font-medium text-sky-600 hover:underline">Admin</button>
              <span className="text-slate-300">›</span>
              <span className="text-slate-500">Request Management</span>
              <span className="text-slate-300">›</span>
              <button onClick={onCancel} className="text-slate-500 hover:underline">Request Form Rules</button>
              <span className="text-slate-300">›</span>
              <span className="text-slate-700">{isNew ? "Create" : "Edit"}</span>
            </nav>
            <h1 className="mt-1 text-xl font-bold text-slate-800">{isNew ? "Create Request Form Rule" : "Edit Request Form Rule"}</h1>
          </div>
          <div className="flex shrink-0 items-center gap-2">
            <button onClick={onCancel} className="h-10 rounded-full border border-slate-200 bg-white px-5 text-sm font-medium text-slate-600 hover:bg-slate-50">Cancel</button>
            <button onClick={()=>onSave(draft)} className={cx("h-10 rounded-full bg-sky-500 px-6 text-sm font-semibold text-white shadow-sm hover:bg-sky-600", !valid && "opacity-50 pointer-events-none")}>Save rule</button>
          </div>
        </div>
      </div>

      {/* ── design-variant selector — subtle strip just below the version tabs, top of the create/edit area ── */}
      <div className="flex flex-wrap items-center gap-x-3 gap-y-1 border-b border-slate-200 bg-slate-50/70 px-8 py-2">
        <span className="text-[11px] font-medium uppercase tracking-wide text-slate-400">Design variant</span>
        <Dropdown trigger={
          <button className="inline-flex items-center gap-2 rounded-md border border-slate-200 bg-white px-2.5 py-1 text-xs font-medium text-slate-600 shadow-sm hover:bg-slate-50">
            <span className="inline-block h-1.5 w-1.5 rounded-full bg-slate-300" />
            {curMode.label} · {curMode.tagline}
            <span className="text-[9px] opacity-50">▾</span>
          </button>}>
          {close => (
            <div className="w-72">
              <p className="px-2 py-1 text-[11px] uppercase tracking-wide text-slate-400">Compare UX approach</p>
              {V6_MODES.map(m=>(
                <button key={m.id} onClick={()=>{setMode(m.id);close();}}
                  className={cx("block w-full rounded px-2 py-2 text-left hover:bg-slate-100", m.id===mode && "bg-slate-50")}>
                  <span className="flex items-center justify-between gap-2">
                    <span className="text-sm font-medium text-slate-700">{m.label} · {m.tagline}</span>
                    {m.id===mode && <span className="shrink-0 text-[11px] font-medium text-emerald-600">current</span>}
                  </span>
                  <span className="mt-0.5 block text-[11px] leading-snug text-slate-400">{m.blurb}</span>
                </button>
              ))}
            </div>
          )}
        </Dropdown>
        <span className="text-[11px] text-slate-400">Prototype comparison only — pick one, then build your rule as usual.</span>
      </div>

      {/* form body */}
      <div className="flex-1 overflow-y-auto">
        <div className="max-w-3xl px-8 py-6">

          {/* live plain-English banner (Options A & B; Option C has its own summary hero) */}
          {mode!=="C" && (
          <div className="mb-6 flex items-start gap-2 rounded-lg border border-sky-100 bg-sky-50 px-4 py-3 text-sm text-slate-700">
            <span className="mt-px text-sky-500">✦</span>
            <span>
              <span className="font-semibold text-sky-700">In plain English: </span>
              {summarize(draft) || `${draft.blocks.length} requirement${draft.blocks.length>1?"s":""} set so far.`}
              <span className="ml-1 text-slate-400">· Affects {affectedFields.length} field{affectedFields.length!==1?"s":""}.</span>
            </span>
          </div>
          )}

          {mode==="A" ? (
            <OptionA draft={draft} update={update} conflicts={conflicts} dismiss={dismiss} />
          ) : mode==="B" ? (
            <OptionB draft={draft} update={update} conflicts={conflicts} dismiss={dismiss} affectedFields={affectedFields} onPreview={()=>setShowTest(true)} />
          ) : (
            <OptionC draft={draft} update={update} conflicts={conflicts} dismiss={dismiss} affectedFields={affectedFields} onPreview={()=>setShowTest(true)} />
          )}

        </div>
      </div>

      {/* sticky footer (shared chrome) — conflict status is calm and never blocks Save */}
      <div className="flex items-center justify-between border-t border-slate-200 bg-white px-5 py-3">
        <span className={cx("text-sm font-medium", conflicts.length ? "text-amber-600" : "text-emerald-600")}>
          {conflicts.length ? `${conflicts.length} thing${conflicts.length>1?"s":""} to review` : "No conflicts with your other rules"}
        </span>
        <div className="flex items-center gap-2">
          {mode==="A" && <button onClick={()=>setShowTest(true)} title="See how this rule plays out on a sample form before you save. Nothing is saved." className="h-10 rounded-full border border-sky-200 bg-sky-50 px-5 text-sm font-medium text-sky-700 hover:bg-sky-100">Try it</button>}
          <button onClick={onCancel} className="h-10 rounded-full border border-slate-200 bg-white px-5 text-sm font-medium text-slate-600 hover:bg-slate-50">Cancel</button>
          <button onClick={()=>onSave(draft)} className={cx("h-10 rounded-full bg-sky-500 px-6 text-sm font-semibold text-white shadow-sm hover:bg-sky-600", !valid && "opacity-50 pointer-events-none")}>Save rule</button>
        </div>
      </div>

      {/* "Try it" — light preview drawer (reuses the shared PreviewPanel; never blocks Save) */}
      {showTest && (
        <React.Fragment>
          <div className="fixed inset-0 z-40 bg-black/20" onClick={()=>setShowTest(false)} />
          <div className="fixed right-0 top-0 z-50 h-full w-[380px] overflow-y-auto bg-white p-4 shadow-2xl">
            <div className="mb-2 flex items-center justify-between">
              <h3 className="font-semibold">Try it</h3>
              <button onClick={()=>setShowTest(false)} className="text-slate-400 hover:text-slate-700">✕</button>
            </div>
            <p className="mb-3 text-xs text-slate-400">See how this rule plays out on a sample form before you save — pick who's using it and a few test values. Nothing is saved.</p>
            <PreviewPanel draft={draft} allRules={allRules} />
          </div>
        </React.Fragment>
      )}
    </div>
  );
}

/* ============================================================ PREVIEW PANEL */
function PreviewPanel({ draft, allRules }){
  const [persona, setPersona] = useState(draft.scope.audience==="ALL"?"TECHNICIANS":draft.scope.audience);
  const [moment, setMoment]   = useState(draft.trigger.moment);
  const refFields = useMemo(() => {
    const s = new Set();
    if (draft.trigger.moment==="ON_FIELD_CHANGE") s.add(draft.trigger.fieldId);
    draft.blocks.forEach(b => b.conditions.forEach(c => s.add(c.fieldId)));
    return [...s];
  }, [draft]);
  const [values, setValues] = useState({});
  const [result, setResult] = useState(null);

  const setVal = (id,v) => setValues(o=>({...o,[id]:v}));
  const run = () => setResult(simulate(draft, allRules, persona, values, moment));

  return (
    <div>
      <p className="mb-1.5 text-xs font-semibold uppercase tracking-wide text-slate-400">Preview &amp; Test</p>
      <div className="rounded-md border border-slate-200 p-3 space-y-2 text-sm">
        <div className="flex items-center gap-2">
          <span className="w-16 text-slate-500">Run as</span>
          <Select value={persona} onChange={setPersona} options={AUDIENCES.filter(a=>a.id!=="ALL").map(a=>({value:a.id,label:a.label}))} className="h-8 flex-1" />
        </div>
        <div className="flex items-center gap-2">
          <span className="w-16 text-slate-500">Moment</span>
          <Select value={moment} onChange={setMoment} options={MOMENTS.map(m=>({value:m.id,label:m.label}))} className="h-8 flex-1" />
        </div>
        <div className="border-t border-slate-100 pt-2">
          <p className="mb-1 text-xs font-medium text-slate-500">Test values</p>
          {refFields.length===0 && <p className="text-xs italic text-slate-400">No condition fields — rule always matches.</p>}
          {refFields.map(id=>(
            <div key={id} className="mb-1 flex items-center gap-2">
              <span className="w-24 text-xs text-slate-500">{fLabel(id)}</span>
              {fieldOf(id).type==="select"
                ? <Select value={values[id]||""} onChange={v=>setVal(id,v)} options={[{value:"",label:"—"},...fieldOf(id).options.map(o=>({value:o,label:o}))]} className="h-8 flex-1" />
                : <TextInput value={values[id]||""} onChange={v=>setVal(id,v)} type={fieldOf(id).type==="number"?"number":"text"} className="h-8 flex-1" />}
            </div>
          ))}
        </div>
        <Btn onClick={run} className="w-full">▷ Run simulation</Btn>

        {result && (
          <div className="border-t border-slate-100 pt-2 space-y-2">
            <p className="text-xs font-medium text-slate-500">Execution trace ({result.applicableCount} applicable rule{result.applicableCount!==1?"s":""})</p>
            <div className="space-y-1">
              {result.trace.filter(t=>t.matched).length===0 && <p className="text-xs italic text-slate-400">No blocks matched these values.</p>}
              {result.trace.filter(t=>t.matched).map((t,i)=>(
                <div key={i} className={cx("rounded px-2 py-1 text-xs", t.isDraft?"bg-sky-50 text-sky-800":"bg-slate-50 text-slate-600")}>
                  <span className="font-semibold">{t.isDraft?"This rule":"Rule "+t.ruleId.replace("rule_","#")}</span> · block {t.blockIndex+1} matched
                  <span className="block text-slate-500">→ {t.actions.map(actionPhrase).join("; ")}</span>
                </div>
              ))}
            </div>
            <p className="text-xs font-medium text-slate-500">Resulting form state</p>
            <div className="space-y-1">
              {Object.keys(result.state).map(fid=>{
                const s = result.state[fid];
                return (
                  <div key={fid} className="flex items-center gap-2 text-xs">
                    <span className={cx("inline-block h-2 w-2 rounded-full", s.visible?"bg-emerald-500":"bg-slate-300")} />
                    <span className="font-medium">{fLabel(fid)}</span>
                    <span className="text-slate-500">
                      {s.visible?"visible":"hidden"}{s.required?", required":""}{!s.enabled?", disabled":""}{s.value?`, = ${s.value}`:""}
                    </span>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ============================================================ VERSION SWITCHER */
const VERSIONS = [
  { id:"v1", label:"Version 1", note:"Sentence-first builder", href:"rule-studio-v1.html" },
  { id:"v2", label:"Version 2", note:"Structured form",        href:"rule-studio-demo.html" },
  { id:"v3", label:"Version 3", note:"Block workspace",        href:"rule-studio-v3.html" },
  { id:"v4", label:"Version 4", note:"Starter cards",          href:"rule-studio-v4.html" },
  { id:"v5", label:"Version 5", note:"Guided composer",        href:"rule-studio-v5.html" },
  { id:"v6", label:"Version 6", note:"Refined classic form",   href:"rule-studio-v6.html" },
];
const currentVersionId = () => {
  const p = (typeof window!=="undefined" && window.location.pathname) || "";
  if (p.indexOf("v6") >= 0) return "v6";
  if (p.indexOf("v5") >= 0) return "v5";
  if (p.indexOf("v4") >= 0) return "v4";
  if (p.indexOf("v3") >= 0) return "v3";
  if (p.indexOf("v1") >= 0) return "v1";
  return "v2";
};
function VersionBar(){
  const [open,setOpen]=useState(false);
  const cur = currentVersionId();
  const curV = VERSIONS.find(v=>v.id===cur) || VERSIONS[1];
  return (
    <div className="flex shrink-0 items-center justify-between border-b border-slate-800 bg-slate-900 px-4 py-1.5 text-xs text-slate-300">
      <span className="font-semibold tracking-wide text-slate-100">Request Form Rules · Rule Studio</span>
      <div className="relative">
        <button onClick={()=>setOpen(o=>!o)} className="inline-flex items-center gap-2 rounded-md bg-slate-800 px-3 py-1 font-medium text-white hover:bg-slate-700">
          <span className="inline-block h-1.5 w-1.5 rounded-full bg-emerald-400" />
          {curV.label} · {curV.note}
          <span className="opacity-60">▾</span>
        </button>
        {open && (
          <React.Fragment>
            <div className="fixed inset-0 z-40" onClick={()=>setOpen(false)} />
            <div className="absolute right-0 z-50 mt-1 w-60 overflow-hidden rounded-lg border border-slate-200 bg-white p-1 text-slate-700 shadow-xl">
              <p className="px-2 py-1 text-[11px] uppercase tracking-wide text-slate-400">Switch version</p>
              {VERSIONS.map(v=>(
                <a key={v.id} href={v.href}
                   className={cx("flex items-center justify-between rounded px-2 py-2 text-sm hover:bg-slate-100", v.id===cur && "bg-slate-50")}>
                  <span><span className="font-medium">{v.label}</span><span className="block text-xs text-slate-400">{v.note}</span></span>
                  {v.id===cur && <span className="text-xs font-medium text-emerald-600">current</span>}
                </a>
              ))}
            </div>
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

/* ============================================================ APP */
function App(){
  const [rules, setRules] = useState(() => SEED.map(r => ({ ...r, name: r.name || genSlug(r) })));
  const [view, setView] = useState({ screen:"list" }); // {screen:'studio', id|null}

  const startCreate = () => setView({ screen:"studio", rule:newRule(), isNew:true });
  const startEdit = id => setView({ screen:"studio", rule:rules.find(r=>r.id===id), isNew:false });
  const cancel = () => setView({ screen:"list" });
  const save = draft => {
    setRules(rs => rs.some(r=>r.id===draft.id) ? rs.map(r=>r.id===draft.id?draft:r) : [...rs, draft]);
    setView({ screen:"list" });
  };

  return (
    <div className="flex h-screen flex-col">
      <VersionBar />
      {view.screen==="studio"
        ? <RuleStudio initial={view.rule} isNew={view.isNew} allRules={rules} onCancel={cancel} onSave={save} />
        : <div className="flex-1 overflow-y-auto"><RulesList rules={rules} setRules={setRules} onCreate={startCreate} onEdit={startEdit} /></div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<script>
// safety net: surface the real Babel error if the script fails to compile
window.addEventListener('load', function(){
  setTimeout(function(){
    try {
      var el = document.querySelector('script[type="text/babel"]');
      if (window.Babel && el) { window.Babel.transform(el.textContent, { presets: ['react'] }); }
    } catch (err) {
      (document.getElementById('root')||document.body).innerHTML = '<pre style="white-space:pre-wrap;color:#b91c1c;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:16px;margin:24px;font:12px ui-monospace,monospace">[Compile error]\n' + (err && err.message ? err.message : err) + '</pre>';
    }
  }, 600);
});
</script>
