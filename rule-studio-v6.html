/* ============================================================ SUMMARIZE */
function triggerClause(rule){
  let s = `When ${audActor(rule.scope.audience)} ${lcVerb(rule.trigger.lifecycle)}`;
  if (rule.trigger.moment === "ON_FIELD_CHANGE") s += ` and changes ${fLabel(rule.trigger.fieldId)}`;
  else if (rule.trigger.moment === "ON_SUBMIT")  s += ` and submits the request`;
  return s;
}
function condClause(block){
  const parts = block.conditions.map(c =>
    VALUELESS.includes(c.op) ? `${fLabel(c.fieldId)} ${opLabel(c.op)}`
                             : `${fLabel(c.fieldId)} ${opLabel(c.op)} ${c.value}`);
  return parts.join(block.match === "ALL" ? " and " : " or ");
}
function listJoin(arr){
  if (arr.length <= 1) return arr[0] || "";
  return arr.slice(0,-1).join(", ") + " and " + arr[arr.length-1];
}
function actClause(block){ return listJoin(block.actions.map(actionPhrase)); }
function advClause(rule){
  const x=[];
  if (rule.advanced.reverseOnFalse) x.push("reverses when the condition is no longer true");
  if (rule.advanced.enforceSystemWide) x.push("enforced system-wide");
  return x;
}
const cap = s => s.charAt(0).toUpperCase()+s.slice(1);
// Requirement-framed sentence: "When Priority becomes High, make Assignee required for technicians."
function blockSentence(rule, b){
  const cond = condClause(b);
  let s = cond ? `when ${cond}, ${actClause(b)}` : actClause(b);
  if (rule.scope.audience !== "ALL") s += ` for ${audPlural(rule.scope.audience)}`;
  const adv = advClause(rule); if (adv.length) s += ` (${adv.join(", ")})`;
  return s;
}
function summarize(rule){
  if (rule.blocks.length === 1) return cap(blockSentence(rule, rule.blocks[0]) + ".");
  return null; // multiple requirements rendered as a list
}

/* ============================================================ CONFLICTS */
const lcSet = lc => lc==="CREATE_EDIT" ? ["CREATE","EDIT"] : [lc];
const lcOverlap = (a,b) => lcSet(a).some(x => lcSet(b).includes(x));
const scopeOverlap = (a,b) => a==="ALL" || b==="ALL" || a===b;
function triggerOverlap(r1,r2){
  if (!lcOverlap(r1.trigger.lifecycle, r2.trigger.lifecycle)) return false;
  if (r1.trigger.moment !== r2.trigger.moment) return false;
  return scopeOverlap(r1.scope.audience, r2.scope.audience);
}
const allActions = r => r.blocks.flatMap(b => b.actions);
function detectConflicts(rule, all){
  const out = [];
  const others = all.filter(r => r.id !== rule.id && r.status === "ENABLED");
  const mine = allActions(rule);
  for (const o of others){
    if (!triggerOverlap(rule, o)) continue;
    for (const da of mine) for (const oa of allActions(o)){
      if (da.fieldId !== oa.fieldId) continue;
      if (OPPOSITE[da.type] === oa.type){
        out.push({ type:"CONTRADICTORY", severity:"HIGH", with:o, field:da.fieldId,
          text:`This rule does “${actionPhrase(da)}” while ${ruleName(o)} does “${actionPhrase(oa)}” on the same trigger.` });
      } else if (da.type === oa.type){
        out.push({ type:"REDUNDANT", severity:"MEDIUM", with:o, field:da.fieldId,
          text:`This rule duplicates “${actionPhrase(da)}” already done by ${ruleName(o)}.` });
      } else if (da.type==="SET_VALUE" && oa.type==="SET_VALUE" && da.value!==oa.value){
        out.push({ type:"CONTRADICTORY", severity:"HIGH", with:o, field:da.fieldId,
          text:`This rule sets ${fLabel(da.fieldId)} to “${da.value}” but ${ruleName(o)} sets it to “${oa.value}”.` });
      }
    }
  }
  // dedupe by with+field+type
  const seen = new Set();
  return out.filter(c => { const k=c.with.id+c.field+c.type; if(seen.has(k)) return false; seen.add(k); return true; });
}
function ruleName(r){
  const s = summarize(r);
  if (s) return `“${s.replace(/\.$/,"")}”`;
  return `a ${r.blocks.length}-block rule`;
}

/* ============================================================ SIMULATION */
function evalCondition(c, values){
  const raw = values[c.fieldId];
  const v = raw === undefined ? "" : raw;
  switch(c.op){
    case "BECOMES":      return String(v) === String(c.value);
    case "EQUALS":       return String(v) === String(c.value);
    case "NOT_EQUALS":   return String(v) !== String(c.value);
    case "GREATER_THAN": return parseFloat(v) >  parseFloat(c.value);
    case "LESS_THAN":    return parseFloat(v) <  parseFloat(c.value);
    case "CONTAINS":     return String(v).toLowerCase().includes(String(c.value).toLowerCase());
    case "IS_EMPTY":     return !v;
    case "IS_NOT_EMPTY": return !!v;
    default: return false;
  }
}
function evalBlock(block, values){
  if (!block.conditions.length) return true;
  const res = block.conditions.map(c => evalCondition(c, values));
  return block.match === "ALL" ? res.every(Boolean) : res.some(Boolean);
}
function scopeMatchPersona(aud, persona){
  if (aud === "ALL") return true;
  if (aud === "LOGGED_IN") return true; // all demo personas are logged in
  return aud === persona;
}
function applyAction(state, a){
  const s = state[a.fieldId] || (state[a.fieldId] = { visible:true, required:false, enabled:true, value: "" });
  switch(a.type){
    case "SHOW": s.visible=true; break;
    case "HIDE": s.visible=false; break;
    case "MANDATE": s.required=true; break;
    case "OPTIONAL": s.required=false; break;
    case "ENABLE": s.enabled=true; break;
    case "DISABLE": s.enabled=false; break;
    case "SET_VALUE": s.value=a.value; break;
  }
}
function simulate(draft, all, persona, values, moment){
  const ruleset = [...all.filter(r => r.id !== draft.id && r.status === "ENABLED"), draft];
  const applicable = ruleset.filter(r => r.trigger.moment === moment && scopeMatchPersona(r.scope.audience, persona));
  const state = {};
  // init touched fields
  applicable.forEach(r => allActions(r).forEach(a => {
    if (!state[a.fieldId]) state[a.fieldId] = { visible:true, required:false, enabled:true, value: values[a.fieldId]||"" };
  }));
  const trace = [];
  applicable.forEach(r => r.blocks.forEach((b, bi) => {
    const matched = evalBlock(b, values);
    if (matched){
      b.actions.forEach(a => applyAction(state, a));
      trace.push({ ruleId:r.id, isDraft:r.id===draft.id, blockIndex:bi, matched:true, actions:b.actions });
    } else {
      trace.push({ ruleId:r.id, isDraft:r.id===draft.id, blockIndex:bi, matched:false, actions:[] });
    }
  }));
  return { state, trace, applicableCount: applicable.length };
}

function TriggerChip({ trigger }){

}

/* ============================================================ LIST LABELS + ICONS */
const execLabel = lc => ({ CREATE:"On Create", EDIT:"On Edit", CREATE_EDIT:"On Create and Edit" }[lc] || lc);
const eventLabel = m => ({ ON_LOAD:"On Form Load", ON_FIELD_CHANGE:"On Field Change", ON_SUBMIT:"On Form Submit" }[m] || m);
const applicableLabel = a => ({ ALL:"All Users", REQUESTERS:"All Requesters", TECHNICIANS:"All Technicians", LOGGED_IN:"All Logged-in Users" }[a] || a);
function genSlug(rule){
  const b = rule.blocks[0]; if (!b) return "rule";
  const parts = [];
  const c = b.conditions[0]; if (c) parts.push(`${c.fieldId}_${String(c.value||opLabel(c.op)).toLowerCase().replace(/\s+/g,"")}`);
  const a = b.actions[0]; if (a) parts.push(`${a.type.toLowerCase()}_${a.fieldId}`);
  if (rule.blocks.length>1) parts.push(`plus${rule.blocks.length-1}`);
  return parts.join("_") || "rule";
}

/* ============================================================ RULES LIST */
function RulesList({ rules, setRules, onCreate, onEdit }){
  const [expanded, setExpanded] = useState(null);
  const [q, setQ] = useState("");
  const [statusFilter, setStatusFilter] = useState("ALL");
  const [filterOpen, setFilterOpen] = useState(false);

  const conflictsByRule = useMemo(() => { const m={}; rules.forEach(r => m[r.id]=detectConflicts(r,rules)); return m; }, [rules]);

  const toggleStatus = id => setRules(rs => rs.map(r => r.id===id ? {...r, status:r.status==="ENABLED"?"DISABLED":"ENABLED"} : r));
  const duplicate = r => setRules(rs => { const i=rs.findIndex(x=>x.id===r.id); const copy={...JSON.parse(JSON.stringify(r)), id:uid("rule"), audit:{...r.audit, createdBy:"You", createdAt:"just now", version:1}}; const n=[...rs]; n.splice(i+1,0,copy); return n; });
  const remove = id => setRules(rs => rs.filter(r => r.id!==id));

  const visible = rules.filter(r => {
    if (statusFilter!=="ALL" && r.status!==statusFilter) return false;

                <th className="w-40 py-3 pr-4 font-semibold">Rule Applicable For</th>
                <th className="w-36 py-3 pr-4 font-semibold">Rule Event</th>
                <th className="w-48 py-3 pr-4 font-semibold">Created Date</th>
                <th className="w-20 py-3 pr-4 font-semibold">Enabled</th>
                <th className="w-32 py-3 font-semibold">Actions</th>
              </tr>
            </thead>
            <tbody>
              {visible.map((r, idx) => {
                const conflicts = conflictsByRule[r.id] || [];
                const sum = summarize(r);
                const open = expanded === r.id;
                return (
                  <React.Fragment key={r.id}>
                    <tr className={cx("border-b border-slate-100 hover:bg-slate-50/60", r.status==="DISABLED" && "opacity-60")}>
                      <td className="py-4 pl-1 align-top"><input type="checkbox" className="rounded border-slate-300"/></td>
                      <td className="py-4 pr-4 align-top">
                        <div className="cursor-pointer" onClick={()=>setExpanded(open?null:r.id)}>
                          <div className="flex items-center gap-2">
                            <span className="font-medium text-slate-800">{idx+1}. {r.name || (sum ? sum.replace(/\.$/,"") : genSlug(r))}</span>
                            {conflicts.length>0 && <span className="inline-flex items-center gap-1 rounded-full border border-amber-200 bg-amber-50 px-2 py-0.5 text-[11px] font-semibold text-amber-700">⚠ {conflicts.length}</span>}
                          </div>
                          <div className="mt-0.5 text-xs text-slate-400">{sum || `${r.blocks.length} requirements`}</div>
                        </div>
                      </td>
                      <td className="py-4 pr-4 align-top text-slate-600">{execLabel(r.trigger.lifecycle)}</td>
                      <td className="py-4 pr-4 align-top text-slate-600">{applicableLabel(r.scope.audience)}</td>
                      <td className="py-4 pr-4 align-top text-slate-600">{eventLabel(r.trigger.moment)}</td>
                      <td className="py-4 pr-4 align-top text-slate-500">{r.audit.createdAt}</td>
                      <td className="py-4 pr-4 align-top">
                        <button onClick={()=>toggleStatus(r.id)} aria-label="Toggle enabled"
                          className={cx("relative inline-block h-6 w-11 rounded-full transition-colors", r.status==="ENABLED"?"bg-emerald-500":"bg-slate-300")}>
                          <span className={cx("absolute top-0.5 h-5 w-5 rounded-full bg-white shadow transition-all", r.status==="ENABLED"?"left-[22px]":"left-0.5")}/>

                      </td>
                      <td className="py-4 align-top">
                        <div className="flex items-center gap-3">

                          <button title="Duplicate" onClick={()=>duplicate(r)} className="text-slate-400 hover:text-slate-600"><IconCopy/></button>

                          <button title="Delete" onClick={()=>remove(r.id)} className="text-red-400 hover:text-red-600"><IconTrash/></button>
                        </div>
                      </td>
                    </tr>
                    {open && (
                      <tr className="border-b border-slate-100 bg-slate-50/50">
                        <td></td>
                        <td colSpan={7} className="px-1 pb-5 pt-1">
                          <div className="rounded-lg border border-slate-200 bg-white p-4 text-sm">
                            <p className="text-slate-700"><span className="font-medium">In plain English:</span> {sum || "Multiple requirements:"}</p>
                            {!sum && <ol className="mt-1 list-decimal space-y-0.5 pl-5 text-slate-600">{r.blocks.map(b=><li key={b.id}>{b.conditions.length?`When ${condClause(b)}, `:""}{actClause(b)}.</li>)}</ol>}
                            {conflicts.length>0 && (
                              <div className="mt-3 rounded-md border border-amber-200 bg-amber-50 p-3 text-amber-800">
                                <div className="font-semibold">⚠ {conflicts.length} thing{conflicts.length>1?"s":""} to review</div>
                                {conflicts.map((c,i)=><div key={i} className="mt-1 text-xs">{c.text}</div>)}
                              </div>
                            )}
                            <div className="mt-3 flex items-center justify-between border-t border-slate-100 pt-3 text-xs text-slate-500">
                              <span>v{r.audit.version} · modified {r.audit.modifiedAt} by {r.audit.modifiedBy} · created {r.audit.createdAt} by {r.audit.createdBy}</span>
                              <span className="flex gap-3">
                                <button onClick={()=>onEdit(r.id)} className="font-medium text-sky-600 hover:underline">Edit</button>
                                <button onClick={()=>duplicate(r)} className="font-medium text-slate-500 hover:underline">Duplicate</button>
                                <button onClick={()=>remove(r.id)} className="font-medium text-red-500 hover:underline">Delete</button>
                              </span>
                            </div>
                          </div>
                        </td>
                      </tr>
                    )}
                  </React.Fragment>
                );
              })}
            </tbody>
          </table>
          {visible.length===0 && <div className="py-16 text-center text-sm text-slate-400">No rules match your search.</div>}
        </div>
      </div>
    </div>
  );
}

/* ============================================================ TOKEN BUILDER UI */
function Dropdown({ trigger, children, align }){
  const [open,setOpen]=useState(false);
  return (
    <span className="relative inline-block align-middle">
      <span onClick={()=>setOpen(o=>!o)}>{trigger}</span>
      {open && (
        <React.Fragment>
          <div className="fixed inset-0 z-40" onClick={()=>setOpen(false)} />
          <div className={cx("absolute z-50 mt-1 min-w-[190px] rounded-lg border border-slate-200 bg-white p-1 shadow-xl", align==="right"&&"right-0")}>
            {typeof children==="function" ? children(()=>setOpen(false)) : children}
          </div>
        </React.Fragment>
      )}
    </span>
  );
}
const TOKEN_STYLE = {
  field: "bg-sky-50 text-sky-700 border-sky-200 hover:bg-sky-100",
  op:    "bg-slate-100 text-slate-600 border-slate-200 hover:bg-slate-200",
  value: "bg-emerald-50 text-emerald-700 border-emerald-200 hover:bg-emerald-100",
  verb:  "bg-violet-50 text-violet-700 border-violet-200 hover:bg-violet-100",
};
function TokenBtn({ label, kind, warn, placeholder }){
  return (
    <button className={cx("inline-flex items-center gap-1 rounded-md border px-2.5 py-1 text-[15px] font-medium transition-colors",
      placeholder ? "border-dashed border-slate-300 bg-white text-slate-400 hover:text-slate-600" : TOKEN_STYLE[kind||"op"],
      warn && "ring-2 ring-amber-300")}>
      {label}<span className="text-[9px] opacity-50">▼</span>{warn && <span className="text-amber-500">⚠</span>}
    </button>
  );
}
function PickList({ items, onPick, search }){
  const [q,setQ]=useState("");
  const filtered = search ? items.filter(i=>i.label.toLowerCase().includes(q.toLowerCase())) : items;
  return (
    <div>
      {search && <input autoFocus value={q} onChange={e=>setQ(e.target.value)} placeholder="Search…"
        className="mb-1 w-full rounded border border-slate-200 px-2 py-1 text-sm focus:border-sky-400 focus:outline-none" />}
      <div className="max-h-56 overflow-y-auto">
        {filtered.map(i=>(
          <button key={i.value} onClick={()=>onPick(i.value)} className="block w-full rounded px-2 py-1.5 text-left text-sm hover:bg-sky-50">{i.label}</button>
        ))}
        {filtered.length===0 && <p className="px-2 py-1 text-sm text-slate-400">No matches</p>}
      </div>
    </div>
  );
}
function FieldToken({ value, onChange, kind, warn }){
  return <Dropdown trigger={<TokenBtn label={fLabel(value)} kind={kind||"field"} warn={warn} />}>
    {close => <PickList search items={FIELDS.map(f=>({value:f.id,label:f.label}))} onPick={v=>{onChange(v);close();}} />}
  </Dropdown>;
}
function OpToken({ value, onChange }){
  return <Dropdown trigger={<TokenBtn label={opLabel(value)} kind="op" />}>
    {close => <PickList items={OPERATORS.map(o=>({value:o.id,label:o.label}))} onPick={v=>{onChange(v);close();}} />}
  </Dropdown>;
}
function ValueToken({ field, value, onChange }){
  const f = fieldOf(field);
  if (f.type==="select")
    return <Dropdown trigger={<TokenBtn label={value||"choose"} kind="value" placeholder={!value} />}>
      {close => <PickList items={f.options.map(o=>({value:o,label:o}))} onPick={v=>{onChange(v);close();}} />}
    </Dropdown>;
  return <Dropdown trigger={<TokenBtn label={(value===""||value==null)?"a value":String(value)} kind="value" placeholder={value===""||value==null} />}>
    {close => <div className="p-1">
      <input autoFocus type={f.type==="number"?"number":"text"} defaultValue={value}
        onKeyDown={e=>{ if(e.key==="Enter"){ onChange(e.target.value); close(); } }} onBlur={e=>onChange(e.target.value)}
        className="w-40 rounded border border-slate-200 px-2 py-1 text-sm focus:border-sky-400 focus:outline-none" />
      <p className="mt-1 px-1 text-[11px] text-slate-400">Press Enter</p>
    </div>}
  </Dropdown>;
}
function VerbToken({ value, onChange }){
  const label = (ACTION_TYPES.find(t=>t.id===value)||{}).label || value;
  return <Dropdown trigger={<TokenBtn label={label} kind="verb" />}>
    {close => <PickList items={ACTION_TYPES.map(t=>({value:t.id,label:t.label}))} onPick={v=>{onChange(v);close();}} />}
  </Dropdown>;
}
function Pill({ labelPrefix, value, items, onChange }){
  return <Dropdown trigger={
    <button className="inline-flex items-center gap-1.5 rounded-full border border-slate-200 bg-white px-3 py-1 text-sm text-slate-600 hover:bg-slate-50">
      <span className="text-slate-400">{labelPrefix}</span><span className="font-medium text-slate-700">{value}</span><span className="text-[9px] opacity-50">▼</span>
    </button>}>
    {close => <PickList items={items} onPick={v=>{onChange(v);close();}} />}
  </Dropdown>;
}

// labelled field: plain-language label (+ optional required * and InfoHint) · one helper line · control
function FieldA({ label, required, help, info, children }){

    <div>
      <label className="flex items-center text-sm font-semibold text-slate-700">
        {label}{required && <span className="ml-0.5 text-red-500">*</span>}

                <textarea value={draft.description} onChange={e=>update(d=>d.description=e.target.value)} rows={2} placeholder="Describe what this rule does and why…"
                  className="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-sky-400 focus:outline-none focus:ring-1 focus:ring-sky-300" />
              </FieldA>
            </div>}
      </div>

      <div className="border-t border-slate-100" />

                          </Dropdown>
                        : <input value={c.value} onChange={e=>setCond(bi,ci,"value",e.target.value)} type={fieldOf(c.fieldId).type==="number"?"number":"text"} placeholder="value"
                            className="flex-1 rounded-md border border-slate-300 px-3 py-1.5 text-sm focus:border-sky-400 focus:outline-none" />
                    )}
                  </div>
                </div>
              ))}
            </div>
            <button onClick={()=>addCond(bi)} className="mt-2.5 flex items-center gap-2 text-sm font-medium text-sky-600 hover:underline">
              <span className="flex h-5 w-5 items-center justify-center rounded-full bg-sky-100 text-sm leading-none text-sky-600">+</span> Add a condition
            </button>
          </div>

          {/* ACTIONS */}
          <div>
            <h3 className="flex items-center text-sm font-semibold text-slate-700">
              What should happen?
              <InfoHint text={`Choose what happens to the field when the rule runs — show or hide it, make it required or optional, lock it, or set its value.`} />
            </h3>
            <p className="mt-0.5 text-xs text-slate-400">Choose what happens to the field when your conditions match.</p>

            <div className="mt-3 space-y-2.5">
              {b.actions.length===0 && <p className="rounded-md border border-dashed border-slate-200 bg-slate-50 px-3 py-2.5 text-xs text-slate-400">Add at least one thing to do — for example, make a field required when your conditions match.</p>}
              {b.actions.map((a,ai)=>(
                <div key={a.id}>
                  <div className="flex items-center gap-2.5">
                    <button onClick={()=>rmAct(bi,ai)} title="Remove action" className="flex h-5 w-5 shrink-0 items-center justify-center rounded-full bg-slate-200 text-sm leading-none text-slate-500 hover:bg-red-500 hover:text-white">−</button>
                    <div className={cx("flex flex-1 flex-wrap items-center gap-2 rounded-md border p-1.5", conflictFields.has(a.fieldId) ? "border-amber-300 bg-amber-50/40 ring-1 ring-amber-200" : "border-slate-200 bg-white")}>
                      <Dropdown trigger={<span className="cursor-pointer rounded-md bg-slate-100 px-3 py-1.5 text-sm text-slate-700 hover:bg-slate-200">{(ACTION_TYPES.find(t=>t.id===a.type)||{}).label} ▾</span>}>
                        {close => <PickList items={ACTION_TYPES.map(t=>({value:t.id,label:t.label}))} onPick={v=>{setAct(bi,ai,"type",v);close();}} />}
                      </Dropdown>
                      <span className="text-sm text-slate-400">→</span>
                      <Dropdown trigger={<span className="cursor-pointer px-2 text-sm text-slate-700 hover:text-slate-900">{fLabel(a.fieldId)} ▾</span>}>
                        {close => <PickList search items={FIELDS.map(f=>({value:f.id,label:f.label}))} onPick={v=>{setAct(bi,ai,"fieldId",v);close();}} />}
                      </Dropdown>
                      {a.type==="SET_VALUE" && <span className="text-sm text-slate-400">to</span>}
                      {a.type==="SET_VALUE" && (
                        fieldOf(a.fieldId).type==="select"
                          ? <Dropdown trigger={<span className="cursor-pointer rounded-md border border-slate-200 bg-slate-50 px-3 py-1.5 text-sm text-slate-700">{a.value||"choose"} ▾</span>}>
                              {close => <PickList items={fieldOf(a.fieldId).options.map(o=>({value:o,label:o}))} onPick={v=>{setAct(bi,ai,"value",v);close();}} />}
                            </Dropdown>
                          : <input value={a.value} onChange={e=>setAct(bi,ai,"value",e.target.value)} placeholder="value" className="rounded-md border border-slate-300 px-3 py-1.5 text-sm focus:border-sky-400 focus:outline-none" />
                      )}
                    </div>
                  </div>
                  {conflicts.filter(c => c.field===a.fieldId).map((c,i)=>(
                    <div key={i} className="ml-8 mt-1.5 rounded-md border border-amber-200 bg-amber-50 px-3 py-2 text-xs">
                      <p className="text-amber-800"><span className="font-medium">Worth a look:</span> {c.text}</p>
                      <div className="mt-1 flex gap-3 font-medium">
                        <button className="text-amber-700 hover:underline">View that rule</button>
                        <button onClick={()=>dismiss(c)} className="text-amber-700 hover:underline">Keep this rule's version</button>
                        <button onClick={()=>dismiss(c)} className="text-slate-400 hover:underline">Dismiss</button>
                      </div>
                    </div>
                  ))}
                </div>
              ))}
            </div>
            <button onClick={()=>addAct(bi)} className="mt-2.5 flex items-center gap-2 text-sm font-medium text-sky-600 hover:underline">
              <span className="flex h-5 w-5 items-center justify-center rounded-full bg-sky-100 text-sm leading-none text-sky-600">+</span> Add an action
            </button>
          </div>

          {bi < draft.blocks.length-1 && <div className="border-t border-dashed border-slate-200" />}
        </div>
      ))}

      {/* add another set (progressive — most rules need only one) */}
      <button onClick={addBlock} className="text-sm font-medium text-slate-500 hover:text-sky-600">Add another “when this, do that”</button>

      <div className="border-t border-slate-100" />

      {/* advanced options (collapsed by default) */}
      <div>
        <button onClick={()=>setShowAdvanced(s=>!s)} className="flex items-center gap-2 text-sm font-medium text-sky-600 hover:underline">
          <span className="flex h-4 w-4 items-center justify-center rounded-full border border-sky-400 text-[10px] leading-none">{showAdvanced?"˅":"›"}</span> Advanced options
        </button>
        {showAdvanced && (
          <div className="mt-3 space-y-4 rounded-lg border border-slate-200 bg-slate-50 p-4 text-sm">
            <label className={cx("flex items-start gap-2.5", !allActionsReversible && "opacity-40")}>
              <input type="checkbox" disabled={!allActionsReversible} checked={draft.advanced.reverseOnFalse} onChange={e=>setAdv("reverseOnFalse",e.target.checked)} className="mt-0.5" />
              <span className="flex-1">
                <span className="flex items-center font-medium text-slate-700">Undo this automatically when the conditions stop being true<InfoHint text={`Example: if you hide a field when Priority is High, this shows it again the moment Priority changes. Works only with on/off actions (show, hide, required, read-only). Not available with "Set value" — it has no opposite to undo.`} /></span>
                <span className="mt-0.5 block text-xs text-slate-400">Keeps the form tidy — if someone changes a value back, the field returns to how it was.</span>
                {!allActionsReversible && <em className="mt-0.5 block text-xs text-slate-400">Not available with “Set value” (it has no opposite).</em>}
              </span>
            </label>
            <label className="flex items-start gap-2.5">
              <input type="checkbox" checked={draft.advanced.enforceSystemWide} onChange={e=>setAdv("enforceSystemWide",e.target.checked)} className="mt-0.5" />
              <span className="flex-1">
                <span className="flex items-center font-medium text-slate-700">Apply to every request form, not just this one<InfoHint text={`When on, this rule runs on every request form for everyone, ignoring the audience you picked above. Powerful but easy to forget — double-check before saving.`} /></span>
                <span className="mt-0.5 block text-xs text-slate-400">Leave off unless you really need this everywhere. It overrides the “Who should this apply to?” choice across all forms.</span>
                {draft.advanced.enforceSystemWide && <em className="mt-0.5 block text-xs text-amber-600">Overrides “Who should this apply to?” everywhere — use with care.</em>}
              </span>
            </label>
          </div>
        )}
      </div>

      {/* conflict status — calm, inline, never blocking */}
      <div>
        {conflicts.length===0
          ? <div className="flex items-center gap-2 rounded-lg border border-emerald-100 bg-emerald-50/60 px-4 py-2.5 text-sm text-emerald-700"><span>✓</span><span>No conflicts with your other rules.</span></div>
          : <div className="rounded-lg border border-amber-200 bg-amber-50 px-4 py-3 text-sm">
              <p className="flex items-center gap-2 font-medium text-amber-800"><span>⚠</span><span>{conflicts.length} thing{conflicts.length>1?"s":""} to review</span></p>
              <p className="mt-1 text-xs text-amber-700">We found another rule that touches the same field at the same moment. You can still save — this is just a heads-up so nothing surprises you later.</p>
              <ul className="mt-2 space-y-1 text-xs text-amber-800">{conflicts.map((c,i)=>(<li key={i} className="flex gap-1.5"><span>•</span><span>{c.text}</span></li>))}</ul>
            </div>}
      </div>

    </div>
  );
}

/* ============================================================ V6 — OPTION B (familiar, "better organized": section cards + clearer hierarchy) */
// a distinct, scannable section card: numbered chip · title (+ InfoHint) · short helper · content
function SectionB({ n, title, help, info, children }){
  return (
    <section className="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
      <div className="flex items-start gap-3">
        {n!=null && <span className="flex h-7 w-7 shrink-0 items-center justify-center rounded-full bg-sky-50 text-sm font-semibold text-sky-600">{n}</span>}
        <div className="min-w-0 flex-1">
          <h3 className="flex items-center text-sm font-semibold text-slate-800">{title}{info && <InfoHint text={info} />}</h3>
          {help && <p className="mt-0.5 text-xs text-slate-500">{help}</p>}
          <div className="mt-4">{children}</div>
        </div>
      </div>
    </section>
  );
}

function OptionB({ draft, update, conflicts, dismiss, affectedFields, onPreview }){
  const [showAdvanced, setShowAdvanced] = useState(false);
  const [showDesc, setShowDesc] = useState(!!draft.description);

  const b = draft.blocks[0];
  const conflictFields = new Set(conflicts.map(c=>c.field));
  const allActionsReversible = draft.blocks.every(bk => bk.actions.every(a => REVERSIBLE.includes(a.type)));

  const setMatch     = v => update(d => d.blocks[0].match=v);
  const addCond      = () => update(d => d.blocks[0].conditions.push(newCondition()));
  const setCond      = (ci,k,v) => update(d => { d.blocks[0].conditions[ci][k]=v; });
  const rmCond       = ci => update(d => d.blocks[0].conditions.splice(ci,1));
  const addAct       = () => update(d => d.blocks[0].actions.push(newAction()));
  const setAct       = (ai,k,v) => update(d => { d.blocks[0].actions[ai][k]=v; });
  const rmAct        = ai => update(d => d.blocks[0].actions.splice(ai,1));
  const setAdv       = (k,v) => update(d => { d.advanced[k]=v; });
  const setBlockMode = m => update(d => { d.blocks[0].mode=m; });

  return (
    <div className="space-y-4">

      {/* basics — name + optional note */}
      <div className="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
        <FieldA label="Rule name" required
          help={`Give it a name a teammate would understand at a glance. You'll see it in the rules list.`}
          info={`A short, recognisable name — e.g. "Require an approver for high-cost requests." It only appears to admins on the rules list, never to end users.`}>
          <input value={draft.name} onChange={e=>update(d=>d.name=e.target.value)} placeholder="e.g. Require an approver for high-cost requests"
            className="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-sky-400 focus:outline-none focus:ring-1 focus:ring-sky-300" />
        </FieldA>
        {!showDesc
          ? <button onClick={()=>setShowDesc(true)} className="mt-2 text-sm font-medium text-sky-600 hover:underline">Add a note</button>
          : <div className="mt-3"><FieldA label="Notes (optional)" help={`Add a sentence about why this rule exists, so the next admin knows what it's for.`}>
              <textarea value={draft.description} onChange={e=>update(d=>d.description=e.target.value)} rows={2} placeholder="Describe what this rule does and why…"
                className="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-sky-400 focus:outline-none focus:ring-1 focus:ring-sky-300" />
            </FieldA></div>}
      </div>

      {/* 1 — What should happen? (intent-first) */}
      <SectionB n={1} title="What should happen?" help={`Choose what this rule does to the form when it runs.`}
        info={`Choose what happens to the field when the rule runs — show or hide it, make it required or optional, lock it, or set its value.`}>
        <div className="mt-3 space-y-2.5">
          {b.actions.length===0 && <p className="rounded-md border border-dashed border-slate-200 bg-slate-50 px-3 py-2.5 text-xs text-slate-400">Add at least one thing to do — for example, make a field required when your conditions match.</p>}
          {b.actions.map((a,ai)=>(
            <div key={a.id}>
              <div className="flex items-center gap-2.5">
                <button onClick={()=>rmAct(ai)} title="Remove action" className="flex h-5 w-5 shrink-0 items-center justify-center rounded-full bg-slate-200 text-sm leading-none text-slate-500 hover:bg-red-500 hover:text-white">−</button>
                <div className={cx("flex flex-1 flex-wrap items-center gap-2 rounded-md border p-1.5", conflictFields.has(a.fieldId) ? "border-amber-300 bg-amber-50/40 ring-1 ring-amber-200" : "border-slate-200 bg-white")}>
                  <Dropdown trigger={<span className="cursor-pointer rounded-md bg-slate-100 px-3 py-1.5 text-sm text-slate-700 hover:bg-slate-200">{(ACTION_TYPES.find(t=>t.id===a.type)||{}).label} ▾</span>}>
                    {close => <PickList items={ACTION_TYPES.map(t=>({value:t.id,label:t.label}))} onPick={v=>{setAct(ai,"type",v);close();}} />}
                  </Dropdown>
                  <span className="text-sm text-slate-400">→</span>
                  <Dropdown trigger={<span className="cursor-pointer px-2 text-sm text-slate-700 hover:text-slate-900">{fLabel(a.fieldId)} ▾</span>}>
                    {close => <PickList search items={FIELDS.map(f=>({value:f.id,label:f.label}))} onPick={v=>{setAct(ai,"fieldId",v);close();}} />}
                  </Dropdown>
                  {a.type==="SET_VALUE" && <span className="text-sm text-slate-400">to</span>}
                  {a.type==="SET_VALUE" && (
                    fieldOf(a.fieldId).type==="select"
                      ? <Dropdown trigger={<span className="cursor-pointer rounded-md border border-slate-200 bg-slate-50 px-3 py-1.5 text-sm text-slate-700">{a.value||"choose"} ▾</span>}>
                          {close => <PickList items={fieldOf(a.fieldId).options.map(o=>({value:o,label:o}))} onPick={v=>{setAct(ai,"value",v);close();}} />}
                        </Dropdown>
                      : <input value={a.value} onChange={e=>setAct(ai,"value",e.target.value)} placeholder="value" className="rounded-md border border-slate-300 px-3 py-1.5 text-sm focus:border-sky-400 focus:outline-none" />
                  )}
                </div>
              </div>
              {conflicts.filter(c => c.field===a.fieldId).map((c,i)=>(
                <div key={i} className="ml-8 mt-1.5 rounded-md border border-amber-200 bg-amber-50 px-3 py-2 text-xs">
                  <p className="text-amber-800"><span className="font-medium">Worth a look:</span> {c.text}</p>
                  <div className="mt-1 flex gap-3 font-medium">
                    <button className="text-amber-700 hover:underline">View that rule</button>
                    <button onClick={()=>dismiss(c)} className="text-amber-700 hover:underline">Keep this rule's version</button>
                    <button onClick={()=>dismiss(c)} className="text-slate-400 hover:underline">Dismiss</button>
                  </div>
                </div>
              ))}
            </div>
          ))}
        </div>
        <button onClick={addAct} className="mt-2.5 flex items-center gap-2 text-sm font-medium text-sky-600 hover:underline">
          <span className="flex h-5 w-5 items-center justify-center rounded-full bg-sky-100 text-sm leading-none text-sky-600">+</span> Add an action
        </button>
      </SectionB>

      {/* 2 — When should it happen? */}
      <SectionB n={2} title="When should it happen?" help={`Set which requests this applies to, and the moment it acts.`}>
        <div className="grid gap-4 sm:grid-cols-2">
          <FieldA label="Which requests?" help={`New, existing (being edited), or both.`}
            info={`"New requests" runs while someone raises a request for the first time. "Existing requests" runs when someone reopens and edits a request that's already been raised. Pick "Both" if it should behave the same either way.`}>
            <Select value={draft.trigger.lifecycle} onChange={v=>update(d=>d.trigger.lifecycle=v)} options={A_LIFECYCLE} className="h-10 w-full" />
          </FieldA>
          <FieldA label="At what point?" help={`The moment this rule acts.`}
            info={`"When the form opens" runs once before anyone types. "While the form is being filled" re-checks every time a field changes. "When the form is submitted" runs a final check as someone submits — use this for validation.`}>
            <Select value={draft.trigger.moment} onChange={v=>update(d=>d.trigger.moment=v)} options={A_MOMENT} className="h-10 w-full" />

        </div>
        {draft.trigger.moment==="ON_FIELD_CHANGE" && (
          <div className="mt-4">
            <FieldA label="Which field should it watch?" help={`The rule re-checks each time this field changes.`}>
              <Select value={draft.trigger.fieldId||"priority"} onChange={v=>update(d=>d.trigger.fieldId=v)} options={FIELDS.map(f=>({value:f.id,label:f.label}))} className="h-10 w-full sm:w-1/2" />
            </FieldA>
          </div>
        )}
      </SectionB>

      {/* 3 — Who should this affect? */}
      <SectionB n={3} title="Who should this affect?" help={`Choose which people see this behaviour. Everyone is the safe default.`}
        info={`"Everyone" applies to all users of the form. "Requesters" are the people raising requests; "Technicians" are agents working on them; "Signed-in users only" excludes anyone using the form without logging in.`}>
        <Select value={draft.scope.audience} onChange={v=>update(d=>d.scope.audience=v)} options={AUD_FRIENDLY.map(a=>({value:a.id,label:a.label}))} className="h-10 w-full sm:w-1/2" />
      </SectionB>

      {/* 4 — What conditions must match? */}
      <SectionB n={4} title="What conditions must match?" help={`Limit when this rule acts. Leave empty to run every time.`}
        info={`"Match all" acts only when every line below is true at the same time. "Match any" acts as soon as a single line is true. With one condition this makes no difference.`}>
        {b.conditions.length>1 && (
          <div className="mb-3 flex flex-wrap items-center gap-x-6 gap-y-2 text-sm text-slate-600">
            <label className="flex cursor-pointer items-center gap-2"><input type="radio" checked={b.match==="ALL"} onChange={()=>setMatch("ALL")} className="accent-sky-500" /> Match all of the conditions below</label>
            <label className="flex cursor-pointer items-center gap-2"><input type="radio" checked={b.match==="ANY"} onChange={()=>setMatch("ANY")} className="accent-sky-500" /> Match any of the conditions below</label>
          </div>
        )}
        <div className="space-y-2.5">
          {b.conditions.length===0 && <p className="rounded-md border border-dashed border-slate-200 bg-slate-50 px-3 py-2.5 text-xs text-slate-400">No conditions yet — this rule runs every time. Add a condition to make it act only in specific cases.</p>}
          {b.conditions.map((c,ci)=>(
            <div key={c.id} className="flex items-center gap-2.5">
              <button onClick={()=>rmCond(ci)} title="Remove condition" className="flex h-5 w-5 shrink-0 items-center justify-center rounded-full bg-slate-200 text-sm leading-none text-slate-500 hover:bg-red-500 hover:text-white">−</button>
              <div className="flex flex-1 flex-wrap items-center gap-2 rounded-md border border-slate-200 bg-white p-1.5">
                <Dropdown trigger={<span className="cursor-pointer rounded-md bg-slate-100 px-3 py-1.5 text-sm text-slate-700 hover:bg-slate-200">{fLabel(c.fieldId)} ▾</span>}>
                  {close => <PickList search items={FIELDS.map(f=>({value:f.id,label:f.label}))} onPick={v=>{setCond(ci,"fieldId",v);close();}} />}
                </Dropdown>
                <Dropdown trigger={<span className="cursor-pointer px-1 text-sm text-slate-500 hover:text-slate-700">{opLabel(c.op)} ▾</span>}>
                  {close => <PickList items={OPERATORS.map(o=>({value:o.id,label:o.label}))} onPick={v=>{setCond(ci,"op",v);close();}} />}
                </Dropdown>
                {!VALUELESS.includes(c.op) && (

                        {close => <PickList items={fieldOf(c.fieldId).options.map(o=>({value:o,label:o}))} onPick={v=>{setCond(ci,"value",v);close();}} />}
                      </Dropdown>
                    : <input value={c.value} onChange={e=>setCond(ci,"value",e.target.value)} type={fieldOf(c.fieldId).type==="number"?"number":"text"} placeholder="value"
                        className="flex-1 rounded-md border border-slate-300 px-3 py-1.5 text-sm focus:border-sky-400 focus:outline-none" />
                )}

            </div>
