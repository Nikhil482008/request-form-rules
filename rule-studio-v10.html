/* ============================================================ DATA */
const BRAND = "#1593d4";

// Left palette — Custom Fields, grouped exactly as the product
const PALETTE = [
  { group:"Text Fields",      items:[

// Center canvas — Request Form, in the exact order/layout from the screenshot.
// Rows of 2 entries render side-by-side; single entries are full width.
// `half` = a lone field that occupies only the LEFT column of the two-column grid, as in production. The form
// canvas keys off row length alone and is unaffected; the Run Test preview honours it so it mirrors production.
const fld = (id, label, kind, opts={}) =>
  ({ id, label, kind, placeholder: opts.placeholder || "Select", required: !!opts.required, half: !!opts.half });
const FORM_ROWS = [
  [ fld("fill_template",    "Fill From Template", "select", {half:true}) ],
  [ fld("transition_model", "Transition Model",   "select", {half:true}) ],
  [ fld("requester",        "Requester",          "text", {required:true}) ],
  [ fld("cc_emails",        "Cc Emails",          "adder") ],
  [ fld("subject",          "Subject",            "text", {required:true}) ],
  [ fld("description",      "Description",        "richtext") ],
  [ fld("status",           "Status",             "select", {half:true}) ],
  [ fld("priority", "Priority", "select"), fld("urgency",  "Urgency",  "select") ],
  [ fld("impact",   "Impact",   "select"), fld("category", "Category", "select") ],
  [ fld("tech_group", "Technician Group", "select"), fld("assignee", "Assignee", "select", {placeholder:"Select Technician"}) ],
  [ fld("department", "Department", "select"), fld("vendor", "Vendor", "select") ],
  [ fld("location",  "Location", "select", {half:true}) ],
  [ fld("tags",      "Tags",     "adder") ],
  [ fld("attachment","Attachment","attach") ],
];
const ALL_FIELDS = FORM_ROWS.flat();
// Display labels for demo-only fields that aren't part of the form builder (used by the HR Rule UI Exp demo).
const DEMO_FIELD_LABELS = { employee_id:"Employee ID", department:"Department", designation:"Designation", joining_date:"Joining Date" };
const labelOf = id => (ALL_FIELDS.find(f=>f.id===id) || {}).label || DEMO_FIELD_LABELS[id] || id;

// ---- Rule model (mock data; no engine in this step) ------------------------------------------
// A rule = trigger (when) + audience + conditions (IF) + actions (THEN). Per-field rule awareness,
// the insight-rich picker, and the plain-English summary are all DERIVED from this one model.
// V9 operator / action vocabulary (reused verbatim so V9 and V10 read identically).
// Operator sets are FIELD-TYPE-AWARE: a field's kind decides which operators it offers —
//   adder fields  (Tags, Cc Emails)                         → Match Any / Match All / Is Empty / Is Not Empty
//   select fields (Status, Priority, Category, Department …) → Is / Is Not / Is Empty / Is Not Empty  (single-choice + lookups)
//   text fields   (Requester, Subject, Description, text …)  → Equals / Not Equals / Start With / End With / Contains / Is (Not) Blank
const OP_SETS = {
  TEXT:       ["Equals","Not Equals","Start With","End With","Contains","Is Not Blank","Is Blank"],
  SELECT:     ["Is","Is Not","Is Empty","Is Not Empty"],
  CHOICE:     ["Match Any","Match All","Is Empty","Is Not Empty"],
  MEMBERSHIP: ["In","Not In"],   // legacy — retained for back-compat; no field maps to it anymore
};
const OPS = [...OP_SETS.TEXT, ...OP_SETS.SELECT, ...OP_SETS.CHOICE];   // full set (fallback / lookups)
const opsetOf = id => { if(id==="tags") return "SELECT"; const f=ALL_FIELDS.find(x=>x.id===id)||{}; if(f.kind==="adder") return "CHOICE"; if(f.kind==="select") return "SELECT"; return "TEXT"; };
const fieldOps = id => OP_SETS[opsetOf(id)] || OP_SETS.TEXT;              // operators valid for this field
// Strictly the field's own operator group — never mix operators from another group into the dropdown.
// (A stored operator that isn't valid for the field simply shows unselected, prompting a re-pick.)
const condOps = c => fieldOps(c && c.fieldId);
const OPS_NOVALUE = ["Is Empty","Is Not Empty","Is Blank","Is Not Blank"];
const OPS_MULTI = ["Match Any","Match All","In","Not In"];
const OP_PHRASE = { "Equals":"is", "Not Equals":"is not", "Start With":"starts with", "End With":"ends with", "Contains":"contains", "Match Any":"is any of", "Match All":"is all of", "Is":"is", "Is Not":"is not", "Is Empty":"is empty", "Is Not Empty":"is not empty", "Is Blank":"is blank", "Is Not Blank":"is not blank", "In":"is in", "Not In":"is not in" };
const BEHAVIORS = ["Show","Hide","Mandate","Non-Mandate","Enable","Disable","Set Value","Clear Value","Show Options","Hide Options","Run Custom Script","Filter Data"];
// These state-toggle behaviors make sense only once per block — once used, they're disabled in later action rows
// of the same block. The value/option behaviors (Set Value, Clear Value, Show/Hide Options, …) can repeat.
const SINGLE_USE_ACTIONS = ["Show","Hide","Mandate","Non-Mandate","Enable","Disable"];
// ---- Action-pair conflict matrix -------------------------------------------------------------
// The OPPOSING action pairs from the Step-6 reference table — the single source of truth for what "opposes" on
// a shared field. Symmetric, so keyed order-independently. Anything not listed here (and not a same-action case,
// handled below) is INDEPENDENT → not a conflict — e.g. one rule hides while the other sets a value.
const ACTION_HARD_PAIRS = [
  ["Show","Hide"],                                              // visible vs gone
  ["Mandate","Non-Mandate"],                                    // required vs optional
  ["Enable","Disable"],                                         // editable vs locked
  ["Set Value","Clear Value"],                                  // writes vs wipes
  ["Hide","Mandate"],                                           // hidden AND required
  ["Clear Value","Mandate"],                                    // emptied AND required
  ["Disable","Mandate"],                                        // locked AND required
  ["Hide Options","Mandate"],                                   // no options AND required (Hide Options = ALL)
  ["Show","Hide Options"],                                      // visible but every option hidden
  ["Show Options","Hide Options"],                              // same option key shown + hidden
];
const pairKey = (a,b) => [a,b].sort().join(" | ");
const ACTION_HARD_SET = new Set(ACTION_HARD_PAIRS.map(p=> pairKey(p[0],p[1])));
// Actions whose clash depends on the CONFIGURED VALUE, not the type alone (the matrix classifies types only).
const VALUE_ACTIONS = ["Set Value"];
const isValueAct = a => VALUE_ACTIONS.indexOf(a) >= 0;
// THREE outcomes, mirroring the reference's two tabs + "Nothing":
//   "conflict"   — opposing actions on the shared field (red).
//   "duplicate"  — the SAME action (and, for value actions, the SAME value): the other rule is redundant (gold).
//   "compatible" — independent actions or a same-value no-op: show nothing.
// The reference's Steps 1–4 (do both rules certainly fire together?) are NOT modelled — this is a UI demo, so
// every fixture pair is authored already knowing its two rules pass those gates.
const pairVerdict = (a, b, va, vb) => {
  if(a === b) return isValueAct(a)
    ? ((va||"") === (vb||"") ? "duplicate" : "conflict")   // same field: same value = duplicate, different = conflict
    : "duplicate";                                          // same non-value action = identical effect = redundant
  return ACTION_HARD_SET.has(pairKey(a,b)) ? "conflict" : "compatible";
};
// LEGACY matrix — the pre-duplicate ruleset, kept ONLY for R23 (`DEMO_S8.legacy`), which is reverted to its
// last-pushed behaviour: binary verdict (conflict | drop), Hide↔Set Value and Set Value↔Hide Options still count

const cap = s => s ? s.charAt(0).toUpperCase() + s.slice(1) : s;
const condPhrase = c => {
  const f = labelOf(c.fieldId);
  if (OPS_NOVALUE.indexOf(c.op) >= 0) return f + " " + (OP_PHRASE[c.op] || "is set");
  const v = Array.isArray(c.value) ? c.value.join(" / ") : c.value;
  return f + " " + (OP_PHRASE[c.op] || "is") + " " + (v || "a value");
};
const actionPhrase = a => {
  const ids = (a.fieldIds && a.fieldIds.length) ? a.fieldIds : (a.fieldId ? [a.fieldId] : []);
  const f = ids.length ? ids.map(labelOf).join(" & ") : "the field";
  if (a.behavior==="Show") return "show " + f;
  if (a.behavior==="Hide") return "hide " + f;
  if (a.behavior==="Mandate") return "make " + f + " mandatory";
  if (a.behavior==="Non-Mandate") return "make " + f + " optional";
  if (a.behavior==="Enable") return "enable " + f;
  if (a.behavior==="Disable") return "disable " + f;
  if (a.behavior==="Set Value") return "set " + f + (a.value ? " to " + a.value : "");
  if (a.behavior==="Clear Value") return "clear " + f;
  if (a.behavior==="Show Options") return "show options for " + f + (Array.isArray(a.value)&&a.value.length ? " (" + a.value.join(", ") + ")" : "");
  if (a.behavior==="Hide Options") return "hide options for " + f + (Array.isArray(a.value)&&a.value.length ? " (" + a.value.join(", ") + ")" : "");
  if (a.behavior==="Run Custom Script") return "run a custom script";
  if (a.behavior==="Filter Data"){
    const ent = (FD_PERSONS.find(p=>p.value===a.entity)||{}).label;
    const sf  = (FD_USER_FIELDS.find(p=>p.value===a.srcField)||{}).label;
    return (ent && sf) ? ("filter data by " + ent + "’s " + sf + (a.value ? " = " + a.value : "")) : "filter data";
  }
  return (a.behavior || "update") + " " + f;
};
function summarize(rule){
  const conds = (rule.conditions || []).filter(c=>c.fieldId);
  const acts  = (rule.actions || []).filter(a=>a.fieldId);
  if (!acts.length) return "Add an action to describe what this rule does.";
  const condText = conds.length ? "when " + conds.map(condPhrase).join(" and ") + ", " : "";
  const actText  = acts.map(actionPhrase).join(", and ");
  const aud = (rule.audience && rule.audience !== "Everyone") ? " for " + rule.audience : "";
  return cap(condText + actText + aud) + ".";
}

const fieldsOfRule = r => {
  const s = [];
  (r.conditions || []).forEach(c=> { if (c.fieldId && s.indexOf(c.fieldId) < 0) s.push(c.fieldId); });
  (r.actions || []).forEach(a=> { if (a.fieldId && s.indexOf(a.fieldId) < 0) s.push(a.fieldId); });
  return s;
};
const affectedFields = r => {
  const s = [];
  (r.actions || []).forEach(a=> { if (a.fieldId && s.indexOf(a.fieldId) < 0) s.push(a.fieldId); });
  return s;
};
const ruleUsesField = (r, fieldId) => fieldsOfRule(r).indexOf(fieldId) >= 0;
// Role-specific relevance: rules that already use the field as a condition / as an action target.
const condRulesFor = fieldId => RULE_DB.filter(r=> (r.conditions||[]).some(c=> c.fieldId===fieldId));
const actRulesFor  = fieldId => RULE_DB.filter(r=> (r.actions||[]).some(a=> a.fieldId===fieldId));
const ruleList   = fieldId => RULE_DB.filter(r=> ruleUsesField(r, fieldId));
const ruleCount  = fieldId => ruleList(fieldId).length;
const totalRules = () => RULE_DB.length;
const coveredFields = () => ALL_FIELDS.filter(f=> ruleCount(f.id) > 0).length;

// Mock metadata so the table reads like a live inventory (V10 rules don't store exec-on / created date).
const RULE_EXEC    = ["On Create","On Edit","On Create and Edit"];
const RULE_CREATED = ["02 Jun 2026","27 May 2026","14 Jun 2026","18 May 2026","09 Jun 2026","05 Jun 2026","21 May 2026"];
// Freeze the mock exec / created onto each seeded rule (one-time, by original position) so the inventory can be
// reordered or have new rules added without the existing rows' columns shifting. Saved rules carry their own values.
RULE_DB.forEach((r,i)=>{ if(!r.exec) r.exec = RULE_EXEC[i % RULE_EXEC.length]; if(!r.created) r.created = RULE_CREATED[i % RULE_CREATED.length]; });
// ---- Local persistence: ONE inventory shared by Form Builder + Form Rules, surviving refresh/navigation ----
// The store key is versioned — bump it to discard saved rules and fall back to the seeds above.
// Bumped to v3: r23 gained its three clean actions, and merge-by-id below lets a STORED r23 win over the
// seed — so without this bump any browser that had already saved would keep the old 5-action r23 while the
// Run Test preview (which resolves by rule name) still claimed effects on tags/fill_template/transition_model.
const RULE_STORE_KEY = "v10_form_rules_v3";
function saveStoredRules(){ try { localStorage.setItem(RULE_STORE_KEY, JSON.stringify(RULE_DB)); } catch(_){} }
(function hydrateRules(){
  try {
    const raw = localStorage.getItem(RULE_STORE_KEY);
    if(raw){ const arr = JSON.parse(raw); if(Array.isArray(arr) && arr.length){
      // Merge-by-id: stored rules win (preserve user edits), but any in-code seed missing from storage is
      // spliced back in — so newly-added seed rules always surface without discarding what the user saved.
      const seeds = RULE_DB.slice(); RULE_DB.length = 0; arr.forEach(r=> RULE_DB.push(r));
      seeds.forEach(s=>{ if(!RULE_DB.some(r=> r.id===s.id)) RULE_DB.push(s); });
    } }
  } catch(_){}
})();
// --- Listing conflict model: a rule's actions/conditions vs every other saved rule. -----------------
// Two ways rules collide: (1) both act on the same field (contradict / duplicate / both change it), and
// (2) one rule hides/disables/clears a field another rule relies on in its conditions.
const HIDE_LIKE = { Hide:1, Disable:1, "Clear Value":1 };
const actVerb = (b, f) => {
  const L = labelOf(f);
  switch(b){
    case "Show": return "shows " + L;
    case "Hide": return "hides " + L;
    case "Mandate": return "makes " + L + " mandatory";
    case "Non-Mandate": return "makes " + L + " optional";
    case "Enable": return "enables " + L;
    case "Disable": return "disables " + L;
    case "Set Value": return "sets " + L;
    case "Clear Value": return "clears " + L;
    case "Filter Data": return "filters " + L;
    default: return (b ? b.toLowerCase() : "changes") + " " + L;
  }
};
// A rule's action / condition rows, honoring multi-block rules (blocks) AND flat seeds alike — so the SAME
// targets are read whether the input is a live draft, a freshly-saved multi-block rule, or a flat seeded rule.
const flatGroups = items => (items||[]).flatMap(it => (it && it.group) ? (it.conditions||[]) : [it]);
const ruleActions    = r => (r && r.blocks && r.blocks.length) ? r.blocks.flatMap(b=> b.actions||[]) : ((r && r.actions)||[]);
const ruleConditions = r => (r && r.blocks && r.blocks.length) ? flatGroups(r.blocks.flatMap(b=> b.conditions||[])) : flatGroups((r && r.conditions)||[]);
const actTargets = r => { const m={}; ruleActions(r).forEach(a=>{ const ids=(a.fieldIds&&a.fieldIds.length)?a.fieldIds:(a.fieldId?[a.fieldId]:[]); ids.forEach(f=>{ if(f) m[f]=a.behavior; }); }); return m; };
const condTargets = r => { const s={}; ruleConditions(r).forEach(c=>{ if(c && c.fieldId) s[c.fieldId]=true; }); return s; };
function conflictsFor(rule){
  if(!rule) return [];
  const out = []; const myAct = actTargets(rule), myCond = condTargets(rule);
  RULE_DB.forEach(o=>{
    if(o.id===rule.id || o.disabled) return;   // a disabled rule can't conflict — it won't run
    const oAct = actTargets(o), oCond = condTargets(o);
    const reasons = []; const seen = {};
    const push = (field, reason) => { const key=field+"|"+reason; if(!seen[key]){ seen[key]=1; reasons.push({field, reason}); } };
    Object.keys(myAct).forEach(f=>{
      if(f in oAct){
        const mb=myAct[f], ob=oAct[f];
        if(OPP_BEHAVIOR[mb]===ob) push(f, "Contradicts — this rule " + actVerb(mb,f) + ", while “" + o.name + "” " + actVerb(ob,f) + ".");
        else if(mb===ob) push(f, "Duplicate — both rules " + actVerb(mb,f) + ".");
        else push(f, "Both rules change " + labelOf(f) + " — “" + o.name + "” " + actVerb(ob,f) + ".");
      }
    });
    Object.keys(myAct).forEach(f=>{ if(HIDE_LIKE[myAct[f]] && (f in oCond)) push(f, "This rule " + actVerb(myAct[f],f) + ", but “" + o.name + "” relies on " + labelOf(f) + " in its conditions."); });
    Object.keys(oAct).forEach(f=>{ if(HIDE_LIKE[oAct[f]] && (f in myCond)) push(f, "“" + o.name + "” " + actVerb(oAct[f],f) + ", which this rule needs in its conditions."); });
    if(reasons.length) out.push({ rule:o, reasons });
  });
  return out;
}

function RulesListing({customSel, onEditRule, onCustom, onToast}){

function crList(arr){
  if(arr.length===1) return arr[0];

function crSectionPreview(section, ids){

  if(!opts.length) return null;
  if(section.type==="radio"){
    const o = opts[0];
    return (section.lead ? section.lead + " " : "") + (o.clause || o.label) + (section.tail ? " " + section.tail : "") + ".";
  }
  const list = crList(opts.map(o=> o.clause || o.label));
  return (section.lead ? section.lead + " " : "") + list + (section.tail ? (" " + section.tail) : "") + ".";

// --- Resizable side drawers (V10) -------------------------------------------------------------------
// Right-anchored drawers can be widened/narrowed by dragging their LEFT edge. Default width is unchanged
// (each drawer seeds the hook with its existing width); width is clamped to sensible min/max + viewport.
function useDrawerResize(initialWidth, min, max){
  const [width, setWidth] = useState(initialWidth);
  const [dragging, setDragging] = useState(false);
  const onMouseDown = e => {
    e.preventDefault();
    const startX = e.clientX, startW = width;
    setDragging(true);
    document.body.style.userSelect = "none";
    document.body.style.cursor = "col-resize";
    const onMove = ev => {
      const hi = Math.min(max, window.innerWidth - 40);
      let w = startW + (startX - ev.clientX);   // right-anchored: drag left → wider, drag right → narrower
      w = Math.max(min, Math.min(hi, w));
      setWidth(w);
    };
    const onUp = () => {
      setDragging(false);
      document.body.style.userSelect = "";
      document.body.style.cursor = "";
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
    };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
  };
  return { width, dragging, onMouseDown };
}
// Visual cue on the drawer's left edge: a hairline that brightens on hover, plus a small grip pill (3 dots).
function DrawerResizer({onMouseDown, dragging}){
  return (
    <div onMouseDown={onMouseDown} title="Drag to resize" role="separator" aria-orientation="vertical"
      className="group absolute top-0 -left-1.5 z-[60] h-full w-3 cursor-col-resize select-none">
      <div className={"absolute left-1/2 top-0 h-full w-px -translate-x-1/2 transition-colors " + (dragging ? "bg-sky-400" : "bg-transparent group-hover:bg-sky-300")}/>
      <div className={"absolute left-1/2 top-1/2 flex h-9 w-[7px] -translate-x-1/2 -translate-y-1/2 flex-col items-center justify-center gap-[3px] rounded-full border shadow-sm transition-colors " + (dragging ? "border-sky-300 bg-sky-50" : "border-slate-200 bg-white group-hover:border-sky-300")}>
        {[0,1,2].map(i=> <span key={i} className={"h-[3px] w-[3px] rounded-full " + (dragging ? "bg-sky-500" : "bg-slate-300 group-hover:bg-sky-400")}/>)}

  );
}

  const conds = (block.conditions||[]).filter(it=> it.group ? (it.conditions||[]).some(c=>c.fieldId) : it.fieldId);
  const acts  = (block.actions||[]).filter(a=> a.behavior && (a.fieldId || (a.fieldIds && a.fieldIds.length) || (a.behavior==="Filter Data" && a.entity && a.srcField)));
  if (!acts.length) return null;
  const join = block.match==="any" ? " or " : " and ";
  const condText = conds.length ? "when " + conds.map(itemPhrase).join(join) + ", " : "";
  const actText  = acts.map(actionPhrase).join(", and ");

function GuidedDropdown({value, onChange, options, guide, placeholder, hint, variant, highlight, multi, autoOpen}){

  const norm = options.map(o=> (o && typeof o==="object") ? o : {value:o, label:o});

  const arr = Array.isArray(value) ? value : (value ? [value] : []);
  const sel = norm.find(o=> o.value===value);
  const hasPanel = !!guide || !!hint;

  const filtered = ql ? norm.filter(o=> (o.label||"").toLowerCase().indexOf(ql) >= 0) : norm;
  const showSearch = norm.length > 6;
  const subOf = o => o.desc || (guide && guide[o.value] && guide[o.value].desc) || null;
  const labelFor = v => { const o = norm.find(x=>x.value===v); return o ? o.label : v; };

    const r = btnRef.current.getBoundingClientRect();

    let left = r.left; if (left + W > window.innerWidth - 8) left = window.innerWidth - W - 8; if (left < 8) left = 8;
    // Anchor to the trigger: open below if it fits (or there's no room above); otherwise flip directly

                    <span className="min-w-0 leading-snug">{o.label}</span>

              </div>

    </>
  );

// A branch leaf: a real elbow (vertical trunk segment + horizontal arm meeting at a corner) plus a
// node dot, so each condition/action hangs off the trunk like a file tree. The last child terminates

  const v = isLast ? "before:h-[28px]" : "before:bottom-0";
  return (
    <div className={"relative pl-9 py-2.5 before:content-[''] before:absolute before:left-[15px] before:top-0 before:w-px before:" + line + " " + v +
      " after:content-[''] after:absolute after:left-[15px] after:top-[28px] after:-translate-y-1/2 after:w-[18px] after:h-px after:" + line}>
      <span className={"absolute left-[31px] top-[28px] -translate-y-1/2 w-1.5 h-1.5 rounded-full bg-white ring-1 " + ring} aria-hidden="true"/>
      <div className="min-w-0">{children}</div>
    </div>
  );
}
// AND/OR junction: the trunk passes straight through and the pill tucks over it, reading as a node.

    <div className={"relative h-6 before:content-[''] before:absolute before:left-[15px] before:top-0 before:bottom-0 before:w-px " + (faint ? "before:bg-slate-200" : "before:bg-slate-300")}>

// Nested condition group rendered as its own deeper branch (connector lines + indentation, no card).

        </div>}
    </div>

/* ============================================================ V7-STYLE FORM RULE EDITOR

const V7_FIELD_GROUPS = [

// Compact ⚠ conflict indicator that lives INSIDE a field control (fields dropdown / condition field picker),

// Grouped + searchable field picker (V7 field organisation over V10's form fields).
function V7FieldPicker({value, onChange, placeholder, conflict, onConflict, conflictLabel, autoOpen}){
  const [open, setOpen] = useState(false);
  const [q, setQ] = useState("");
  const [pos, setPos] = useState(null);
  const btn = useRef(null);
  // Progressive disclosure — open automatically when the parent marks this as the active step.
  useEffect(()=>{ if(autoOpen && !open){ const t=setTimeout(()=>{ if(btn.current) openMenu(); }, 30); return ()=>clearTimeout(t); } }, [autoOpen]);
  const openMenu = () => {
    const r = btn.current.getBoundingClientRect();
    const W = 280, H = 360;
    let left = r.left; if (left + W > window.innerWidth - 8) left = window.innerWidth - W - 8; if (left < 8) left = 8;
    // Anchor to the trigger: below if it fits, else directly above (never jump to the top of the screen).
    const fitsBelow = r.bottom + 4 + H <= window.innerHeight - 8;
    setPos((fitsBelow || r.top < H)
      ? { left, top: r.bottom + 4 }
      : { left, bottom: (window.innerHeight - r.top) + 4 });
    setQ(""); setOpen(true);
  };
  const ql = q.trim().toLowerCase();
  const groups = V7_FIELD_GROUPS
    .map(g=>({ label:g.label, items: g.ids.map(id=>ALL_FIELDS.find(f=>f.id===id)).filter(Boolean).filter(f=> !ql || f.label.toLowerCase().indexOf(ql)>=0) }))
    .filter(g=> g.items.length);
  // ---- keyboard nav: ↑/↓ move the highlight, Enter selects, Esc closes (Space types in the search box) ----
  const [active, setActive] = useState("");
  const listRef = useRef(null);
  const flat = groups.flatMap(g=>g.items);
  const moveActive = dir => { if(!flat.length) return; const i=flat.findIndex(f=>f.id===active); let ni = i<0 ? (dir>0?0:flat.length-1) : i+dir; if(ni<0) ni=flat.length-1; if(ni>=flat.length) ni=0; setActive(flat[ni].id); };
  const onMenuKey = e => {
    if(e.key==="ArrowDown"){ e.preventDefault(); moveActive(1); }
    else if(e.key==="ArrowUp"){ e.preventDefault(); moveActive(-1); }
    else if(e.key==="Enter"){ e.preventDefault(); const id = active || (flat[0] && flat[0].id); if(id){ onChange(id); setQ(""); setOpen(false); } }
    else if(e.key==="Escape"){ e.preventDefault(); setOpen(false); if(btn.current) btn.current.focus(); }
  };
  // keep a valid highlight as the filter narrows; scroll the highlight into view
  useEffect(()=>{ if(open && flat.length && !flat.some(f=>f.id===active)) setActive(value && flat.some(f=>f.id===value) ? value : flat[0].id); }, [q, open]);
  useEffect(()=>{ if(!open || !listRef.current) return; const els=listRef.current.querySelectorAll('[data-val]'); for(let i=0;i<els.length;i++){ if(els[i].getAttribute('data-val')===String(active)){ if(els[i].scrollIntoView) els[i].scrollIntoView({block:"nearest"}); break; } } }, [active, open]);
  return (
    <>
      <button ref={btn} type="button" onClick={()=> open?setOpen(false):openMenu()}
        onKeyDown={e=>{ if(!open && (e.key==="ArrowDown"||e.key==="ArrowUp")){ e.preventDefault(); openMenu(); } }}
        className={"cursor-pointer h-9 w-full rounded-md border bg-white px-2.5 text-[13px] transition inline-flex items-center justify-between gap-1.5 " + (value ? "border-slate-200 text-slate-700 hover:border-slate-300" : "border-slate-200 italic text-slate-400 hover:border-slate-300")}>
        <span className="truncate">{value ? labelOf(value) : (placeholder || "choose field")}</span>
        <span className="flex shrink-0 items-center gap-2.5">
          {conflict && <ConflictPip count={1} fields={[conflictLabel || labelOf(value)]} onClick={()=> onConflict && onConflict([value])}/>}
          <Ico name="chevdown" size={14} cls="text-slate-400"/>
        </span>
      </button>
      {open && pos && ReactDOM.createPortal(
        <div className="fixed inset-0 z-[60]" onMouseDown={()=>setOpen(false)}>
          <div onMouseDown={e=>e.stopPropagation()} className="absolute v10-pop bg-white rounded-xl shadow-2xl ring-1 ring-slate-200 overflow-hidden w-[280px]" style={{left:pos.left, ...(pos.top!=null ? {top:pos.top} : {bottom:pos.bottom})}}>
            <div className="p-2 border-b border-slate-100">
              <input autoFocus value={q} onChange={e=>setQ(e.target.value)} onKeyDown={onMenuKey} placeholder="Search fields"
                className="w-full h-8 px-2 rounded-md border border-slate-200 text-[12.5px] outline-none focus:border-sky-300"/>
            </div>
            <div ref={listRef} className="max-h-72 overflow-y-auto py-1">
              {groups.map(g=>(
                <div key={g.label}>
                  <div className="px-3 pt-2 pb-1 text-[10px] font-bold uppercase tracking-wide text-slate-400">{g.label}</div>
                  {g.items.map(f=>(
                    <button key={f.id} type="button" data-val={f.id} onMouseEnter={()=>setActive(f.id)} onClick={()=>{ onChange(f.id); setQ(""); setOpen(false); }}
                      className={"w-full text-left px-3 py-1.5 text-[13px] flex items-center justify-between " + (f.id===value ? "bg-sky-50 text-[#1180c1] font-semibold" : (f.id===active ? "bg-slate-100 text-slate-800" : "text-slate-700 hover:bg-slate-100"))}>
                      {f.label}{f.id===value && <Ico name="check" size={14}/>}
                    </button>
                  ))}
                </div>
              ))}
              {groups.length===0 && <p className="px-3 py-4 text-center text-[12px] text-slate-400">No matches</p>}
            </div>
          </div>
        </div>, document.body)}
    </>
  );
}
// Action target selector — collapsed control. Empty → "Choose fields"; 1 → the field; many → "Status + N more".
// Click opens a compact popover (search + live multi-select); its expand button opens the full dual-pane "Select fields" modal.
function V7TargetSelect({ ids, onChange, conflictIds, onConflict, autoOpen }){
  const [view, setView] = useState(null);   // null | "pop" | "modal"
  const [pq, setPq] = useState("");          // popover search query
  const [popExpand, setPopExpand] = useState(false);   // popover: show ALL selected chips vs first 3 + "+N"
  const [pos, setPos] = useState(null);      // popover anchor position
  const [tip, setTip] = useState(null);      // {left, top} for the portaled hover preview of all selected fields
  const [cfTip, setCfTip] = useState(null);  // hover tooltip for the conflict indicator
  const btn = useRef(null);
  const cf = useRef(null);
  const n = ids.length;
  const cfList = conflictIds || [];         // ids among the selection that conflict
  const cfN = cfList.length;
  const label = n===0 ? "Choose fields" : (n===1 ? labelOf(ids[0]) : labelOf(ids[0]) + " + " + (n-1) + " more");
  const openPop = () => {
    if(!btn.current) return;
    const r = btn.current.getBoundingClientRect();
    const W = 440, H = 380;
    let left = r.left; if(left+W>window.innerWidth-8) left=window.innerWidth-W-8; if(left<8) left=8;
    const fitsBelow = r.bottom+4+H <= window.innerHeight-8;
    setPos((fitsBelow || r.top<H) ? {left, top:r.bottom+4} : {left, bottom:(window.innerHeight-r.top)+4});
    setPq(""); setPopExpand(false); setTip(null); setView("pop");
  };
  const toggle = id => onChange(ids.indexOf(id)>=0 ? ids.filter(x=>x!==id) : [...ids, id]);
  const pql = pq.trim().toLowerCase();
  // Popover list = fields NOT yet chosen (the chosen ones are pinned as chips at the top); filtered by the search.
  const popAvail = V7_FIELD_FLAT.filter(f=> ids.indexOf(f.id)<0 && (!pql || f.label.toLowerCase().indexOf(pql)>=0));
  // ---- keyboard nav in the popover: ↑/↓ move, Enter/Space add the highlighted field, Esc closes ----
  const [popActive, setPopActive] = useState("");
  const popListRef = useRef(null);
  const movePop = dir => { if(!popAvail.length) return; const i=popAvail.findIndex(f=>f.id===popActive); let ni = i<0 ? (dir>0?0:popAvail.length-1) : i+dir; if(ni<0) ni=popAvail.length-1; if(ni>=popAvail.length) ni=0; setPopActive(popAvail[ni].id); };
  const onPopKey = e => {
    if(e.key==="ArrowDown"){ e.preventDefault(); movePop(1); }
    else if(e.key==="ArrowUp"){ e.preventDefault(); movePop(-1); }
    else if(e.key==="Enter"){ e.preventDefault(); const id=popActive||(popAvail[0]&&popAvail[0].id); if(id){ toggle(id); setPq(""); } }
    else if(e.key==="Escape"){ e.preventDefault(); setView(null); if(btn.current) btn.current.focus(); }
  };

// Write the rule into the shared inventory — replace in place when editing, prepend (newest first) when new.

    id: makeRuleId(),
    name: src.name + " (copy)",
    created: today(),

// Opposite-behaviour pairs — shared by the single conflict engine (conflictsFor) and the inspector.
const OPP_BEHAVIOR = { "Show":"Hide", "Hide":"Show", "Mandate":"Non-Mandate", "Non-Mandate":"Mandate", "Enable":"Disable", "Disable":"Enable", "Show Options":"Hide Options", "Hide Options":"Show Options" };
// ---- Conflict inspector (opened from the editor's conflict bar) -----------------------------------
// Inspect → view-only → edit. Reuses the conflict helpers; classifies overlaps into meaningful kinds
// (Action Conflict / Condition Conflict / Contradiction / Scope Conflict / Partial Overlap — no "Duplicate").
const CITagTone = { "Contradiction":"rose", "Action Conflict":"amber", "Condition Conflict":"sky", "Reverse behavior":"violet", "Scope Conflict":"slate", "Partial Overlap":"slate" };
const CITag = ({label}) => {
  const t = CITagTone[label] || "slate";
  const cls = { rose:"bg-rose-50 text-rose-700 ring-rose-200", amber:"bg-amber-50 text-amber-700 ring-amber-200", sky:"bg-sky-50 text-[#1180c1] ring-sky-200", violet:"bg-violet-50 text-violet-700 ring-violet-200", slate:"bg-slate-100 text-slate-600 ring-slate-200" }[t];
  const icon = label==="Reverse behavior" ? <Ico name="history" size={10} cls="mr-0.5"/> : null;
  return <span className={"inline-flex items-center rounded-full px-2 py-0.5 text-[10.5px] font-semibold ring-1 " + cls}>{icon}{label}</span>;
};
const CIMeta = ({label, value}) => (
  <div className="rounded-lg border border-slate-200 bg-white px-3 py-2">
    <div className="text-[10px] font-semibold uppercase tracking-wide text-slate-400">{label}</div>
    <div className="mt-0.5 text-[13px] font-semibold text-slate-800">{value}</div>
  </div>

// Per-rule conflict detail for the inspector — runs on the SAME normalized draft (draftToRule) and the SAME
// target maps the engine (conflictsFor) uses, so any rule the engine flags always resolves to ≥1 explained reason.
function inspectConflict(draft, rule){
  const me = draftToRule(draft, null);
  const dA = actTargets(me), dC = condTargets(me), oA = actTargets(rule), oC = condTargets(rule);
  const actionConflicts = [];
  const pushAct = (field, kind, reason) => { if(!actionConflicts.some(a=>a.field===field && a.reason===reason)) actionConflicts.push({field, kind, reason}); };
  Object.keys(dA).forEach(f=>{
    if(f in oA){
      const mb=dA[f], ob=oA[f]; let kind, reason;
      if(OPP_BEHAVIOR[mb]===ob){ kind="Contradiction"; reason="This rule " + actVerb(mb,f) + ", while “" + rule.name + "” " + actVerb(ob,f) + "."; }
      else if(mb==="Set Value" && ob==="Set Value"){ kind="Scope Conflict"; reason="Both set a value on " + labelOf(f) + " — the last rule to run wins."; }
      else if(mb===ob){ kind=""; reason="Both rules " + actVerb(mb,f) + "."; }   // same behavior → no extra sub-tag (was "Duplicate", now removed)
      else { kind="Partial Overlap"; reason="Both rules change " + labelOf(f) + " — “" + rule.name + "” " + actVerb(ob,f) + "."; }
      pushAct(f, kind, reason);
    }
  });
  // hide-like vs condition dependencies (mirror the engine, so HIDE_LIKE-only conflicts are never shown empty)
  Object.keys(dA).forEach(f=>{ if(HIDE_LIKE[dA[f]] && (f in oC)) pushAct(f, "Contradiction", "This rule " + actVerb(dA[f],f) + ", but “" + rule.name + "” relies on " + labelOf(f) + " in its conditions."); });
  Object.keys(oA).forEach(f=>{ if(HIDE_LIKE[oA[f]] && (f in dC)) pushAct(f, "Contradiction", "“" + rule.name + "” " + actVerb(oA[f],f) + ", which this rule needs in its conditions."); });
  const conditionConflicts = [];
  Object.keys(dC).forEach(f=>{ if(f in oC) conditionConflicts.push({field:f, reason:"Both rules check " + labelOf(f) + " in their conditions."}); });
  // Reverse (advanced) behavior — an execution-TIME conflict: a rule undoes its own change when the condition
  // stops matching, so the final value of a shared field depends on which rule runs last (not just conditions/actions).
  const reversesField = (rl, field) => {
    const blocks = (rl.blocks && rl.blocks.length) ? rl.blocks : [{advanced: rl.advanced, actions: rl.actions||[]}];
    return blocks.some(b => b.advanced && (b.actions||[]).some(a=>{ const ids=(a.fieldIds&&a.fieldIds.length)?a.fieldIds:(a.fieldId?[a.fieldId]:[]); return ids.indexOf(field)>=0; }));
  };
  const sharedField = actionConflicts.length ? actionConflicts[0].field : null;
  const mineRev = sharedField ? reversesField(me, sharedField) : false;
  const theirsRev = sharedField ? reversesField(rule, sharedField) : false;
  let reverse = null;
  if(sharedField && (mineRev || theirsRev)){
    const F = labelOf(sharedField);
    const revName   = theirsRev ? "“"+rule.name+"”" : "Your rule";
    const otherName = theirsRev ? "“"+(draft.name||"your rule")+"”" : "“"+rule.name+"”";
    const revVerb   = theirsRev ? actVerb(oA[sharedField], sharedField) : actVerb(dA[sharedField], sharedField);
    reverse = { field: sharedField,
      impact: revName + " " + revVerb + " while its condition holds, then restores " + F + " when it no longer does — but " + otherName + " also changes " + F + ", so the final state depends on run order." };
  }
  const kinds = [];
  if(actionConflicts.length) kinds.push("Action Conflict");
  if(conditionConflicts.length) kinds.push("Condition Conflict");
  actionConflicts.forEach(a=>{ if(a.kind && kinds.indexOf(a.kind)<0) kinds.push(a.kind); });
  if(reverse) kinds.push("Reverse behavior");
  // Single row tag — only two exist. Duplicate = same behaviour on the same field; everything else
  // (opposite / different / set-value clash / hide-vs-condition / reverse) = Contradicting. Contradiction wins.
  const hasContradiction = !!reverse || actionConflicts.some(a=> a.kind==="Contradiction" || a.kind==="Scope Conflict" || a.kind==="Partial Overlap");
  const hasDuplicate = actionConflicts.some(a=> a.kind==="");
  const tag = hasContradiction ? "Contradicting" : (hasDuplicate ? "Duplicate" : "Contradicting");
  const total = actionConflicts.length + conditionConflicts.length;
  const where = (actionConflicts.length && conditionConflicts.length) ? "conditions and actions" : actionConflicts.length ? "actions" : conditionConflicts.length ? "conditions" : "scope";
  return { actionConflicts, conditionConflicts, kinds, reverse, tag, total, where };
}

// Module-scope so both DemoCompare (R20) and the grouped simplified card (R21) can reuse it.
function glanceOf(side, L){
  const checkVal = c => { if(!c) return ""; const eq=c.indexOf(" = "); if(eq>=0) return c.slice(eq+3); let r=(c.indexOf(L+" ")===0)?c.slice(L.length+1):c; return r.replace(/^is /,""); };
  const actLine = a => { if(!a) return "Changes " + L;
    if(a.indexOf("Set value → ")===0) return "Changes " + L + " to " + a.slice(("Set value → ").length);
    switch(a){ case "Make mandatory": return "Makes " + L + " mandatory"; case "Make optional": return "Makes " + L + " optional"; case "Hide field": return "Hides " + L; case "Show field": return "Shows " + L; case "Clear value": return "Clears " + L; case "Make read-only": return "Locks " + L; case "Make editable": return "Unlocks " + L; default: return a + " " + L; } };
  const fieldAct = s => (s.then||[]).concat(s.others||[]).find(a=> a.indexOf(L)>=0);
  if(side.role==="Action") return actLine(side.action);
  const base = side.role==="Both" ? ("Checks if " + L + " is " + checkVal(side.check) + ", then changes it to " + side.changeTo) : ("Checks if " + L + " is " + checkVal(side.check));
  const hit = fieldAct(side);
  return hit ? (base + " and can " + hit.charAt(0).toLowerCase() + hit.slice(1)) : base;
}

  const lgFields = (()=>{ const a=[]; lgRules.forEach(r=> r.fields.forEach(f=>{ if(!a.some(x=>x.id===f.id)) a.push(f); })); return a; })();
  // NEW drawer content — derived from the SAME preview fixture + matrix as the form-preview chips (single source
  // of truth). Each entry is one (other-rule, field) clash, verdict conflict|duplicate; rolled up per rule + field.
  const clashEntries = (ruleMatrixMode && !legacy) ? buildClashEntries(demoData.preview) : [];
  // nConf/nDup are COUNTS (not booleans) so a rule/field with both shows both — a single dot would hide one.
  const clashRules = (()=>{ const m=[]; clashEntries.forEach(e=>{ let r=m.find(x=>x.name===e.rule); if(!r){r={name:e.rule,fields:[],nConf:0,nDup:0};m.push(r);} if(r.fields.indexOf(e.fieldId)<0) r.fields.push(e.fieldId); if(e.verdict==="conflict") r.nConf++; else r.nDup++; }); return m; })();
  const clashFields = (()=>{ const m=[]; clashEntries.forEach(e=>{ let f=m.find(x=>x.id===e.fieldId); if(!f){f={id:e.fieldId,label:e.fieldLabel,rules:[],nConf:0,nDup:0};m.push(f);} if(f.rules.indexOf(e.rule)<0) f.rules.push(e.rule); if(e.verdict==="conflict") f.nConf++; else f.nDup++; }); return m; })();
  const nConf = clashEntries.filter(e=>e.verdict==="conflict").length;
  const nDup  = clashEntries.filter(e=>e.verdict==="duplicate").length;
  const rmxFields = legacy ? lgFields : clashFields;   // header tooltip lists the affected field names
  // If opened by clicking a specific field's flag, show ONLY that field's conflicting rule and expand it.
  // focusFields = the field ids to scope the drawer to (an action's conflicts). null → the whole block (all rows).
  const ff = (focusFields && focusFields.length) ? focusFields : null;
  const demoRows = ff ? demoData.rows.filter(r=> (r.blocks[0].fields||[]).some(f=> ff.indexOf(f.id)>=0)) : demoData.rows;
  useEffect(()=>{ if(!ff) return; const row = demoData.rows.find(r=> (r.blocks[0].fields||[]).some(f=> ff.indexOf(f.id)>=0)); if(row){ setOpenRule(row.id); const fld=(row.blocks[0].fields||[]).find(f=> ff.indexOf(f.id)>=0); if(fld) setSelField(t=>({...t,[row.id+":0"]:fld.id})); } }, [ff && ff.join(",")]);
  // Opened from a specific field's pip: land scoped to it. Field view is conflict-only, so a duplicate-only field
  // (no conflicts) opens RULE view on its duplicate rule instead — that's where duplicates live. R23 (legacy)
  // keeps the original always-field-view behaviour.
  useEffect(()=>{
    if(!ruleMatrixMode || !ff || !ff.length) return;
    if(!legacy && !clashFields.some(f=> f.id===ff[0] && f.nConf>0)){
      setMx2View("rule");
      const de = clashEntries.find(e=> e.fieldId===ff[0] && e.verdict==="duplicate");
      if(de) setMx2Rule(de.rule);

    }
    setMx2View("field");
    setMx2Fields(ff.slice());
    setMx2FieldSel(ff[0]);
  }, [ruleMatrixMode, ff && ff.join(",")]);
  const N = demo ? demoData.fields.length : allFields.size;   // total conflicting fields
  const chipLabels = demo ? demoData.fields : [...allFields].map(labelOf);
  // RULE-FIRST — one row per conflicting rule: the fields it clashes on, and which of OUR blocks those live in.
  const rows = ruleCF.map(({r, ci, cf})=>{
    const rFields = [...cf];
    const ourBlocks = db.map((b,i)=>({b,i})).filter(({b}) => rFields.some(F=> blockHasField(b, F)));
    return { r, ci, cf, rFields, ourBlocks, tag: ci.tag };
  }).sort((a,b)=> (b.rFields.length-a.rFields.length) || (b.ourBlocks.length-a.ourBlocks.length));
  const ql = q.trim().toLowerCase();
  const rulesView = rows.filter(row=>{
    if(tagFilter!=="ALL" && row.tag!==tagFilter) return false;
    if(!ql) return true;
    const hay = (row.r.name + " " + row.rFields.map(labelOf).join(" ") + " " + row.ourBlocks.map(x=>"block "+(x.i+1)).join(" ") + " " + row.ourBlocks.flatMap(x=>flatConds(x.b)).map(condText).join(" ") + " " + row.ourBlocks.flatMap(x=>(x.b.actions||[])).map(behaviorLabel).join(" ")).toLowerCase();
    return hay.indexOf(ql)>=0;
  });
  // First-4 rules open the FIELD-CENTRIC map (field → the current rule's blocks → detail + conflicting rules).
  const FIELD_CENTRIC_RULES = ["Require Assignee before In Progress","Auto-set Priority from Impact & Urgency","Capture resolution when Resolved","Hide Status on the portal"];
  const fieldCentric = FIELD_CENTRIC_RULES.indexOf((draft.name||"").trim())>=0;
  const fieldMap = [...allFields].map(F=>{
    const blocks = db.map((b,i)=>({b,i})).filter(x=> blockHasField(x.b, F));
    const fr = ruleCF.filter(x=> x.cf.has(F));
    const related = new Set(); fr.forEach(x=> x.cf.forEach(f=>{ if(f!==F) related.add(f); }));
    return { F, blocks, rules: fr.map(x=>x.r), related:[...related], reverse: blocks.some(x=> x.b.advanced) };
  }).sort((a,b)=> (b.blocks.length-a.blocks.length) || (b.rules.length-a.rules.length));
  const joinAnd = arr => arr.length<=1 ? (arr[0]||"") : (arr.length===2 ? arr[0]+" and "+arr[1] : arr.slice(0,-1).join(", ")+", and "+arr[arr.length-1]);
  const summarySentence = allFields.size===0 ? "No conflicting fields."
    : (allFields.size<=3 ? "This rule conflicts on " + joinAnd([...allFields].map(labelOf)) + "."
    : allFields.size + " fields are conflicting · " + labelOf(fieldMap[0].F) + " is the most affected.");
  const fmShown = !ql ? fieldMap : fieldMap.filter(fm=>{
    const hay = (labelOf(fm.F) + " " + fm.related.map(labelOf).join(" ") + " " + fm.rules.map(r=>r.name).join(" ") + " " + fm.blocks.map(x=>"block "+(x.i+1)).join(" ") + " " + fm.blocks.flatMap(x=>flatConds(x.b)).map(condText).join(" ")).toLowerCase();
    return hay.indexOf(ql)>=0;
  });
  // Per-block field comparison — a compact field selector, then OUR vs CONFLICTING on the selected field + condition.
  const BlockCompare = ({r, b, bk, bFields})=>{
    const sel = (selField[bk] && bFields.indexOf(selField[bk])>=0) ? selField[bk] : bFields[0];
    if(!sel) return null;
    const yc = flatConds(b).map(condText);
    const tc = ruleConditions(r).filter(c=>c&&c.fieldId).map(condText);
    return (
      <div className="pb-3">
        {/* FIELD SELECTOR — this block's conflicting fields only: strip for ≤4, dropdown for more (no tabs) */}
        {bFields.length>1 && (bFields.length<=4
          ? <div className="mb-2.5 flex flex-wrap gap-1.5">
              {bFields.map(F=>(
                <button key={F} type="button" onClick={()=>setSelField(t=>({...t,[bk]:F}))} className={"rounded-md px-2.5 py-1 text-[12px] transition " + (sel===F ? "bg-white font-semibold text-slate-800 ring-1 ring-slate-300 shadow-sm" : "text-slate-500 hover:text-slate-700")}>{labelOf(F)}</button>

              {bFields.map(F=><option key={F} value={F}>{labelOf(F)}</option>)}
            </select>)}
        {/* COMPARISON — our rule vs the conflicting rule on the selected field, then the overlapping condition */}
        <div className="rounded-lg border border-slate-200 bg-white px-4 py-3">
          <div className="grid grid-cols-2 gap-3">
            <div>
              <div className="text-[10px] font-semibold uppercase tracking-wide text-slate-400">Our rule</div>

            <div className="border-l border-slate-100 pl-3">
              <div className="text-[10px] font-semibold uppercase tracking-wide text-slate-400">Conflicting rule</div>

          </div>
          <div className="mt-3 border-t border-slate-100 pt-2">
            <div className="text-[10px] font-semibold uppercase tracking-wide text-slate-400">Condition</div>
            <div className="mt-1 text-[11.5px] leading-snug text-slate-600">Our rule runs when: <span className="text-slate-700">{yc.length?yc.join(", "):"Always"}</span></div>
            <div className="mt-0.5 text-[11.5px] leading-snug text-slate-600">Conflicting rule runs when: <span className="text-slate-700">{tc.length?tc.join(", "):"Always"}</span></div>
          </div>
          {!!b.advanced &&
            <div className="mt-3 flex gap-1.5 border-t border-slate-100 pt-2 text-[11.5px] leading-snug text-slate-500"><Ico name="history" size={12} cls="mt-0.5 shrink-0 text-blue-500"/><span>Reverse behavior — restores <span className="font-medium">{labelOf(sel)}</span> when the condition no longer holds.</span></div>}
        </div>
      </div>
    );
  };
  // Part 2 demo comparison — trigger → labeled field selector → FIELD / CURRENT RULE vs <conflicting rule> →
  // WHY (subtly emphasised) → <conflicting rule> runs when (or NO CONDITIONS) → reverse. Switching a field
  // updates the comparison + why in place; the block title/count/Reverse already live on the row above.
  const DemoCompare = ({blk, bk, ruleName, ruleId, simplified})=>{
    const fields = blk.fields;
    const sel = (selField[bk] && fields.some(f=>f.id===selField[bk])) ? selField[bk] : fields[0].id;
    const F = fields.find(f=>f.id===sel) || fields[0];
    const L = F.label, cur = F.cur, con = F.con;
    // how many rules use THIS field: the current rule + every conflicting rule that references it
    const usedIn = 1 + demoData.rows.filter(r=> (r.blocks[0].fields||[]).some(f=>f.id===F.id)).length;
    // one shared expand for the whole comparison — both rule details reveal/collapse together
    const cmpOpen = !!seeMore[bk+":"+sel+":cmp"];

    const sideBySide = true;

    const checkVal = c => { if(!c) return ""; const eq=c.indexOf(" = "); if(eq>=0) return c.slice(eq+3); let r=(c.indexOf(L+" ")===0)?c.slice(L.length+1):c; return r.replace(/^is /,""); };
    const actLine = a => { if(!a) return "Changes " + L;
      if(a.indexOf("Set value → ")===0) return "Changes " + L + " to " + a.slice(("Set value → ").length);
      switch(a){ case "Make mandatory": return "Makes " + L + " mandatory"; case "Make optional": return "Makes " + L + " optional"; case "Hide field": return "Hides " + L; case "Show field": return "Shows " + L; case "Clear value": return "Clears " + L; case "Make read-only": return "Locks " + L; case "Make editable": return "Unlocks " + L; default: return a + " " + L; } };
    // a key action this rule performs on the SELECTED field via its Then/Other actions (e.g. also hides it)
    const fieldAct = side => (side.then||[]).concat(side.others||[]).find(a=> a.indexOf(L)>=0);
    const glance = side => {
      if(side.role==="Action") return actLine(side.action);
      const base = side.role==="Both"
        ? ("Checks if " + L + " is " + checkVal(side.check) + ", then changes it to " + side.changeTo)
        : ("Checks if " + L + " is " + checkVal(side.check));
      const hit = fieldAct(side);
      return hit ? (base + " and can " + hit.charAt(0).toLowerCase() + hit.slice(1)) : base;
    };

    // field-first heading (role is understood from the wording, never tagged separately)
    const Lbl = ({children}) => <div className="text-[10px] font-semibold uppercase tracking-wider text-slate-400">{children}</div>;
    // the field's own check/change value — the prominent line under each heading
    const Val = ({children}) => <div className="mt-0.5 text-[13px] font-medium text-slate-900">{children}</div>;
    // Level-1 field-focused heading (explains the selected field's role) — sentence case, darker than the

    const FieldHead = ({children}) => <div className="text-[12px] font-medium text-slate-600">{children}</div>;
    // condition groups: AND within a group (bullets), OR between groups (labelled), light indent — no cards
    const Groups = ({groups}) => (
      <div className="mt-1.5 space-y-2">
        {groups.map((g,gi)=>(
          <div key={gi}>
            {gi>0 && <div className="mb-2 flex items-center gap-2 text-[10px] font-semibold uppercase tracking-wider text-slate-400"><span>Or</span><div className="h-px flex-1 bg-slate-100"/></div>}
            {groups.length>1 && <div className="mb-1 text-[10px] font-medium uppercase tracking-wide text-slate-400">Group {gi+1}</div>}
            <div className={(groups.length>1 ? "border-l border-slate-200 pl-2.5 " : "") + "space-y-0.5"}>
              {g.map((c,ci)=><div key={ci} className="flex items-start gap-1.5 text-[12.5px] leading-snug text-slate-600"><span className="mt-[7px] h-1 w-1 shrink-0 rounded-full bg-slate-300"/><span>{c}</span></div>)}
            </div>
          </div>
        ))}
      </div>
    );
    // secondary action lists (Then / Other actions) — first 3, then progressive disclosure
    const Actions = ({items, k, label}) => {
      if(!items || !items.length) return null;
      const open = !!seeMore[k]; const shown = open ? items : items.slice(0,3); const more = items.length - 3;
      return (
        <div>
          <Lbl>{label}</Lbl>
          <div className="mt-1 space-y-0.5">

          {more>0 && <button type="button" onClick={()=>setSeeMore(t=>({...t,[k]:!open}))} className="mt-1 text-[11.5px] font-medium text-sky-600 hover:text-sky-700">{open ? "Show fewer" : ("Show " + more + " more actions")}</button>}

          <div><FieldHead>{"What happens to " + L}</FieldHead><Val>{side.action}</Val></div>
          <div><Lbl>When</Lbl>{side.cgroups && side.cgroups.length ? <Groups groups={side.cgroups}/> : <div className="mt-0.5 text-[11.5px] text-slate-400">No conditions · runs whenever this block is triggered.</div>}</div>

          <div><FieldHead>{"How " + L + " is checked"}</FieldHead><Val>{side.check}</Val></div>

          <div><FieldHead>{"How " + L + " is checked"}</FieldHead><Val>{side.check}</Val></div>
          {side.cgroups && side.cgroups.length>0 && <div><Lbl>Along with</Lbl><Groups groups={side.cgroups}/></div>}
          <div><FieldHead>{"Then " + L + " changes to"}</FieldHead><Val>{side.changeTo}</Val></div>

    const RuleSection = ({label, name, side, kp}) => {
      const open = !!seeMore[kp+":open"];

      return (
        <div className="overflow-hidden rounded-lg border border-slate-200/80">
          <button type="button" onClick={()=>setSeeMore(t=>({...t,[kp+":open"]:!open}))} className={"flex w-full items-center gap-3 px-3 py-2.5 text-left transition " + (isCur ? "bg-slate-50/60 hover:bg-slate-50" : "hover:bg-slate-50/60")}>
            <div className="min-w-0 flex-1">

      const open = seeMore[kp+":open"]===undefined ? true : seeMore[kp+":open"];
      return (
        <div className="min-w-0">
          <button type="button" onClick={()=>setSeeMore(t=>({...t,[kp+":open"]:!open}))} className="flex w-full items-start gap-2 px-3.5 py-2.5 text-left transition hover:bg-slate-50/60">

          {open && <div className="border-t border-slate-100 px-3.5 py-3"><Detail side={side} kp={kp}/></div>}

      <div className="pt-0.5 pb-2.5">

        {fields.length>1 &&

            {fields.map(f=>{ const active=f.id===sel; const role=combineRole(f.cur.role, f.con.role);
              return (

        {/* compact first view — field name, short reason, then two collapsible self-contained rule sections */}

            ? <>
                {/* simplified view (R21) — the SAME side-by-side Current Rule | Conflicting Rule card as R20,

                <div className="mt-0.5 text-[12px] text-slate-500">Used in {usedIn} Rule{usedIn===1?"":"s"}</div>
                <div className="mt-3 overflow-hidden rounded-xl border border-slate-200/80">
                  <div className="grid grid-cols-2 divide-x divide-slate-200/80">
                    {/* Current Rule — kept, side-by-side */}
                    <div className="min-w-0 bg-slate-50/50 px-3.5 py-2.5">
                      <div className="text-[10px] font-semibold uppercase tracking-wider text-slate-500">Current Rule</div>
                      <div className="mt-1.5 text-[13px] font-medium leading-snug text-slate-900">{glance(cur)}</div>
                    </div>
                    {/* Conflicting Rule — with an Edit action in-column */}
                    <div className="min-w-0 px-3.5 py-2.5">
                      <div className="flex items-start justify-between gap-2">
                        <div className="min-w-0">
                          <div className="truncate text-[10px] leading-tight" title={"Conflicting Rule · " + ruleName}><span className="font-semibold uppercase tracking-wider text-slate-500">Conflicting Rule</span><span className="font-medium text-slate-400"> · {ruleName}</span></div>
                          <div className="mt-1.5 text-[13px] font-medium leading-snug text-slate-900">{glance(con)}</div>

                      </div>
                    </div>

                </div>

            : <>
          {/* short conflict reason — understandable at a glance, before any detail */}
          {F.why &&
            <div className="mt-1.5 flex items-start gap-1.5">
              <Ico name="warn" size={13} cls="mt-px shrink-0 text-amber-500"/>
              <div className="text-[12.5px] leading-snug text-slate-600">{F.why}</div>
            </div>}
          {/* ONE comparison component — a single control expands BOTH rule details together. For the scoped
              Priority case the panels sit side-by-side; everywhere else they stack. Expand state is shared. */}
          {sideBySide
            ? <div className="mt-3 overflow-hidden rounded-xl border border-slate-200/80">
                <div className="grid grid-cols-2 divide-x divide-slate-200/80">
                  {/* Current Rule */}
                  <div className="min-w-0">
                    <div className="bg-slate-50/50 px-3.5 py-2.5">
                      <div className="text-[10px] font-semibold uppercase tracking-wider text-slate-500">Current Rule</div>
                      <div className="mt-1.5 text-[13px] font-medium leading-snug text-slate-900">{glance(cur)}</div>
                    </div>
                    {cmpOpen && <div className="border-t border-slate-100 px-3.5 py-3"><Detail side={cur} kp={bk+":"+sel+":cmpcur"}/></div>}
                  </div>
                  {/* Conflicting Rule */}
                  <div className="min-w-0">
                    <div className="px-3.5 py-2.5">
                      <div className="truncate text-[10px] leading-tight" title={"Conflicting Rule · " + ruleName}><span className="font-semibold uppercase tracking-wider text-slate-500">Conflicting Rule</span><span className="font-medium text-slate-400"> · {ruleName}</span></div>

            const draftBlock = (draft && draft.blocks && draft.blocks[0]) || {};
