    // Preview path: 4 stages × 1.8s, then an 0.8s "Preview ready" beat — ~8s end to end. The labels are three
    // words apiece, so the time goes to the motion rather than to reading.
    // The drawer run stays at ~12s, where the longer sequence itself is what the user reads.
    const steps = testGoesToPreview ? SIM_STEPS.length : TEST_STEPS.length;
    const total = testGoesToPreview ? 7200 : 12000;
    const tick = setInterval(()=> setTestStep(s=> Math.min(s+1, steps)), total/steps);
    const timers = [];
    if(testGoesToPreview){
      // land on completion for a beat before the preview takes over — cutting away mid-thought reads as a glitch
      timers.push(setTimeout(()=> setSimReady(true), total));
      timers.push(setTimeout(()=>{ endTest(); setInspectFields(null); setPreview23(true); }, total + 800));
    } else if(isConflictDemo(draft)){
      timers.push(setTimeout(()=>{
        setTesting(false);
        setInspectFields(null);
        setTestAutoPreview(!!demoFor(draft).matrix);   // R22 → drawer opens with the form preview layered on top
        setInspectOpen(true);
      }, total));
    } else {
      // New / user-created rule → no scripted scenario, so the test lands on a clean "all clear" result.
      timers.push(setTimeout(()=> setTestDone(true), total));
    }
    return ()=>{ clearInterval(tick); timers.forEach(clearTimeout); };
  }, [testing]);
  const [inspectOpen, setInspectOpen] = useState(false);
  const [inspectFields, setInspectFields] = useState(null);   // field ids to focus the drawer on (null = whole block)
  const openFieldConflict = fids => { setInspectFields(fids && fids.length ? fids : null); setInspectOpen(true); };
  const [inspectVerdict, setInspectVerdict] = useState(null);   // R25 two-button entry: "conflict" | "duplicate" | null
  const [sameCondEditor, setSameCondEditor] = useState(false);   // R26 — bottom-bar "View similar rules" drawer
  // R26 — the block whose (filled) condition matches existing rules, and that match (for the bottom-bar entry).
  const sameCondBlock = isSameCondDemo(draft.name) ? draft.blocks.find(b=> sameConditionMatch(b)) : null;
  const sameCondMatch = sameCondBlock ? sameConditionMatch(sameCondBlock) : null;
  const openInspect = verdict => { setInspectFields(null); setInspectVerdict(verdict||null); setInspectOpen(true); };
  // Disable a conflicting rule from the inspector → it stops running (excluded from conflicts) and persists.
  const disableRule = rule => { rule.disabled = true; persistRule(rule); bumpRules(); };
  // Inspector Action toggle — enable/disable a conflicting rule inline; disabling drops it from conflictsFor on recompute.
  const toggleRule = rule => { rule.disabled = !rule.disabled; persistRule(rule); bumpRules(); };
  const save = ()=>{
    if(!canSave){ setShowErrors(true); return; }
    setSaved(true);
    const rule = ruleFromDraft(draft, baseRule);
    // Verification: the rule's conflict count must be identical before (draft) and after (saved) — same engine, same id.
    const after = conflictsFor(rule).length;
    if(after !== conflicts.length) console.warn("[conflict] draft/saved mismatch — draft:", conflicts.length, "saved:", after, rule.id);
    setTimeout(()=> onSaved && onSaved(rule), 600);
  };
  // Edit a conflicting rule from the inspector → reload THIS editor with that rule's values (prefilled), close inspector.
  const loadRule = rule => {
    const block = { match:"all", advanced:!!rule.advanced, advOpen:false, time: rule.when, people: rule.audience,
      conditions: (rule.conditions||[]).map(c=>({...c})), actions: (rule.actions||[]).map(a=>({...a})) };
    setDraft({ name: rule.name, exec: rule.exec||"", description: rule.description||"", tags:(rule.tags||[]).slice(), blocks:[block] });
    setShowDesc(!!rule.description); setSaved(false); setShowErrors(false); setExpandedIdx(0); setInspectOpen(false);
  };
  const rz = useDrawerResize(Math.round((typeof window!=="undefined" ? window.innerWidth : 2000) * 0.5), 560, 1400);
  // Tag chips + add/edit control — shared so it can sit beside "Add description" (collapsed) or below the box (expanded).
  const tagsControls = <>
    {(draft.tags||[]).map((t,i)=>(
      <span key={i} className="inline-flex items-center gap-1 rounded-full border border-slate-200 bg-slate-100 px-2.5 py-0.5 text-[12px] font-medium text-slate-600">
        {t}<button onClick={()=>rmTag(i)} className="text-slate-400 hover:text-slate-600" title="Remove tag"><Ico name="x" size={11}/></button>
      </span>
    ))}
    {tagEditing
      ? <span className="inline-flex items-center gap-1.5">
          <input autoFocus value={tagDraft} onChange={e=>setTagDraft(e.target.value)}
            onKeyDown={e=>{ if(e.key==="Enter") commitTag(); else if(e.key==="Escape") cancelTag(); }}
            placeholder="Tag" className="h-7 w-28 rounded-md border border-sky-300 px-2 text-[12px] outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-200"/>
          <button onClick={commitTag} title="Save tag" className="flex h-6 w-6 items-center justify-center rounded-md bg-emerald-50 text-emerald-600 hover:bg-emerald-100"><Ico name="check" size={13}/></button>
          <button onClick={cancelTag} title="Cancel" className="flex h-6 w-6 items-center justify-center rounded-md bg-rose-50 text-rose-500 hover:bg-rose-100"><Ico name="x" size={13}/></button>
        </span>
      : <button onClick={()=>setTagEditing(true)} title="Add tag" className="inline-flex h-6 items-center gap-1 rounded-md border border-sky-200 bg-sky-50 px-2 text-[12px] font-medium text-[#1180c1] hover:bg-sky-100"><span className="text-sm font-semibold leading-none">+</span> Add tag</button>}
  </>;
  return (
    <>
      <div className="fixed inset-0 z-40 bg-slate-900/20" onClick={onClose}/>
      <aside style={{width: rz.width}} className="fixed top-0 right-0 z-50 h-full max-w-[97vw] bg-white shadow-2xl border-l border-slate-200 flex flex-col v10-drawer">
        <DrawerResizer onMouseDown={rz.onMouseDown} dragging={rz.dragging}/>
        <div className="border-b border-slate-200 px-8 py-4 flex items-start justify-between gap-4 shrink-0">
          <div>
            <h1 className="text-[19px] font-bold text-slate-800">{baseRule ? "Edit Rule" : "Add Rule"}</h1>
            <p className="mt-0.5 text-[12px] text-slate-500">Automate this form — show, hide, require or set fields based on conditions you choose. <a className="ml-0.5 inline-flex items-center gap-0.5 font-medium text-[#1180c1] hover:underline cursor-pointer">Learn more<Ico name="external" size={11}/></a></p>
          </div>
          <button onClick={onClose} className="w-8 h-8 grid place-items-center rounded-md text-slate-400 hover:bg-slate-100 hover:text-slate-600 shrink-0" title="Close"><Ico name="x" size={18}/></button>
        </div>
        <div className="flex-1 overflow-y-auto bg-white">
          <div className="px-8 py-6 space-y-5">
            {/* Save-blocked prompt — appears only after a failed save attempt, listing exactly what's missing */}
            {showErrors && !canSave &&
              <div className="flex items-start gap-3 rounded-xl border border-rose-200 bg-rose-50 px-4 py-3 v10-fade">
                <span className="mt-0.5 grid h-6 w-6 shrink-0 place-items-center rounded-full bg-rose-100 text-rose-500"><Ico name="warn" size={14}/></span>
                <div className="min-w-0">
                  <div className="text-[13px] font-semibold text-rose-700">Before you can save, a few things are still needed</div>
                  <ul className="mt-1 space-y-0.5">
                    {missing.map((m,i)=> <li key={i} className="flex items-center gap-1.5 text-[12.5px] text-rose-600"><span className="h-1 w-1 rounded-full bg-rose-400"/>{cap(m)}</li>)}
                  </ul>
                </div>
              </div>}
            <div className="pb-1">
              <div className="grid grid-cols-1 gap-5 sm:grid-cols-2">
                <div>
                  <label className="block text-[12.5px] font-semibold text-slate-700">Rule name <span className="text-rose-500">*</span></label>
                  <input value={draft.name} onChange={e=>patch({name:e.target.value})} onBlur={()=>setShowErrors(s=> s || !nameOk)} placeholder="e.g. Hardware request automation"
                    className={"mt-1.5 w-full h-9 rounded-md border px-3 text-[13px] outline-none focus:ring-1 " + (showErrors && !nameOk ? "border-rose-400 focus:border-rose-400 focus:ring-rose-200 bg-rose-50/40" : "border-slate-300 focus:border-sky-400 focus:ring-sky-200")}/>
                  {showErrors && !nameOk && <p className="mt-1 text-[12px] font-medium text-rose-500">Give this rule a name to save it.</p>}
                </div>
                <div>
                  {/* Applies to is COMMON to the whole rule; Execute on now lives on each block's When step. */}
                  <label className="block text-[12.5px] font-semibold text-slate-700">Select Rule Applicable for <span className="text-rose-500">*</span></label>
                  <div className={"mt-1.5 rounded-md " + (showErrors && !appliesOk ? "ring-1 ring-rose-400" : "")}><GuidedDropdown value={draft.people} onChange={setAudience} options={AUDS} guide={AUD_GUIDE} placeholder="Choose people"/></div>
                  {showErrors && !appliesOk && <p className="mt-1 text-[12px] font-medium text-rose-500">Choose who this rule applies to.</p>}
                </div>
              </div>
              {/* metadata — collapsed: "Add description" with "Add tag" beside it; once description opens, Tags drop below the box (V7) */}
              <div className="mt-4">
                {showDesc
                  ? <>
                      <label className="block text-[13px] font-semibold text-slate-700">Description</label>
                      <textarea value={draft.description} onChange={e=>patch({description:e.target.value})} rows={2} placeholder="What does this rule do?"
                        className="mt-1.5 w-full rounded-md border border-slate-300 px-3 py-2 text-[13.5px] outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-200 resize-y"/>
                      <div className="mt-3 flex flex-wrap items-center gap-2">
                        <span className="text-[13px] font-semibold text-slate-700">Tags</span>
                        <span className="h-4 w-px bg-slate-200"/>
                        {tagsControls}
                      </div>
                    </>
                  : <div className="flex flex-wrap items-center gap-2.5">
                      <button onClick={()=>setShowDesc(true)} className="text-[13px] font-medium text-[#1180c1] hover:underline">Add description</button>
                      <span className="h-4 w-px bg-slate-200"/>
                      {tagsControls}
                    </div>}
              </div>
            </div>
            <div className="space-y-3">
              {draft.blocks.map((b,i)=>
                <V7Block key={i} block={b} index={i} total={draft.blocks.length} expanded={expandedIdx===i}
                  exec={draft.exec} ruleName={draft.name} conflictFields={scenFieldIds} onFieldConflict={openFieldConflict}
                  onToggle={()=>setExpandedIdx(expandedIdx===i?null:i)} onChange={p=>setBlock(i,p)}
                  onDuplicate={()=>dupBlock(i)} onRemove={()=>rmBlock(i)}/>)}
            </div>
            {/* Add block — always visible; once a first action exists it gets HIGHLIGHTED (coaching callout,
                tint, New pill, animated icons) so the multi-block feature lands when it's actually useful. */}
            {(()=>{ const blockHi = actionOk && blockHint; return (
            <div className="space-y-2">
              {blockHi && draft.blocks.length===1 &&
                <div className="relative rounded-xl border border-sky-100 bg-sky-50/60 px-4 py-3.5 v10-fade">
                  <div className="flex items-start gap-2.5">
                    <span className="mt-0.5 shrink-0 text-sky-500 v10-twinkle"><Ico name="sparkles" size={17}/></span>
                    <div className="min-w-0 flex-1">
                      <div className="text-[13.5px] font-semibold text-slate-800"><span className="text-sky-600">New</span> — one rule can now hold several blocks</div>
                      <p className="mt-1 text-[12.5px] leading-relaxed text-slate-500">Each block is checked on its own, and every block that matches runs — so you can cover several cases without creating separate rules.</p>
                      <div className="mt-3 flex items-center gap-1.5">
                        <button onClick={()=>{ addBlock(); dismissBlockHint(); }} className="group inline-flex items-center gap-1.5 rounded-full px-3.5 py-1.5 text-[12.5px] font-semibold text-white shadow-sm transition hover:brightness-105" style={{background:BRAND}}><Ico name="plus" size={13} cls="transition-transform duration-300 group-hover:rotate-90"/> Add a second block</button>
                        <button onClick={dismissBlockHint} className="rounded-full px-3 py-1.5 text-[12.5px] font-medium text-slate-500 transition hover:bg-white/70 hover:text-slate-700">Got it</button>
                      </div>
                    </div>
                    <button onClick={dismissBlockHint} title="Dismiss" className="-mr-1 -mt-1 grid h-6 w-6 shrink-0 place-items-center rounded-md text-slate-400 transition hover:bg-white/70 hover:text-slate-600"><Ico name="x" size={14}/></button>
                  </div>
                  {/* pointer connecting the callout to the Add rule block box below — gentle idle nudge */}
                  <span className="absolute -bottom-[7px] left-8 h-3 w-3 border-b border-r border-sky-100 bg-sky-50/60 v10-nudge"/>
                </div>}
              {/* the add-block target — icon + title + subtitle, left-aligned; highlighted state matches the callout */}
              <button onClick={addBlock}
                className={"group flex w-full items-center gap-3 rounded-xl border border-dashed px-4 py-3.5 text-left transition " + (blockHi ? "border-sky-300 bg-sky-50/40 hover:bg-sky-50" : "border-slate-300 bg-white hover:border-slate-400 hover:bg-slate-50")}>
                <span className={"grid h-8 w-8 shrink-0 place-items-center rounded-lg transition " + (blockHi ? "bg-white text-[#1180c1] ring-1 ring-sky-100 v10-float" : "bg-slate-100 text-slate-500 group-hover:bg-slate-200")}>
                  <Ico name="plus" size={18} cls="transition-transform duration-300 group-hover:rotate-90"/>
                </span>
                <span className="min-w-0 flex-1">
                  <span className="block text-[13.5px] font-semibold text-slate-800">Add rule block</span>
                  <span className="block text-[12px] text-slate-500">Handle another case inside this same rule</span>
                </span>
                {blockHi && <span className="shrink-0 rounded-full bg-sky-100 px-2 py-0.5 text-[10px] font-bold uppercase tracking-wide text-sky-700">New</span>}
              </button>
            </div>); })()}
          </div>
        </div>
        {/* bottom bar — conflict status is the primary info (replaces the old block count) */}
        <div className="flex items-center justify-between border-t border-slate-200 bg-white px-8 py-3 shrink-0">
          {/* R26 — same "View similar rules" bottom-bar entry as R25, shown once the condition matches existing rules */}
          <div className="flex items-center gap-5">
            {isSameCondDemo(draft.name) && sameCondMatch &&
              <button type="button" onClick={()=>setSameCondEditor(true)}
                className="group inline-flex items-center gap-2 rounded-full border border-amber-200 bg-amber-50 py-1.5 pl-3 pr-2.5 text-[12.5px] font-semibold text-amber-800 transition hover:bg-amber-100">
                <Ico name="bulb" size={14} cls="shrink-0 text-amber-500"/>
                <span className="whitespace-nowrap">{sameCondMatch.rules.length} rule{sameCondMatch.rules.length===1?"":"s"} with the same condition</span>
                <span className="ml-0.5 inline-flex items-center gap-0.5 rounded-full bg-white/70 px-2 py-0.5 text-[11.5px] text-amber-700 transition group-hover:bg-white">View<Ico name="chevdown" size={12} cls="-rotate-90"/></span>
              </button>}
            {/* New / user-created rules start clean — once an action is configured, reassure that nothing clashes */}
            {!isSameCondDemo(draft.name) && !isConflictDemo(draft) && actionOk &&
              <span className="inline-flex items-center gap-1.5 text-[12.5px] font-medium text-emerald-600"><Ico name="tick" size={14} cls="text-emerald-500"/>No conflicts with existing rules</span>}
            {!isSameCondDemo(draft.name) && isConflictDemo(draft) && <>
            {/* PROTOTYPE: hardcoded to the fixed demo — always surfaces the scenario's conflicts */}
            <span className="inline-flex items-center gap-1.5 text-[12.5px] font-semibold text-amber-700"><span className="w-2 h-2 rounded-full bg-amber-500"/>{demoFor(draft).fields.length} conflicts with existing rules</span>
            {demoFor(draft).dualEntry
              ? /* R25 — two separate drawer entries, verdict-scoped */
                <div className="flex items-center gap-2">
                  <button type="button" onClick={()=>openInspect("conflict")}
                    className="inline-flex items-center gap-1 rounded-md border border-rose-200 bg-rose-50 px-2.5 py-1 text-[12px] font-semibold text-rose-700 transition hover:bg-rose-100">
                    <span className="h-1.5 w-1.5 rounded-full bg-rose-500"/>View conflicts<Ico name="chevdown" size={12} cls="-rotate-90"/>
                  </button>
                  <button type="button" onClick={()=>openInspect("duplicate")}
                    className="inline-flex items-center gap-1 rounded-md border border-amber-200 bg-amber-50 px-2.5 py-1 text-[12px] font-semibold text-amber-700 transition hover:bg-amber-100">
                    <span className="h-1.5 w-1.5 rounded-full bg-amber-400"/>View similar rules<Ico name="chevdown" size={12} cls="-rotate-90"/>
                  </button>
                </div>
              : <button type="button" onClick={()=>{ setInspectFields(null); setInspectOpen(true); }}
                  className="inline-flex items-center gap-1 rounded-md border border-amber-200 bg-amber-50 px-2.5 py-1 text-[12px] font-semibold text-amber-700 transition hover:bg-amber-100">
                  View conflicts<Ico name="chevdown" size={12} cls="-rotate-90"/>
                </button>}
            </>}
          </div>
          <div className="flex items-center gap-3">
            {/* Save Rule (dark) then Cancel — matching the screenshot's bottom bar */}
            <button onClick={save} aria-disabled={!canSave} title={canSave ? "" : ("Needed to save: " + missing.join(", "))}
              className={"h-9 rounded-lg px-5 text-[12.5px] font-semibold text-white shadow-sm transition " + (saved ? "bg-emerald-600" : canSave ? "bg-slate-900 hover:bg-slate-800" : "bg-slate-900 opacity-50 cursor-not-allowed")}>{saved ? "Saved ✓" : (baseRule ? "Update Rule" : "Save Rule")}</button>
            <button onClick={onClose} className="h-9 rounded-lg border border-slate-300 bg-white px-4 text-[12.5px] font-medium text-slate-600 hover:bg-slate-50">Cancel</button>
          </div>
        </div>
        {/* RUN TEST — transitional, read-only. Same width/position as the conflict drawer so it hands off seamlessly. */}
        {testing && ReactDOM.createPortal(
          <>
            <div className="fixed inset-0 z-[55] bg-slate-900/25" onClick={endTest}/>
            <aside style={{width: Math.round(rz.width * 0.9)}}
              className="fixed top-0 right-0 z-[56] h-full max-w-[97vw] bg-white shadow-2xl border-l border-slate-200 flex flex-col v10-drawer">
              <div className="flex items-center gap-3 border-b border-slate-200 px-6 py-3.5 shrink-0">
                <h2 className="text-[16px] font-bold text-slate-800">Run Test</h2>
              </div>
              {/* the preview path tells the "safe simulation" story; the drawer path keeps the original sequence,
                  whose steps stay true for rules that end on the conflict drawer and never open a preview */}
              <div className="flex min-h-0 flex-1 items-center justify-center overflow-y-auto px-6 py-6">
                {testDone ? (
                  /* Clean result — a genuinely new rule has no scripted conflict scenario */
                  <div className="w-full max-w-sm text-center v10-fade">
                    <div className="flex justify-center">
                      <span className="relative grid h-16 w-16 place-items-center">
                        <span className="absolute inset-0 rounded-full bg-emerald-50"/>
                        <span className="absolute inset-1 rounded-full border-2 border-emerald-100"/>
                        <Ico name="tick" size={26} cls="relative text-emerald-500"/>
                      </span>
                    </div>
                    <div className="mt-5 text-[16px] font-semibold text-slate-900">No conflicts found</div>
                    <div className="mt-1.5 text-[13px] leading-relaxed text-slate-500">We checked this rule against every existing rule on this form. It runs cleanly and is safe to save.</div>
                    <div className="mt-6 flex justify-center gap-2.5">
                      <button onClick={endTest} className="h-9 rounded-full border border-slate-200 bg-white px-4 text-[13px] font-medium text-slate-600 hover:bg-slate-50">Close</button>
                      <button onClick={()=>{ endTest(); save(); }} className="h-9 rounded-full px-5 text-[13px] font-semibold text-white shadow-sm hover:brightness-105" style={{background:BRAND}}>Save rule</button>
                    </div>
                  </div>
                ) : testGoesToPreview ? <SafePreviewSim step={testStep} ready={simReady}/> : <div className="w-full max-w-sm">
                  {/* calm analysis indicator — soft halo + one sweeping arc; no flashy motion */}
                  <div className="flex justify-center">
                    <span className="relative grid h-16 w-16 place-items-center">
                      <span className="absolute inset-0 rounded-full bg-sky-50 animate-pulse"/>
                      <span className="absolute inset-1 rounded-full border-2 border-slate-200"/>
                      <span className="absolute inset-1 rounded-full border-2 border-transparent border-t-sky-500 animate-spin"/>
                      <Ico name="zap" size={20} cls="relative text-sky-600"/>
                    </span>
                  </div>
                  <div className="mt-5 text-center">
                    <div className="text-[15px] font-semibold text-slate-900">Rule engine is running your test</div>
                    <div className="mt-1 text-[13px] leading-relaxed text-slate-500">We're checking this rule against your existing rules in the background.</div>
                  </div>
                  <div className="mt-6 space-y-2.5">
                    {TEST_STEPS.map((s,i)=>{
                      const done = i < testStep, active = i === testStep;
                      return (
                        <div key={i} className={"flex items-center gap-2.5 text-[12.5px] transition-colors " + (done ? "text-slate-500" : active ? "font-medium text-slate-800" : "text-slate-300")}>
                          <span className="grid h-4 w-4 shrink-0 place-items-center">
                            {done ? <Ico name="tick" size={13} cls="text-emerald-500"/>
                              : active ? <span className="h-2 w-2 rounded-full bg-sky-500 animate-pulse"/>
                              : <span className="h-1.5 w-1.5 rounded-full bg-slate-200"/>}
                          </span>
                          <span>{s}</span>
                        </div>
                      );
                    })}
                  </div>
                  {/* the reassurance is the point of the wait */}
                  <div className="mt-6 rounded-lg border border-slate-200 bg-slate-50/70 px-3.5 py-3">
                    <div className="flex items-start gap-2">
                      <Ico name="lock" size={14} cls="mt-0.5 shrink-0 text-slate-400"/>
                      <div className="text-[12px] leading-relaxed text-slate-600">This test won't save or modify anything. Your existing rules remain unchanged — you're only previewing possible conflicts.</div>
                    </div>
                  </div>
                </div>}
              </div>
            </aside>
          </>, document.body)}
        {/* Opened from the rule config drawer → render 10% narrower than it, so the config drawer's edge stays
            visible behind and the stack reads as "one level deeper" (+56 cancels the inspector's own inset). */}
        {/* R23's Run Test result. Deliberately NOT closed when the conflict drawer opens over it — the drawer's
            Back button then returns the user to the exact form they left, at the sentence they clicked. */}
        {preview23 && <RuleTestPreview width={Math.round(rz.width * 0.9)} preview={demoFor(draft).preview} legacy={!!demoFor(draft).legacy} onClose={()=>setPreview23(false)} onFieldConflict={openFieldConflict}/>}
        {/* R26 — bottom-bar "View similar rules" opens the same drawer as the inline nudge */}
        {sameCondEditor && sameCondMatch && sameCondBlock && <SameCondDrawer when={sameCondBlock.time} exec={sameCondBlock.exec} conds={blockCondsList(sameCondBlock)} curActions={blockActionsText(sameCondBlock)} rules={sameCondMatch.rules} onClose={()=>setSameCondEditor(false)}/>}
        {inspectOpen && <ConflictInspector draft={draft} conflicts={conflicts} parentWidth={Math.round(rz.width * 0.9) + 56} focusFields={inspectFields} focusVerdict={inspectVerdict} autoPreview={testAutoPreview} onClose={()=>{ setInspectOpen(false); setInspectFields(null); setInspectVerdict(null); setTestAutoPreview(false); }} onEdit={loadRule} onDisable={disableRule} onToggle={toggleRule}/>}
      </aside>
    </>
  );
}

/* ============================================================ FIELD RULES DRAWER
   "Rules applying to a field" — a review surface (NOT the conflict inspector).
   Hierarchy: FIELD → RULE → BLOCKS WHERE THIS FIELD APPEARS → WHAT THE BLOCK DOES
   TO/WITH THE FIELD → CONDITIONS. A field may be a condition, an action, or both,
   and may appear in several blocks of one rule. */
function FieldRulesDrawer({fieldId, onClose}){
  const F = fieldId, L = labelOf(F);
  const [q, setQ]           = useState("");
  const [filter, setFilter] = useState("all");
  const [openRules, setOpenRules]   = useState({});
  const [openBlocks, setOpenBlocks] = useState({});

  // labels for known fields; title-cases any unknown id (e.g. requester_type → Requester Type)
  const flabel = id => { const l = labelOf(id); return l!==id ? l : id.split("_").map(w=> w.charAt(0).toUpperCase()+w.slice(1)).join(" "); };
  // --- per-field/block helpers ------------------------------------------------
  // every block carries its trigger — `exec` (Execute on) + `time` (When it runs); block value wins, else the rule's.
  const blocksOf   = r => { const bs = (r.blocks && r.blocks.length) ? r.blocks : [{conditions:r.conditions||[], actions:r.actions||[]}]; return bs.map(b=> ({...b, exec: b.exec || r.exec, time: b.time || r.when })); };
  const actFieldsOf = a => (a.fieldIds && a.fieldIds.length) ? a.fieldIds : (a.fieldId ? [a.fieldId] : []);
  const blkActs    = b => (b.actions||[]).filter(a=> actFieldsOf(a).indexOf(F)>=0);
  // conditions may be grouped ({group:true, conditions:[...]}) — expose the groups and a flat leaf list
  const condGroups = b => { const raw=b.conditions||[]; const g=raw.filter(c=>c&&c.group); return g.length ? g.map(x=> x.conditions||[]) : [raw]; };
  const leafConds  = b => condGroups(b).reduce((a,g)=> a.concat(g), []);
  const blkFCond   = b => leafConds(b).filter(c=> c && c.fieldId===F);
  const blkUses    = b => blkActs(b).length>0 || blkFCond(b).length>0;

  const condText = c => flabel(c.fieldId) + " " + (OP_PHRASE[c.op]||c.op||"") + (c.value ? " " + (Array.isArray(c.value)?c.value.join(" / "):c.value) : "");
  const condEq   = c => { if(OPS_NOVALUE.indexOf(c.op)>=0) return flabel(c.fieldId)+" "+(OP_PHRASE[c.op]||c.op); const v=Array.isArray(c.value)?c.value.join(" / "):c.value; return flabel(c.fieldId)+" = "+(v||"—"); };
  const actArrow = a => { switch(a.behavior){
    case "Set Value": return "Set value → " + (a.value||"a value"); case "Mandate": return "Make mandatory"; case "Non-Mandate": return "Make optional";
    case "Hide": return "Hide field"; case "Show": return "Show field"; case "Enable": return "Make editable"; case "Disable": return "Make read-only";
    case "Clear Value": return "Clear value"; case "Show Options": return "Show options"; case "Hide Options": return "Limit options";
    case "Run Custom Script": return "Run script"; case "Filter Data": return "Filter data"; default: return a.behavior||"Change field"; } };
  // full action line for the block detail — names the target field (any field, not just the selected one)
  const actLine = a => { const fL = actFieldsOf(a).map(flabel).join(" & ") || "field"; switch(a.behavior){
    case "Set Value": return "Set " + fL + " → " + (a.value||"a value"); case "Mandate": return "Make " + fL + " mandatory"; case "Non-Mandate": return "Make " + fL + " optional";
    case "Hide": return "Hide " + fL; case "Show": return "Show " + fL; case "Enable": return "Enable " + fL; case "Disable": return "Lock " + fL;
    case "Clear Value": return "Clear " + fL; case "Show Options": return "Show " + fL + " options"; case "Hide Options": return "Limit " + fL + " options";
    case "Run Custom Script": return "Run script"; case "Filter Data": return "Filter " + fL; default: return (a.behavior||"Change") + " " + fL; } };
  // collapsed block-row summary (with field name), tolerant of condition / action / both
  const rowVerb = b => { const acts=blkActs(b), isC=blkFCond(b).length>0;
    if(acts.length && isC) return "Uses " + L + " as both condition and action";
    if(acts.length){ const a=acts[0]; switch(a.behavior){
      case "Set Value": return "Sets " + L + " → " + (a.value||"a value"); case "Mandate": return "Makes " + L + " mandatory"; case "Non-Mandate": return "Makes " + L + " optional";
      case "Hide": return "Hides " + L; case "Show": return "Shows " + L; case "Enable": return "Makes " + L + " editable"; case "Disable": return "Makes " + L + " read-only";
      case "Clear Value": return "Clears " + L; case "Show Options": return "Sets " + L + " options"; case "Hide Options": return "Limits " + L + " options"; default: return "Changes " + L; } }
    return "Uses " + L + " as a condition"; };

  // --- rule view-models -------------------------------------------------------
  const source = FIELD_RULE_FIXTURES[F] || RULE_DB;   // Status & Description are demo-populated fixtures
  const vms = source.map(r=>{
    const all = blocksOf(r);
    const appearing = all.map((b,i)=>({b,i})).filter(x=> blkUses(x.b));
    if(!appearing.length) return null;
    const hasAct  = appearing.some(x=> blkActs(x.b).length>0);
    const hasCond = appearing.some(x=> blkFCond(x.b).length>0);
    return { r, total: all.length, multi: !!(r.blocks && r.blocks.length>1), appearing, hasAct, hasCond };
  }).filter(Boolean);

  // multi-block rule → "appears in k of n blocks" (count is in the summary); single-block → the field's verb + a "1 of 1 blocks" count
  const rowSummary = vm => vm.multi ? (L + " appears in " + vm.appearing.length + " of " + vm.total + " blocks") : rowVerb(vm.appearing[0].b);
  const rowCount   = vm => vm.multi ? "" : (vm.appearing.length + " of " + vm.total + " blocks");
  const haystack = vm => { const p=[vm.r.name, vm.r.audience||""];
    vm.appearing.forEach(x=>{ p.push("block "+(x.i+1), rowVerb(x.b)); leafConds(x.b).forEach(c=>p.push(condText(c))); blkActs(x.b).forEach(a=>p.push(actArrow(a))); });
    return p.join(" ").toLowerCase(); };

  const ql = q.trim().toLowerCase();
  const searched = vms.filter(vm=> !ql || haystack(vm).indexOf(ql)>=0);
  // group by the field's role — mutually exclusive so a rule appears in exactly one section
  const GROUPS = [
    {k:"cond", title:"Used as a condition", rules: searched.filter(vm=> vm.hasCond && !vm.hasAct)},
    {k:"act",  title:"Used as an action",   rules: searched.filter(vm=> vm.hasAct && !vm.hasCond)},
    {k:"both", title:"Used as both",        rules: searched.filter(vm=> vm.hasCond && vm.hasAct)},
  ];
  const visGroups  = GROUPS.filter(g=> g.rules.length && (filter==="all" || filter===g.k));
  const totalShown = visGroups.reduce((n,g)=> n+g.rules.length, 0);

  const blockTotal = vms.reduce((n,vm)=> n+vm.appearing.length, 0);
  const anyCond = vms.some(vm=>vm.hasCond), anyAct = vms.some(vm=>vm.hasAct);
  const mixed = anyCond && anyAct;

  const TABS = [{k:"all",label:"All"},{k:"cond",label:"Conditions"},{k:"act",label:"Actions"},{k:"both",label:"Both"}];
  const Lbl = ({children}) => <div className="text-[10px] font-semibold uppercase tracking-wider text-slate-400">{children}</div>;

  // Field-first detail card. The user clicked this field, so we lead with the field's own role,
  // then the rest of the block's conditions, then the outcome. Conditions are never re-labelled
  // as a separate "Runs when" concept — there are only conditions and actions.
  const BlockDetail = ({b}) => {
    const stActs=blkActs(b), allActs=b.actions||[];
    const grps = condGroups(b);
    const fC = grps.reduce((a,g)=> a.concat(g), []).filter(c=> c && c.fieldId===F);
    const otherGroups = grps.map(g=> g.filter(c=> fC.indexOf(c)<0)).filter(g=> g.length>0);
    const otherActs = allActs.filter(a=> actFieldsOf(a).indexOf(F)<0);
    const role = (stActs.length>0 && fC.length>0) ? "both" : (stActs.length>0 ? "action" : "condition");
    const Body  = ({children}) => <div className="text-[13px] font-medium text-slate-800">{children}</div>;
    const Conds = ({items}) => <div className="space-y-1">{items.map((c,i)=><div key={i} className="flex items-start gap-2 text-[12.5px] leading-snug text-slate-600"><span className="mt-[7px] h-1 w-1 shrink-0 rounded-full bg-slate-300"/><span>{condText(c)}</span></div>)}</div>;
    // one group → a plain list; several → each group reads as a unit, joined by AND
    const Groups = ({groups}) => groups.length<=1
      ? <Conds items={groups[0]||[]}/>
      : <div>{groups.map((g,gi)=>(
          <div key={gi}>
            {gi>0 && <div className="my-2 flex items-center gap-2 text-[10px] font-semibold tracking-wide text-slate-400"><span>AND</span><div className="h-px flex-1 bg-slate-100"/></div>}
            <div className="border-l-2 border-slate-100 pl-2.5">
              <div className="mb-1 text-[10.5px] font-medium text-slate-400">Group {gi+1}</div>
              <Conds items={g}/>
            </div>
          </div>
        ))}</div>;
    // one labelled zone per line of meaning; a hairline separates zones (the field name is NOT repeated —
    // the drawer title and the block summary already name it, so the detail leads straight with content)
    const Sec = ({label, children}) => <div className="border-t border-slate-100 pt-2.5 first:border-t-0 first:pt-0"><Lbl>{label}</Lbl><div className="mt-1">{children}</div></div>;
    return (
      <div className="space-y-2.5 px-4 py-3.5">
        {/* the block's trigger, as a quiet single line — when it runs · which operations it executes on */}
        {(b.time || b.exec) &&
          <div className="flex items-center gap-1.5 text-[11.5px] text-slate-400">
            <Ico name="history" size={12} cls="shrink-0"/>
            <span className="min-w-0 truncate">{[b.time, b.exec].filter(Boolean).join(" · ")}</span>
          </div>}
        {role==="condition" && <>
          <Sec label="Condition"><Body>{condEq(fC[0])}</Body></Sec>
          {otherGroups.length>0 && <Sec label="Along with"><Groups groups={otherGroups}/></Sec>}
          {allActs.length>0 && <Sec label="Then">{allActs.map((a,i)=><Body key={i}>{actLine(a)}</Body>)}</Sec>}
        </>}
        {role==="action" && <>
          <Sec label="Action">{stActs.map((a,i)=><Body key={i}>{actArrow(a)}</Body>)}</Sec>
          {otherGroups.length>0
            ? <Sec label="Conditions"><Groups groups={otherGroups}/></Sec>
            : <div className="border-t border-slate-100 pt-2.5 text-[11.5px] italic text-slate-400">Runs whenever the block runs.</div>}
          {otherActs.length>0 && <Sec label="Other actions in this rule">{otherActs.map((a,i)=><Body key={i}>{actLine(a)}</Body>)}</Sec>}
        </>}
        {role==="both" && <>
          <Sec label="Condition"><Body>{condEq(fC[0])}</Body></Sec>
          {otherGroups.length>0 && <Sec label="Along with"><Groups groups={otherGroups}/></Sec>}
          {stActs.map((a,i)=> a.behavior==="Set Value"
            ? <Sec key={"o"+i} label="Then changes to"><Body>{a.value||"a value"}</Body></Sec>
            : <Sec key={"o"+i} label="Then"><Body>{actArrow(a)}</Body></Sec>)}
          {otherActs.length>0 && <Sec label="Other actions in this rule">{otherActs.map((a,i)=><Body key={i}>{actLine(a)}</Body>)}</Sec>}
        </>}
      </div>
    );
  };

  // one rule row — the rule NAME leads (primary), a muted meta line beneath, then its expansion.
  // single-block → the detail directly (no redundant "Block 1"); multi-block → collapsible blocks.
  const RuleCard = ({vm}) => {
    const ro = !!openRules[vm.r.id];
    return (
      <div className="overflow-hidden rounded-xl border border-slate-200 bg-white">
        <button onClick={()=>setOpenRules(t=>({...t,[vm.r.id]:!ro}))} className="flex w-full items-center gap-3 px-4 py-3 text-left transition hover:bg-slate-50/60">
          <div className="min-w-0 flex-1">
            <div className="flex items-baseline justify-between gap-3">
              <span className="truncate text-[14px] font-semibold text-slate-900">{vm.r.name}</span>
              {vm.r.audience && <span className="shrink-0 text-[11px] font-medium text-slate-400">{vm.r.audience}</span>}
            </div>
            <div className="mt-0.5 truncate text-[12px] text-slate-500">{rowSummary(vm)}{rowCount(vm) ? " · " + rowCount(vm) : ""}</div>
          </div>
          <Ico name="chevdown" size={15} cls={"shrink-0 text-slate-400 transition-transform " + (ro?"":"-rotate-90")}/>
        </button>
        {ro &&
          <div className="border-t border-slate-100 bg-slate-50/50 px-3 py-3">
            {vm.multi
              ? <>
                  <div className="mb-2 px-1"><Lbl>Blocks with {L} · {vm.appearing.length} of {vm.total}</Lbl></div>
                  <div className="space-y-2">
                    {vm.appearing.map(x=>{
                      const bk = vm.r.id+":"+x.i, bo = !!openBlocks[bk];
                      return (
                        <div key={bk} className="overflow-hidden rounded-lg border border-slate-200 bg-white">
                          <button onClick={()=>setOpenBlocks(t=>({...t,[bk]:!bo}))} className="flex w-full items-center gap-2.5 px-3 py-2 text-left transition hover:bg-slate-50">
                            <span className="shrink-0 rounded bg-slate-100 px-1.5 py-0.5 text-[10px] font-semibold uppercase tracking-wide text-slate-500">Block {x.i+1}</span>
                            <span className="min-w-0 flex-1 truncate text-[12.5px] text-slate-700">{rowVerb(x.b)}</span>
                            <Ico name="chevdown" size={13} cls={"shrink-0 text-slate-400 transition-transform " + (bo?"":"-rotate-90")}/>
                          </button>
                          {bo && <div className="border-t border-slate-100"><BlockDetail b={x.b}/></div>}
                        </div>
                      );
                    })}
                  </div>
                </>
              : <div className="rounded-lg border border-slate-200 bg-white"><BlockDetail b={vm.appearing[0].b}/></div>}
          </div>}
      </div>
    );
  };

  return (
    <>
      <div className="fixed inset-0 z-[58] bg-slate-900/25" onClick={onClose}/>
      <aside className="fixed top-0 right-0 z-[59] flex h-full w-[600px] max-w-[97vw] flex-col border-l border-slate-200 bg-white shadow-2xl v10-drawer">
        {/* header — the field is the subject, named once and prominently */}
        <div className="flex items-start justify-between gap-3 border-b border-slate-200 px-5 pb-4 pt-5 shrink-0">
          <div className="min-w-0">
            <div className="text-[10px] font-semibold uppercase tracking-wider text-slate-400">Field rules</div>
            <div className="mt-1 truncate text-[18px] font-bold leading-tight text-slate-900">{L}</div>
            <div className="mt-1 text-[12.5px] text-slate-500">{vms.length===1 ? "1 rule applies" : (vms.length + " rules apply")}{mixed ? " — as a condition, action, or both" : ""}</div>
          </div>
          <button onClick={onClose} className="grid h-8 w-8 shrink-0 place-items-center rounded-md text-slate-400 transition hover:bg-slate-100 hover:text-slate-700" title="Close"><Ico name="x" size={18}/></button>
        </div>
        {/* search + role filter */}
        <div className="space-y-2.5 border-b border-slate-100 px-5 py-3 shrink-0">
          <div className="relative">
            <span className="absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-400"><Ico name="search" size={15}/></span>
            <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search rules..."
              className="h-8 w-full rounded-md border border-slate-200 pl-8 pr-2 text-[13px] outline-none transition focus:border-sky-300 focus:ring-2 focus:ring-sky-100"/>
          </div>
          <div className="inline-flex items-center gap-0.5 rounded-lg bg-slate-100 p-0.5">
            {TABS.map(t=>(
              <button key={t.k} type="button" onClick={()=>setFilter(t.k)}
                className={"rounded-md px-3 py-1 text-[12px] transition " + (filter===t.k ? "bg-white font-semibold text-slate-800 shadow-sm" : "text-slate-500 hover:text-slate-700")}>{t.label}</button>
            ))}
          </div>
        </div>
        {/* grouped rules — a captioned hairline heads each role group */}
        <div className="flex-1 space-y-6 overflow-y-auto px-5 py-4">
          {visGroups.map(g=>(
            <div key={g.k}>
              <div className="mb-2.5 flex items-center gap-2.5 px-0.5">
                <span className="text-[10px] font-semibold uppercase tracking-wider text-slate-400">{g.title}</span>
                <span className="h-px flex-1 bg-slate-100"/>
                <span className="text-[11px] font-medium text-slate-300">{g.rules.length}</span>
              </div>
              <div className="space-y-2.5">
                {g.rules.map(vm=> <RuleCard key={vm.r.id} vm={vm}/>)}
              </div>
            </div>
          ))}
          {totalShown===0 && <div className="py-12 text-center text-[12.5px] text-slate-400">No rules match.</div>}
        </div>
      </aside>
    </>
  );
}

/* ============================================================ APP */
function AppV10(){
  const [tab, setTab]           = useState("rules");
  const [selField, setSelField] = useState(null);
  const [intent, setIntent]     = useState(null);
  const [flash, setFlash]       = useState(null);
  const [flow, setFlow]         = useState(null);   // field-driven rule-attachment flow
  const [fieldRules, setFieldRules] = useState(null); // "Rules applying to a field" review drawer (field id)
  const [customOpen, setCustomOpen] = useState(false); // Create Custom Rule drawer
  const [customFamily, setCustomFamily] = useState(null); // open the drawer straight into a family (null = dashboard)
  // Custom-rule selections lifted here so the Form Rules listing can show live Configured/Not-configured status.
  // Seeded so Show Dialog + Add Worklog read as configured by default.
  const [customSel, setCustomSel] = useState({ "d-fields":["category","assignee"], "d-act":["confirm"], "w-who":["either"], "w-act":["restrict"] });
  const [formRule, setFormRule] = useState(null);   // V7-style Form Rule editor (large panel) — {baseRule}
  const [toast, setToast]       = useState("");

  const openFlow   = (fieldId) => { setSelField(null); setFlash(fieldId); setFlow({ field:fieldId, mode:null, ruleId:null, dir:null, entered:false, creating:false }); };
  const closeFlow  = () => { setFlow(null); setFlash(null); };
  // Create Form Rule → open the V7-style rule editor (large workspace panel), NOT the field-config drawer.
  const createForm = () => { setFlow(null); setFlash(null); setSelField(null); setFormRule({ baseRule:null }); };
  // Edit an existing form rule from the listing — open the same V7 editor with the rule loaded (all steps revealed).
  const openRule = (ruleId) => { setFlow(null); setFlash(null); setSelField(null); setFormRule({ baseRule: RULE_DB.find(x=>x.id===ruleId) || null }); };
  const openCustom = () => { setCustomFamily(null); setCustomOpen(true); };
  const openCustomFamily = (famId) => { setFlow(null); setFlash(null); setCustomFamily(famId); setCustomOpen(true); };  // from an inline custom-rule entry
  const closeCustom= () => setCustomOpen(false);
  // Save Custom Rules: persist the session (mock), close the drawer, refresh the Form Rules view + toast.
  const saveCustom = () => { setCustomOpen(false); setTab("rules"); setToast("Custom rules saved successfully."); };
  useEffect(()=>{ if(!toast) return; const t=setTimeout(()=>setToast(""), 3000); return ()=>clearTimeout(t); }, [toast]);
  // "Add rule" launches the guided attach flow; View / Edit go to the Form Rules tab.
  const goRules    = (fieldId) => openFlow(fieldId);   // field-centric: one action opens the rule sidebar
  const viewFieldRules = (fieldId) => setFieldRules(fieldId); // review the rules already applying to this field
  const openTab    = () => { setTab("rules"); };
  const openBuilder= () => { setTab("builder"); };
  const onOpen     = (fieldId, it) => { setSelField(fieldId); setIntent(it); };
  const onClear    = () => { setSelField(null); setIntent(null); };

  // When we return to the builder carrying a field context, flash that field.
  useEffect(()=>{
    if(tab==="builder" && selField){
      setFlash(selField);
      const t = setTimeout(()=> setFlash(null), 2300);
      return ()=> clearTimeout(t);
    }
  }, [tab, selField]);

  return (
    <div className="v10 h-screen flex flex-col bg-slate-100 text-slate-800 overflow-hidden">
      <TopBar/>
      <div className="flex flex-1 min-h-0">
        <IconRail/>
        <main className="flex-1 flex flex-col min-w-0">
          <HeaderRow/>
          <TabsRow tab={tab} onBuilder={openBuilder} onRules={openTab} total={totalRules()} onCreateForm={createForm} onCreateCustom={openCustom}/>
          <div className="flex-1 min-h-0 overflow-hidden">
            <div key={tab} className={(tab==="rules" ? "v10-slide" : "v10-fade") + " h-full"}>
              {tab==="builder"
                ? <FormBuilder flash={flash} goRules={goRules} viewFieldRules={viewFieldRules}/>
                : <FormRulesHome field={selField} intent={intent} onBack={openBuilder} onOpen={onOpen} onClear={onClear} onCreateForm={createForm} onCreateCustom={openCustom} onCustomFamily={openCustomFamily} customSel={customSel} onEditRule={openRule} onToast={setToast}/>}
            </div>
          </div>
        </main>
      </div>
      {flow && <RuleFlow flow={flow} setFlow={setFlow} onClose={closeFlow} onCustom={openCustomFamily} onToast={setToast}
        onSaved={(rule)=>{ if(rule){ const editing = RULE_DB.some(r=>r.id===rule.id); persistRule(rule); closeFlow(); setToast("“"+rule.name+"” "+(editing?"updated":"saved to Form Rules")+"."); } else { closeFlow(); } }}/>}
      {formRule && <FormRuleEditorV7 baseRule={formRule.baseRule} onClose={()=>setFormRule(null)} onSaved={(rule)=>{ const editing=!!(formRule&&formRule.baseRule); if(rule) persistRule(rule); setFormRule(null); setTab("rules"); setToast(rule ? ("“"+rule.name+"” "+(editing?"updated":"saved")+" in Form Rules.") : "Form rule saved successfully."); }}/>}
      {customOpen && <CustomRuleDrawer initialFamily={customFamily} sel={customSel} setSel={setCustomSel} onClose={closeCustom} onSaved={saveCustom}/>}
      {fieldRules && <FieldRulesDrawer fieldId={fieldRules} onClose={()=>setFieldRules(null)}/>}
      {toast && <div className="fixed bottom-5 left-1/2 -translate-x-1/2 z-[60] rounded-lg bg-slate-900 text-white text-[13px] px-4 py-2.5 shadow-lg flex items-center gap-2"><Ico name="check" size={15} cls="text-emerald-400"/>{toast}</div>}
    </div>
  );
}

<!-- self-compile safety net: prints the exact Babel error on screen if the app fails to compile (silent on success) -->
<script>
  window.addEventListener("load", function(){
    setTimeout(function(){
      var root = document.getElementById("root");
      if (root && root.children.length) return;      // rendered fine
      if (document.getElementById("v10err")) return; // runtime error already shown by the render try/catch
      var msg;
      if (!window.React || !window.ReactDOM) {
        msg = "React / ReactDOM did not load from the CDN (unpkg.com).\nCheck your internet connection or an ad-blocker, then hard-reload (Ctrl+Shift+R).";
      } else if (!window.Babel) {
        msg = "Babel did not load from the CDN (unpkg.com).\nCheck your internet connection or an ad-blocker, then hard-reload (Ctrl+Shift+R).";
      } else {
        try {
          var s = document.querySelector('script[type="text/babel"]');
          if (s) Babel.transform(s.textContent, { presets:["react"] });
          msg = "Scripts loaded and compiled OK, but nothing rendered — likely a runtime error.\nOpen DevTools (F12) and copy the red Console error.";
        } catch(err){
          msg = "V10 failed to compile:\n\n" + (err && err.message ? err.message : err);
        }
      }
      var pre = document.createElement("pre");
      pre.style.cssText = "white-space:pre-wrap;background:#fff1f2;color:#9f1239;padding:14px 16px;margin:0;font:13px/1.5 ui-monospace,Menlo,Consolas,monospace;border-bottom:3px solid #e11d48;";
      pre.textContent = msg;
      document.body.insertBefore(pre, document.body.firstChild);
    }, 600);
  });
</script>
