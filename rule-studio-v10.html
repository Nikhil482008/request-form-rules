  if (OPS_NOVALUE.indexOf(c.op) >= 0) return f + " " + (OP_PHRASE[c.op] || "is set");
  const v = Array.isArray(c.value) ? c.value.join(" / ") : c.value;
  return f + " " + (OP_PHRASE[c.op] || "is") + " " + (v || "a value");
};
const actionPhrase = a => {
  const f = labelOf(a.fieldId);
  if (a.behavior==="Show") return "show " + f;
  if (a.behavior==="Hide") return "hide " + f;
  if (a.behavior==="Mandate") return "make " + f + " mandatory";
  if (a.behavior==="Non-Mandate") return "make " + f + " optional";
  if (a.behavior==="Enable") return "enable " + f;
  if (a.behavior==="Disable") return "disable " + f;
  if (a.behavior==="Set Value") return "set " + f + (a.value ? " to " + a.value : "");
  if (a.behavior==="Clear Value") return "clear " + f;
  if (a.behavior==="Filter Data") return "filter the options for " + f;
  return (a.behavior || "update") + " " + f;
};
function summarize(rule){
  const conds = (rule.conditions || []).filter(c=>c.fieldId);
  const acts  = (rule.actions || []).filter(a=>a.fieldId);
  if (!acts.length) return "Add an action to describe what this rule does.";
  const condText = conds.length ? "when " + conds.map(condPhrase).join(" and ") + ", " : "";
  const actText  = acts.map(actionPhrase).join(", and ");
  const aud = (rule.audience && rule.audience !== "Everyone") ? " for " + rule.audience : "";
  return cap(condText + actText + aud) + ".";
}

const fieldsOfRule = r => {
  const s = [];
  (r.conditions || []).forEach(c=> { if (c.fieldId && s.indexOf(c.fieldId) < 0) s.push(c.fieldId); });
  (r.actions || []).forEach(a=> { if (a.fieldId && s.indexOf(a.fieldId) < 0) s.push(a.fieldId); });
  return s;
};
const affectedFields = r => {
  const s = [];
  (r.actions || []).forEach(a=> { if (a.fieldId && s.indexOf(a.fieldId) < 0) s.push(a.fieldId); });
  return s;
};
const ruleUsesField = (r, fieldId) => fieldsOfRule(r).indexOf(fieldId) >= 0;
// Role-specific relevance: rules that already use the field as a condition / as an action target.
const condRulesFor = fieldId => RULE_DB.filter(r=> (r.conditions||[]).some(c=> c.fieldId===fieldId));
const actRulesFor  = fieldId => RULE_DB.filter(r=> (r.actions||[]).some(a=> a.fieldId===fieldId));
const ruleList   = fieldId => RULE_DB.filter(r=> ruleUsesField(r, fieldId));
const ruleCount  = fieldId => ruleList(fieldId).length;
const totalRules = () => RULE_DB.length;
const coveredFields = () => ALL_FIELDS.filter(f=> ruleCount(f.id) > 0).length;

const CR_FIELDS = [

// Resolved Rules and Closed Rules share the same condition sections (only the target state differs).
function crStateConditions(p, state){
  return [
    { id:p+"-int", bucket:"condition", title:"User Interaction", type:"check",
      helper:"Require the user to do these before a ticket can be " + state + ".",

    { id:p+"-mand", bucket:"condition", title:"Mandatory Fields", type:"check",
      helper:"Select the fields that must be completed before a ticket can be " + state + ".",
      empty:"No mandatory fields configured.",
      lead:"Before a ticket can be " + state + ",", tail:"must be completed",
      options:CR_FIELDS },
    { id:p+"-state", bucket:"condition", title:"Required State", type:"check",
      helper:"Select the conditions that must be satisfied before a ticket can be " + state + ".",
      empty:"No required conditions configured.",
      lead:"A ticket can only be " + state + " when", tail:"",
      options:CR_CONDITIONS },
  ];
}
const CR_FAMILIES = [

    sections:[

        helper:"Choose whose worklog access this rule controls.",
        empty:"No access context selected.",
        tail:"can add worklogs",
        options:[ {id:"assignee",label:"Only Assignee",clause:"Only the assigned technician"},
                  {id:"group",label:"Only Technician Group",clause:"Only the technician group"},
                  {id:"all",label:"All Technicians",clause:"All technicians"},
                  {id:"either",label:"Only Assignee or Technician Group",clause:"Only the assignee or technician group"} ] },
      { id:"w-act", bucket:"action", title:"Access decision", type:"radio",

        options:[ {id:"allow",label:"Allow add worklog"}, {id:"restrict",label:"Restrict add worklog"} ] },

function crList(arr){
  if(arr.length===1) return arr[0];
  if(arr.length===2) return arr[0] + " and " + arr[1];
  return arr.slice(0,-1).join(", ") + " and " + arr[arr.length-1];
}
// Translate a section's selection into a plain-English policy sentence.
function crSectionPreview(section, ids){
  if(!ids || !ids.length) return null;
  const opts = section.options.filter(o=> ids.indexOf(o.id)>=0);
  if(!opts.length) return null;
  if(section.type==="radio"){
    const o = opts[0];
    return (section.lead ? section.lead + " " : "") + (o.clause || o.label) + (section.tail ? " " + section.tail : "") + ".";
  }
  const list = crList(opts.map(o=> o.clause || o.label));
  return (section.lead ? section.lead + " " : "") + list + (section.tail ? (" " + section.tail) : "") + ".";
}
const CR_UNITS = { resolved:["validation","configured"], closed:["validation","configured"], note:["field","selected"], dialog:["field","selected"], worklog:["selection","made"] };
// Short status detail for a family's dashboard card (e.g., "5 validations configured", or the chosen worklog access).
function famStatus(fam, sel){
  const count = fam.sections.reduce((n,sec)=> n + ((sel[sec.id]||[]).length), 0);
  if(!count) return null;
  if(fam.id==="worklog"){ const sec = fam.sections.find(s=>s.id==="w-who"); const o = sec && sec.options.find(x=>x.id===(sel["w-who"]||[])[0]); if(o) return o.label; }
  const u = CR_UNITS[fam.id] || ["item","selected"];
  return count + " " + u[0] + (count===1?"":"s") + " " + u[1];
}

const REQUESTS = ["All requests","Incidents","Service requests","Problems","Changes"];
const itemPhrase = it => it.group

  : condPhrase(it);
function summarizeBlock(block, people){
  const conds = (block.conditions||[]).filter(it=> it.group ? (it.conditions||[]).some(c=>c.fieldId) : it.fieldId);
  const acts  = (block.actions||[]).filter(a=>a.fieldId);
  if (!acts.length) return null;
  const join = block.match==="any" ? " or " : " and ";
  const condText = conds.length ? "when " + conds.map(itemPhrase).join(join) + ", " : "";
  const actText  = acts.map(actionPhrase).join(", and ");
  const aud = (people && people!=="Everyone") ? " for " + people : "";
  return cap(condText + actText + aud) + ".";
}
function summarizeRule(draft){
  const parts = (draft.blocks||[]).map(b=> summarizeBlock(b, b.people)).filter(Boolean);
  if (!parts.length) return "Add an action to describe what this rule does.";

}

function GuidedDropdown({value, onChange, options, guide, placeholder, hint, variant, highlight, multi}){
  const [open, setOpen] = useState(false);
  const [q, setQ] = useState("");
  const [active, setActive] = useState("");
  const [pos, setPos] = useState(null);
  const btnRef = useRef(null);
  const norm = options.map(o=> (o && typeof o==="object") ? o : {value:o, label:o});
  const isMulti = !!multi;
  const arr = Array.isArray(value) ? value : (value ? [value] : []);
  const sel = norm.find(o=> o.value===value);
  const hasPanel = !!guide || !!hint;
  const ql = q.trim().toLowerCase();
  const filtered = ql ? norm.filter(o=> (o.label||"").toLowerCase().indexOf(ql) >= 0) : norm;
  const showSearch = norm.length > 6;
  const subOf = o => o.desc || (guide && guide[o.value] && guide[o.value].desc) || null;
  const labelFor = v => { const o = norm.find(x=>x.value===v); return o ? o.label : v; };
  const openMenu = () => {
    const r = btnRef.current.getBoundingClientRect();
    const W = hasPanel ? 460 : 300, H = 340;
    let left = r.left; if (left + W > window.innerWidth - 8) left = window.innerWidth - W - 8; if (left < 8) left = 8;
    let top = r.bottom + 4; if (top + H > window.innerHeight - 8) top = Math.max(8, r.top - H - 4);
    setPos({left, top, W}); setActive(value || (norm[0] && norm[0].value) || ""); setQ(""); setOpen(true);
  };
  const pick = v => { if (isMulti){ const next = arr.indexOf(v)>=0 ? arr.filter(x=>x!==v) : arr.concat([v]); onChange(next); } else { onChange(v); setOpen(false); } };
  const triggerCls = variant==="pill"
    ? "appearance-none h-11 rounded-lg border bg-white pl-4 pr-9 text-[14px] font-semibold inline-flex items-center justify-between gap-2 min-w-[150px] relative " + (sel?"text-slate-700":"text-slate-400") + " " + (open?"border-sky-300 ring-2 ring-sky-100":"border-slate-200 hover:border-slate-300")
    : "h-9 rounded-md border bg-white px-2.5 text-[13px] inline-flex items-center justify-between gap-1.5 w-full relative " + ((sel||arr.length)?"text-slate-700":"text-slate-400") + " " + (open?"border-sky-300 ring-1 ring-sky-200":(highlight?"border-sky-300 ring-1 ring-sky-200":"border-slate-200 hover:border-slate-300"));
  const triggerText = isMulti ? (arr.length ? arr.map(labelFor).join(", ") : (placeholder||"Select")) : (sel ? sel.label : (placeholder||"Select"));
  const g = guide && active && guide[active];
  return (
    <>
      <button ref={btnRef} type="button" onClick={()=> open?setOpen(false):openMenu()} className={triggerCls}>
        <span className="truncate">{triggerText}</span>
        <Ico name="chevdown" size={14} cls="text-slate-400 shrink-0"/>
      </button>
      {open && pos && ReactDOM.createPortal(
        <div className="fixed inset-0 z-[60]" onMouseDown={()=>setOpen(false)}>
          <div onMouseDown={e=>e.stopPropagation()} className="absolute v10-pop bg-white rounded-xl shadow-2xl ring-1 ring-slate-200 overflow-hidden flex" style={{left:pos.left, top:pos.top, width:pos.W}}>
            <div className={(hasPanel ? "w-[210px] border-r border-slate-100" : "w-full") + " shrink-0 flex flex-col max-h-[340px]"}>
              {showSearch &&
                <div className="p-2 border-b border-slate-100">
                  <input autoFocus value={q} onChange={e=>setQ(e.target.value)} placeholder="Search"
                    className="w-full h-8 px-2 rounded-md border border-slate-200 text-[12.5px] outline-none focus:border-sky-300"/>
                </div>}
              <div className="overflow-y-auto py-1">
                {filtered.map(o=>{
                  const on = isMulti ? arr.indexOf(o.value)>=0 : o.value===value;
                  const sub = subOf(o);
                  return (
                    <button key={o.value} type="button" onMouseEnter={()=>setActive(o.value)} onClick={()=>pick(o.value)}
                      className={"w-full text-left px-2.5 py-1.5 text-[13px] flex items-start justify-between gap-2 " + (on?"bg-sky-50 text-[#1180c1] font-semibold":(o.value===active?"bg-slate-50 text-slate-700":"text-slate-700 hover:bg-slate-50"))}>
                      <span className="min-w-0"><span className="block truncate">{o.label}</span>{sub && <span className="block text-[11px] text-slate-400 truncate font-normal">{sub}</span>}</span>
                      {on && <Ico name="check" size={14} cls="shrink-0 mt-0.5"/>}
                    </button>
                  );
                })}
                {filtered.length===0 && <p className="px-3 py-4 text-[12px] text-slate-400 text-center">No matches</p>}
              </div>
              {isMulti &&
                <div className="border-t border-slate-100 p-2">
                  <button type="button" onClick={()=>setOpen(false)} className="w-full h-8 rounded-md text-[12.5px] font-medium text-white" style={{background:BRAND}}>Done</button>
                </div>}
            </div>
            {hasPanel &&
              <div className="flex-1 min-w-0 p-3.5 bg-slate-50/50 max-h-[340px] overflow-y-auto">
                {g
                  ? <div className="space-y-2.5">
                      <h5 className="text-[13px] font-semibold text-slate-800">{labelFor(active)}</h5>
                      <GBlock label="WHEN TO USE" text={g.when}/>
                      <GBlock label="HOW IT WORKS" text={g.how}/>
                      <GBlock label="OUTPUT" text={g.output}/>
                      {g.example && <div className="rounded-md bg-white ring-1 ring-slate-200 px-2.5 py-2"><div className="text-[9.5px] font-bold tracking-wide text-[#1180c1] mb-0.5">EXAMPLE</div><p className="text-[11.5px] text-slate-600 leading-snug">{g.example}</p></div>}
                    </div>
                  : <div className="space-y-1.5">
                      <h5 className="text-[13px] font-semibold text-slate-800">{active ? labelFor(active) : "Choose an option"}</h5>
                      <p className="text-[12px] text-slate-500 leading-relaxed">{hint || "Pick from the list."}</p>
                    </div>}
              </div>}
          </div>
        </div>,
        document.body)}
    </>
  );
}

function RuleEditor({fieldId, dir, baseRule, onClose, onSaved}){
  const init = useMemo(()=>{
    const fieldCond = {fieldId, op:"", value:"", _new:true};   // prefill the field only — user picks the condition
    const fieldAct  = {behavior:"", fieldId, value:"", _new:true};   // prefill the field only — user picks the action
    if (baseRule){
      // Migration: move the rule's shared trigger into the block so each block is a complete unit.
      const block = { match:"all", advanced:!!baseRule.advanced, advOpen:false,
        time: baseRule.when, requests:"All requests", people: baseRule.audience,
        conditions: baseRule.conditions.map(c=>({...c})), actions: baseRule.actions.map(a=>({...a})) };
      if (dir==="condition") block.conditions.push(fieldCond); else block.actions.push(fieldAct);
      return { name: baseRule.name, exec: "", blocks:[block] };
    }
    return {
      name: "",
      exec: "",
      blocks: [{ match:"all", advanced:false, advOpen:false,
        time: "", requests: "", people: "",
        conditions: dir==="condition" ? [fieldCond] : [],
        actions: dir==="action" ? [fieldAct] : [] }],
    };
  }, [baseRule, dir, fieldId]);
  const [draft, setDraft] = useState(init);
  const [saved, setSaved] = useState(false);
  const fieldOpts = ALL_FIELDS.map(f=>({value:f.id, label:f.label}));
  const patch = p => setDraft(d=>({...d, ...p}));
  const setBlock = (i,p) => setDraft(d=>({...d, blocks: d.blocks.map((b,j)=> j===i?{...b,...p}:b)}));
  const dupBlock = i => setDraft(d=>{ const src=d.blocks[i]; const copy={...src, conditions:src.conditions.map(c=>({...c})), actions:src.actions.map(a=>({...a}))}; const blocks=d.blocks.slice(); blocks.splice(i+1,0,copy); return {...d, blocks}; });
  const rmBlock = i => setDraft(d=>({...d, blocks: d.blocks.filter((_,j)=>j!==i)}));
  const addBlock = () => setDraft(d=>({...d, blocks:[...d.blocks, {match:"all", advanced:false, advOpen:false, time:"", requests:"", people:"", conditions:[], actions:[]}]}));
  const summary = summarizeRule(draft);
  const canSave = draft.blocks.some(b=> b.actions.some(a=>a.fieldId && a.behavior));
  const save = () => { setSaved(true); setTimeout(()=>{ onSaved && onSaved(); }, 750); };
  return (
    <div>
      <div className="flex items-stretch gap-2.5 mb-4">
        <input value={draft.name} onChange={e=>patch({name:e.target.value})} placeholder="Name this rule"
          className="flex-1 min-w-0 h-11 rounded-lg border border-slate-200 px-3.5 text-[15px] font-semibold outline-none focus:ring-2 focus:ring-sky-100 focus:border-sky-300"/>
        <div className="shrink-0"><GuidedDropdown variant="pill" value={draft.exec} onChange={v=>patch({exec:v})} options={EXEC_OPTS} guide={EXEC_GUIDE} placeholder="Which Requests"/></div>
      </div>
      <div className="space-y-3">
        {draft.blocks.map((b,i)=>
          <V9Block key={i} block={b} index={i} total={draft.blocks.length} fieldOpts={fieldOpts}
            onChange={p=>setBlock(i,p)} onDuplicate={()=>dupBlock(i)} onRemove={()=>rmBlock(i)}/>)}
      </div>
      <button onClick={addBlock}
        className="mt-3 w-full inline-flex items-center justify-center gap-1.5 h-11 rounded-xl border border-dashed border-slate-300 text-[13.5px] font-medium text-slate-500 hover:border-sky-300 hover:text-[#1180c1] hover:bg-sky-50/40 transition">
        <Ico name="plus" size={15}/> Add another rule block
      </button>
      <div className="mt-4 rounded-lg bg-slate-50 ring-1 ring-slate-200 px-3.5 py-3">
        <div className="text-[10.5px] font-semibold uppercase tracking-wider text-slate-400 mb-1 flex items-center gap-1.5"><Ico name="info" size={12}/> In plain English</div>
        <p className="text-[13.5px] text-slate-700 leading-snug">{summary}</p>
      </div>
      <div className="mt-3 flex items-center justify-end gap-2">
        <button onClick={onClose} className="h-9 px-4 rounded-md text-[13px] font-medium text-slate-600 border border-slate-200 bg-white hover:bg-slate-50">Cancel</button>
        <button onClick={save} disabled={!canSave}
          className={"h-9 px-5 rounded-md text-[13px] font-medium text-white transition " + (canSave ? "" : "opacity-50 cursor-not-allowed")}
          style={{background: saved ? "#16a34a" : BRAND}}>
          {saved ? "Saved ✓" : (baseRule ? "Update rule" : "Save rule")}
        </button>
      </div>
    </div>
  );
}

// The whole rule-attachment journey lives in ONE contextual right drawer (no popups/wizard screens).
// Step 1 — choose how the field participates; each card shows how many rules use the field in that role.
function HowDecision({fieldId, onSelect}){
  const cCount = condRulesFor(fieldId).length;
  const aCount = actRulesFor(fieldId).length;
  return (
    <div>
      <h4 className="text-[14px] font-semibold text-slate-800 mb-0.5">How should this field participate?</h4>
      <p className="text-[12.5px] text-slate-500 mb-3.5">Choose whether this field decides when a rule runs, or is changed when a rule runs.</p>
      <div className="grid grid-cols-2 gap-3">
        <ChoiceCard icon="branch" title="Condition" desc="Use this field to determine when a rule should run."
          hint={cCount + " rule" + (cCount===1?"":"s") + " use this field"} onClick={()=>onSelect("condition")}/>
        <ChoiceCard icon="zap" accent title="Action" desc="Use this field as the outcome of a rule."
          hint={aCount + " rule" + (aCount===1?"":"s") + " affect this field"} onClick={()=>onSelect("action")}/>
      </div>
    </div>
  );
}
function RuleFlow({flow, setFlow, onClose, onCustom}){
  const f = flow;
  const fieldId = f.field;
  const lbl = labelOf(fieldId);
  const baseRule = f.ruleId ? RULE_DB.find(r=>r.id===f.ruleId) : null;
  const setDir  = d => setFlow(x=>({...x, dir:d}));        // keeps mode: field Configure → role list, Create Form Rule → builder
  const pickRule = id => setFlow(x=>({...x, mode:"existing", ruleId:id, entered:true}));   // open the builder directly (no preview step)
  const createNew = () => setFlow(x=>({...x, mode:"new", ruleId:null, entered:false}));
  const backToList = () => setFlow(x=>({...x, mode:null, ruleId:null, entered:false}));        // keep dir → role-filtered list
  const backToHow = () => setFlow(x=>({...x, dir:null, mode:null, ruleId:null, entered:false}));   // change participation
  const continueEditor = () => setFlow(x=>({...x, entered:true}));
  const editChoices = () => setFlow(x=>({...x, dir:null, mode:null, ruleId:null, entered:false}));
  const inEditor = f.dir && (f.mode==="new" || (f.mode==="existing" && f.ruleId && f.entered));
  const showPreview = f.dir && f.mode==="existing" && f.ruleId && !f.entered;
  const showHow = !f.dir;                                  // Step 1: Condition / Action
  const showList = f.dir && !inEditor && !showPreview;     // Step 2: role-filtered rules + Create New
  return (
    <>
      <div className="fixed inset-0 z-40 bg-slate-900/10" onClick={onClose}/>
      <aside className="fixed top-0 right-0 z-50 h-full w-[600px] max-w-[94vw] bg-white shadow-2xl border-l border-slate-200 flex flex-col v10-drawer">
        <div className="px-5 py-4 border-b border-slate-100 flex items-start justify-between gap-3 shrink-0">
          <div className="min-w-0">
            <div className="flex items-center gap-2">
              <span className="w-7 h-7 rounded-md bg-sky-50 text-[#1593d4] grid place-items-center shrink-0"><Ico name="flag" size={15}/></span>
              <h3 className="text-[16px] font-semibold text-slate-800 truncate">{lbl} Field</h3>
            </div>
            <p className="text-[12px] text-slate-400 mt-1">Configure how this field participates in form behavior and validations.</p>
          </div>
          <button onClick={onClose} className="w-8 h-8 grid place-items-center rounded-md text-slate-400 hover:bg-slate-100 hover:text-slate-600 shrink-0" title="Close"><Ico name="x" size={17}/></button>
        </div>
        <div className="flex-1 overflow-y-auto px-5 py-4 space-y-5">
          {showHow && <HowDecision fieldId={fieldId} onSelect={setDir}/>}
          {showList &&
            <div>
              <button onClick={backToHow} className="text-[12px] text-slate-500 hover:text-slate-700 mb-3 inline-flex items-center gap-1"><Ico name="back" size={13}/> Change participation</button>
              <RoleRulesList fieldId={fieldId} dir={f.dir} onPick={pickRule} onNew={createNew} onCustom={onCustom}/>
            </div>}
          {inEditor &&
            <>
              <button onClick={backToList} className="text-[12px] text-slate-500 hover:text-slate-700 inline-flex items-center gap-1"><Ico name="back" size={13}/> Back to Rules</button>
              <ContextStrip fieldId={fieldId} dir={f.dir} mode={f.mode} ruleName={baseRule && baseRule.name} onEdit={editChoices}/>
              <RuleEditor key={(f.mode==="existing" ? ("ex-"+f.ruleId) : "new") + "-" + f.dir} fieldId={fieldId} dir={f.dir} baseRule={f.mode==="existing" ? baseRule : null} onClose={onClose} onSaved={onClose}/>
            </>}
        </div>
      </aside>
    </>
  );
}

/* ============================================================ APP */
function AppV10(){
  const [tab, setTab]           = useState("builder");
  const [selField, setSelField] = useState(null);
  const [intent, setIntent]     = useState(null);
  const [flash, setFlash]       = useState(null);
  const [flow, setFlow]         = useState(null);   // field-driven rule-attachment flow
  const [customOpen, setCustomOpen] = useState(false); // Create Custom Rule drawer
  const [customFamily, setCustomFamily] = useState(null); // open the drawer straight into a family (null = dashboard)
  const [toast, setToast]       = useState("");

  const openFlow   = (fieldId) => { setSelField(null); setFlash(fieldId); setFlow({ field:fieldId, mode:null, ruleId:null, dir:null, entered:false, creating:false }); };
  const closeFlow  = () => { setFlow(null); setFlash(null); };
  // Create Form Rule → open the existing form-rule builder straight into "create new" for a default field.
  const createForm = () => { setSelField(null); setFlash(null); setFlow({ field: ALL_FIELDS[0].id, mode:"new", ruleId:null, dir:null, entered:false, creating:true }); };
  const openCustom = () => { setCustomFamily(null); setCustomOpen(true); };
  const openCustomFamily = (famId) => { setFlow(null); setFlash(null); setCustomFamily(famId); setCustomOpen(true); };  // from an inline custom-rule entry
  const closeCustom= () => setCustomOpen(false);
  // Save Custom Rules: persist the session (mock), close the drawer, refresh the Form Rules view + toast.
  const saveCustom = () => { setCustomOpen(false); setTab("rules"); setToast("Custom rules saved successfully."); };
  useEffect(()=>{ if(!toast) return; const t=setTimeout(()=>setToast(""), 3000); return ()=>clearTimeout(t); }, [toast]);
  // "Add rule" launches the guided attach flow; View / Edit go to the Form Rules tab.
  const goRules    = (fieldId) => openFlow(fieldId);   // field-centric: one action opens the rule sidebar
  const openTab    = () => { setTab("rules"); };
  const openBuilder= () => { setTab("builder"); };
  const onOpen     = (fieldId, it) => { setSelField(fieldId); setIntent(it); };
  const onClear    = () => { setSelField(null); setIntent(null); };

  // When we return to the builder carrying a field context, flash that field.
  useEffect(()=>{
    if(tab==="builder" && selField){
      setFlash(selField);
      const t = setTimeout(()=> setFlash(null), 2300);
      return ()=> clearTimeout(t);
    }
  }, [tab, selField]);

  return (
    <div className="v10 h-screen flex flex-col bg-slate-100 text-slate-800 overflow-hidden">
      <TopBar/>
      <div className="flex flex-1 min-h-0">
        <IconRail/>
        <main className="flex-1 flex flex-col min-w-0">
          <HeaderRow/>
          <TabsRow tab={tab} onBuilder={openBuilder} onRules={openTab} total={totalRules()}/>
          <div className="flex-1 min-h-0 overflow-hidden">
            <div key={tab} className={(tab==="rules" ? "v10-slide" : "v10-fade") + " h-full"}>
              {tab==="builder"
                ? <FormBuilder flash={flash} goRules={goRules}/>
                : <FormRulesHome field={selField} intent={intent} onBack={openBuilder} onOpen={onOpen} onClear={onClear} onCreateForm={createForm} onCreateCustom={openCustom}/>}
            </div>
          </div>
        </main>
      </div>
      {flow && <RuleFlow flow={flow} setFlow={setFlow} onClose={closeFlow} onCustom={openCustomFamily}/>}
      {customOpen && <CustomRuleDrawer initialFamily={customFamily} onClose={closeCustom} onSaved={saveCustom}/>}
      {toast && <div className="fixed bottom-5 left-1/2 -translate-x-1/2 z-[60] rounded-lg bg-slate-900 text-white text-[13px] px-4 py-2.5 shadow-lg flex items-center gap-2"><Ico name="check" size={15} cls="text-emerald-400"/>{toast}</div>}
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById("root")).render(<AppV10 />);
} catch (e) {
  var _err = document.createElement("pre");
  _err.id = "v10err";
  _err.style.cssText = "white-space:pre-wrap;background:#fff1f2;color:#9f1239;padding:14px 16px;margin:0;font:13px/1.5 ui-monospace,Menlo,Consolas,monospace;border-bottom:3px solid #e11d48;";
  _err.textContent = "V10 runtime error:\n\n" + ((e && e.stack) ? e.stack : (e && e.message ? e.message : e));
  document.body.insertBefore(_err, document.body.firstChild);
}
</script>

<!-- self-compile safety net: prints the exact Babel error on screen if the app fails to compile (silent on success) -->
<script>
  window.addEventListener("load", function(){
    setTimeout(function(){
      var root = document.getElementById("root");
      if (root && root.children.length) return;      // rendered fine
      if (document.getElementById("v10err")) return; // runtime error already shown by the render try/catch
      var msg;
      if (!window.React || !window.ReactDOM) {
        msg = "React / ReactDOM did not load from the CDN (unpkg.com).\nCheck your internet connection or an ad-blocker, then hard-reload (Ctrl+Shift+R).";
      } else if (!window.Babel) {
        msg = "Babel did not load from the CDN (unpkg.com).\nCheck your internet connection or an ad-blocker, then hard-reload (Ctrl+Shift+R).";
      } else {
        try {
          var s = document.querySelector('script[type="text/babel"]');
          if (s) Babel.transform(s.textContent, { presets:["react"] });
          msg = "Scripts loaded and compiled OK, but nothing rendered — likely a runtime error.\nOpen DevTools (F12) and copy the red Console error.";
        } catch(err){
          msg = "V10 failed to compile:\n\n" + (err && err.message ? err.message : err);
        }
      }
      var pre = document.createElement("pre");
      pre.style.cssText = "white-space:pre-wrap;background:#fff1f2;color:#9f1239;padding:14px 16px;margin:0;font:13px/1.5 ui-monospace,Menlo,Consolas,monospace;border-bottom:3px solid #e11d48;";
      pre.textContent = msg;
      document.body.insertBefore(pre, document.body.firstChild);
    }, 600);
  });
</script>
</body>
</html>
